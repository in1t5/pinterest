<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Pin 38 — Forest Meadow</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="pins.css" />
<link rel="stylesheet" href="pins-36-40.css" />
<style>
  html, body { margin: 0; padding: 20px; background: #f0eee9; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; box-sizing: border-box; }
  .pin-wrap { transform-origin: top center; }
</style>
</head>
<body>
<div class="pin-wrap">
  <div class="pin pin-38">
    <div class="top">
      <span class="eyebrow"><span class="dot"></span><span>Portfolio Calculator</span></span>
      <span class="tag">— a small, mixed meadow —</span>
    </div>

    <h1 class="headline">Don't plant one tree.<br />Plant <em>a small meadow.</em></h1>

    <div class="meadow">
      <svg viewBox="0 0 1000 740" preserveAspectRatio="xMidYMax meet">
        <!-- distant hills -->
        <path d="M -50 540 Q 200 480 450 520 Q 700 560 1050 500 L 1050 740 L -50 740 Z" fill="#C1D5A5" opacity="0.35" />

        <g transform="translate(30,0)">
        <!-- OAK: x=130, h=380, w=200 -->
        <ellipse cx="130" cy="371" rx="110" ry="159.6" fill="#84A17C" opacity="0.92" />
        <ellipse cx="70" cy="409" rx="64" ry="106.4" fill="#84A17C" opacity="0.92" />
        <ellipse cx="190" cy="409" rx="64" ry="106.4" fill="#84A17C" opacity="0.92" />
        <ellipse cx="130" cy="295" rx="60" ry="76" fill="#C1D5A5" opacity="0.92" />
        <path d="M 130 580 Q 126 428 130 352" fill="none" stroke="#47584F" stroke-width="9" stroke-linecap="round" />
        <circle cx="70" cy="390" r="9" fill="#F5EEED" stroke="#F1683F" stroke-width="2" />
        <text x="70" y="395" text-anchor="middle" font-family="Cormorant Garamond, serif" font-size="13" fill="#F1683F" font-weight="500">€</text>
        <circle cx="190" cy="390" r="9" fill="#F5EEED" stroke="#F1683F" stroke-width="2" />
        <text x="190" y="395" text-anchor="middle" font-family="Cormorant Garamond, serif" font-size="13" fill="#F1683F" font-weight="500">€</text>

        <!-- PINE: x=350, h=280, w=150 -->
        <path d="M 350 300 L 275 454 L 425 454 Z" fill="#47584F" opacity="0.85" />
        <path d="M 350 384 L 290 510 L 410 510 Z" fill="#47584F" opacity="0.85" />
        <path d="M 350 468 L 297.5 566 L 402.5 566 Z" fill="#47584F" opacity="0.85" />
        <rect x="345" y="566" width="10" height="20" fill="#5C4033" />

        <!-- BIRCH: x=540, h=220, w=130 -->
        <ellipse cx="540" cy="448" rx="71.5" ry="77" fill="#84A17C" opacity="0.88" />
        <ellipse cx="515" cy="459" rx="39" ry="48.4" fill="#C1D5A5" opacity="0.9" />
        <path d="M 540 580 L 538 448" fill="none" stroke="#47584F" stroke-width="5" stroke-linecap="round" />

        <!-- SHRUB: x=720, h=180, w=110 -->
        <ellipse cx="720" cy="490" rx="60.5" ry="90" fill="#84A17C" opacity="0.85" />
        <ellipse cx="702" cy="508" rx="35.2" ry="54" fill="#C1D5A5" opacity="0.85" />

        <!-- SAPLING: x=880, h=110, w=70 -->
        <ellipse cx="880" cy="519.5" rx="35" ry="38.5" fill="#C1D5A5" />
        <path d="M 880 580 L 880 514" fill="none" stroke="#47584F" stroke-width="2.5" stroke-linecap="round" />
        </g>

        <!-- birds -->
        <g stroke="#47584F" stroke-width="2" fill="none" stroke-linecap="round">
          <path d="M 200 180 Q 210 170 220 180 Q 230 170 240 180" />
          <path d="M 760 110 Q 768 102 776 110 Q 784 102 792 110" />
        </g>
      </svg>
    </div>

    <div class="horizon-line"></div>

    <div class="ground-row">
      <div class="acct">
        <div class="lbl">Oak</div>
        <div class="name">Index ETF</div>
        <div class="val">€312K</div>
        <div class="pct">65% of portfolio</div>
      </div>
      <div class="acct">
        <div class="lbl">Pine</div>
        <div class="name">Pension</div>
        <div class="val">€88K</div>
        <div class="pct">18%</div>
      </div>
      <div class="acct">
        <div class="lbl">Birch</div>
        <div class="name">Bonds</div>
        <div class="val">€42K</div>
        <div class="pct">9%</div>
      </div>
      <div class="acct">
        <div class="lbl">Shrub</div>
        <div class="name">Cash buffer</div>
        <div class="val coral">€18K</div>
        <div class="pct">4%</div>
      </div>
      <div class="acct">
        <div class="lbl">Sapling</div>
        <div class="name">Crypto / risk</div>
        <div class="val">€8K</div>
        <div class="pct">2%</div>
      </div>
    </div>

    <div class="footer">
      <div class="footer-brand">
        <img src="../assets/logo_brownish_framed_no_text_2501x2500.png" alt="" />
        <div>
          <div class="name">Time &amp; Moneytree</div>
          <div class="url">TIMEANDMONEYTREE.COM</div>
        </div>
      </div>
      <span class="cta-pill">Plan your meadow →</span>
    </div>
  </div>
</div>
<script>
function fit() {
  var scale = Math.min(1, (window.innerHeight - 40) / 1500, (window.innerWidth - 40) / 1000);
  document.querySelector('.pin-wrap').style.transform = 'scale(' + scale + ')';
  document.body.style.minHeight = Math.round(1500 * scale + 40) + 'px';
}
fit();
window.addEventListener('resize', fit);
</script>
</body>
</html>
