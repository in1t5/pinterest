<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Financial Ledger — Your Number Every Year · 1000×1500</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600&family=Lato:wght@300;400;500;700;900&family=Pinyon+Script&display=swap" rel="stylesheet" />
<style>
html, body { margin: 0; padding: 20px; background: #2b2f2d; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; box-sizing: border-box; }
.pin-wrap { transform-origin: top center; }
.grain { position: absolute; inset: 0; pointer-events: none; opacity: 0.06; mix-blend-mode: multiply; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/%3E%3CfeColorMatrix values='0 0 0 0 0.28 0 0 0 0 0.34 0 0 0 0 0.31 0 0 0 1 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); }
</style>
</head>
<body>
<div class="pin-wrap">
<div style="width:1000px;height:1500px;background:#1a1f1c;position:relative;overflow:hidden;font-family:Lato,sans-serif;">
  <div class="grain"></div>
  <div style="position:absolute;inset:0;opacity:0.15;background:radial-gradient(circle at 30% 20%,#47584F 0%,transparent 50%);"></div>

  <div style="padding:90px 80px 0;position:relative;">
    <div style="font-family:'Pinyon Script',cursive;font-size:62px;line-height:1;color:#C1D5A5;margin-bottom:10px;">your number,</div>
    <div style="font-family:'Pinyon Script',cursive;font-size:62px;line-height:1;color:#C1D5A5;margin-left:40px;margin-bottom:28px;">every year.</div>
    <div style="font-family:'Cormorant Garamond',Georgia,serif;font-weight:300;font-size:104px;line-height:1.05;color:#F5EEED;margin-bottom:4px;">Financial</div>
    <div style="font-family:'Cormorant Garamond',Georgia,serif;font-weight:300;font-style:italic;font-size:104px;line-height:1.05;color:#C1D5A5;margin-bottom:24px;">Ledger.</div>
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:20px;">
      <div style="width:50px;height:1px;background:#C1D5A5;"></div>
      <div style="font-family:Lato,sans-serif;font-size:16px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#C1D5A5;">No spreadsheet needed</div>
    </div>
    <div style="font-family:Lato,sans-serif;font-size:27px;font-weight:400;line-height:1.45;color:#EAEDCE;max-width:520px;">Track net worth. Watch wealth compound. One free tool, used once a year.</div>
  </div>

  <!-- Net worth card -->
  <div style="padding:50px 80px 0;position:relative;">
    <div style="background:linear-gradient(135deg,#EAEDCE 0%,#F5EEED 100%);border-radius:8px;padding:32px 36px;box-shadow:0 12px 32px rgba(0,0,0,0.25);">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;">
        <div style="font-family:Lato,sans-serif;font-size:16px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#84A17C;">Net worth</div>
        <div style="font-size:16px;letter-spacing:2px;color:#6E686A;font-weight:700;">2024</div>
      </div>
      <div style="font-family:'Cormorant Garamond',Georgia,serif;font-weight:400;font-style:italic;font-size:92px;line-height:1;color:#1A1A18;margin-bottom:12px;">$231,000</div>
      <div style="display:flex;align-items:center;gap:8px;">
        <div style="width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;border-bottom:10px solid #84A17C;"></div>
        <div style="font-family:Lato,sans-serif;font-size:25px;font-weight:700;color:#47584F;">+$89,000 this year</div>
      </div>
    </div>

    <!-- Chart -->
    <div style="margin-top:30px;padding:20px 0 0;position:relative;">
      <svg width="840" height="260" viewBox="0 0 840 260">
        <defs>
          <linearGradient id="cgrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#C1D5A5" stop-opacity="0.3"/>
            <stop offset="100%" stop-color="#C1D5A5" stop-opacity="0"/>
          </linearGradient>
        </defs>
        <path d="M 0 166 L 168 146 L 336 120 L 504 94 L 672 77 L 840 57 L 840 220 L 0 220 Z" fill="url(#cgrad)"/>
        <path d="M 0 166 L 168 146 L 336 120 L 504 94 L 672 77 L 840 57" stroke="#C1D5A5" stroke-width="2" fill="none" stroke-linecap="round"/>
        <circle cx="0" cy="166" r="5" fill="#F5EEED" stroke="#C1D5A5" stroke-width="2"/>
        <circle cx="168" cy="146" r="5" fill="#F5EEED" stroke="#C1D5A5" stroke-width="2"/>
        <circle cx="336" cy="120" r="5" fill="#F5EEED" stroke="#C1D5A5" stroke-width="2"/>
        <circle cx="504" cy="94" r="5" fill="#F5EEED" stroke="#C1D5A5" stroke-width="2"/>
        <circle cx="672" cy="77" r="5" fill="#F5EEED" stroke="#C1D5A5" stroke-width="2"/>
        <circle cx="840" cy="57" r="5" fill="#F5EEED" stroke="#C1D5A5" stroke-width="2"/>
        <text x="0" y="244" fill="#84A17C" font-family="Lato,sans-serif" font-size="14" text-anchor="middle" letter-spacing="2">2019</text>
        <text x="168" y="244" fill="#84A17C" font-family="Lato,sans-serif" font-size="14" text-anchor="middle" letter-spacing="2">2020</text>
        <text x="336" y="244" fill="#84A17C" font-family="Lato,sans-serif" font-size="14" text-anchor="middle" letter-spacing="2">2021</text>
        <text x="504" y="244" fill="#84A17C" font-family="Lato,sans-serif" font-size="14" text-anchor="middle" letter-spacing="2">2022</text>
        <text x="672" y="244" fill="#84A17C" font-family="Lato,sans-serif" font-size="14" text-anchor="middle" letter-spacing="2">2023</text>
        <text x="840" y="244" fill="#84A17C" font-family="Lato,sans-serif" font-size="14" text-anchor="middle" letter-spacing="2">2024</text>
      </svg>
    </div>

    <div style="text-align:center;margin-top:12px;">
      <div style="font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:27px;color:#C1D5A5;">Log once a year. The chart writes itself.</div>
    </div>
  </div>

  <!-- Footer dark -->
  <div style="position:absolute;bottom:0;left:0;right:0;height:90px;background:#3a473f;display:flex;align-items:center;padding:0 36px;gap:16px;">
    <div style="width:44px;height:44px;border-radius:50%;background:#F5EEED;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid rgba(71,88,79,0.15);">
      <img src="logo.svg" style="width:32px;height:32px;" alt="" />
    </div>
    <div style="flex:1;line-height:1.2;">
      <div style="font-family:Lato,sans-serif;font-size:21px;font-weight:700;color:#F5EEED;">Free tool — no sign-up</div>
      <div style="font-family:Lato,sans-serif;font-size:16px;color:#C1D5A5;letter-spacing:2px;text-transform:uppercase;margin-top:3px;">timeandmoneytree.com</div>
    </div>
    <div style="padding:12px 22px;border:1px solid rgba(245,238,237,0.4);border-radius:999px;font-family:Lato,sans-serif;font-size:18px;font-weight:700;color:#F5EEED;letter-spacing:1.5px;text-transform:uppercase;">Calculate →</div>
  </div>
</div>
</div>
<script>
function fit() {
  var scale = Math.min(1, (window.innerHeight - 40) / 1500, (window.innerWidth - 40) / 1000);
  document.querySelector('.pin-wrap').style.transform = 'scale(' + scale + ')';
  document.body.style.minHeight = Math.round(1500 * scale + 40) + 'px';
}
fit();
window.addEventListener('resize', fit);
</script>
</body>
</html>
