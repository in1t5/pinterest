<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Beginner Net Worth Steps · Financial Ledger · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;width:420px;height:630px;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 15 · Step Ladder Beginner · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/only_tree.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=72;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.fillStyle='#ffffff';ctx.fill();ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',200,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',200,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle=P.cream;ctx.fillRect(0,0,W,H);
  ctx.fillStyle=P.green;ctx.fillRect(0,0,W,8);

  // Headline
  ctx.fillStyle=P.green;ctx.font='700 22px Lato';ctx.letterSpacing='0.14em';
  ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('YOUR FIRST NET WORTH ENTRY',W/2,52);
  ctx.letterSpacing='0em';
  ctx.fillStyle=P.warmGray;ctx.font='italic 300 36px "Cormorant Garamond"';
  ctx.fillText('Takes under 5 minutes. Promise.',W/2,98);

  const steps=[
    {num:'01',time:'1 min',title:'Open Financial Ledger',desc:'Enter today\'s date in the entry form'},
    {num:'02',time:'1 min',title:'List everything you own',desc:'savings · investments · property · pension'},
    {num:'03',time:'30 sec',title:'List everything you owe',desc:'mortgage · loans · credit cards'},
    {num:'04',time:'30 sec',title:'See net worth instantly',desc:'Save it. Your journey starts here.'},
  ];

  const cardX=60,cardW=880,cardH=188,cardGap=20,startY=128;
  steps.forEach((step,i)=>{
    const cy=startY+i*(cardH+cardGap);
    rrect(cardX,cy,cardW,cardH,16);
    ctx.fillStyle=rgba(P.green,.06);ctx.fill();
    ctx.strokeStyle=rgba(P.sage,.25);ctx.lineWidth=1.5;ctx.stroke();

    // Sage step number circle
    ctx.beginPath();ctx.arc(cardX+58,cy+cardH/2,36,0,Math.PI*2);
    ctx.fillStyle=P.sage;ctx.fill();
    ctx.fillStyle=P.white;ctx.font='700 20px Lato';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(step.num,cardX+58,cy+cardH/2);

    // Time chip
    const chipW=90,chipH=32,chipX=cardX+cardW-chipW-20,chipY=cy+20;
    rrect(chipX,chipY,chipW,chipH,16);
    ctx.fillStyle=P.sageFaint;ctx.fill();
    ctx.strokeStyle=P.sage;ctx.lineWidth=1.5;ctx.stroke();
    ctx.fillStyle=P.green;ctx.font='700 16px Lato';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(step.time,chipX+chipW/2,chipY+chipH/2);

    // Text
    ctx.fillStyle=P.greenDk;ctx.font='700 26px Lato';ctx.textAlign='left';ctx.textBaseline='alphabetic';
    ctx.fillText(step.title,cardX+116,cy+72);
    ctx.fillStyle=P.warmGray;ctx.font='300 22px Lato';
    ctx.fillText(step.desc,cardX+116,cy+108);
  });

  // Total time summary
  const sumY=1028;
  rrect(60,sumY,880,60,30);
  ctx.fillStyle=P.sagePale;ctx.fill();
  ctx.fillStyle=P.greenDk;ctx.font='700 22px Lato';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.letterSpacing='0.06em';
  ctx.fillText('TOTAL TIME: ~3 MINUTES',W/2,sumY+30);
  ctx.letterSpacing='0em';

  // Italic sage strip tagline
  ctx.fillStyle=P.green;ctx.fillRect(0,1110,W,80);
  ctx.fillStyle=P.sagePale;ctx.font='italic 300 36px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('"One number. Every year. Life-changing clarity."',W/2,1150);

  // CTA
  const pw=360,ph=68,ppx=W/2-pw/2,ppy=1224;
  rrect(ppx,ppy,pw,ph,34);
  ctx.fillStyle=P.green;ctx.fill();
  ctx.fillStyle=P.white;ctx.font='700 26px Lato';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.letterSpacing='0.04em';
  ctx.fillText('Open Free Ledger  →',W/2,ppy+ph/2);
  ctx.letterSpacing='0em';

  ctx.fillStyle=rgba(P.warmGray,.72);ctx.font='300 17px Lato';ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('financial ledger  ·  net worth tracker  ·  free tool',W/2,1350);

  drawFooter();
}
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='financial-ledger-15-step-ladder-beginner-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
