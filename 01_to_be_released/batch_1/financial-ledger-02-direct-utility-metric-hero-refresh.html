<!doctype html>
<html lang="en">
<head>

<style>

</head>
<body>
<div class="pin-wrap">

    </div>

    <svg width="840" height="240" viewBox="0 0 840 240">
      <defs>
        <linearGradient id="tgrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#C1D5A5" stop-opacity="0.3"/>
          <stop offset="100%" stop-color="#C1D5A5" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <path d="M 0 150 L 168 133 L 336 110 L 504 88 L 672 73 L 840 55 L 840 200 L 0 200 Z" fill="url(#tgrad)"/>
      <path d="M 0 150 L 168 133 L 336 110 L 504 88 L 672 73 L 840 55" stroke="#C1D5A5" stroke-width="2" fill="none" stroke-linecap="round"/>
      <circle cx="0" cy="150" r="5" fill="#1a1f1c" stroke="#C1D5A5" stroke-width="2"/>
      <circle cx="168" cy="133" r="5" fill="#1a1f1c" stroke="#C1D5A5" stroke-width="2"/>

      <circle cx="504" cy="88" r="5" fill="#1a1f1c" stroke="#C1D5A5" stroke-width="2"/>
      <circle cx="672" cy="73" r="5" fill="#1a1f1c" stroke="#C1D5A5" stroke-width="2"/>
      <circle cx="840" cy="55" r="5" fill="#1a1f1c" stroke="#C1D5A5" stroke-width="2"/>
      <text x="0" y="224" fill="#84A17C" font-family="Lato,sans-serif" font-size="14" text-anchor="middle" letter-spacing="2">2019</text>
      <text x="168" y="224" fill="#84A17C" font-family="Lato,sans-serif" font-size="14" text-anchor="middle" letter-spacing="2">2020</text>
      <text x="336" y="224" fill="#84A17C" font-family="Lato,sans-serif" font-size="14" text-anchor="middle" letter-spacing="2">2021</text>
      <text x="504" y="224" fill="#84A17C" font-family="Lato,sans-serif" font-size="14" text-anchor="middle" letter-spacing="2">2022</text>

    <div style="text-align:center;margin-top:16px;font-family:Lato,sans-serif;font-size:18px;color:#84A17C;letter-spacing:2px;font-weight:700;text-transform:uppercase;">Free tool · no account · works in browser</div>
  </div>

  <!-- Footer dark -->
  <div style="position:absolute;bottom:0;left:0;right:0;height:90px;background:#3a473f;display:flex;align-items:center;padding:0 36px;gap:16px;">
    <div style="width:44px;height:44px;border-radius:50%;background:#F5EEED;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid rgba(71,88,79,0.15);">

    </div>
    <div style="padding:12px 22px;border:1px solid rgba(245,238,237,0.4);border-radius:999px;font-family:Lato,sans-serif;font-size:18px;font-weight:700;color:#F5EEED;letter-spacing:1.5px;text-transform:uppercase;">Calculate →</div>
  </div>

</div>
<script>
function fit() {
  var scale = Math.min(1, (window.innerHeight - 40) / 1500, (window.innerWidth - 40) / 1000);
  document.querySelector('.pin-wrap').style.transform = 'scale(' + scale + ')';
  document.body.style.minHeight = Math.round(1500 * scale + 40) + 'px';
}
fit();
window.addEventListener('resize', fit);
</script>
</body>
</html>
