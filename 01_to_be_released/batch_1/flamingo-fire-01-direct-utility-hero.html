<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flamingo FIRE Calculator — Advanced Retirement Planning &amp; Scenario Modeling · Flamingo FIRE Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 01 · Direct Utility Hero · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxWidth&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);return y;
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_no_text_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=72;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.fillStyle='#ffffff';ctx.fill();ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',200,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',200,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Cream background
  ctx.fillStyle=P.cream;
  ctx.fillRect(0,0,W,1395);

  // Top decorative band
  ctx.fillStyle=P.green;
  ctx.fillRect(0,0,W,12);

  // Pinyon Script whisper
  ctx.fillStyle=rgba(P.sage,0.35);
  ctx.font='72px "Pinyon Script"';
  ctx.textBaseline='top';
  ctx.textAlign='center';
  ctx.fillText('model every scenario.',W/2,48);

  // Main headline
  ctx.fillStyle=P.green;
  ctx.font='italic 300 80px "Cormorant Garamond"';
  ctx.textAlign='center';
  ctx.textBaseline='top';
  ctx.fillText('Flamingo FIRE',W/2,148);
  ctx.fillText('Calculator',W/2,240);

  // Divider
  ctx.strokeStyle=P.sage;
  ctx.lineWidth=2;
  ctx.beginPath();
  ctx.moveTo(120,345);ctx.lineTo(880,345);
  ctx.stroke();

  // Sub headline
  ctx.fillStyle=P.warmGray;
  ctx.font='300 30px Lato';
  ctx.textAlign='center';
  ctx.fillText('Advanced retirement scenario modeling',W/2,368);
  ctx.fillText('— free, no email required.',W/2,408);

  // Three metric chips
  const chips=[
    {label:'Retire At',val:'58'},
    {label:'Portfolio',val:'$1.2M'},
    {label:'Success',val:'97%'},
  ];
  const chipW=260,chipH=110,chipY=470,chipGap=20;
  const totalW=chips.length*chipW+(chips.length-1)*chipGap;
  let chipX=(W-totalW)/2;
  chips.forEach(chip=>{
    rrect(chipX,chipY,chipW,chipH,16);
    ctx.fillStyle=P.white;ctx.fill();
    ctx.strokeStyle=P.sage;ctx.lineWidth=2;ctx.stroke();
    ctx.fillStyle=P.warmGray;ctx.font='700 14px Lato';ctx.letterSpacing='0.12em';
    ctx.textAlign='center';ctx.textBaseline='top';
    ctx.fillText(chip.label.toUpperCase(),chipX+chipW/2,chipY+18);
    ctx.fillStyle=P.green;ctx.font='700 48px "Cormorant Garamond"';ctx.letterSpacing='0em';
    ctx.textBaseline='top';
    ctx.fillText(chip.val,chipX+chipW/2,chipY+40);
    chipX+=chipW+chipGap;
  });

  // Body text
  ctx.fillStyle=P.nearBlk;
  ctx.font='300 28px Lato';
  ctx.textAlign='center';
  ctx.textBaseline='top';
  const bodyY=620;
  ctx.fillText('Model income changes, life events,',W/2,bodyY);
  ctx.fillText('withdrawal strategies, and',W/2,bodyY+44);
  ctx.fillText('40-year forecasts.',W/2,bodyY+88);

  // Feature list
  const features=[
    '✦  Flamingo FIRE scenario modeling',
    '✦  Life events & one-off expenses',
    '✦  Dynamic withdrawal strategies',
    '✦  40-year portfolio simulation',
  ];
  ctx.fillStyle=P.green;
  ctx.font='400 24px Lato';
  ctx.textAlign='left';
  ctx.textBaseline='top';
  let fy=800;
  features.forEach(f=>{
    ctx.fillText(f,100,fy);
    fy+=52;
  });

  // Divider 2
  ctx.strokeStyle=rgba(P.sage,0.5);
  ctx.lineWidth=1.5;
  ctx.beginPath();
  ctx.moveTo(80,1060);ctx.lineTo(920,1060);
  ctx.stroke();

  // Keywords strip
  ctx.fillStyle=P.warmGray;
  ctx.font='300 22px Lato';
  ctx.textAlign='center';
  ctx.textBaseline='top';
  ctx.fillText('flamingo fire calculator · retirement financial planning',W/2,1085);
  ctx.fillText('retirement planning calculator',W/2,1120);

  // CTA pill
  const ctaW=440,ctaH=80,ctaX=(W-ctaW)/2,ctaY=1230;
  rrect(ctaX,ctaY,ctaW,ctaH,40);
  ctx.fillStyle=P.green;ctx.fill();
  ctx.fillStyle=P.white;ctx.font='700 28px Lato';ctx.letterSpacing='0.06em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Calculate Yours Free →',W/2,ctaY+ctaH/2);
  ctx.letterSpacing='0em';

  // Bottom brand strip above footer
  ctx.fillStyle=rgba(P.sageFaint,0.8);
  ctx.fillRect(0,1330,W,65);
  ctx.fillStyle=P.green;
  ctx.font='700 18px Lato';ctx.letterSpacing='0.14em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('TIMEANDMONEYTREE.COM',W/2,1362);
  ctx.letterSpacing='0em';

  drawFooter();
}
function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='flamingo-fire-01-direct-utility-hero-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
