<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Retirement Portfolio Milestones by Age — Are You on Track? · Flamingo FIRE Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 26 · Educational — Milestone Tracker · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_no_text_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=72;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.fillStyle='#ffffff';ctx.fill();ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',200,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',200,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
  ctx.letterSpacing='0em';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Cream background
  ctx.fillStyle=P.cream;
  ctx.fillRect(0,0,W,1395);

  // Top header
  ctx.fillStyle=P.nearBlk;
  ctx.font='700 13px Lato';ctx.letterSpacing='0.20em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('ARE YOU ON TRACK?',W/2,40);
  ctx.letterSpacing='0em';

  ctx.fillStyle=P.nearBlk;
  ctx.font='700 46px Lato';
  ctx.textBaseline='top';
  ctx.fillText('RETIREMENT PORTFOLIO',W/2,78);
  ctx.fillText('MILESTONES BY AGE',W/2,132);

  ctx.fillStyle=P.sage;
  ctx.font='italic 300 26px "Cormorant Garamond"';
  ctx.textBaseline='top';
  ctx.fillText('benchmarks to guide your accumulation journey',W/2,192);

  // Milestone rows — color ramp forest green to pale sage
  const milestones=[
    {bg:'#47584F',textColor:P.cream,rangeColor:P.sagePale,age:'Age 30',range:'$50k – $100k',note:'early accumulation'},
    {bg:'#566860',textColor:P.cream,rangeColor:P.sagePale,age:'Age 35',range:'$150k – $250k',note:'compound growth begins'},
    {bg:P.sage,textColor:P.nearBlk,rangeColor:P.green,age:'Age 40',range:'$300k – $500k',note:'Coast FIRE window opens'},
    {bg:'#9CB894',textColor:P.nearBlk,rangeColor:P.green,age:'Age 45',range:'$500k – $800k',note:'advanced accumulation'},
    {bg:'#B8D0AF',textColor:P.nearBlk,rangeColor:P.green,age:'Age 50',range:'$800k – $1.2M',note:'approaching FIRE territory'},
    {bg:P.sagePale,textColor:P.nearBlk,rangeColor:P.green,age:'Age 55',range:'$1.0M – $1.5M+',note:'retirement ready'},
  ];

  const rowX=80,rowW=840,rowH=145,rowGap=0;
  let ry=230;
  milestones.forEach((m,i)=>{
    ctx.fillStyle=m.bg;
    ctx.fillRect(rowX,ry,rowW,rowH);

    // Age chip (sage pill on left)
    const chipW=108,chipH=40,chipX=rowX+24,chipY=ry+(rowH-chipH)/2;
    rrect(chipX,chipY,chipW,chipH,20);
    ctx.fillStyle=i<3?rgba(P.cream,0.20):rgba(P.green,0.18);
    ctx.fill();
    ctx.strokeStyle=i<3?rgba(P.cream,0.35):rgba(P.green,0.35);ctx.lineWidth=1.5;ctx.stroke();
    ctx.fillStyle=m.textColor;
    ctx.font='700 19px Lato';ctx.letterSpacing='0em';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(m.age,chipX+chipW/2,chipY+chipH/2);

    // Portfolio range
    const rangeX=chipX+chipW+24;
    ctx.fillStyle=m.rangeColor;
    ctx.font='700 36px Lato';ctx.letterSpacing='0em';
    ctx.textAlign='left';ctx.textBaseline='middle';
    ctx.fillText(m.range,rangeX,ry+rowH/2-14);

    // Note italic
    ctx.fillStyle=i<2?rgba(P.cream,0.65):rgba(P.nearBlk,0.58);
    ctx.font='italic 300 22px "Cormorant Garamond"';
    ctx.textBaseline='middle';
    ctx.fillText(m.note,rangeX,ry+rowH/2+22);

    ry+=rowH+rowGap;
  });

  // CTA
  const ctaW=420,ctaH=76,ctaX=(W-ctaW)/2,ctaY=1200;
  rrect(ctaX,ctaY,ctaW,ctaH,38);
  ctx.fillStyle=P.green;ctx.fill();
  ctx.fillStyle=P.cream;ctx.font='700 26px Lato';ctx.letterSpacing='0.06em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Find Your Milestone  →',W/2,ctaY+ctaH/2);
  ctx.letterSpacing='0em';

  // URL
  ctx.fillStyle=rgba(P.green,0.45);
  ctx.font='300 18px Lato';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('timeandmoneytree.com',W/2,1318);

  drawFooter();
}
function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='flamingo-fire-26-educational-milestone-tracker-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
