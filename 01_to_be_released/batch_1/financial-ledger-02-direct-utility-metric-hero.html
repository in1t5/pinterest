<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Your Net Worth — Tracked, Charted, and Growing · Financial Ledger · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 02 · Direct Utility Metric Hero · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_no_text_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=72;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.fillStyle='#ffffff';ctx.fill();ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',200,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',200,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);
  // Background near-black with subtle radial
  ctx.fillStyle=P.nearBlk;ctx.fillRect(0,0,W,H);
  const bgGrad=ctx.createRadialGradient(W/2,H/2,100,W/2,H/2,800);
  bgGrad.addColorStop(0,rgba(P.green,.15));bgGrad.addColorStop(1,'transparent');
  ctx.fillStyle=bgGrad;ctx.fillRect(0,0,W,H);

  // Pinyon script accent
  ctx.fillStyle=rgba(P.sagePale,.6);ctx.font='italic 72px "Pinyon Script"';
  ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('your number',W/2,140);

  // Serif headline
  ctx.fillStyle=P.cream;ctx.font='300 88px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('Net Worth Tracker',W/2,240);

  // Thin rule
  ctx.strokeStyle=rgba(P.sagePale,.25);ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(140,268);ctx.lineTo(860,268);ctx.stroke();

  // Large metric card
  const cx=80,cy=310,cw=840,ch=340;
  rrect(cx,cy,cw,ch,24);
  ctx.fillStyle=rgba(P.white,.97);ctx.fill();
  ctx.strokeStyle=rgba(P.sagePale,.3);ctx.lineWidth=1.5;ctx.stroke();

  // Big number
  ctx.fillStyle=P.green;ctx.font='italic 300 108px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('$231,000',W/2,cy+130);

  // Divider inside card
  ctx.strokeStyle=rgba(P.sagePale,.5);ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(cx+60,cy+200);ctx.lineTo(cx+cw-60,cy+200);ctx.stroke();

  // Growth row
  ctx.fillStyle=P.sage;ctx.font='700 36px Lato';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('▲ +$89,000 this year',W/2,cy+270);

  // Body text
  ctx.fillStyle=P.warmGray;ctx.font='300 28px Lato';
  ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('Log your assets and liabilities once a year.',W/2,730);
  ctx.fillText('Watch the number grow.',W/2,768);

  // Mini sparkline
  const sx=160,sy=820,sw=680,sh=160;
  const spts=[[sx,sy+sh-10],[sx+sw*0.2,sy+sh-55],[sx+sw*0.4,sy+sh-100],[sx+sw*0.65,sy+sh-130],[sx+sw,sy+10]];
  // area
  const aG=ctx.createLinearGradient(0,sy,0,sy+sh);
  aG.addColorStop(0,rgba(P.sage,.3));aG.addColorStop(1,rgba(P.sage,.02));
  ctx.fillStyle=aG;ctx.beginPath();ctx.moveTo(spts[0][0],sy+sh);
  spts.forEach(p=>ctx.lineTo(p[0],p[1]));ctx.lineTo(spts[spts.length-1][0],sy+sh);ctx.closePath();ctx.fill();
  ctx.strokeStyle=P.sagePale;ctx.lineWidth=3.5;ctx.lineJoin='round';
  ctx.beginPath();spts.forEach((p,i)=>i===0?ctx.moveTo(p[0],p[1]):ctx.lineTo(p[0],p[1]));ctx.stroke();
  spts.forEach(p=>{ctx.beginPath();ctx.arc(p[0],p[1],7,0,Math.PI*2);ctx.fillStyle=P.cream;ctx.fill();ctx.strokeStyle=P.sagePale;ctx.lineWidth=2.5;ctx.stroke();});

  // Year labels under sparkline
  const yrs=['2019','2020','2021','2022','2023'];
  ctx.fillStyle=rgba(P.warmGray,.6);ctx.font='700 17px Lato';ctx.textAlign='center';
  spts.forEach((p,i)=>{ctx.fillText(yrs[i],p[0],sy+sh+26);});

  // CTA pill
  const pw=360,ph=70,ppx=W/2-pw/2,ppy=1070;
  rrect(ppx,ppy,pw,ph,35);
  const pGrad=ctx.createLinearGradient(ppx,ppy,ppx+pw,ppy);
  pGrad.addColorStop(0,P.sage);pGrad.addColorStop(1,P.green);
  ctx.fillStyle=pGrad;ctx.fill();
  ctx.fillStyle=P.white;ctx.font='700 26px Lato';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Start Tracking Free →',W/2,ppy+ph/2);

  // Tag line
  ctx.fillStyle=rgba(P.sagePale,.45);ctx.font='italic 300 22px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('Free tool · No account required · Works in browser',W/2,1210);

  drawFooter();
}
function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='financial-ledger-02-direct-utility-metric-hero-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
