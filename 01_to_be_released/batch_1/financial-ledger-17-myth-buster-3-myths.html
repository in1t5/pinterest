<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3 Net Worth Myths Busted · Financial Ledger · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 17 · Myth Buster 3 Myths · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_no_text_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=72;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.fillStyle='#ffffff';ctx.fill();ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',200,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',200,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxWidth&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);return y;
}
function render(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle=P.cream;ctx.fillRect(0,0,W,H);
  ctx.fillStyle=P.green;ctx.fillRect(0,0,W,8);

  // Headline
  ctx.fillStyle=P.green;ctx.font='700 22px Lato';ctx.letterSpacing='0.14em';
  ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('3 MYTHS ABOUT NET WORTH TRACKING',W/2,52);
  ctx.letterSpacing='0em';
  ctx.fillStyle=P.warmGray;ctx.font='italic 300 36px "Cormorant Garamond"';
  ctx.fillText('And the truth behind each one',W/2,98);

  const myths=[
    {
      num:'01',
      myth:'"You need a lot of money to bother tracking"',
      truth:'Tracking builds wealth — it\'s the cause, not the effect. Start with $0.',
    },
    {
      num:'02',
      myth:'"Spreadsheets are good enough"',
      truth:'A dedicated ledger adds automatic charts, trend analysis, and PDF export.',
    },
    {
      num:'03',
      myth:'"Net worth only matters near retirement"',
      truth:'Tracking in your 20s and 30s changes your entire financial trajectory.',
    },
  ];

  const cardX=60,cardW=880,startY=128,cardGap=22;
  myths.forEach((m,i)=>{
    const cardH=360;
    const cy=startY+i*(cardH+cardGap);

    // Card
    rrect(cardX,cy,cardW,cardH,18);
    ctx.fillStyle=rgba(P.green,.04);ctx.fill();
    ctx.strokeStyle=rgba(P.warmGray,.18);ctx.lineWidth=1.5;ctx.stroke();

    // Myth header band — coral
    ctx.fillStyle=P.coral;ctx.fillRect(cardX,cy,cardW,56);
    // Round top corners only
    rrect(cardX,cy,cardW,56,18);
    ctx.fillStyle=P.coral;ctx.fill();

    ctx.fillStyle=P.white;ctx.font='700 17px Lato';ctx.letterSpacing='0.16em';
    ctx.textAlign='left';ctx.textBaseline='middle';
    ctx.fillText('MYTH '+m.num,cardX+28,cy+28);
    ctx.letterSpacing='0em';
    // BUSTED chip
    rrect(cardX+cardW-110,cy+12,90,32,16);
    ctx.fillStyle=rgba(P.white,.25);ctx.fill();
    ctx.fillStyle=P.white;ctx.font='700 14px Lato';ctx.letterSpacing='0.06em';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('BUSTED',cardX+cardW-65,cy+28);
    ctx.letterSpacing='0em';

    // Myth text italic Cormorant
    ctx.fillStyle=rgba(P.nearBlk,.75);ctx.font='italic 300 36px "Cormorant Garamond"';
    ctx.textAlign='left';ctx.textBaseline='alphabetic';
    const mythTop=cy+114;
    const mythBottom=wrapText(m.myth,cardX+28,mythTop,cardW-56,44);

    // Divider
    const dividerY=mythBottom+36;
    ctx.strokeStyle=rgba(P.sage,.3);ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(cardX+28,dividerY);ctx.lineTo(cardX+cardW-28,dividerY);ctx.stroke();

    // Truth text
    ctx.fillStyle=P.green;ctx.font='300 23px Lato';ctx.textAlign='left';ctx.textBaseline='alphabetic';
    wrapText(m.truth,cardX+28,dividerY+44,cardW-56,34);
  });

  // CTA
  const pw=360,ph=68,ppx=W/2-pw/2,ppy=1232;
  rrect(ppx,ppy,pw,ph,34);
  ctx.fillStyle=P.green;ctx.fill();
  ctx.fillStyle=P.white;ctx.font='700 26px Lato';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.letterSpacing='0.04em';
  ctx.fillText('Start Tracking Free  →',W/2,ppy+ph/2);
  ctx.letterSpacing='0em';

  ctx.fillStyle=rgba(P.warmGray,.72);ctx.font='300 17px Lato';ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('financial ledger  ·  net worth tracker  ·  free tool',W/2,1360);

  drawFooter();
}
function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='financial-ledger-17-myth-buster-3-myths-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
