<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>What Would It Feel Like to See Your Net Worth Double? · Financial Ledger · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 05 · Question Hook Aspiration · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_no_text_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=72;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.fillStyle='#ffffff';ctx.fill();ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',200,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',200,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);
  // Cream background
  ctx.fillStyle=P.cream;ctx.fillRect(0,0,W,H);
  // Subtle green top wash
  const topGrad=ctx.createLinearGradient(0,0,0,300);
  topGrad.addColorStop(0,rgba(P.sageFaint,.8));topGrad.addColorStop(1,'transparent');
  ctx.fillStyle=topGrad;ctx.fillRect(0,0,W,300);

  // Top accent bar
  ctx.fillStyle=P.green;ctx.fillRect(0,0,W,10);

  // Large italic question — dominant
  ctx.fillStyle=P.greenDk;ctx.font='italic 300 78px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('What would it feel like',W/2,140);
  ctx.fillText('to see your net worth',W/2,228);
  ctx.fillStyle=P.green;ctx.font='italic 300 88px "Cormorant Garamond"';
  ctx.fillText('double?',W/2,320);

  // Thin rule
  ctx.strokeStyle=rgba(P.sage,.4);ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(200,350);ctx.lineTo(800,350);ctx.stroke();

  // Mini 2-point chart: $100k → $200k
  const chartX=180,chartY=400,chartW=640,chartH=260;
  // Arrow path
  const p1=[chartX+60,chartY+chartH-20];
  const p2=[chartX+chartW-60,chartY+20];

  // Gradient area
  const aG=ctx.createLinearGradient(0,chartY,0,chartY+chartH);
  aG.addColorStop(0,rgba(P.sage,.35));aG.addColorStop(1,rgba(P.sage,.04));
  ctx.fillStyle=aG;ctx.beginPath();ctx.moveTo(p1[0],chartY+chartH-20);
  ctx.lineTo(p2[0],p2[1]);ctx.lineTo(p2[0],chartY+chartH-20);ctx.closePath();ctx.fill();

  // Arrow line
  ctx.strokeStyle=P.sage;ctx.lineWidth=5;ctx.lineJoin='round';ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(p1[0],p1[1]);ctx.lineTo(p2[0],p2[1]);ctx.stroke();

  // Arrow head
  const angle=Math.atan2(p1[1]-p2[1],p2[0]-p1[0]);
  const aSize=22;
  ctx.fillStyle=P.sage;ctx.beginPath();
  ctx.moveTo(p2[0],p2[1]);
  ctx.lineTo(p2[0]-aSize*Math.cos(angle-Math.PI/7),p2[1]+aSize*Math.sin(angle-Math.PI/7));
  ctx.lineTo(p2[0]-aSize*Math.cos(angle+Math.PI/7),p2[1]+aSize*Math.sin(angle+Math.PI/7));
  ctx.closePath();ctx.fill();

  // Labels
  ctx.fillStyle=P.greenDk;ctx.font='700 36px Lato';ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('$100k',p1[0],p1[1]+44);
  ctx.fillStyle=P.green;ctx.font='700 42px Lato';
  ctx.fillText('$200k',p2[0],p2[1]-22);

  // Body
  ctx.fillStyle=P.warmGray;ctx.font='300 26px Lato';ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('People who track their net worth',W/2,750);
  ctx.fillText('consistently grow it faster.',W/2,786);
  ctx.fillStyle=rgba(P.warmGray,.7);
  ctx.fillText('Visibility creates accountability.',W/2,830);

  // Insight card
  rrect(100,880,800,120,14);
  ctx.fillStyle=rgba(P.green,.08);ctx.fill();
  ctx.strokeStyle=rgba(P.green,.2);ctx.lineWidth=1.5;ctx.stroke();
  ctx.fillStyle=P.green;ctx.font='italic 300 32px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('"Track it once a year.',W/2,920);
  ctx.fillText('Watch it compound."',W/2,962);

  // CTA
  const pw=420,ph=72,ppx=W/2-pw/2,ppy=1070;
  rrect(ppx,ppy,pw,ph,36);
  ctx.fillStyle=P.green;ctx.fill();
  ctx.fillStyle=P.white;ctx.font='700 26px Lato';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Start Your Ledger Free →',W/2,ppy+ph/2);

  // Keywords
  ctx.fillStyle=rgba(P.warmGray,.78);ctx.font='300 19px Lato';ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('net worth tracker  ·  wealth building  ·  financial planning',W/2,1230);

  drawFooter();
}
function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='financial-ledger-05-question-hook-aspiration-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
