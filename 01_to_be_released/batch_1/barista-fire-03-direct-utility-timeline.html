<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Barista FIRE Timeline — From Full-Time Work to Total Freedom · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 03 · Direct Utility Timeline · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxWidth&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);return y;
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_no_text_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=72;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.fillStyle='#ffffff';ctx.fill();ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',200,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',200,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Cream bg
  ctx.fillStyle=P.cream;ctx.fillRect(0,0,W,H);

  // Top decorative band
  ctx.fillStyle=P.green;ctx.fillRect(0,0,W,18);

  // Headline
  ctx.fillStyle=P.nearBlk;ctx.font='300 72px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('Your Barista FIRE',W/2,46);
  ctx.fillText('Timeline',W/2,126);
  ctx.textAlign='left';

  // Sub italic
  ctx.fillStyle=P.warmGray;ctx.font='italic 300 30px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('From full-time grind to total freedom',W/2,216);
  ctx.textAlign='left';

  // Pinyon script accent
  ctx.fillStyle=rgba(P.sage,0.55);ctx.font='400 52px "Pinyon Script"';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('your path to freedom',W/2,258);
  ctx.textAlign='left';

  // TIMELINE BAR
  const barY=340,barH=88,barX=80,barW=840;
  // Phase proportions: Phase1 = 8yr (30→38), Phase2 = 9yr (38→47), Phase3 = rest
  // Visual: 35% / 35% / 30%
  const p1w=Math.round(barW*0.35);
  const p2w=Math.round(barW*0.35);
  const p3w=barW-p1w-p2w;

  // Phase 1 - forest green
  ctx.save();
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(barX,barY,p1w,barH,[10,0,0,10]);}
  else{ctx.beginPath();ctx.rect(barX,barY,p1w,barH);}
  ctx.fillStyle=P.green;ctx.fill();
  ctx.restore();

  // Phase 2 - sage
  ctx.fillStyle=P.sage;ctx.fillRect(barX+p1w,barY,p2w,barH);

  // Phase 3 - pale sage
  ctx.save();
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(barX+p1w+p2w,barY,p3w,barH,[0,10,10,0]);}
  else{ctx.beginPath();ctx.rect(barX+p1w+p2w,barY,p3w,barH);}
  ctx.fillStyle=P.sagePale;ctx.fill();
  ctx.restore();

  // Phase labels inside bar
  ctx.fillStyle=P.cream;ctx.font='700 18px Lato';ctx.letterSpacing='0.08em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('FULL-TIME WORK',barX+p1w/2,barY+barH/2-10);
  ctx.fillStyle=rgba(P.cream,0.8);ctx.font='300 16px Lato';ctx.letterSpacing='0em';
  ctx.fillText('Phase 1',barX+p1w/2,barY+barH/2+14);

  ctx.fillStyle=P.white;ctx.font='700 18px Lato';ctx.letterSpacing='0.08em';
  ctx.fillText('BARISTA FI',barX+p1w+p2w/2,barY+barH/2-10);
  ctx.fillStyle=rgba(P.white,0.8);ctx.font='300 16px Lato';ctx.letterSpacing='0em';
  ctx.fillText('Phase 2',barX+p1w+p2w/2,barY+barH/2+14);

  ctx.fillStyle=P.greenDk;ctx.font='700 18px Lato';ctx.letterSpacing='0.08em';
  ctx.fillText('FULL FIRE',barX+p1w+p2w+p3w/2,barY+barH/2-10);
  ctx.fillStyle=rgba(P.greenDk,0.8);ctx.font='300 16px Lato';ctx.letterSpacing='0em';
  ctx.fillText('Phase 3',barX+p1w+p2w+p3w/2,barY+barH/2+14);
  ctx.textAlign='left';

  // Transition nodes
  const nodeR=14;
  [barX+p1w, barX+p1w+p2w].forEach(nx=>{
    ctx.save();
    ctx.shadowColor='rgba(0,0,0,0.3)';ctx.shadowBlur=8;
    ctx.beginPath();ctx.arc(nx,barY+barH/2,nodeR,0,Math.PI*2);
    ctx.fillStyle=P.cream;ctx.fill();
    ctx.restore();
    ctx.strokeStyle=P.green;ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(nx,barY+barH/2,nodeR,0,Math.PI*2);ctx.stroke();
  });

  // Age labels below bar
  const ages=[{x:barX,a:'Age 30'},{x:barX+p1w,a:'Age 38'},{x:barX+p1w+p2w,a:'Age 47'},{x:barX+barW,a:'Age 57+'}];
  ages.forEach(({x,a})=>{
    // tick
    ctx.strokeStyle=rgba(P.nearBlk,0.25);ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(x,barY+barH);ctx.lineTo(x,barY+barH+14);ctx.stroke();
    ctx.fillStyle=P.warmGray;ctx.font='700 22px Lato';ctx.letterSpacing='0em';
    ctx.textAlign='center';ctx.textBaseline='top';
    ctx.fillText(a,x,barY+barH+20);
  });
  ctx.textAlign='left';

  // Phase detail cards
  const cards=[
    {x:barX,w:p1w-10,color:P.green,tcolor:P.cream,title:'Phase 1',sub:'Full-Time Work',desc:'Build portfolio to Barista FI target'},
    {x:barX+p1w+10,w:p2w-20,color:P.sage,tcolor:P.white,title:'Phase 2',sub:'Part-Time Bridge',desc:'Portfolio grows unassisted to Full FIRE'},
    {x:barX+p1w+p2w+10,w:p3w-10,color:P.sagePale,tcolor:P.greenDk,title:'Phase 3',sub:'Full Freedom',desc:'Work completely optional'},
  ];
  const cardY=490,cardH=200;
  cards.forEach(c=>{
    ctx.save();
    ctx.shadowColor='rgba(0,0,0,0.10)';ctx.shadowBlur=14;ctx.shadowOffsetY=5;
    rrect(c.x,cardY,c.w,cardH,12);ctx.fillStyle=c.color;ctx.fill();
    ctx.restore();
    ctx.fillStyle=c.tcolor;ctx.font='700 17px Lato';ctx.letterSpacing='0.10em';
    ctx.textAlign='center';ctx.textBaseline='top';
    ctx.fillText(c.title.toUpperCase(),c.x+c.w/2,cardY+18);
    ctx.font='300 26px "Cormorant Garamond"';ctx.letterSpacing='0em';
    ctx.fillText(c.sub,c.x+c.w/2,cardY+50);
    ctx.font='300 20px Lato';
    const words=c.desc.split(' ');
    let line='',ly=cardY+88;
    words.forEach((word,n)=>{
      const test=line+word+' ';
      if(ctx.measureText(test).width>c.w-20&&n>0){ctx.fillText(line,c.x+c.w/2,ly);line=word+' ';ly+=28;}
      else line=test;
    });
    ctx.fillText(line,c.x+c.w/2,ly);
  });
  ctx.textAlign='left';

  // Divider
  ctx.strokeStyle=rgba(P.sage,0.3);ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(80,720);ctx.lineTo(920,720);ctx.stroke();

  // Key insight
  ctx.fillStyle=P.nearBlk;ctx.font='italic 300 42px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('"Phase 2 is the exit ramp.',W/2,750);
  ctx.fillText('Phase 3 is freedom."',W/2,800);
  ctx.textAlign='left';

  // Metrics row
  const metrics=[
    {label:'Full-Time Years',val:'8',sub:'to Barista FI'},
    {label:'Part-Time Years',val:'9',sub:'to Full FIRE'},
    {label:'Freedom Begins',val:'38',sub:'years old'},
  ];
  const mY=880,mH=130,mW=260,mGap=15;
  const totalMW=metrics.length*mW+(metrics.length-1)*mGap;
  let mx=(W-totalMW)/2;
  metrics.forEach(m=>{
    ctx.save();
    ctx.shadowColor='rgba(0,0,0,0.08)';ctx.shadowBlur=10;ctx.shadowOffsetY=3;
    rrect(mx,mY,mW,mH,12);ctx.fillStyle=P.white;ctx.fill();
    ctx.restore();
    ctx.strokeStyle=rgba(P.sage,0.3);ctx.lineWidth=1;
    rrect(mx,mY,mW,mH,12);ctx.stroke();
    ctx.fillStyle=P.warmGray;ctx.font='700 15px Lato';ctx.letterSpacing='0.10em';
    ctx.textAlign='center';ctx.textBaseline='top';
    ctx.fillText(m.label.toUpperCase(),mx+mW/2,mY+14);
    ctx.fillStyle=P.green;ctx.font='300 56px "Cormorant Garamond"';ctx.letterSpacing='0em';
    ctx.fillText(m.val,mx+mW/2,mY+36);
    ctx.fillStyle=P.warmGray;ctx.font='300 20px Lato';
    ctx.fillText(m.sub,mx+mW/2,mY+100);
    mx+=mW+mGap;
  });
  ctx.textAlign='left';

  // Body paragraph
  ctx.fillStyle=P.warmGray;ctx.font='300 26px Lato';
  ctx.textAlign='center';ctx.textBaseline='top';
  wrapText('The free calculator shows your exact Phase 2 start date based on your real numbers.',W/2,1040,800,38);
  ctx.textAlign='left';

  // Keywords
  const tags=['barista fire calculator','barista fire','fire retirement calculator'];
  const tagY=1130,tagH=40,tagGap=10,tagPad=16;
  ctx.font='700 17px Lato';ctx.letterSpacing='0.04em';
  const tagMetrics=tags.map(label=>({label,width:ctx.measureText(label).width+tagPad*2}));
  const totalTagW=tagMetrics.reduce((sum,{width})=>sum+width,0)+tagGap*(tagMetrics.length-1);
  let tx=(W-totalTagW)/2;
  tagMetrics.forEach(({label,width})=>{
    rrect(tx,tagY,width,tagH,20);ctx.fillStyle=rgba(P.sage,0.18);ctx.fill();
    ctx.strokeStyle=rgba(P.sage,0.38);ctx.lineWidth=1;ctx.stroke();
    ctx.fillStyle=P.green;ctx.textBaseline='middle';ctx.textAlign='center';
    ctx.fillText(label,tx+width/2,tagY+tagH/2);
    tx+=width+tagGap;
  });

  // CTA pill
  const ctaText='CALCULATE YOUR TIMELINE →';
  ctx.font='700 24px Lato';
  const ctaPadding=64;
  const ctaH=68;
  const ctaW=Math.ceil(ctx.measureText(ctaText).width+ctaPadding);
  const ctaX=(W-ctaW)/2,ctaY=1290;
  ctx.save();
  ctx.shadowColor='rgba(71,88,79,0.35)';ctx.shadowBlur=22;ctx.shadowOffsetY=8;
  rrect(ctaX,ctaY,ctaW,ctaH,34);ctx.fillStyle=P.green;ctx.fill();
  ctx.restore();
  ctx.fillStyle=P.cream;ctx.letterSpacing='0.10em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(ctaText,W/2,ctaY+ctaH/2);
  ctx.textAlign='left';

  drawFooter();
}
function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='barista-fire-03-direct-utility-timeline-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
