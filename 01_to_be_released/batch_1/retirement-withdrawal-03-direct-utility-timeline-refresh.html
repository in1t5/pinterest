<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />

<meta name="viewport" content="width=device-width, initial-scale=1" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600&family=Lato:wght@300;400;500;700;900&family=Pinyon+Script&display=swap" rel="stylesheet" />

</style>
</head>
<body>
<div class="pin-wrap">

        <line x1="80" y1="110" x2="820" y2="110" stroke="#C1D5A5" stroke-width="0.5" opacity="0.2"/>

        <!-- portfolio area + line with volatility -->
        <path d="M 80 130 L 130 150 L 180 140 L 230 165 L 280 145 L 330 155 L 380 130 L 430 140 L 480 115 L 530 125 L 580 100 L 630 110 L 680 90 L 730 95 L 780 80 L 780 300 L 80 300 Z" fill="url(#rgrad)"/>
        <path d="M 80 130 L 130 150 L 180 140 L 230 165 L 280 145 L 330 155 L 380 130 L 430 140 L 480 115 L 530 125 L 580 100 L 630 110 L 680 90 L 730 95 L 780 80" stroke="#C1D5A5" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

        <circle cx="780" cy="80" r="7" fill="#C1D5A5"/>
        <circle cx="780" cy="80" r="14" fill="#C1D5A5" opacity="0.3"/>
        <!-- annotation pill -->

        <text x="660" y="48" fill="#47584F" font-family="Lato,sans-serif" font-size="16" font-weight="700" text-anchor="middle">Year 30: $847k intact</text>
        <line x1="660" y1="66" x2="780" y2="76" stroke="#F5EEED" stroke-width="1"/>
        <!-- x axis -->
        <line x1="80" y1="300" x2="820" y2="300" stroke="#C1D5A5" stroke-width="0.5" opacity="0.4"/>
        <text x="80"  y="316" fill="#C1D5A5" font-family="Lato,sans-serif" font-size="13" text-anchor="middle" opacity="0.7">Yr 0</text>
        <text x="203" y="316" fill="#C1D5A5" font-family="Lato,sans-serif" font-size="13" text-anchor="middle" opacity="0.7">Yr 5</text>
        <text x="326" y="316" fill="#C1D5A5" font-family="Lato,sans-serif" font-size="13" text-anchor="middle" opacity="0.7">Yr 10</text>

        <text x="780" y="316" fill="#C1D5A5" font-family="Lato,sans-serif" font-size="13" text-anchor="middle" opacity="0.7">Yr 30</text>
      </svg>
    </div>

    <!-- Strategy callout pill -->
    <div style="margin-top:28px;padding:16px 28px;background:#C1D5A5;border-radius:999px;display:flex;align-items:center;justify-content:center;gap:14px;">

    <div style="text-align:center;margin-top:28px;font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:24px;color:#C1D5A5;">"Spend more in good years. Protect in bad."</div>

  <!-- Dark footer -->
  <div style="position:absolute;bottom:0;left:0;right:0;height:90px;background:#3a473f;display:flex;align-items:center;padding:0 36px;gap:16px;">
    <div style="width:44px;height:44px;border-radius:50%;background:#F5EEED;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid rgba(71,88,79,0.15);">

    <div style="flex:1;line-height:1.2;">

      <div style="font-family:Lato,sans-serif;font-size:16px;color:#C1D5A5;letter-spacing:2px;text-transform:uppercase;margin-top:3px;">timeandmoneytree.com</div>
    </div>
    <div style="padding:12px 22px;border:1px solid rgba(245,238,237,0.4);border-radius:999px;font-family:Lato,sans-serif;font-size:18px;font-weight:700;color:#F5EEED;letter-spacing:1.5px;text-transform:uppercase;">Run simulation →</div>
  </div>
</div>
</div>
<script>
function fit() {
  var scale = Math.min(1, (window.innerHeight - 40) / 1500, (window.innerWidth - 40) / 1000);
  document.querySelector('.pin-wrap').style.transform = 'scale(' + scale + ')';
  document.body.style.minHeight = Math.round(1500 * scale + 40) + 'px';
}
fit();
window.addEventListener('resize', fit);
</script>
</body>
</html>
