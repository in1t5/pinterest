<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Financial Ledger — Track Net Worth &amp; Watch Your Wealth Compound · Financial Ledger · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 01 · Direct Utility Hero · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxWidth&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);return y;
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_no_text_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=72;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.fillStyle='#ffffff';ctx.fill();ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',200,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',200,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);
  // Background
  ctx.fillStyle=P.nearBlk;ctx.fillRect(0,0,W,H);
  // Subtle texture gradient
  const bgGrad=ctx.createRadialGradient(W/2,400,0,W/2,400,700);
  bgGrad.addColorStop(0,rgba(P.green,.12));bgGrad.addColorStop(1,'transparent');
  ctx.fillStyle=bgGrad;ctx.fillRect(0,0,W,H);

  // Pinyon Script accent
  ctx.fillStyle=rgba(P.sagePale,.55);ctx.font='italic 68px "Pinyon Script"';
  ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('your number. every year.',W/2,148);

  // Main headline
  ctx.fillStyle=P.cream;ctx.font='300 96px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('Financial Ledger',W/2,260);

  // Divider
  ctx.strokeStyle=rgba(P.sagePale,.3);ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(120,290);ctx.lineTo(880,290);ctx.stroke();

  // Sub text
  ctx.fillStyle=P.warmGray;ctx.font='300 28px Lato';ctx.textAlign='center';
  ctx.fillText('Track net worth. Watch wealth compound.',W/2,340);
  ctx.fillText('Free tool — no spreadsheet needed.',W/2,378);

  // Large metric card
  const cx=100,cy=420,cw=800,ch=240;
  rrect(cx,cy,cw,ch,20);
  const cardGrad=ctx.createLinearGradient(cx,cy,cx+cw,cy+ch);
  cardGrad.addColorStop(0,rgba(P.white,.97));cardGrad.addColorStop(1,rgba(P.sageFaint,.97));
  ctx.fillStyle=cardGrad;ctx.fill();
  ctx.strokeStyle=rgba(P.sagePale,.4);ctx.lineWidth=1.5;ctx.stroke();

  ctx.fillStyle=P.green;ctx.font='italic 300 82px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('$231,000',W/2,cy+90);
  ctx.fillStyle=P.green;ctx.font='700 32px Lato';
  ctx.fillText('Net Worth',W/2,cy+145);
  ctx.fillStyle=P.sage;ctx.font='700 28px Lato';
  ctx.fillText('▲ +$89,000 this year',W/2,cy+192);

  // Body text
  ctx.fillStyle=P.warmGray;ctx.font='300 27px Lato';ctx.textAlign='center';
  ctx.fillText('Log assets and liabilities once a year.',W/2,720);
  ctx.fillText('The chart builds itself.',W/2,757);

  // Small line chart decorative
  const chartX=100,chartY=820,chartW=800,chartH=280;
  const pts=[
    [chartX+40,chartY+chartH-30],
    [chartX+180,chartY+chartH-90],
    [chartX+340,chartY+chartH-150],
    [chartX+500,chartY+chartH-200],
    [chartX+660,chartY+chartH-230],
    [chartX+chartW-40,chartY+20],
  ];
  // Area fill
  const areaGrad=ctx.createLinearGradient(0,chartY,0,chartY+chartH);
  areaGrad.addColorStop(0,rgba(P.sage,.35));areaGrad.addColorStop(1,rgba(P.sage,.02));
  ctx.fillStyle=areaGrad;
  ctx.beginPath();ctx.moveTo(pts[0][0],chartY+chartH-30);
  pts.forEach(p=>ctx.lineTo(p[0],p[1]));
  ctx.lineTo(pts[pts.length-1][0],chartY+chartH-30);ctx.closePath();ctx.fill();
  // Line
  ctx.strokeStyle=P.sage;ctx.lineWidth=4;ctx.lineJoin='round';
  ctx.beginPath();pts.forEach((p,i)=>i===0?ctx.moveTo(p[0],p[1]):ctx.lineTo(p[0],p[1]));ctx.stroke();
  // Dots
  pts.forEach(p=>{ctx.beginPath();ctx.arc(p[0],p[1],8,0,Math.PI*2);ctx.fillStyle=P.cream;ctx.fill();ctx.strokeStyle=P.sage;ctx.lineWidth=3;ctx.stroke();});

  // Year labels
  const years=['2019','2020','2021','2022','2023','2024'];
  ctx.fillStyle=rgba(P.sagePale,.7);ctx.font='700 18px Lato';ctx.textAlign='center';
  pts.forEach((p,i)=>{ctx.fillText(years[i],p[0],chartY+chartH+2);});

  // CTA pill
  const pw=380,ph=72,px=W/2-pw/2,py=1140;
  rrect(px,py,pw,ph,36);
  const pillGrad=ctx.createLinearGradient(px,py,px+pw,py);
  pillGrad.addColorStop(0,P.sage);pillGrad.addColorStop(1,P.green);
  ctx.fillStyle=pillGrad;ctx.fill();
  ctx.fillStyle=P.white;ctx.font='700 26px Lato';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.letterSpacing='0.05em';ctx.fillText('Start Tracking Free →',W/2,py+ph/2);ctx.letterSpacing='0em';

  // Keywords row
  ctx.fillStyle=rgba(P.cream,.85);ctx.font='400 22px Lato';ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('financial ledger  ·  net worth tracker  ·  financial planning tool',W/2,1280);

  drawFooter();
}
function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='financial-ledger-01-direct-utility-hero-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
