<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Beginner Budget Steps · Budget Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 15 · Step Ladder Beginner · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_no_text_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Cream background
  ctx.fillStyle=P.cream;
  ctx.fillRect(0,0,W,1395);

  // Top bar
  ctx.fillStyle=P.green;
  ctx.fillRect(0,0,W,166);

  ctx.fillStyle=P.sagePale;
  ctx.font='400 42px "Pinyon Script"';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('for absolute beginners',W/2,24);

  ctx.fillStyle=P.white;ctx.font='700 38px Lato';ctx.letterSpacing='0.06em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('BUILD YOUR FIRST BUDGET',W/2,78);

  ctx.fillStyle=rgba(P.sagePale,.7);ctx.font='300 22px Lato';ctx.letterSpacing='0em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('No experience needed',W/2,130);

  // Cards
  const cards=[
    {
      num:'01',
      title:'List Income Sources',
      body:'Salary, freelance income, other regular income — every source. Monthly total.',
      note:'',
      alt:false,
    },
    {
      num:'02',
      title:'List Fixed Expenses',
      body:'Rent, insurance, loan payments, subscriptions. Same amount every month.',
      note:'',
      alt:true,
    },
    {
      num:'03',
      title:'Add Variable Expenses',
      body:'Food, transport, entertainment, misc. Start with estimates — precision comes later.',
      note:'Start rough. That\'s fine.',
      alt:false,
    },
    {
      num:'04',
      title:'Set Your Savings Target First',
      body:'Pay yourself first. Assign savings before budgeting expenses. Budget what remains.',
      note:'This is the key insight.',
      alt:true,
    },
  ];

  const cardH=220,cardGap=14,cardX=50,cardW=W-100,startY=178;
  cards.forEach((card,i)=>{
    const cy=startY+i*(cardH+cardGap);
    ctx.fillStyle=card.alt?P.sageFaint:P.white;
    rrect(cardX,cy,cardW,cardH,16);ctx.fill();
    ctx.strokeStyle=rgba(P.sage,.3);ctx.lineWidth=1.5;
    rrect(cardX,cy,cardW,cardH,16);ctx.stroke();

    // Step number circle (sage)
    ctx.fillStyle=P.sage;
    ctx.beginPath();ctx.arc(cardX+54,cy+54,40,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=P.white;ctx.font='700 28px Lato';ctx.letterSpacing='0em';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(card.num,cardX+54,cy+54);

    // Title
    ctx.fillStyle=P.green;ctx.font='700 28px Lato';ctx.letterSpacing='0em';
    ctx.textAlign='left';ctx.textBaseline='top';
    ctx.fillText(card.title,cardX+112,cy+20);

    // Body
    ctx.fillStyle=P.nearBlk;ctx.font='300 24px Lato';ctx.letterSpacing='0em';
    ctx.textAlign='left';ctx.textBaseline='top';
    const words=card.body.split(' ');let line='';let ly=cy+58;const mx=cardW-130;
    for(let n=0;n<words.length;n++){
      const test=line+words[n]+' ';
      if(ctx.measureText(test).width>mx&&n>0){ctx.fillText(line,cardX+112,ly);line=words[n]+' ';ly+=30;}
      else line=test;
    }
    ctx.fillText(line,cardX+112,ly);

    // Note chip
    if(card.note){
      ctx.fillStyle=P.sagePale;
      rrect(cardX+112,cy+cardH-46,Math.min(300,ctx.measureText(card.note).width+32),34,17);ctx.fill();
      ctx.fillStyle=P.green;ctx.font='700 18px Lato';ctx.letterSpacing='0em';
      ctx.textAlign='left';ctx.textBaseline='middle';
      ctx.fillText(card.note,cardX+128,cy+cardH-29);
    }

    // Arrow connector
    if(i<cards.length-1){
      ctx.fillStyle=P.sage;ctx.font='700 24px Lato';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('↓',W/2,cy+cardH+cardGap/2);
    }
  });

  // Tagline strip
  const stripY=startY+4*(cardH+cardGap)-cardGap+8;
  ctx.fillStyle=P.green;
  ctx.fillRect(0,stripY,W,64);
  ctx.fillStyle=P.cream;ctx.font='italic 300 30px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('"Start rough. Refine monthly. It gets easier."',W/2,stripY+32);

  // CTA
  const ctaY=stripY+84;
  ctx.fillStyle=P.green;
  rrect(W/2-210,ctaY,420,88,44);ctx.fill();
  ctx.fillStyle=P.white;ctx.font='700 30px Lato';ctx.letterSpacing='0.06em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Try Free Calculator  →',W/2,ctaY+44);

  // Tag
  ctx.fillStyle=P.warmGray;ctx.font='300 22px Lato';ctx.letterSpacing='0em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('beginner budget · savings · free · timeandmoneytree.com',W/2,ctaY+108);

  drawFooter();
}
function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='budget-15-step-ladder-beginner-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
