<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FIRE Calculator Hero · FIRE Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;width:420px;height:630px;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 01 · FIRE Calculator Hero · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxWidth&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);return y;
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/only_tree.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=72;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.fillStyle='#ffffff';ctx.fill();ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',200,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',200,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Forest green top half
  ctx.fillStyle=P.green;
  ctx.fillRect(0,0,W,605);

  // Cream bottom
  ctx.fillStyle=P.cream;
  ctx.fillRect(0,605,W,790);

  // Decorative circles on green
  ctx.save();
  ctx.globalAlpha=0.12;
  ctx.fillStyle=P.sagePale;
  ctx.beginPath();ctx.arc(874,265,238,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(944,510,118,0,Math.PI*2);ctx.fill();
  ctx.restore();

  // Badge pill
  const badgeText='FREE CALCULATOR · FIRE & EARLY RETIREMENT';
  ctx.font='700 18px Lato';
  ctx.letterSpacing='0.12em';
  const bw2=ctx.measureText(badgeText).width+48;
  rrect(80,60,bw2,44,22);
  ctx.strokeStyle=rgba(P.sagePale,0.7);ctx.lineWidth=1.5;ctx.stroke();
  ctx.fillStyle=P.sagePale;ctx.textBaseline='middle';
  ctx.fillText(badgeText,80+24,82);
  ctx.textBaseline='alphabetic';

  // Headline
  ctx.fillStyle=P.cream;
  ctx.font='300 108px "Cormorant Garamond"';
  ctx.letterSpacing='-0.01em';
  ctx.fillText('Retire early.',80,205);
  ctx.fillText('On your terms.',80,325);

  // Script accent
  ctx.fillStyle=P.sagePale;
  ctx.font='400 72px "Pinyon Script"';
  ctx.letterSpacing='0em';
  ctx.fillText('Your number awaits.',80,430);

  // Subtext
  ctx.fillStyle=rgba(P.cream,0.85);
  ctx.font='300 28px Lato';
  ctx.letterSpacing='0em';
  ctx.fillText('Calculate your exact FIRE number and retirement date.',80,510);

  // Calculator card
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,0.14)';ctx.shadowBlur=28;ctx.shadowOffsetY=8;
  rrect(80,630,840,420,18);ctx.fillStyle=P.white;ctx.fill();
  ctx.restore();

  // 2x2 input grid
  const inputs=[
    {label:'Current Age',value:'34'},
    {label:'Annual Income',value:'$85k'},
    {label:'Annual Expenses',value:'$45k'},
    {label:'Portfolio',value:'$124k'},
  ];
  const cols=2,rows=2,iw=380,ih=100,gap=20,startX=100,startY=648;
  inputs.forEach((inp,i)=>{
    const col=i%cols,row=Math.floor(i/cols);
    const ix=startX+col*(iw+gap),iy=startY+row*(ih+gap);
    rrect(ix,iy,iw,ih,10);ctx.fillStyle='#edf2ee';ctx.fill();
    ctx.fillStyle=P.warmGray;ctx.font='700 15px Lato';ctx.letterSpacing='0.08em';
    ctx.textBaseline='alphabetic';
    ctx.fillText(inp.label.toUpperCase(),ix+16,iy+28);
    ctx.fillStyle=P.nearBlk;ctx.font='300 38px "Cormorant Garamond"';ctx.letterSpacing='0em';
    ctx.fillText(inp.value,ix+16,iy+78);
  });

  // Divider
  ctx.fillStyle='#e0e8e1';
  ctx.fillRect(100,870,800,1);

  // Result row
  ctx.fillStyle=P.warmGray;ctx.font='700 14px Lato';ctx.letterSpacing='0.10em';
  ctx.textBaseline='alphabetic';
  ctx.fillText('FIRE NUMBER',100,912);
  ctx.fillStyle=P.nearBlk;ctx.font='300 74px "Cormorant Garamond"';ctx.letterSpacing='-0.02em';
  ctx.fillText('$1,125,000',100,990);
  ctx.fillStyle=P.sage;ctx.font='700 22px Lato';ctx.letterSpacing='0em';
  ctx.fillText('✓ FIRE date: Age 49 — 15 years away',100,1040);

  // Strategy pills
  const pills=[
    {label:'FIRE',active:true},
    {label:'Lean FIRE',active:false},
    {label:'Barista FIRE',active:false},
    {label:'Fat FIRE',active:false},
  ];
  let px=80;
  pills.forEach(pill=>{
    ctx.font='700 16px Lato';ctx.letterSpacing='0.06em';
    const tw=ctx.measureText(pill.label).width+32;
    rrect(px,1105,tw,40,20);
    if(pill.active){ctx.fillStyle=P.green;ctx.fill();}
    else{ctx.strokeStyle=rgba(P.warmGray,0.4);ctx.lineWidth=1.5;ctx.stroke();}
    ctx.fillStyle=pill.active?P.cream:P.warmGray;
    ctx.textBaseline='middle';
    ctx.fillText(pill.label,px+16,1125);
    ctx.textBaseline='alphabetic';
    px+=tw+12;
  });

  // Bullet points
  const bullets=[
    'Your exact FIRE date',
    'Year-by-year portfolio projection',
    'Savings rate analysis',
    'Free PDF report',
  ];
  ctx.font='300 24px Lato';ctx.letterSpacing='0em';
  bullets.forEach((b,i)=>{
    const by2=1180+i*48;
    // sage check circle
    ctx.beginPath();ctx.arc(100,by2-8,14,0,Math.PI*2);ctx.fillStyle=P.sage;ctx.fill();
    ctx.fillStyle=P.white;ctx.font='700 16px Lato';ctx.textBaseline='middle';
    ctx.fillText('✓',93,by2-8);
    ctx.textBaseline='alphabetic';
    ctx.fillStyle=P.nearBlk;ctx.font='300 26px Lato';ctx.letterSpacing='0em';
    ctx.fillText(b,126,by2);
  });

  // Keywords
  const kws=['fire calculator','fire number calculator','retire early'];
  let kwx=80;
  ctx.font='400 18px Lato';ctx.letterSpacing='0.04em';
  kws.forEach(kw=>{
    const tw=ctx.measureText(kw).width+28;
    rrect(kwx,1350,tw,38,19);
    ctx.strokeStyle=rgba(P.warmGray,0.35);ctx.lineWidth=1.5;ctx.stroke();
    ctx.fillStyle=P.warmGray;ctx.textBaseline='middle';
    ctx.fillText(kw,kwx+14,1369);
    ctx.textBaseline='alphabetic';
    kwx+=tw+12;
  });

  drawFooter();
}
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='fire-01-direct-utility-hero-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
