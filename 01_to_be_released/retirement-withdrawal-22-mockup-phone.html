<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Retirement Income Calculator — Your Strategy on Your Phone. Free. · Retirement Withdrawal Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;width:420px;height:630px;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 22 · Mockup Phone · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxWidth&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);return y;
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/only_tree.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=72;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.fillStyle='#ffffff';ctx.fill();ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',200,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',200,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Navy background (special color scheme for this pin)
  ctx.fillStyle=P.navy;
  ctx.fillRect(0,0,W,1395);

  // Top headline
  ctx.fillStyle=P.cream;
  ctx.font='700 48px Lato';
  ctx.letterSpacing='-0.01em';
  ctx.textAlign='center';
  ctx.textBaseline='top';
  ctx.fillText('RETIREMENT INCOME',W/2,44);
  ctx.fillText('CALCULATOR.',W/2,104);
  ctx.letterSpacing='0em';
  ctx.fillStyle=P.sagePale;
  ctx.font='italic 300 38px "Cormorant Garamond"';
  ctx.textAlign='center';
  ctx.textBaseline='top';
  ctx.fillText('In Your Pocket.',W/2,164);

  // Phone frame outer (dark forest green)
  const phoneW=340,phoneH=620,phoneX=W/2-phoneW/2,phoneY=240,phoneR=34;
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,0.5)';ctx.shadowBlur=50;ctx.shadowOffsetY=20;
  rrect(phoneX,phoneY,phoneW,phoneH,phoneR);
  ctx.fillStyle=P.greenDk;ctx.fill();
  ctx.restore();

  // Phone screen (near-black)
  const scrPad=14;
  rrect(phoneX+scrPad,phoneY+scrPad,phoneW-scrPad*2,phoneH-scrPad*2,phoneR-6);
  ctx.fillStyle='#0f1a13';ctx.fill();

  // Screen content
  const scrX=phoneX+scrPad+16;
  const scrW=phoneW-scrPad*2-32;

  // Status bar notch
  ctx.fillStyle=rgba(P.sagePale,.15);
  rrect(W/2-50,phoneY+scrPad+8,100,20,10);
  ctx.fill();

  // Header
  ctx.fillStyle=P.sage;
  ctx.font='700 22px Lato';
  ctx.letterSpacing='0em';
  ctx.textAlign='left';
  ctx.textBaseline='top';
  ctx.fillText('🌿 Withdrawal',scrX,phoneY+62);

  // Divider
  ctx.strokeStyle=rgba(P.sage,.3);
  ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(scrX,phoneY+94);ctx.lineTo(scrX+scrW,phoneY+94);ctx.stroke();

  // Strategy
  ctx.fillStyle=P.cream;
  ctx.font='400 20px Lato';
  ctx.textAlign='left';
  ctx.textBaseline='top';
  ctx.fillText('Strategy: Dynamic',scrX,phoneY+106);

  // Big income
  ctx.fillStyle=P.cream;
  ctx.font='700 44px Lato';
  ctx.textAlign='left';
  ctx.textBaseline='top';
  ctx.fillText('$40k/yr',scrX,phoneY+138);

  // Success rate
  ctx.fillStyle=P.sagePale;
  ctx.font='700 26px Lato';
  ctx.textAlign='left';
  ctx.textBaseline='top';
  ctx.fillText('Success: 94%',scrX,phoneY+200);

  // Mini 30yr chart
  const chartX=scrX,chartY=phoneY+248,chartW=scrW,chartH=160;
  ctx.fillStyle=rgba(P.sagePale,.06);
  ctx.fillRect(chartX,chartY,chartW,chartH);

  // Chart line
  ctx.beginPath();
  ctx.moveTo(chartX,chartY+chartH*0.2);
  ctx.bezierCurveTo(
    chartX+chartW*0.3,chartY+chartH*0.25,
    chartX+chartW*0.6,chartY+chartH*0.4,
    chartX+chartW,chartY+chartH*0.45
  );
  ctx.strokeStyle=P.sage;ctx.lineWidth=3;ctx.stroke();

  // Chart year labels
  ctx.fillStyle=rgba(P.sagePale,.5);
  ctx.font='300 14px Lato';
  ctx.textAlign='left';ctx.textBaseline='top';
  ctx.fillText('Yr 0',chartX,chartY+chartH-18);
  ctx.textAlign='right';
  ctx.fillText('Yr 30',chartX+chartW,chartY+chartH-18);

  // Home indicator
  ctx.beginPath();ctx.arc(W/2,phoneY+phoneH-scrPad-20,18,0,Math.PI*2);
  ctx.strokeStyle=rgba(P.sagePale,.25);ctx.lineWidth=2;ctx.stroke();

  // Supporting text
  ctx.fillStyle=rgba(P.sagePale,.8);
  ctx.font='300 24px Lato';
  ctx.textAlign='center';
  ctx.textBaseline='top';
  ctx.fillText('Free. No sign-up. Works on all devices.',W/2,898);

  // CTA pill (cornflower — navy special)
  const ctaY=980;
  const ctaW=300,ctaH=68;
  rrect(W/2-ctaW/2,ctaY,ctaW,ctaH,34);
  ctx.fillStyle=P.cornflower;ctx.fill();
  ctx.fillStyle=P.white;
  ctx.font='700 26px Lato';
  ctx.letterSpacing='0.06em';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText('Open Free  →',W/2,ctaY+ctaH/2);
  ctx.letterSpacing='0em';

  drawFooter();
}
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='retirement-withdrawal-22-mockup-phone-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
