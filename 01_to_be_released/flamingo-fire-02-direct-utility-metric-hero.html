<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Your Retirement — 3 Numbers That Change Everything · Flamingo FIRE Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;width:420px;height:630px;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 02 · Direct Utility Metric Hero · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxWidth&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);return y;
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/only_tree.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=72;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.fillStyle='#ffffff';ctx.fill();ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',200,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',200,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Forest green background
  ctx.fillStyle=P.green;
  ctx.fillRect(0,0,W,1395);

  // Top decorative subtle pattern
  ctx.fillStyle=rgba(P.sagePale,0.08);
  for(let i=0;i<W;i+=60){
    ctx.fillRect(i,0,30,1395);
  }

  // Small caps label
  ctx.fillStyle=P.sagePale;
  ctx.font='700 18px Lato';
  ctx.letterSpacing='0.22em';
  ctx.textAlign='center';
  ctx.textBaseline='top';
  ctx.fillText('YOUR RETIREMENT METRICS',W/2,70);
  ctx.letterSpacing='0em';

  // Display serif headline
  ctx.fillStyle=P.cream;
  ctx.font='italic 300 74px "Cormorant Garamond"';
  ctx.textAlign='center';
  ctx.textBaseline='top';
  ctx.fillText('Three Numbers.',W/2,120);
  ctx.fillText('Complete Picture.',W/2,208);

  // Thin divider
  ctx.strokeStyle=rgba(P.sagePale,0.4);
  ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(200,312);ctx.lineTo(800,312);ctx.stroke();

  // Large cream metric card
  const cardX=60,cardY=340,cardW=880,cardH=340;
  rrect(cardX,cardY,cardW,cardH,20);
  ctx.fillStyle=rgba(P.cream,0.12);ctx.fill();
  ctx.strokeStyle=rgba(P.sagePale,0.3);ctx.lineWidth=1.5;ctx.stroke();

  // Three columns with sage dividers
  const colW=cardW/3;
  const metrics=[
    {label:'Retire At',val:'58'},
    {label:'Portfolio',val:'$1.2M'},
    {label:'Success',val:'97%'},
  ];
  metrics.forEach((m,i)=>{
    const cx=cardX+colW*i+colW/2;
    const cy=cardY+cardH/2;
    ctx.fillStyle=rgba(P.sagePale,0.6);
    ctx.font='700 15px Lato';ctx.letterSpacing='0.15em';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(m.label.toUpperCase(),cx,cy-80);
    ctx.fillStyle=P.cream;
    ctx.font='700 64px "Cormorant Garamond"';ctx.letterSpacing='0em';
    ctx.textBaseline='middle';
    ctx.fillText(m.val,cx,cy+10);
    // dividers
    if(i<2){
      ctx.strokeStyle=rgba(P.sage,0.45);
      ctx.lineWidth=1.5;
      ctx.beginPath();
      ctx.moveTo(cardX+colW*(i+1),cardY+40);
      ctx.lineTo(cardX+colW*(i+1),cardY+cardH-40);
      ctx.stroke();
    }
  });

  // Sub label
  ctx.fillStyle=rgba(P.sagePale,0.5);
  ctx.font='300 22px Lato';
  ctx.textAlign='center';ctx.textBaseline='top';ctx.letterSpacing='0em';
  ctx.fillText('calculated with Flamingo FIRE',W/2,700);

  // Body
  ctx.fillStyle=P.sagePale;
  ctx.font='300 30px Lato';
  ctx.textAlign='center';
  ctx.textBaseline='top';
  ctx.fillText('Model any scenario. See how every',W/2,790);
  ctx.fillText('variable affects your retirement.',W/2,832);

  // Feature pills
  const features=['Income changes','Life events','40-year forecast'];
  const pillGap=24,py=930,ph=44;
  ctx.font='400 22px Lato';
  const pillData=features.map(text=>{
    const textWidth=ctx.measureText(text).width;
    return {text,width:textWidth+40};
  });
  const totalWidth=pillData.reduce((sum,{width})=>sum+width,0)+pillGap*(pillData.length-1);
  let fx=(W-totalWidth)/2;
  pillData.forEach(({text,width})=>{
    rrect(fx,py,width,ph,22);
    ctx.fillStyle=rgba(P.sagePale,0.15);ctx.fill();
    ctx.strokeStyle=rgba(P.sagePale,0.4);ctx.lineWidth=1.5;ctx.stroke();
    ctx.fillStyle=P.sagePale;
    ctx.textAlign='left';ctx.textBaseline='middle';
    ctx.fillText(text,fx+20,py+ph/2);
    fx+=width+pillGap;
  });

  // Keyword strip
  ctx.fillStyle=rgba(P.sagePale,0.5);
  ctx.font='300 20px Lato';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('flamingo fire calculator · retirement financial planning',W/2,1040);
  ctx.fillText('retirement income planning',W/2,1072);

  // Divider
  ctx.strokeStyle=rgba(P.sagePale,0.25);
  ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(100,1120);ctx.lineTo(900,1120);ctx.stroke();

  // CTA pill
  const ctaW=440,ctaH=80,ctaX=(W-ctaW)/2,ctaY=1210;
  rrect(ctaX,ctaY,ctaW,ctaH,40);
  ctx.fillStyle=P.sagePale;ctx.fill();
  ctx.fillStyle=P.green;ctx.font='700 28px Lato';ctx.letterSpacing='0.06em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Calculate Yours Free →',W/2,ctaY+ctaH/2);
  ctx.letterSpacing='0em';

  // URL
  ctx.fillStyle=rgba(P.sagePale,0.55);
  ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('TIMEANDMONEYTREE.COM',W/2,1330);
  ctx.letterSpacing='0em';

  drawFooter();
}
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='flamingo-fire-02-direct-utility-metric-hero-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
