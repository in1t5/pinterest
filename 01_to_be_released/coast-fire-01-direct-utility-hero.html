<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Coast FIRE Calculator — Find Your Number &amp; Stop Saving Forever · Coast FIRE · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;width:420px;height:630px;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">coast-fire-01 · Coast FIRE Calculator — Find Your Number · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');

const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',
};

function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxWidth&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);return y;
}

let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/only_tree.png';}

function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=72;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.fillStyle='#ffffff';ctx.fill();ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',200,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',200,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}

function drawDecorCircles(){
  ctx.save();
  ctx.globalAlpha=0.10;ctx.strokeStyle=P.sagePale;ctx.lineWidth=4;
  ctx.beginPath();ctx.arc(874,265,238,0,Math.PI*2);ctx.stroke();
  ctx.globalAlpha=0.07;ctx.fillStyle=P.sagePale;
  ctx.beginPath();ctx.arc(944,510,118,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function drawBadge(text,x,y){
  ctx.font='700 19px Lato';ctx.letterSpacing='0.10em';
  const bw=ctx.measureText(text).width+72,bh=44,br=22;
  rrect(x,y-bh/2,bw,bh,br);ctx.strokeStyle=rgba(P.sagePale,.50);ctx.lineWidth=1.5;ctx.stroke();
  ctx.fillStyle=P.sagePale;ctx.beginPath();ctx.arc(x+23,y,6,0,Math.PI*2);ctx.fill();
  ctx.textBaseline='middle';ctx.fillText(text,x+39,y);
}

function render(){
  ctx.clearRect(0,0,W,H);

  // HERO — forest green bg
  ctx.fillStyle=P.green;ctx.fillRect(0,0,W,617);
  drawDecorCircles();

  // Badge
  ctx.fillStyle=P.sagePale;
  drawBadge('FREE CALCULATOR · COAST FIRE',76,70);

  // Headlines
  ctx.textBaseline='top';ctx.letterSpacing='-0.01em';
  ctx.fillStyle=P.cream;ctx.font='300 104px "Cormorant Garamond"';
  ctx.fillText('Stop saving.',76,120);
  ctx.fillText('Let it coast.',76,238);
  ctx.fillStyle=P.sagePale;ctx.font='400 118px "Pinyon Script"';ctx.letterSpacing='0em';
  ctx.fillText('To freedom.',76,355);
  ctx.fillStyle=rgba(P.cream,.76);ctx.font='300 30px Lato';ctx.letterSpacing='0em';
  ctx.fillText('Find the exact portfolio you need today',76,494);
  ctx.fillText('to retire without saving another dollar.',76,534);

  // Cream section
  ctx.fillStyle=P.cream;ctx.fillRect(0,605,W,790);

  // Calculator card
  const cc={x:80,y:630,w:840,h:358,r:18};
  ctx.save();ctx.shadowColor='rgba(26,26,24,0.10)';ctx.shadowBlur=32;ctx.shadowOffsetY=12;
  rrect(cc.x,cc.y,cc.w,cc.h,cc.r);ctx.fillStyle=P.white;ctx.fill();ctx.restore();
  rrect(cc.x,cc.y,cc.w,cc.h,cc.r);ctx.strokeStyle='#dde8df';ctx.lineWidth=1.5;ctx.stroke();
  ctx.fillStyle=P.warmGray;ctx.font='700 16px Lato';ctx.letterSpacing='0.12em';ctx.textBaseline='top';
  ctx.fillText('COAST FIRE CALCULATOR',cc.x+26,cc.y+22);

  // 2×2 inputs
  const inputs=[{l:'CURRENT AGE',v:'30',u:'yrs'},{l:'RETIREMENT AGE',v:'65',u:'yrs'},{l:'ANNUAL EXPENSES',v:'$40,000',u:'/yr'},{l:'PORTFOLIO',v:'$85,000',u:''}];
  const gw=(cc.w-52-12)/2,gh=64;
  inputs.forEach((inp,i)=>{
    const col=i%2,row=Math.floor(i/2),ix=cc.x+26+col*(gw+8),iy=cc.y+50+row*(gh+8);
    rrect(ix,iy,gw,gh,8);ctx.fillStyle='#edf2ee';ctx.fill();
    ctx.fillStyle=P.warmGray;ctx.font='700 13px Lato';ctx.letterSpacing='0.08em';ctx.textBaseline='top';
    ctx.fillText(inp.l,ix+12,iy+9);
    ctx.fillStyle=P.nearBlk;ctx.font='300 34px "Cormorant Garamond"';ctx.letterSpacing='0em';
    ctx.fillText(inp.v,ix+12,iy+26);
  });

  // Divider + result
  const divY=cc.y+208;
  ctx.strokeStyle='#dde8df';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(cc.x+26,divY);ctx.lineTo(cc.x+cc.w-26,divY);ctx.stroke();
  ctx.fillStyle=P.warmGray;ctx.font='700 15px Lato';ctx.letterSpacing='0.12em';ctx.textBaseline='top';ctx.fillText('COAST FIRE NUMBER',cc.x+26,divY+14);
  ctx.fillStyle=P.nearBlk;ctx.font='300 74px "Cormorant Garamond"';ctx.letterSpacing='-0.02em';ctx.fillText('$186,000',cc.x+26,divY+32);
  ctx.fillStyle='#2e7d32';ctx.font='400 19px Lato';ctx.letterSpacing='0em';ctx.textBaseline='top';
  ctx.fillText('✓  Reach it at age 33 — just 3 years away',cc.x+26,divY+108);

  // Strategy pills
  const pills=['Coast FIRE','Lean FIRE','Barista FIRE','Fat FIRE'];
  let px=80;
  pills.forEach((label,i)=>{
    ctx.font='700 20px Lato';const tw=ctx.measureText(label).width,pw=tw+38,ph=44,py=1042;
    rrect(px,py,pw,ph,22);
    if(i===0){ctx.fillStyle=P.green;ctx.fill();ctx.fillStyle=P.white;}
    else{ctx.strokeStyle='#b8c8bc';ctx.lineWidth=1.5;ctx.stroke();ctx.fillStyle=P.nearBlk;}
    ctx.textBaseline='middle';ctx.fillText(label,px+19,py+ph/2);px+=pw+12;
  });

  // Bullets
  const bItems=[
    {bold:'Your exact Coast FIRE number',rest:' — no guesswork, no spreadsheets'},
    {bold:'Real growth rate',rest:' — after inflation, fees & tax drag'},
    {bold:'Full portfolio projection',rest:' — to retirement age & beyond'},
    {bold:'Free PDF report',rest:' — save or share your Coast plan'}
  ];
  bItems.forEach((item,i)=>{
    const y=1108+i*66,iconX=96;
    ctx.beginPath();ctx.arc(iconX,y+16,16,0,Math.PI*2);ctx.fillStyle=P.sage;ctx.fill();
    ctx.fillStyle=P.white;ctx.font='700 18px Lato';ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('✓',iconX,y+17);
    ctx.textAlign='left';ctx.textBaseline='middle';
    ctx.fillStyle=P.nearBlk;ctx.font='700 25px Lato';ctx.fillText(item.bold,130,y+16);
    const bw2=ctx.measureText(item.bold).width;
    ctx.fillStyle=P.warmGray;ctx.font='400 25px Lato';ctx.fillText(item.rest,130+bw2,y+16);
  });

  ctx.textBaseline='alphabetic';ctx.letterSpacing='0em';
  drawFooter();
}

document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='coast-fire-01-direct-utility-hero-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});

document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
