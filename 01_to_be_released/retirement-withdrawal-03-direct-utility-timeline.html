<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Your Portfolio 30 Years Still Standing · Retirement Withdrawal Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 03 · Direct Utility Timeline · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxWidth&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);return y;
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_no_text_2501x2500.png';}
function drawFooter(){
  // SPECIAL: navy bg footer for Pin 03
  ctx.fillStyle=P.navy;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=72;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.fillStyle='#ffffff';ctx.fill();ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.cornflower;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',200,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',200,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.fillStyle=P.cornflower;ctx.fill();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Navy background
  ctx.fillStyle=P.navy;
  ctx.fillRect(0,0,W,1395);

  // Top accent
  ctx.fillStyle=P.cornflower;
  ctx.fillRect(0,0,W,14);

  // Headline
  ctx.fillStyle=P.cream;
  ctx.font='300 74px "Cormorant Garamond"';
  ctx.textAlign='center';
  ctx.textBaseline='top';
  const headLines=['Your Portfolio.','30 Years.','Still Standing.'];
  headLines.forEach((l,i)=>ctx.fillText(l,W/2,60+i*84));

  // Subtitle line
  ctx.fillStyle=rgba(P.sagePale,.7);
  ctx.font='300 26px Lato';
  ctx.textAlign='center';
  ctx.textBaseline='top';
  ctx.fillText('Dynamic Withdrawal Strategy — modeled over 30 years',W/2,330);

  // Chart area card
  const chX=60,chY=385,chW=W-120,chH=420;
  rrect(chX,chY,chW,chH,16);
  ctx.fillStyle=rgba(P.white,0.07);ctx.fill();
  ctx.strokeStyle=rgba(P.cornflower,.4);ctx.lineWidth=1.5;ctx.stroke();

  // Y-axis labels
  const yLabels=['$1.2M','$1.0M','$800k','$600k'];
  ctx.fillStyle=rgba(P.cream,.5);
  ctx.font='300 18px Lato';
  ctx.textAlign='left';
  ctx.textBaseline='middle';
  const chartL=chX+70,chartR=chX+chW-30,chartT=chY+30,chartB=chY+chH-50;
  yLabels.forEach((l,i)=>{
    const yy=chartT+i*(chartB-chartT)/3;
    ctx.fillText(l,chX+8,yy);
    ctx.strokeStyle=rgba(P.cream,.08);ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(chartL,yy);ctx.lineTo(chartR,yy);ctx.stroke();
  });

  // X-axis labels
  const xLabels=['Yr 0','Yr 5','Yr 10','Yr 15','Yr 20','Yr 25','Yr 30'];
  ctx.fillStyle=rgba(P.cream,.5);
  ctx.font='300 18px Lato';
  ctx.textAlign='center';
  ctx.textBaseline='top';
  xLabels.forEach((l,i)=>{
    const xx=chartL+i*(chartR-chartL)/6;
    ctx.fillText(l,xx,chartB+8);
  });

  // Portfolio line — rises then stable
  const pts=[
    [0,0.5],[0.08,0.42],[0.15,0.55],[0.22,0.48],[0.3,0.62],[0.38,0.57],
    [0.45,0.68],[0.52,0.72],[0.6,0.65],[0.67,0.75],[0.75,0.70],[0.83,0.78],
    [0.9,0.72],[1.0,0.75]
  ];
  // Fill area under line
  ctx.beginPath();
  pts.forEach(([t,v],i)=>{
    const px=chartL+t*(chartR-chartL);
    const py=chartT+(1-v)*(chartB-chartT);
    if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);
  });
  ctx.lineTo(chartR,chartB);ctx.lineTo(chartL,chartB);ctx.closePath();
  const grad=ctx.createLinearGradient(0,chartT,0,chartB);
  grad.addColorStop(0,rgba(P.sage,.35));
  grad.addColorStop(1,rgba(P.sage,0));
  ctx.fillStyle=grad;ctx.fill();

  // Line itself
  ctx.beginPath();
  pts.forEach(([t,v],i)=>{
    const px=chartL+t*(chartR-chartL);
    const py=chartT+(1-v)*(chartB-chartT);
    if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);
  });
  ctx.strokeStyle=P.sage;ctx.lineWidth=3.5;ctx.lineJoin='round';ctx.stroke();

  // End dot
  const lastPt=pts[pts.length-1];
  const dotX=chartL+lastPt[0]*(chartR-chartL);
  const dotY=chartT+(1-lastPt[1])*(chartB-chartT);
  ctx.beginPath();ctx.arc(dotX,dotY,9,0,Math.PI*2);ctx.fillStyle=P.sage;ctx.fill();

  // Callout at end
  rrect(dotX-230,dotY-68,230,50,10);
  ctx.fillStyle=rgba(P.navy,.95);ctx.fill();
  ctx.strokeStyle=P.sage;ctx.lineWidth=1.5;ctx.stroke();
  ctx.fillStyle=P.cream;
  ctx.font='700 20px Lato';
  ctx.letterSpacing='0em';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText('Year 30: $847,000 intact',dotX-115,dotY-43);

  // Strategy badge
  const badgeY=chY+chH+36;
  const badgeTxt='Dynamic Withdrawal Strategy · 94% success rate';
  ctx.font='700 18px Lato';
  ctx.letterSpacing='0.04em';
  const bw2=ctx.measureText(badgeTxt).width+60;
  rrect(W/2-bw2/2,badgeY,bw2,50,25);
  ctx.fillStyle=P.sage;ctx.fill();
  ctx.fillStyle=P.nearBlk;
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText(badgeTxt,W/2,badgeY+25);

  // CTA pill — cornflower
  const ctaY=badgeY+90;
  const ctaW=400,ctaH=70;
  rrect(W/2-ctaW/2,ctaY,ctaW,ctaH,35);
  ctx.fillStyle=P.cornflower;ctx.fill();
  ctx.fillStyle=P.white;
  ctx.font='700 26px Lato';
  ctx.letterSpacing='0.08em';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText('Run Your Simulation  →',W/2,ctaY+ctaH/2);

  drawFooter();
}
function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='retirement-withdrawal-03-direct-utility-timeline-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
