<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Your Coast Number — The Only Portfolio Target That Sets You Free · Coast FIRE · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;width:420px;height:630px;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">coast-fire-02 · Your Coast Number · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');

const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',
};

function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxWidth&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);return y;
}

function fitHeadlineText(text,x,y,maxWidth){
  const minSize=72;
  let size=96;
  while(size>minSize){
    ctx.font=`300 ${size}px "Cormorant Garamond"`;
    if(ctx.measureText(text).width<=maxWidth) break;
    size-=1;
  }
  ctx.font=`300 ${size}px "Cormorant Garamond"`;
  ctx.fillText(text,x,y);
}

let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/only_tree.png';}

function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=72;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.fillStyle='#ffffff';ctx.fill();ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',200,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',200,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}

function drawDecorCircles(){
  ctx.save();
  ctx.globalAlpha=0.10;ctx.strokeStyle=P.sagePale;ctx.lineWidth=4;
  ctx.beginPath();ctx.arc(874,265,238,0,Math.PI*2);ctx.stroke();
  ctx.globalAlpha=0.07;ctx.fillStyle=P.sagePale;
  ctx.beginPath();ctx.arc(944,510,118,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function drawBadge(text,centerX,y){
  ctx.font='700 19px Lato';ctx.letterSpacing='0.10em';
  const textWidth=ctx.measureText(text).width;
  const bw=textWidth+72,bh=44,br=22,bx=centerX-bw/2;
  rrect(bx,y-bh/2,bw,bh,br);ctx.strokeStyle=rgba(P.sagePale,.50);ctx.lineWidth=1.5;ctx.stroke();
  ctx.fillStyle=P.sagePale;ctx.beginPath();ctx.arc(bx+23,y,6,0,Math.PI*2);ctx.fill();
  ctx.textBaseline='middle';ctx.textAlign='left';ctx.fillText(text,bx+39,y);
}

function render(){
  ctx.clearRect(0,0,W,H);

  // Full canvas forest green bg
  ctx.fillStyle=P.green;ctx.fillRect(0,0,W,1395);
  drawDecorCircles();

  // Script accent
  ctx.fillStyle=P.sagePale;ctx.font='400 90px "Pinyon Script"';ctx.textBaseline='top';ctx.letterSpacing='0em';ctx.textAlign='center';
  ctx.fillText('one number. total freedom.',W/2,72);
  ctx.textAlign='left';

  // Badge
  ctx.fillStyle=P.sagePale;
  drawBadge('FREE CALCULATOR · FIRE & EARLY RETIREMENT',W/2,200);

  // Headline
  ctx.fillStyle=P.cream;ctx.letterSpacing='-0.01em';ctx.textBaseline='top';ctx.textAlign='center';
  fitHeadlineText('Your Coast FIRE Number',W/2,240,W-152);
  ctx.fillStyle=P.sagePale;ctx.font='italic 300 72px "Cormorant Garamond"';ctx.letterSpacing='0em';
  ctx.fillText('— the target that sets you free',W/2,348);
  ctx.textAlign='left';

  // Metric card
  const mc={x:80,y:460,w:840,h:420,r:18};
  ctx.save();ctx.shadowColor='rgba(0,0,0,0.30)';ctx.shadowBlur=40;ctx.shadowOffsetY=16;
  rrect(mc.x,mc.y,mc.w,mc.h,mc.r);ctx.fillStyle=P.white;ctx.fill();ctx.restore();

  // Row 1
  ctx.fillStyle=P.warmGray;ctx.font='700 18px Lato';ctx.letterSpacing='0.12em';ctx.textBaseline='top';
  ctx.fillText('COAST NUMBER',mc.x+40,mc.y+30);
  ctx.fillStyle=P.nearBlk;ctx.font='300 76px "Cormorant Garamond"';ctx.letterSpacing='-0.02em';
  ctx.fillText('$247,000',mc.x+40,mc.y+52);

  // Divider
  ctx.strokeStyle='#dde8df';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(mc.x+40,mc.y+142);ctx.lineTo(mc.x+mc.w-40,mc.y+142);ctx.stroke();

  // Row 2
  ctx.fillStyle=P.warmGray;ctx.font='700 18px Lato';ctx.letterSpacing='0.12em';ctx.textBaseline='top';
  ctx.fillText('STOP SAVING AT',mc.x+40,mc.y+158);
  ctx.fillStyle=P.nearBlk;ctx.font='300 56px "Cormorant Garamond"';ctx.letterSpacing='-0.01em';
  ctx.fillText('Age 38',mc.x+40,mc.y+180);

  // Divider
  ctx.strokeStyle='#dde8df';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(mc.x+40,mc.y+248);ctx.lineTo(mc.x+mc.w-40,mc.y+248);ctx.stroke();

  // Row 3
  ctx.fillStyle=P.warmGray;ctx.font='700 18px Lato';ctx.letterSpacing='0.12em';ctx.textBaseline='top';
  ctx.fillText('RETIRE AT',mc.x+40,mc.y+264);
  ctx.fillStyle=P.nearBlk;ctx.font='300 56px "Cormorant Garamond"';ctx.letterSpacing='-0.01em';
  ctx.fillText('Age 62',mc.x+40,mc.y+286);

  // Divider
  ctx.strokeStyle='#dde8df';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(mc.x+40,mc.y+354);ctx.lineTo(mc.x+mc.w-40,mc.y+354);ctx.stroke();

  // Body text below card
  ctx.fillStyle=P.cream;ctx.font='300 30px Lato';ctx.letterSpacing='0em';ctx.textBaseline='top';ctx.textAlign='center';
  ctx.fillText('Hit this number once. Compound growth handles the rest.',W/2,935);
  ctx.textAlign='left';

  // CTA pill
  const ctaW=380,ctaH=64,ctaX=310,ctaY=1010;
  rrect(ctaX,ctaY,ctaW,ctaH,32);ctx.fillStyle=P.sagePale;ctx.fill();
  ctx.fillStyle=P.greenDk;ctx.font='700 24px Lato';ctx.letterSpacing='0.04em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('Find Your Coast Number →',ctaX+ctaW/2,ctaY+ctaH/2);ctx.textAlign='left';

  // Keyword pills
  const keywords=['coast fire calculator','coast fire number','financial independence'];
  const keywordWidths=keywords.map(kw=>{
    ctx.font='400 20px Lato';ctx.letterSpacing='0em';
    return ctx.measureText(kw).width+40;
  });
  const totalKeywordWidth=keywordWidths.reduce((sum,w)=>sum+w,0)+16*(keywords.length-1);
  let kx=(W-totalKeywordWidth)/2;
  keywords.forEach((kw,index)=>{
    const kpw=keywordWidths[index],kph=44;
    rrect(kx,1130,kpw,kph,22);ctx.strokeStyle=rgba(P.cream,.5);ctx.lineWidth=1.5;ctx.stroke();
    ctx.fillStyle=P.cream;ctx.textBaseline='middle';ctx.textAlign='left';ctx.fillText(kw,kx+20,1152);
    kx+=kpw+16;
  });

  ctx.textBaseline='alphabetic';ctx.letterSpacing='0em';
  drawFooter();
}

document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='coast-fire-02-direct-utility-metric-hero-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});

document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
