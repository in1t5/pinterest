<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Coast FIRE Calculator — In Your Pocket · 1000×1500</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600&family=Lato:wght@300;400;500;700;900&family=Pinyon+Script&display=swap" rel="stylesheet" />
<style>
html, body { margin: 0; padding: 20px; background: #2b2f2d; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; box-sizing: border-box; }
.pin-wrap { transform-origin: top center; }
.grain { position: absolute; inset: 0; pointer-events: none; opacity: 0.06; mix-blend-mode: multiply; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/%3E%3CfeColorMatrix values='0 0 0 0 0.28 0 0 0 0 0.34 0 0 0 0 0.31 0 0 0 1 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); }
</style>
</head>
<body>
<div class="pin-wrap">
<div style="width:1000px;height:1500px;background:#47584F;position:relative;overflow:hidden;font-family:Lato,sans-serif;">
  <div class="grain"></div>

  <!-- Radial gradient overlay -->
  <div style="position:absolute;inset:0;opacity:0.2;background:radial-gradient(ellipse at top,#84A17C 0%,transparent 60%);"></div>

  <div style="padding:80px 80px 0;text-align:center;position:relative;">
    <div style="font-family:Lato,sans-serif;font-size:16px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#C1D5A5;margin-bottom:16px;">In your pocket</div>
    <div style="font-family:'Cormorant Garamond',Georgia,serif;font-weight:300;font-size:78px;line-height:1.05;color:#F5EEED;margin-bottom:4px;">Coast FIRE</div>
    <div style="font-family:'Cormorant Garamond',Georgia,serif;font-weight:300;font-style:italic;font-size:78px;line-height:1.05;color:#C1D5A5;margin-bottom:14px;">calculator.</div>
    <div style="font-family:'Pinyon Script',cursive;font-size:48px;line-height:1;color:#C1D5A5;">free, on any device.</div>
  </div>

  <!-- Phone frame -->
  <div style="display:flex;justify-content:center;margin-top:50px;">
    <div style="width:320px;height:560px;background:#1a1f1c;border-radius:38px;padding:12px;position:relative;box-shadow:0 20px 60px rgba(0,0,0,0.4),inset 0 0 0 2px #47584F;">
      <!-- Notch -->
      <div style="position:absolute;top:14px;left:50%;transform:translateX(-50%);width:90px;height:6px;background:#000;border-radius:999px;"></div>

      <div style="background:#1a1f1c;border-radius:28px;height:100%;padding:32px 22px;color:#F5EEED;position:relative;box-sizing:border-box;overflow:hidden;">
        <!-- Header row -->
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid rgba(193,213,165,0.2);">
          <svg width="18" height="18" viewBox="0 0 40 40" fill="none">
            <path d="M20 4 Q34 14 30 28 Q26 36 20 36 Q14 36 10 28 Q6 14 20 4 Z" stroke="#C1D5A5" stroke-width="1" fill="none"/>
            <path d="M20 8 L20 34" stroke="#C1D5A5" stroke-width="0.6"/>
          </svg>
          <div style="font-family:Lato,sans-serif;font-weight:700;font-size:20px;color:#F5EEED;">Coast FIRE</div>
        </div>

        <div style="font-size:16px;letter-spacing:2px;color:#84A17C;font-weight:700;margin-bottom:6px;">RESULT · YOUR NUMBERS</div>
        <div style="font-family:'Cormorant Garamond',Georgia,serif;font-weight:400;font-size:56px;line-height:1;color:#F5EEED;margin-bottom:14px;">$247k<span style="font-size:27px;color:#C1D5A5;"> coast #</span></div>

        <div style="display:inline-block;padding:4px 12px;background:rgba(193,213,165,0.2);border-radius:999px;font-size:17px;color:#C1D5A5;font-weight:700;margin-bottom:18px;">Stop saving at age 38 ✓</div>

        <!-- Mini timeline bar -->
        <div style="margin-bottom:8px;font-size:14px;letter-spacing:1px;color:#84A17C;font-weight:700;">AGE 30 ——————— 38 ——————————————— 62</div>
        <div style="display:flex;height:10px;border-radius:5px;overflow:hidden;margin-bottom:18px;">
          <div style="flex:0 0 30%;background:#47584F;"></div>
          <div style="flex:0 0 50%;background:#84A17C;"></div>
          <div style="flex:0 0 20%;background:#C1D5A5;"></div>
        </div>
        <div style="display:flex;justify-content:space-between;font-family:Lato,sans-serif;font-size:14px;color:#84A17C;margin-bottom:20px;">
          <span>Save</span><span>Coast</span><span>Retire</span>
        </div>

        <!-- Bottom button -->
        <div style="position:absolute;bottom:26px;left:22px;right:22px;padding:12px;background:#C1D5A5;border-radius:999px;text-align:center;font-family:Lato,sans-serif;font-weight:700;color:#47584F;font-size:18px;letter-spacing:1.5px;text-transform:uppercase;">
          Calculate →
        </div>
      </div>
    </div>
  </div>

  <div style="text-align:center;margin-top:60px;">
    <div style="font-family:Lato,sans-serif;font-size:27px;font-weight:400;color:#EAEDCE;">Your coast number in 2 minutes — free.</div>
  </div>

  <!-- Dark footer -->
  <div style="position:absolute;bottom:0;left:0;right:0;height:90px;background:#3a473f;display:flex;align-items:center;padding:0 36px;gap:16px;">
    <div style="width:44px;height:44px;border-radius:50%;background:#F5EEED;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid rgba(71,88,79,0.15);">
      <img src="../design/templates/old/logo.svg" style="width:32px;height:32px;" alt="" />
    </div>
    <div style="flex:1;line-height:1.2;">
      <div style="font-family:Lato,sans-serif;font-size:21px;font-weight:700;color:#F5EEED;">Free tool — no sign-up</div>
      <div style="font-family:Lato,sans-serif;font-size:16px;color:#C1D5A5;letter-spacing:2px;text-transform:uppercase;margin-top:3px;">timeandmoneytree.com</div>
    </div>
    <div style="padding:12px 22px;border:1px solid rgba(245,238,237,0.4);border-radius:999px;font-family:Lato,sans-serif;font-size:18px;font-weight:700;color:#F5EEED;letter-spacing:1.5px;text-transform:uppercase;">Calculate →</div>
  </div>
</div>
</div>
<script>
function fit() {
  var scale = Math.min(1, (window.innerHeight - 40) / 1500, (window.innerWidth - 40) / 1000);
  document.querySelector('.pin-wrap').style.transform = 'scale(' + scale + ')';
  document.body.style.minHeight = Math.round(1500 * scale + 40) + 'px';
}
fit();
window.addEventListener('resize', fit);
</script>
</body>
</html>
