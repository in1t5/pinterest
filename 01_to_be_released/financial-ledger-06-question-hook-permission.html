<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>What If Tracking Your Net Worth Took Just 5 Minutes a Year? · Financial Ledger · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 06 · Question Hook Permission · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_no_text_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);
  // Pale sage background
  ctx.fillStyle=P.sageFaint;ctx.fillRect(0,0,W,H);
  // Top green bar
  ctx.fillStyle=P.green;ctx.fillRect(0,0,W,12);

  // Pinyon Script accent
  ctx.fillStyle=rgba(P.green,.65);ctx.font='italic 76px "Pinyon Script"';
  ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('5 minutes. Once a year.',W/2,140);

  // Rule
  ctx.strokeStyle=rgba(P.sage,.5);ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(120,162);ctx.lineTo(880,162);ctx.stroke();

  // Large italic question
  ctx.fillStyle=P.greenDk;ctx.font='italic 300 62px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('What if financial tracking',W/2,236);
  ctx.fillText('was this simple?',W/2,306);

  // Three step chips — horizontal progressive
  const steps=[
    {label:'Step 1',sub:'Enter assets',col:P.sageFaint,border:rgba(P.sage,.5),txt:P.greenDk},
    {label:'Step 2',sub:'Enter liabilities',col:P.sagePale,border:rgba(P.sage,.7),txt:P.greenDk},
    {label:'Step 3',sub:'See your net worth chart',col:P.green,border:P.green,txt:P.white},
  ];
  const chipW=256,chipH=160,chipGap=20,chipStartX=W/2-(chipW*3+chipGap*2)/2;
  steps.forEach((s,i)=>{
    const cx=chipStartX+i*(chipW+chipGap),cy=360;
    rrect(cx,cy,chipW,chipH,14);
    ctx.fillStyle=s.col;ctx.fill();
    ctx.strokeStyle=s.border;ctx.lineWidth=2;ctx.stroke();
    ctx.fillStyle=s.txt;ctx.font='700 22px Lato';ctx.textAlign='center';ctx.textBaseline='alphabetic';
    ctx.fillText(s.label,cx+chipW/2,cy+54);
    ctx.font='300 20px Lato';
    const words=s.sub.split(' ');
    if(words.length<=2){ctx.fillText(s.sub,cx+chipW/2,cy+88);}
    else{ctx.fillText(words.slice(0,2).join(' '),cx+chipW/2,cy+82);ctx.fillText(words.slice(2).join(' '),cx+chipW/2,cy+108);}
    // Progress number large
    ctx.font='700 56px Lato';ctx.fillStyle=i===2?rgba(P.white,.25):rgba(P.sage,.25);
    ctx.fillText(i+1,cx+chipW/2,cy+chipH-6);
  });

  // Connector arrows between chips
  ctx.fillStyle=rgba(P.sage,.7);ctx.font='700 28px Lato';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('→',chipStartX+chipW+chipGap/2,360+160/2);
  ctx.fillText('→',chipStartX+2*(chipW+chipGap)-chipGap/2,360+160/2);

  // Body text
  ctx.fillStyle=P.warmGray;ctx.font='300 27px Lato';ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('No spreadsheet. No formulas.',W/2,610);
  ctx.fillText('Just log the numbers and watch',W/2,648);
  ctx.fillText('your story unfold.',W/2,686);

  // Feature chips row
  const feats=['Free','Browser-based','No sign-up'];
  const fw=220,fh=50,fGap=20,fStart=W/2-(fw*3+fGap*2)/2;
  feats.forEach((f,i)=>{
    const fx=fStart+i*(fw+fGap),fy=740;
    rrect(fx,fy,fw,fh,25);
    ctx.fillStyle=rgba(P.sage,.2);ctx.fill();
    ctx.strokeStyle=rgba(P.sage,.6);ctx.lineWidth=1.5;ctx.stroke();
    ctx.fillStyle=P.green;ctx.font='700 19px Lato';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(f,fx+fw/2,fy+fh/2);
  });

  // Insight quote
  rrect(100,840,800,130,14);
  ctx.fillStyle=rgba(P.green,.07);ctx.fill();
  ctx.strokeStyle=rgba(P.green,.18);ctx.lineWidth=1.5;ctx.stroke();
  ctx.fillStyle=P.greenDk;ctx.font='italic 300 30px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('"The hardest part is opening the tool.',W/2,878);
  ctx.fillText('Everything else takes 5 minutes."',W/2,918);

  // Timeline strip
  ctx.fillStyle=P.green;ctx.fillRect(0,1010,W,56);
  ctx.fillStyle=P.cream;ctx.font='700 22px Lato';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.letterSpacing='0.06em';ctx.fillText('ANNUAL CHECK-IN  ·  5 MINUTES  ·  LIFE-CHANGING CLARITY',W/2,1038);ctx.letterSpacing='0em';

  // CTA pill
  const pw=380,ph=70,ppx=W/2-pw/2,ppy=1116;
  rrect(ppx,ppy,pw,ph,35);
  ctx.fillStyle=P.green;ctx.fill();
  ctx.fillStyle=P.white;ctx.font='700 26px Lato';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Try It Free →',W/2,ppy+ph/2);

  // Sub tag
  ctx.fillStyle=rgba(P.warmGray,.72);ctx.font='300 18px Lato';ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('financial ledger  ·  net worth  ·  wealth tracker',W/2,1248);

  drawFooter();
}
function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='financial-ledger-06-question-hook-permission-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
