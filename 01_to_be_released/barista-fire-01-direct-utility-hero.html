<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Barista FIRE Calculator — Plan Your Part-Time Path to Full Retirement · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;width:420px;height:630px;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 01 · Direct Utility Hero · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxWidth&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);return y;
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/only_tree.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=72;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.fillStyle='#ffffff';ctx.fill();ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',200,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',200,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Cream background
  ctx.fillStyle=P.cream;
  ctx.fillRect(0,0,W,H);

  // Top sage accent stripe
  ctx.fillStyle=P.sageFaint;
  ctx.fillRect(0,0,W,120);

  // Pinyon Script accent
  ctx.fillStyle=P.sage;
  ctx.font='400 72px "Pinyon Script"';
  ctx.textBaseline='middle';
  ctx.textAlign='center';
  ctx.fillText('two dates. total freedom.',W/2,68);
  ctx.textAlign='left';

  // Headline
  ctx.fillStyle=P.green;
  ctx.font='italic 300 76px "Cormorant Garamond"';
  ctx.textBaseline='top';
  ctx.textAlign='center';
  ctx.fillText('Barista FIRE',W/2,148);
  ctx.fillText('Calculator',W/2,232);
  ctx.textAlign='left';

  // Subheadline
  ctx.fillStyle=P.warmGray;
  ctx.font='300 30px Lato';
  ctx.textAlign='center';
  ctx.textBaseline='top';
  ctx.fillText('Find your part-time date and your full',W/2,338);
  ctx.fillText('retirement date — free.',W/2,376);
  ctx.textAlign='left';

  // Two metric chips
  const chipY=440,chipH=160;
  const chipW=390,chipGap=20;
  const chip1X=W/2-chipW-chipGap/2;
  const chip2X=W/2+chipGap/2;

  // Left chip - pale sage
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,0.14)';ctx.shadowBlur=18;ctx.shadowOffsetY=6;
  rrect(chip1X,chipY,chipW,chipH,16);ctx.fillStyle=P.sagePale;ctx.fill();
  ctx.restore();
  ctx.fillStyle=P.greenDk;ctx.font='700 16px Lato';ctx.letterSpacing='0.12em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('BARISTA FI',chip1X+chipW/2,chipY+22);
  ctx.fillStyle=P.green;ctx.font='300 64px "Cormorant Garamond"';ctx.letterSpacing='0em';
  ctx.textBaseline='top';
  ctx.fillText('Age 38',chip1X+chipW/2,chipY+52);
  ctx.fillStyle=P.warmGray;ctx.font='300 24px Lato';
  ctx.fillText('Part-time begins',chip1X+chipW/2,chipY+124);

  // Right chip - forest green
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,0.14)';ctx.shadowBlur=18;ctx.shadowOffsetY=6;
  rrect(chip2X,chipY,chipW,chipH,16);ctx.fillStyle=P.green;ctx.fill();
  ctx.restore();
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.12em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('FULL FIRE',chip2X+chipW/2,chipY+22);
  ctx.fillStyle=P.cream;ctx.font='300 64px "Cormorant Garamond"';ctx.letterSpacing='0em';
  ctx.fillText('Age 47',chip2X+chipW/2,chipY+52);
  ctx.fillStyle=P.sagePale;ctx.font='300 24px Lato';
  ctx.fillText('Complete freedom',chip2X+chipW/2,chipY+124);
  ctx.textAlign='left';

  // Divider
  ctx.strokeStyle=rgba(P.sage,0.3);ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(80,634);ctx.lineTo(920,634);ctx.stroke();

  // Body text
  ctx.fillStyle=P.warmGray;ctx.font='300 28px Lato';ctx.letterSpacing='0em';
  ctx.textAlign='center';ctx.textBaseline='top';
  wrapText('Enter age, expenses, portfolio, part-time income.',W/2,660,760,40);
  ctx.fillText('Both milestones calculated instantly.',W/2,742);
  ctx.textAlign='left';

  // Feature row chips
  const featY=820,featChipH=56,featChipW=240;
  const features=['Age','Expenses','Portfolio','Part-time $'];
  const totalW=features.length*featChipW+(features.length-1)*12;
  let fx=(W-totalW)/2;
  features.forEach(f=>{
    ctx.save();
    ctx.shadowColor='rgba(0,0,0,0.08)';ctx.shadowBlur=8;ctx.shadowOffsetY=3;
    rrect(fx,featY,featChipW,featChipH,28);ctx.fillStyle=P.sageFaint;ctx.fill();
    ctx.restore();
    ctx.fillStyle=P.greenDk;ctx.font='700 20px Lato';ctx.letterSpacing='0.06em';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(f,fx+featChipW/2,featY+featChipH/2);
    fx+=featChipW+12;
  });
  ctx.textAlign='left';

  // Divider 2
  ctx.strokeStyle=rgba(P.sage,0.3);ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(80,908);ctx.lineTo(920,908);ctx.stroke();

  // Secondary body
  ctx.fillStyle=P.warmGray;ctx.font='300 26px Lato';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('No spreadsheet needed.',W/2,932);
  ctx.fillText('No sign-up required.',W/2,966);
  ctx.fillStyle=P.green;ctx.font='italic 300 32px "Cormorant Garamond"';
  ctx.fillText('"The calculator that shows two exits, not one."',W/2,1020);
  ctx.textAlign='left';

  // Keyword tags
  const tags=['barista fire calculator','barista fire','retire early part time'];
  const tagY=1110,tagH=40,tagGap=12,tagPad=16;
  ctx.font='700 17px Lato';
  const tagMetrics=tags.map(tag=>({
    label:tag,
    width:ctx.measureText(tag).width+tagPad*2,
  }));
  const tagRowWidth=tagMetrics.reduce((sum,{width})=>sum+width,0)+tagGap*(tagMetrics.length-1);
  let tx=(W-tagRowWidth)/2;
  tagMetrics.forEach(({label,width})=>{
    rrect(tx,tagY,width,tagH,20);ctx.fillStyle=rgba(P.sage,0.2);ctx.fill();
    ctx.strokeStyle=rgba(P.sage,0.4);ctx.lineWidth=1;ctx.stroke();
    ctx.fillStyle=P.green;ctx.textBaseline='middle';ctx.textAlign='center';
    ctx.fillText(label,tx+width/2,tagY+tagH/2);
    tx+=width+tagGap;
  });

  // CTA pill
  const ctaText='CALCULATE YOUR TIMELINE →';
  ctx.font='700 24px Lato';
  const ctaPadding=64;
  const ctaH=68;
  const ctaW=Math.ceil(ctx.measureText(ctaText).width+ctaPadding);
  const ctaX=(W-ctaW)/2,ctaY=1290;
  ctx.save();
  ctx.shadowColor='rgba(71,88,79,0.35)';ctx.shadowBlur=22;ctx.shadowOffsetY=8;
  rrect(ctaX,ctaY,ctaW,ctaH,34);ctx.fillStyle=P.green;ctx.fill();
  ctx.restore();
  ctx.fillStyle=P.cream;ctx.letterSpacing='0.10em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(ctaText,W/2,ctaY+ctaH/2);
  ctx.textAlign='left';

  drawFooter();
}
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='barista-fire-01-direct-utility-hero-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
