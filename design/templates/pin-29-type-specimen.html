<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Pin 29 — Type Specimen Poster</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="pins.css" />
<link rel="stylesheet" href="pins-29-32.css" />
<style>
  html, body { margin: 0; padding: 20px; background: #f0eee9; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; box-sizing: border-box; }
  .pin-wrap { transform-origin: top center; }
</style>
</head>
<body>
<div class="pin-wrap">
  <div class="pin pin-29">
    <div class="top-rule">
      <span>Type · Specimen · 044</span>
      <span class="center">— compound interest, in one glyph —</span>
      <span>1000 × 1500 mm</span>
    </div>

    <div class="glyph">€</div>

    <div class="corners">
      <div class="c tl"></div>
      <div class="c tr"></div>
      <div class="c bl"></div>
      <div class="c br"></div>
    </div>

    <div class="center-label">The whole calculator, abbreviated</div>
    <h1 class="headline">
      Plant the euro.<br />
      <em>Let arithmetic do the rest.</em>
    </h1>

    <div class="scale">
      <span class="s1">€200/mo</span>
      <span class="s2">+ 7%</span>
      <span class="s3">× 30 yrs</span>
      <span class="s4">= €482K</span>
      <span class="s5">— our maths</span>
    </div>

    <div class="footer">
      <div class="footer-brand">
        <img src="../logo_brownish_framed_no_text_2501x2500.png" alt="" />
        <div>
          <div class="name">Time &amp; Moneytree</div>
          <div class="url">TIMEANDMONEYTREE.COM</div>
        </div>
      </div>
      <span class="cta-pill">Calculate yours →</span>
    </div>
  </div>
</div>
<script>
function fit() {
  var scale = Math.min(1, (window.innerHeight - 40) / 1500, (window.innerWidth - 40) / 1000);
  document.querySelector('.pin-wrap').style.transform = 'scale(' + scale + ')';
  document.body.style.minHeight = Math.round(1500 * scale + 40) + 'px';
}
fit();
window.addEventListener('resize', fit);
</script>
</body>
</html>
