<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Pin 37 — Pocket Watch Tree</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="pins.css" />
<link rel="stylesheet" href="pins-36-40.css" />
<style>
  html, body { margin: 0; padding: 20px; background: #f0eee9; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; box-sizing: border-box; }
  .pin-wrap { transform-origin: top center; }
</style>
</head>
<body>
<div class="pin-wrap">
  <div class="pin pin-37">
    <div class="grain"></div>
    <div class="top">
      <span class="eyebrow"><span class="dot" style="background: #C1D5A5;"></span><span>FIRE Date Calculator</span></span>
      <span class="tag">— time, money, one tree —</span>
    </div>

    <h1 class="headline">Your money <em>has hours.</em><br />We're just here to read them.</h1>

    <div class="watch">
      <svg viewBox="0 0 660 740" xmlns="http://www.w3.org/2000/svg">
        <!-- crown / loop -->
        <circle cx="330" cy="38" r="22" fill="none" stroke="#F5EEED" stroke-width="5" />
        <rect x="318" y="50" width="24" height="22" rx="3" fill="#F5EEED" />
        <!-- watch outer ring -->
        <circle cx="330" cy="380" r="290" fill="#F5EEED" />
        <circle cx="330" cy="380" r="290" fill="none" stroke="#47584F" stroke-width="14" />
        <circle cx="330" cy="380" r="270" fill="none" stroke="#C1D5A5" stroke-width="1" />
        <!-- hour ticks (big ones have opacity=0, small have opacity=0.6) -->
        <g fill="#47584F">
          <!-- i=0 big: x=330, y=148, r=3.5, opacity=0 -->
          <circle cx="330" cy="148" r="3.5" opacity="0" />
          <!-- i=1 small: x=446, y=179 -->
          <circle cx="446" cy="179" r="2" opacity="0.6" />
          <!-- i=2 small: x=531, y=264 -->
          <circle cx="531" cy="264" r="2" opacity="0.6" />
          <!-- i=3 big: x=562, y=380, opacity=0 -->
          <circle cx="562" cy="380" r="3.5" opacity="0" />
          <!-- i=4 small: x=531, y=496 -->
          <circle cx="531" cy="496" r="2" opacity="0.6" />
          <!-- i=5 small: x=446, y=581 -->
          <circle cx="446" cy="581" r="2" opacity="0.6" />
          <!-- i=6 big: x=330, y=612, opacity=0 -->
          <circle cx="330" cy="612" r="3.5" opacity="0" />
          <!-- i=7 small: x=214, y=581 -->
          <circle cx="214" cy="581" r="2" opacity="0.6" />
          <!-- i=8 small: x=129, y=496 -->
          <circle cx="129" cy="496" r="2" opacity="0.6" />
          <!-- i=9 big: x=98, y=380, opacity=0 -->
          <circle cx="98" cy="380" r="3.5" opacity="0" />
          <!-- i=10 small: x=129, y=264 -->
          <circle cx="129" cy="264" r="2" opacity="0.6" />
          <!-- i=11 small: x=214, y=179 -->
          <circle cx="214" cy="179" r="2" opacity="0.6" />
        </g>
        <!-- year numbers around the dial -->
        <g font-family="Lato, sans-serif" font-size="24" font-weight="900" fill="#47584F" letter-spacing="2.5">
          <text x="330" y="170" text-anchor="middle">2026</text>
          <text x="540" y="388" text-anchor="middle">+15Y</text>
          <text x="330" y="610" text-anchor="middle">+30Y</text>
          <text x="120" y="388" text-anchor="middle">+5Y</text>
        </g>
        <!-- INSIDE: tree growing from bottom of dial -->
        <g fill="#84A17C" opacity="0.92">
          <ellipse cx="330" cy="320" rx="120" ry="80" />
          <ellipse cx="260" cy="350" rx="70" ry="50" />
          <ellipse cx="400" cy="350" rx="70" ry="50" />
          <ellipse cx="330" cy="260" rx="65" ry="48" />
        </g>
        <g fill="#C1D5A5" opacity="0.9">
          <ellipse cx="290" cy="290" rx="34" ry="22" />
          <ellipse cx="370" cy="290" rx="34" ry="22" />
        </g>
        <!-- trunk -->
        <path d="M 330 480 Q 326 440 332 400 Q 336 370 330 340" fill="none" stroke="#47584F" stroke-width="6" stroke-linecap="round" />
        <path d="M 330 410 Q 290 380 270 360" fill="none" stroke="#47584F" stroke-width="3" stroke-linecap="round" />
        <path d="M 330 390 Q 370 360 390 340" fill="none" stroke="#47584F" stroke-width="3" stroke-linecap="round" />
        <!-- coin fruits -->
        <circle cx="270" cy="335" r="11" fill="#F5EEED" stroke="#F1683F" stroke-width="2" />
        <text x="270" y="341" text-anchor="middle" font-family="Cormorant Garamond, serif" font-size="14" fill="#F1683F" font-weight="500">€</text>
        <circle cx="390" cy="335" r="11" fill="#F5EEED" stroke="#F1683F" stroke-width="2" />
        <text x="390" y="341" text-anchor="middle" font-family="Cormorant Garamond, serif" font-size="14" fill="#F1683F" font-weight="500">€</text>
        <circle cx="330" cy="260" r="10" fill="#F5EEED" stroke="#F1683F" stroke-width="2" />
        <text x="330" y="266" text-anchor="middle" font-family="Cormorant Garamond, serif" font-size="13" fill="#F1683F" font-weight="500">€</text>
        <!-- centre pin -->
        <circle cx="330" cy="380" r="10" fill="#47584F" />
        <circle cx="330" cy="380" r="4" fill="#F5EEED" />
        <!-- "now" hand — sage leaf, rotate 45° -->
        <g transform="rotate(45 330 380)">
          <path d="M 330 380 L 332 270 Q 340 250 330 240 Q 320 250 328 270 Z" fill="#C1D5A5" stroke="#47584F" stroke-width="1.5" />
        </g>
        <!-- "FI" hand — coral leaf, rotate 135° -->
        <g transform="rotate(135 330 380)">
          <path d="M 330 380 L 333 200 Q 343 178 330 168 Q 317 178 327 200 Z" fill="#F1683F" stroke="#47584F" stroke-width="1.5" />
        </g>
        <!-- side knobs -->
        <rect x="620" y="370" width="16" height="20" rx="3" fill="#47584F" />
        <rect x="24" y="370" width="16" height="20" rx="3" fill="#47584F" />
      </svg>
    </div>

    <div class="watch-overlay">
      <div class="lbl">FI hand points at</div>
      <div class="val"><em>+13</em> years</div>
    </div>

    <div class="legend">
      <div class="item">
        <span class="hand now"></span>
        <span>Today · age 34</span>
      </div>
      <div class="item">
        <span class="hand fi"></span>
        <span>Financial Independence · age 47</span>
      </div>
    </div>

    <div class="footer">
      <div class="footer-brand">
        <img src="../logo_brownish_framed_no_text_2501x2500.png" alt="" />
        <div>
          <div class="name">Time &amp; Moneytree</div>
          <div class="url">TIMEANDMONEYTREE.COM</div>
        </div>
      </div>
      <span class="cta-pill">Read your watch →</span>
    </div>
  </div>
</div>
<script>
function fit() {
  var scale = Math.min(1, (window.innerHeight - 40) / 1500, (window.innerWidth - 40) / 1000);
  document.querySelector('.pin-wrap').style.transform = 'scale(' + scale + ')';
  document.body.style.minHeight = Math.round(1500 * scale + 40) + 'px';
}
fit();
window.addEventListener('resize', fit);
</script>
</body>
</html>
