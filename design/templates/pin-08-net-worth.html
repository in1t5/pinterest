<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Pin 08 — Net Worth</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Lato:ital,wght@0,300;0,400;0,700;0,900;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="pins.css" />
<style>
  html, body { margin: 0; padding: 20px; background: #f0eee9; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; box-sizing: border-box; }
  .pin-wrap { transform-origin: top center; }
</style>
</head>
<body>
<div class="pin-wrap">
  <div class="pin pin-8">
    <div class="grain"></div>

    <div class="top">
      <span class="eyebrow">
        <span class="dot" style="background:#26C6DA"></span>
        <span>Net Worth Tracker</span>
      </span>
      <h1>
        Your whole<br>
        financial life<br>
        in <em>four lines.</em>
      </h1>
    </div>

    <div class="ledger">
      <div class="row">
        <span class="n">01</span>
        <span class="label-col">
          <span class="k">What you own</span>
          <span class="sub">Cash · ETFs · home equity</span>
        </span>
        <span class="v positive">+ €312,000</span>
      </div>
      <div class="row">
        <span class="n">02</span>
        <span class="label-col">
          <span class="k">What you owe</span>
          <span class="sub">Mortgage · car · cards</span>
        </span>
        <span class="v negative">− €184,000</span>
      </div>
      <div class="row">
        <span class="n">03</span>
        <span class="label-col">
          <span class="k">Monthly flow</span>
          <span class="sub">In · out · saved</span>
        </span>
        <span class="v positive">+ €1,820</span>
      </div>
      <div class="row total-row">
        <span class="n">∑</span>
        <span class="label-col">
          <span class="k">Net worth</span>
        </span>
        <span class="v">€128,000</span>
      </div>
    </div>

    <div class="footer">
      <div class="footer-brand">
        <img src="../logo_brownish_framed_no_text_2501x2500.png" alt="" />
        <div>
          <div class="name">Time &amp; Moneytree</div>
          <div class="url">TIMEANDMONEYTREE.COM</div>
        </div>
      </div>
      <span class="cta-pill">Track yours →</span>
    </div>
  </div>
</div>
<script>
function fit() {
  var scale = Math.min(1, (window.innerHeight - 40) / 1500, (window.innerWidth - 40) / 1000);
  document.querySelector('.pin-wrap').style.transform = 'scale(' + scale + ')';
  document.body.style.minHeight = Math.round(1500 * scale + 40) + 'px';
}
fit();
window.addEventListener('resize', fit);
</script>
</body>
</html>
