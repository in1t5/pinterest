<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Budget Calculator — Clarity Looks Like This · 1000×1500</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600&family=Lato:wght@300;400;500;700;900&family=Pinyon+Script&display=swap" rel="stylesheet" />
<style>
html, body { margin: 0; padding: 20px; background: #2b2f2d; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; box-sizing: border-box; }
.pin-wrap { transform-origin: top center; }
.grain { position: absolute; inset: 0; pointer-events: none; opacity: 0.06; mix-blend-mode: multiply; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/%3E%3CfeColorMatrix values='0 0 0 0 0.28 0 0 0 0 0.34 0 0 0 0 0.31 0 0 0 1 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); }
</style>
</head>
<body>
<div class="pin-wrap">
<div style="width:1000px;height:1500px;background:#1f2620;position:relative;overflow:hidden;font-family:Lato,sans-serif;">
  <div class="grain"></div>

  <!-- vertical lines pattern -->
  <div style="position:absolute;inset:0;opacity:0.08;background-image:repeating-linear-gradient(90deg,#84A17C 0,#84A17C 1px,transparent 1px,transparent 80px);"></div>

  <div style="padding:90px 80px 0;position:relative;">
    <div style="text-align:center;margin-bottom:36px;">
      <div style="font-family:Lato,sans-serif;font-size:16px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#84A17C;margin-bottom:14px;">May 2026 · Budget summary</div>
      <div style="font-family:'Cormorant Garamond',Georgia,serif;font-weight:300;font-size:76px;line-height:1.05;color:#F5EEED;margin-bottom:4px;">This is what</div>
      <div style="font-family:'Cormorant Garamond',Georgia,serif;font-weight:300;font-style:italic;font-size:76px;line-height:1.05;color:#C1D5A5;">clarity looks like.</div>
    </div>

    <!-- Budget table -->
    <div style="background:#F5EEED;border-radius:10px;padding:36px 36px 8px;margin-top:32px;">
      <div style="display:flex;justify-content:space-between;align-items:baseline;padding-bottom:18px;border-bottom:1px solid #EAEDCE;margin-bottom:24px;">
        <div style="font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:28px;color:#47584F;">Budget summary</div>
        <div style="font-size:16px;letter-spacing:2px;color:#84A17C;font-weight:700;text-transform:uppercase;">May</div>
      </div>

      <div style="display:flex;justify-content:space-between;align-items:center;padding:16px 0;border-bottom:1px solid #F5EEED;">
        <div style="font-family:Lato,sans-serif;font-size:24px;color:#47584F;">Total income</div>
        <div style="font-family:'Cormorant Garamond',serif;font-weight:400;font-size:30px;color:#1A1A18;">$5,200</div>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;padding:16px 0;border-bottom:1px solid #F5EEED;">
        <div style="font-family:Lato,sans-serif;font-size:24px;color:#47584F;">Total budgeted</div>
        <div style="font-family:'Cormorant Garamond',serif;font-weight:400;font-size:30px;color:#1A1A18;">$4,400</div>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;padding:16px 0;border-bottom:1px solid #F5EEED;">
        <div style="font-family:Lato,sans-serif;font-size:24px;color:#47584F;">Total spent</div>
        <div style="font-family:'Cormorant Garamond',serif;font-weight:400;font-size:30px;color:#1A1A18;">$3,952</div>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;padding:16px 0;border-bottom:1px solid #F5EEED;">
        <div style="font-family:Lato,sans-serif;font-size:24px;color:#47584F;">Saved</div>
        <div style="font-family:'Cormorant Garamond',serif;font-weight:400;font-size:30px;color:#1A1A18;">$1,248</div>
      </div>

      <!-- Savings rate highlight -->
      <div style="margin-top:8px;padding:22px;background:#47584F;border-radius:6px;display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
        <div>
          <div style="font-size:15px;letter-spacing:2px;color:#C1D5A5;font-weight:700;text-transform:uppercase;margin-bottom:4px;">Savings rate</div>
          <div style="font-family:'Cormorant Garamond',serif;font-style:italic;font-size:27px;color:#F5EEED;">the only number that matters</div>
        </div>
        <div style="font-family:'Cormorant Garamond',Georgia,serif;font-weight:400;font-size:72px;line-height:1;color:#F5EEED;">24%</div>
      </div>
    </div>

    <!-- Pull quote with branch -->
    <div style="margin-top:36px;text-align:center;">
      <svg width="220" height="88" viewBox="0 0 200 80" fill="none" style="display:block;margin:0 auto 18px;">
        <path d="M0 40 Q60 38 100 40 T200 42" stroke="#84A17C" stroke-width="1" fill="none" stroke-linecap="round"/>
        <ellipse cx="40" cy="32" rx="8" ry="3" transform="rotate(-20 40 32)" stroke="#84A17C" stroke-width="0.8" fill="none"/>
        <ellipse cx="65" cy="48" rx="9" ry="3" transform="rotate(15 65 48)" stroke="#84A17C" stroke-width="0.8" fill="none"/>
        <ellipse cx="100" cy="30" rx="10" ry="3" transform="rotate(-15 100 30)" stroke="#84A17C" stroke-width="0.8" fill="none"/>
        <ellipse cx="135" cy="50" rx="9" ry="3" transform="rotate(20 135 50)" stroke="#84A17C" stroke-width="0.8" fill="none"/>
        <ellipse cx="170" cy="36" rx="8" ry="3" transform="rotate(-10 170 36)" stroke="#84A17C" stroke-width="0.8" fill="none"/>
      </svg>
      <div style="font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:26px;color:#C1D5A5;line-height:1.35;">"Track it monthly. Watch it climb."</div>
    </div>
  </div>

  <!-- Dark footer -->
  <div style="position:absolute;bottom:0;left:0;right:0;height:90px;background:#3a473f;display:flex;align-items:center;padding:0 36px;gap:16px;">
    <div style="width:44px;height:44px;border-radius:50%;background:#F5EEED;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid rgba(71,88,79,0.15);">
      <img src="logo.svg" style="width:32px;height:32px;" alt="" />
    </div>
    <div style="flex:1;line-height:1.2;">
      <div style="font-family:Lato,sans-serif;font-size:21px;font-weight:700;color:#F5EEED;">Free tool — no sign-up</div>
      <div style="font-family:Lato,sans-serif;font-size:16px;color:#C1D5A5;letter-spacing:2px;text-transform:uppercase;margin-top:3px;">timeandmoneytree.com</div>
    </div>
    <div style="padding:12px 22px;border:1px solid rgba(245,238,237,0.4);border-radius:999px;font-family:Lato,sans-serif;font-size:18px;font-weight:700;color:#F5EEED;letter-spacing:1.5px;text-transform:uppercase;">Calculate →</div>
  </div>
</div>
</div>
<script>
function fit() {
  var scale = Math.min(1, (window.innerHeight - 40) / 1500, (window.innerWidth - 40) / 1000);
  document.querySelector('.pin-wrap').style.transform = 'scale(' + scale + ')';
  document.body.style.minHeight = Math.round(1500 * scale + 40) + 'px';
}
fit();
window.addEventListener('resize', fit);
</script>
</body>
</html>
