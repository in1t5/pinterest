    <div class="top">
      <span class="eyebrow">
        <span class="dot"></span>
        <span>ETF Growth Calculator</span>

    <h1 class="headline">
      One fund.<br>
      One decision.<br>
      <em>Three decades.</em>
    </h1>

    <div class="center-num">
      <div class="lbl">After thirty patient years</div>
      <div class="val">€760K</div>
      <div class="sub">from €400 a month · global index · 7%</div>
    </div>

    <div class="seal">grown, not chased</div>

    <div class="footer">
      <div class="footer-brand">
        <img src="../logo_brownish_framed_no_text_2501x2500.png" alt="" />
        <div>
          <div class="name">Time &amp; Moneytree</div>
          <div class="url">TIMEANDMONEYTREE.COM</div>
        </div>
      </div>
      <span class="cta-pill">Plant your money →</span>
    </div>

</div>
<script>
function fit() {
  var scale = Math.min(1, (window.innerHeight - 40) / 1500, (window.innerWidth - 40) / 1000);
  document.querySelector('.pin-wrap').style.transform = 'scale(' + scale + ')';
  document.body.style.minHeight = Math.round(1500 * scale + 40) + 'px';
}
fit();
window.addEventListener('resize', fit);
</script>
</body>
</html>
