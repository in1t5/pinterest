<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The FIRE Formula · FIRE Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 27 · Educational — Formula Explainer · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxWidth&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);return y;
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_no_text_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // White bg
  ctx.fillStyle=P.white;ctx.fillRect(0,0,W,1395);

  // Top label: italic "the math behind" in sage
  ctx.fillStyle=P.sage;ctx.font='italic 300 34px "Cormorant Garamond"';ctx.letterSpacing='0em';
  ctx.textBaseline='alphabetic';ctx.textAlign='center';
  ctx.fillText('the math behind',500,108);

  // Bold Lato heading
  ctx.fillStyle=P.nearBlk;ctx.font='700 72px Lato';ctx.letterSpacing='-0.02em';
  ctx.fillText('THE FIRE FORMULA',500,188);
  ctx.textAlign='left';ctx.letterSpacing='0em';

  // Divider
  ctx.fillStyle=P.sagePale;ctx.fillRect(80,210,840,3);

  // ---------- Formula Card 1: FIRE NUMBER ----------
  const c1x=80,c1y=238,c1w=840,c1h=230;
  rrect(c1x,c1y,c1w,c1h,18);ctx.fillStyle=rgba(P.sageFaint,0.6);ctx.fill();
  ctx.strokeStyle=rgba(P.sage,0.3);ctx.lineWidth=1.5;ctx.stroke();

  // Chip label
  const chip1Text='FIRE NUMBER';
  ctx.font='700 15px Lato';ctx.letterSpacing='0.10em';
  const chip1W=ctx.measureText(chip1Text).width+28;
  rrect(108,258,chip1W,34,17);ctx.fillStyle=P.green;ctx.fill();
  ctx.fillStyle=P.cream;ctx.textBaseline='middle';ctx.textAlign='center';
  ctx.fillText(chip1Text,108+chip1W/2,275);
  ctx.textAlign='left';ctx.letterSpacing='0em';

  // Formula text
  ctx.fillStyle=P.nearBlk;ctx.font='300 68px "Cormorant Garamond"';ctx.letterSpacing='-0.01em';
  ctx.textBaseline='alphabetic';
  ctx.fillText('Annual Expenses × 25',108,370);

  // Sub-label
  ctx.fillStyle=P.warmGray;ctx.font='300 22px Lato';ctx.letterSpacing='0em';
  ctx.fillText('e.g. $45,000 × 25 = $1,125,000 FIRE target',108,420);

  // ---------- Formula Card 2: SAFE WITHDRAWAL ----------
  const c2x=80,c2y=490,c2w=840,c2h=210;
  rrect(c2x,c2y,c2w,c2h,18);ctx.fillStyle=rgba(P.sageFaint,0.6);ctx.fill();
  ctx.strokeStyle=rgba(P.sage,0.3);ctx.lineWidth=1.5;ctx.stroke();

  // Chip label
  const chip2Text='SAFE WITHDRAWAL';
  ctx.font='700 15px Lato';ctx.letterSpacing='0.10em';
  const chip2W=ctx.measureText(chip2Text).width+28;
  rrect(108,510,chip2W,34,17);ctx.fillStyle=P.green;ctx.fill();
  ctx.fillStyle=P.cream;ctx.textBaseline='middle';ctx.textAlign='center';
  ctx.fillText(chip2Text,108+chip2W/2,527);
  ctx.textAlign='left';ctx.letterSpacing='0em';

  // Formula text
  ctx.fillStyle=P.nearBlk;ctx.font='300 68px "Cormorant Garamond"';ctx.letterSpacing='-0.01em';
  ctx.textBaseline='alphabetic';
  ctx.fillText('Portfolio × 4%',108,615);

  // Sub-label
  ctx.fillStyle=P.warmGray;ctx.font='300 22px Lato';ctx.letterSpacing='0em';
  ctx.fillText('Withdraw 4% of your portfolio each year',108,660);

  // ---------- Pale sage "Why it works" card ----------
  const c3x=80,c3y=726,c3w=840,c3h=218;
  rrect(c3x,c3y,c3w,c3h,18);ctx.fillStyle=rgba(P.sagePale,0.22);ctx.fill();
  ctx.strokeStyle=rgba(P.sage,0.4);ctx.lineWidth=1.5;ctx.stroke();

  ctx.fillStyle=P.green;ctx.font='700 20px Lato';ctx.letterSpacing='0.08em';
  ctx.textBaseline='alphabetic';
  ctx.fillText('WHY IT WORKS',108,768);

  ctx.fillStyle=P.nearBlk;ctx.font='700 46px "Cormorant Garamond"';ctx.letterSpacing='-0.01em';
  ctx.fillText('$1,125,000 × 4% = $45,000/yr',108,828);

  ctx.fillStyle=P.warmGray;ctx.font='italic 300 26px "Cormorant Garamond"';ctx.letterSpacing='0em';
  ctx.fillText('Historically sustainable indefinitely.',108,874);

  ctx.fillStyle=P.sage;ctx.font='300 20px Lato';ctx.letterSpacing='0em';
  wrapText('Based on the Trinity Study — 30+ years of market data.',108,912,800,30);

  // ---------- Sage italic strip ----------
  const stripY=968,stripH=120;
  ctx.fillStyle=rgba(P.sage,0.12);ctx.fillRect(0,stripY,W,stripH);
  ctx.fillStyle=P.green;ctx.font='italic 300 28px "Cormorant Garamond"';ctx.letterSpacing='0em';
  ctx.textBaseline='middle';ctx.textAlign='center';
  const stripMid=stripY+stripH/2;
  ctx.fillText('Accumulate 25× your spending.',500,stripMid-22);
  ctx.fillText('Withdraw 4% per year. You never run out.',500,stripMid+22);
  ctx.textAlign='left';ctx.textBaseline='alphabetic';

  // ---------- Two detail rows ----------
  const detailY=1116;
  // Left block
  ctx.fillStyle=P.nearBlk;ctx.font='700 22px Lato';ctx.letterSpacing='0em';
  ctx.fillText('The 4% Rule',80,detailY);
  ctx.fillStyle=P.warmGray;ctx.font='300 20px Lato';
  wrapText('Originally from Bengen (1994) and the Trinity Study. A starting point, not a guarantee.',80,detailY+32,400,28);

  // Right block
  ctx.fillStyle=P.nearBlk;ctx.font='700 22px Lato';ctx.letterSpacing='0em';
  ctx.fillText('Adjust for your life',500,detailY);
  ctx.fillStyle=P.warmGray;ctx.font='300 20px Lato';
  wrapText('Longer retirement? Use 3.5%. Flexible spending? 4.5% may work.',500,detailY+32,400,28);

  // ---------- CTA ----------
  rrect(295,1294,410,72,36);ctx.fillStyle=P.green;ctx.fill();
  ctx.fillStyle=P.cream;ctx.font='700 22px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';
  ctx.fillText('Run the Calculator →',500,1330);ctx.textAlign='left';ctx.textBaseline='alphabetic';

  drawFooter();
}
function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='fire-27-educational-formula-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
