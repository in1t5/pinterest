<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Before After Strategy · FIRE Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 09 · Before/After Strategy · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_no_text_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Top headline band forest green
  ctx.fillStyle=P.green;
  ctx.fillRect(0,0,W,160);
  ctx.fillStyle=P.cream;ctx.font='300 62px "Cormorant Garamond"';ctx.letterSpacing='-0.01em';ctx.textBaseline='alphabetic';
  ctx.fillText('Same Income. Different Retirement Age.',76,80);
  ctx.fillStyle=P.sagePale;ctx.font='300 26px Lato';ctx.letterSpacing='0em';
  ctx.fillText('No FIRE plan vs. deliberate FIRE strategy.',76,128);

  // LEFT panel warmGray tint
  ctx.fillStyle='#e8e4e2';
  ctx.fillRect(0,160,500,1075);

  // RIGHT panel forest green
  ctx.fillStyle=P.green;
  ctx.fillRect(500,160,500,1075);

  // LEFT content
  ctx.fillStyle=P.warmGray;ctx.font='700 18px Lato';ctx.letterSpacing='0.15em';ctx.textBaseline='alphabetic';
  ctx.fillText('NO STRATEGY',30,210);

  // Stats cards left
  const leftStats=[
    {label:'TARGETS',val:'none'},
    {label:'INVEST WHEN',val:'"when I can"'},
    {label:'RETIRE AT',val:'"whenever"'},
    {label:'SAVINGS RATE',val:'drifting'},
  ];
  leftStats.forEach((s,i)=>{
    const sy=260+i*160;
    ctx.fillStyle=P.warmGray;ctx.font='700 15px Lato';ctx.letterSpacing='0.08em';
    ctx.fillText(s.label,30,sy);
    ctx.fillStyle=P.nearBlk;ctx.font='300 42px "Cormorant Garamond"';ctx.letterSpacing='-0.01em';
    ctx.fillText(s.val,30,sy+54);
    ctx.fillStyle='#d4cfc9';ctx.fillRect(30,sy+70,430,1);
  });

  // Emotional tag left
  ctx.fillStyle=rgba(P.warmGray,0.4);ctx.font='italic 300 64px "Cormorant Garamond"';ctx.letterSpacing='0em';
  ctx.fillText('hoping.',30,1100);

  // RIGHT content
  ctx.fillStyle=P.sagePale;ctx.font='700 18px Lato';ctx.letterSpacing='0.15em';
  ctx.fillText('FIRE PLAN',530,210);

  const rightStats=[
    {label:'TARGETS',val:'35% savings'},
    {label:'PROJECTION',val:'year-by-year'},
    {label:'FIRE AT',val:'Age 49'},
    {label:'SAVINGS RATE',val:'deliberate'},
  ];
  rightStats.forEach((s,i)=>{
    const sy=260+i*160;
    ctx.fillStyle=rgba(P.cream,0.7);ctx.font='700 15px Lato';ctx.letterSpacing='0.08em';
    ctx.fillText(s.label,530,sy);
    if(s.label==='FIRE AT'){
      ctx.fillStyle=P.cream;ctx.font='300 72px "Cormorant Garamond"';ctx.letterSpacing='-0.01em';
    } else {
      ctx.fillStyle=P.cream;ctx.font='300 42px "Cormorant Garamond"';ctx.letterSpacing='-0.01em';
    }
    ctx.fillText(s.val,530,sy+54);
    ctx.fillStyle=rgba(P.sagePale,0.3);ctx.fillRect(530,sy+70,430,1);
  });

  // Emotional tag right
  ctx.fillStyle=rgba(P.sagePale,0.6);ctx.font='italic 300 64px "Cormorant Garamond"';ctx.letterSpacing='0em';
  ctx.fillText('certain.',530,1100);

  // Hero strip greenDk
  ctx.fillStyle=P.greenDk;
  ctx.fillRect(0,1235,W,160);
  ctx.fillStyle=P.cream;ctx.font='300 50px "Cormorant Garamond"';ctx.letterSpacing='0em';
  ctx.textBaseline='middle';ctx.textAlign='center';
  ctx.fillText('The plan is the difference.',500,1280);
  ctx.fillStyle=P.sagePale;ctx.font='700 20px Lato';ctx.letterSpacing='0.06em';
  ctx.fillText('→ Build yours free',500,1360);
  ctx.textAlign='left';ctx.textBaseline='alphabetic';

  drawFooter();
}
function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='fire-09-before-after-strategy-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
