<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Get Your FIRE Date in 5 Minutes · FIRE Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;width:420px;height:630px;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 29 · Educational — Quick-Start Guide · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxWidth&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);return y;
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Cream bg
  ctx.fillStyle=P.cream;ctx.fillRect(0,0,W,1395);

  // Pinyon Script "your fire date"
  ctx.fillStyle=P.sage;ctx.font='400 72px "Pinyon Script"';ctx.letterSpacing='0em';
  ctx.textBaseline='alphabetic';ctx.textAlign='center';
  ctx.fillText('your fire date',500,104);

  // Bold "IN 5 MINUTES"
  ctx.fillStyle=P.nearBlk;ctx.font='700 80px Lato';ctx.letterSpacing='-0.02em';
  ctx.fillText('IN 5 MINUTES',500,188);
  ctx.textAlign='left';ctx.letterSpacing='0em';

  // Divider
  ctx.fillStyle=rgba(P.sage,0.35);ctx.fillRect(80,208,840,2);

  // Intro line
  ctx.fillStyle=P.warmGray;ctx.font='300 24px Lato';ctx.letterSpacing='0em';
  ctx.textBaseline='alphabetic';ctx.textAlign='center';
  ctx.fillText('Four steps. Zero sign-up. Your FIRE date appears live.',500,248);
  ctx.textAlign='left';

  // ---------- Step cards ----------
  const steps=[
    {
      num:'Step 01',chip:'1 MIN',
      title:'Enter your starting numbers',
      body:'Current age, annual income, annual expenses in retirement.',
      elevated:false,
    },
    {
      num:'Step 02',chip:'1 MIN',
      title:'Enter your portfolio details',
      body:'Current portfolio value and expected annual return rate.',
      elevated:false,
    },
    {
      num:'Step 03',chip:'1 MIN',
      title:'See your FIRE number and FIRE date',
      body:'Your target portfolio and the year you reach financial independence — instantly.',
      elevated:true,
    },
    {
      num:'Step 04',chip:'2 MIN',
      title:'Adjust and explore scenarios',
      body:'Try different savings rates and add one-off life events.',
      elevated:false,
    },
  ];

  const cardX=60,cardW=880;
  let cy=272;
  steps.forEach((step)=>{
    const cardH=step.elevated?190:162;
    const cardBg=step.elevated?rgba(P.sagePale,0.4):P.white;
    rrect(cardX,cy,cardW,cardH,16);
    ctx.fillStyle=cardBg;ctx.fill();
    ctx.strokeStyle=step.elevated?rgba(P.sage,0.6):rgba(P.sage,0.2);
    ctx.lineWidth=step.elevated?2:1.5;ctx.stroke();

    if(step.elevated){
      // Left accent bar
      ctx.fillStyle=P.green;ctx.fillRect(cardX,cy,6,cardH);
    }

    const midCard=cy+cardH/2;

    // Time chip
    ctx.font='700 14px Lato';ctx.letterSpacing='0.08em';
    const chipW=ctx.measureText(step.chip).width+22;
    const chipH=30,chipX=cardX+26,chipY=cy+(cardH-chipH)/2-2;
    rrect(chipX,chipY,chipW,chipH,15);
    ctx.fillStyle=step.elevated?P.green:P.sage;ctx.fill();
    ctx.fillStyle=P.cream;ctx.textBaseline='middle';ctx.textAlign='center';
    ctx.fillText(step.chip,chipX+chipW/2,chipY+chipH/2);
    ctx.textAlign='left';ctx.letterSpacing='0em';

    const textX=cardX+26+chipW+22;
    const textW=cardW-26-chipW-22-20;

    // Step label
    ctx.fillStyle=step.elevated?P.green:P.warmGray;
    ctx.font='700 16px Lato';ctx.letterSpacing='0.06em';ctx.textBaseline='alphabetic';
    ctx.fillText(step.num.toUpperCase(),textX,midCard-38);

    // Title
    ctx.fillStyle=P.nearBlk;ctx.font='700 '+(step.elevated?'26':'24')+'px Lato';ctx.letterSpacing='0em';
    ctx.fillText(step.title,textX,midCard-6);

    // Body
    ctx.fillStyle=P.warmGray;ctx.font='300 20px Lato';ctx.letterSpacing='0em';
    wrapText(step.body,textX,midCard+26,textW,28);

    // Star on elevated card
    if(step.elevated){
      ctx.fillStyle=P.sage;ctx.font='700 26px Lato';ctx.letterSpacing='0em';
      ctx.textBaseline='middle';ctx.textAlign='right';
      ctx.fillText('★',cardX+cardW-24,midCard);
      ctx.textAlign='left';ctx.textBaseline='alphabetic';
    }

    cy+=cardH+18;
  });

  // Sage strip tagline
  const stripY=1242,stripH=84;
  ctx.fillStyle=rgba(P.sage,0.15);ctx.fillRect(0,stripY,W,stripH);
  ctx.fillStyle=P.green;ctx.font='italic 300 32px "Cormorant Garamond"';ctx.letterSpacing='0em';
  ctx.textBaseline='middle';ctx.textAlign='center';
  ctx.fillText('Five minutes. A date that changes everything.',500,stripY+stripH/2);
  ctx.textAlign='left';ctx.textBaseline='alphabetic';

  // CTA
  rrect(280,1350,440,68,34);ctx.fillStyle=P.green;ctx.fill();
  ctx.fillStyle=P.cream;ctx.font='700 22px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';
  ctx.fillText('Start Now — Free →',500,1384);ctx.textAlign='left';ctx.textBaseline='alphabetic';

  drawFooter();
}
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='fire-29-educational-quick-start-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
