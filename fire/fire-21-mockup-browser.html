<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Browser Mockup · FIRE Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;width:420px;height:630px;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 21 · Browser Mockup · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Forest green bg
  ctx.fillStyle=P.green;ctx.fillRect(0,0,W,1395);

  // Decorative circles
  ctx.save();ctx.globalAlpha=0.12;ctx.fillStyle=P.sagePale;
  ctx.beginPath();ctx.arc(874,265,238,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(944,510,118,0,Math.PI*2);ctx.fill();
  ctx.restore();

  // Badge
  const badgeText='FREE TOOL · FIRE CALCULATOR';
  ctx.font='700 18px Lato';ctx.letterSpacing='0.12em';
  const bw2=ctx.measureText(badgeText).width+48;
  rrect(76,66,bw2,44,22);
  ctx.strokeStyle=rgba(P.sagePale,0.6);ctx.lineWidth=1.5;ctx.stroke();
  ctx.fillStyle=P.sagePale;ctx.textBaseline='middle';
  ctx.fillText(badgeText,76+24,88);ctx.textBaseline='alphabetic';

  // Headline
  ctx.fillStyle=P.cream;ctx.font='300 100px "Cormorant Garamond"';ctx.letterSpacing='-0.01em';
  ctx.fillText('FIRE Calculator',76,218);

  // Sub
  ctx.fillStyle=P.sagePale;ctx.font='300 30px Lato';ctx.letterSpacing='0em';
  ctx.fillText('Your retirement date. Free. No sign-up.',76,266);

  // Browser frame
  ctx.save();ctx.shadowColor='rgba(0,0,0,0.35)';ctx.shadowBlur=48;ctx.shadowOffsetY=16;
  rrect(60,298,880,974,16);ctx.fillStyle=P.white;ctx.fill();
  ctx.restore();

  // Chrome bar
  rrect(60,298,880,52,0);
  ctx.fillStyle='#e8e8e8';ctx.fill();
  // Three dots
  const dotColors=[P.coral,P.sage,P.green];
  dotColors.forEach((c,i)=>{
    ctx.beginPath();ctx.arc(92+i*22,324,8,0,Math.PI*2);ctx.fillStyle=c;ctx.fill();
  });
  // URL bar
  rrect(148,310,580,24,12);ctx.fillStyle=P.white;ctx.fill();
  ctx.fillStyle='#888888';ctx.font='300 14px Lato';ctx.letterSpacing='0em';
  ctx.textBaseline='middle';ctx.fillText('timeandmoneytree.com/fire-calculator',158,322);
  ctx.textBaseline='alphabetic';

  // Browser content area
  const contentX=60,contentY=350,contentW=880;

  // Header bar
  ctx.fillStyle=P.green;ctx.fillRect(contentX,contentY,contentW,50);
  ctx.fillStyle=P.cream;ctx.font='700 18px Lato';ctx.letterSpacing='0em';
  ctx.textBaseline='middle';ctx.textAlign='center';
  ctx.fillText('🌿 FIRE Calculator',500,contentY+25);
  ctx.textAlign='left';ctx.textBaseline='alphabetic';

  // 2x2 input grid
  const inputs=[
    {label:'Current Age',val:'34'},
    {label:'Annual Income',val:'$85k'},
    {label:'Annual Expenses',val:'$45k'},
    {label:'Portfolio',val:'$124k'},
  ];
  const iw=400,ih=76,iGap=16,iStartX=80,iStartY=418;
  inputs.forEach((inp,i)=>{
    const col=i%2,row=Math.floor(i/2);
    const ix=iStartX+col*(iw+iGap),iy=iStartY+row*(ih+iGap);
    rrect(ix,iy,iw,ih,8);ctx.fillStyle='#edf2ee';ctx.fill();
    ctx.fillStyle=P.warmGray;ctx.font='700 13px Lato';ctx.letterSpacing='0.06em';ctx.textBaseline='alphabetic';
    ctx.fillText(inp.label.toUpperCase(),ix+12,iy+22);
    ctx.fillStyle=P.nearBlk;ctx.font='300 34px "Cormorant Garamond"';ctx.letterSpacing='-0.01em';
    ctx.fillText(inp.val,ix+12,iy+64);
  });

  // Divider
  ctx.fillStyle='#e0e8e1';ctx.fillRect(80,596,840,1);

  // Results
  ctx.fillStyle=P.warmGray;ctx.font='700 13px Lato';ctx.letterSpacing='0.10em';ctx.textBaseline='alphabetic';
  ctx.fillText('YOUR FIRE NUMBER',80,628);
  ctx.fillStyle=P.nearBlk;ctx.font='300 72px "Cormorant Garamond"';ctx.letterSpacing='-0.02em';
  ctx.fillText('$1,125,000',80,710);
  ctx.fillStyle=P.green;ctx.font='700 22px Lato';ctx.letterSpacing='0em';
  ctx.fillText('FIRE DATE: Age 49 (2041)',80,746);
  ctx.fillStyle=P.sage;ctx.font='400 18px Lato';
  ctx.fillText('✓ 15 years away at 35% savings rate',80,778);

  // Mini chart
  const chartPts=[
    {x:80,y:860},{x:220,y:830},{x:380,y:800},{x:540,y:760},{x:700,y:710},{x:840,y:648},
  ];
  ctx.save();
  ctx.shadowColor=P.sage;ctx.shadowBlur=8;
  ctx.beginPath();ctx.moveTo(chartPts[0].x,chartPts[0].y);
  chartPts.slice(1).forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.strokeStyle=P.sage;ctx.lineWidth=2.5;ctx.stroke();
  ctx.restore();
  chartPts.forEach(p=>{
    ctx.beginPath();ctx.arc(p.x,p.y,5,0,Math.PI*2);ctx.fillStyle=P.sage;ctx.fill();
  });

  // Calculate button
  rrect(80,880,840,60,10);ctx.fillStyle=P.green;ctx.fill();
  ctx.fillStyle=P.cream;ctx.font='700 22px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';
  ctx.fillText('Calculate',500,910);ctx.textAlign='left';ctx.textBaseline='alphabetic';

  // CTA pill
  rrect(370,1324,260,56,28);ctx.fillStyle=P.sagePale;ctx.fill();
  ctx.fillStyle=P.greenDk;ctx.font='700 20px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';
  ctx.fillText('Try It Free →',500,1352);ctx.textAlign='left';ctx.textBaseline='alphabetic';

  drawFooter();
}
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='fire-21-mockup-browser-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
