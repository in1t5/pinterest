<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Two FIRE Scenarios · FIRE Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;width:420px;height:630px;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 04 · Two Scenarios · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxWidth&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);return y;
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Top headline band cream
  ctx.fillStyle=P.cream;
  ctx.fillRect(0,0,W,120);
  ctx.fillStyle=P.nearBlk;ctx.font='300 60px "Cormorant Garamond"';ctx.letterSpacing='-0.01em';
  ctx.textBaseline='alphabetic';
  ctx.fillText('Two FIRE Scenarios. One Decision.',76,88);

  // Left panel sageFaint
  ctx.fillStyle=P.sageFaint;
  ctx.fillRect(0,120,500,1155);

  // Right panel forest green
  ctx.fillStyle=P.green;
  ctx.fillRect(500,120,500,1155);

  // LEFT content
  ctx.fillStyle=P.nearBlk;ctx.font='700 18px Lato';ctx.letterSpacing='0.15em';
  ctx.textBaseline='alphabetic';
  ctx.fillText('CONSERVATIVE',30,170);

  ctx.fillStyle=P.warmGray;ctx.font='700 16px Lato';ctx.letterSpacing='0.08em';
  ctx.fillText('SAVINGS RATE',30,224);
  ctx.fillStyle=P.nearBlk;ctx.font='300 96px "Cormorant Garamond"';ctx.letterSpacing='-0.02em';
  ctx.fillText('20%',30,330);

  ctx.fillStyle=P.warmGray;ctx.font='700 16px Lato';ctx.letterSpacing='0.08em';
  ctx.fillText('FIRE AT',30,400);
  ctx.fillStyle=P.nearBlk;ctx.font='300 72px "Cormorant Garamond"';
  ctx.fillText('Age 54',30,470);

  ctx.fillStyle=P.warmGray;ctx.font='700 16px Lato';
  ctx.fillText('PORTFOLIO',30,540);
  ctx.fillStyle=P.nearBlk;ctx.font='300 52px "Cormorant Garamond"';
  ctx.fillText('$1,125,000',30,600);

  ctx.fillStyle=P.warmGray;ctx.font='300 24px Lato';ctx.letterSpacing='0em';
  wrapText('Slower pace. Still reaches FIRE.',30,660,430,38);

  // Emotional tag
  ctx.fillStyle=rgba(P.warmGray,0.4);ctx.font='italic 300 64px "Cormorant Garamond"';ctx.letterSpacing='0em';
  ctx.fillText('hoping.',30,1080);

  // RIGHT content
  ctx.fillStyle=P.sagePale;ctx.font='700 18px Lato';ctx.letterSpacing='0.15em';
  ctx.fillText('AGGRESSIVE',530,170);

  ctx.fillStyle=rgba(P.cream,0.7);ctx.font='700 16px Lato';ctx.letterSpacing='0.08em';
  ctx.fillText('SAVINGS RATE',530,224);
  ctx.fillStyle=P.cream;ctx.font='300 96px "Cormorant Garamond"';ctx.letterSpacing='-0.02em';
  ctx.fillText('40%',530,330);

  ctx.fillStyle=rgba(P.cream,0.7);ctx.font='700 16px Lato';ctx.letterSpacing='0.08em';
  ctx.fillText('FIRE AT',530,400);
  ctx.fillStyle=P.cream;ctx.font='300 72px "Cormorant Garamond"';
  ctx.fillText('Age 44',530,470);

  ctx.fillStyle=rgba(P.cream,0.7);ctx.font='700 16px Lato';
  ctx.fillText('PORTFOLIO',530,540);
  ctx.fillStyle=P.cream;ctx.font='300 52px "Cormorant Garamond"';
  ctx.fillText('$1,125,000',530,600);

  ctx.fillStyle=P.cream;ctx.font='300 24px Lato';ctx.letterSpacing='0em';
  wrapText('More savings now. FIRE 10 years earlier.',530,660,430,38);

  // Emotional tag right
  ctx.fillStyle=rgba(P.sagePale,0.6);ctx.font='italic 300 64px "Cormorant Garamond"';ctx.letterSpacing='0em';
  ctx.fillText('certain.',530,1080);

  // Insight strip
  ctx.fillStyle=P.greenDk;
  ctx.fillRect(0,1160,W,115);
  ctx.fillStyle=P.cream;ctx.font='300 38px "Cormorant Garamond"';ctx.letterSpacing='0em';
  ctx.textBaseline='middle';ctx.textAlign='center';
  ctx.fillText('$0 difference in FIRE number.',500,1196);
  ctx.fillText('10 years difference in freedom.',500,1236);
  ctx.fillStyle=P.sagePale;ctx.font='700 20px Lato';ctx.letterSpacing='0.06em';
  ctx.fillText('Savings rate is the lever.',500,1264);
  ctx.textAlign='left';ctx.textBaseline='alphabetic';

  // CTA cream band
  ctx.fillStyle=P.cream;
  ctx.fillRect(0,1275,W,120);
  rrect(360,1298,280,56,28);ctx.fillStyle=P.green;ctx.fill();
  ctx.fillStyle=P.cream;ctx.font='700 20px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';
  ctx.fillText('Model Your Scenario →',500,1326);
  ctx.textAlign='left';ctx.textBaseline='alphabetic';

  drawFooter();
}
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='fire-04-direct-utility-two-outcome-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
