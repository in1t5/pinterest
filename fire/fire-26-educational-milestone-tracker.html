<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FIRE Milestones by Age · FIRE Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;width:420px;height:630px;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 26 · FIRE Milestones by Age · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Cream bg
  ctx.fillStyle=P.cream;ctx.fillRect(0,0,W,1395);

  // Green band
  ctx.fillStyle=P.green;ctx.fillRect(0,0,W,100);
  ctx.fillStyle=P.cream;ctx.font='700 20px Lato';ctx.letterSpacing='0.15em';
  ctx.textBaseline='middle';ctx.textAlign='center';
  ctx.fillText('FIRE SAVINGS MILESTONES BY AGE',500,50);ctx.textAlign='left';ctx.textBaseline='alphabetic';

  // Headline
  ctx.fillStyle=P.nearBlk;ctx.font='300 90px "Cormorant Garamond"';ctx.letterSpacing='-0.01em';
  ctx.fillText('How Do You Compare?',76,192);
  ctx.fillStyle=P.warmGray;ctx.font='300 28px Lato';ctx.letterSpacing='0em';
  ctx.fillText('Age-based benchmarks for the FIRE journey.',76,238);

  // 6 milestone rows
  const milestones=[
    {age:'AGE 25',range:'$25k–$50k invested',note:'building savings habits',bg:P.green,ageC:P.cream,valC:P.cream,noteC:P.sagePale,badge:null},
    {age:'AGE 30',range:'$80k–$150k',note:'compound growth starting',bg:'#5f7a65',ageC:P.cream,valC:P.cream,noteC:P.sagePale,badge:null},
    {age:'AGE 35',range:'$200k–$400k',note:'mid-accumulation',bg:P.sage,ageC:P.cream,valC:P.cream,noteC:rgba(P.cream,0.8),badge:'FIRE LIKELY IN RANGE'},
    {age:'AGE 40',range:'$400k–$700k',note:'late accumulation, pushing to FIRE',bg:P.sagePale,ageC:P.nearBlk,valC:P.nearBlk,noteC:P.warmGray,badge:null},
    {age:'AGE 45',range:'$700k–$1.1M',note:'approaching or at FIRE',bg:P.sageFaint,ageC:P.nearBlk,valC:P.nearBlk,noteC:P.warmGray,badge:null},
    {age:'AGE 50',range:'$1.1M+',rangeColor:P.green,note:'FIRE achieved — work optional',bg:P.white,ageC:P.nearBlk,valC:P.green,noteC:P.green,borderLeft:P.green,bold:true},
  ];

  const rowH=162,gap=12,startY=268;
  milestones.forEach((m,i)=>{
    const ry=startY+i*(rowH+gap);
    rrect(80,ry,840,rowH,12);ctx.fillStyle=m.bg;ctx.fill();
    if(m.borderLeft){ctx.fillStyle=m.borderLeft;ctx.fillRect(80,ry,6,rowH);}

    // Age pill
    const agePillW=130,agePillH=46;
    rrect(102,ry+(rowH-agePillH)/2,agePillW,agePillH,8);
    ctx.fillStyle=rgba(m.ageC,0.15);ctx.fill();
    ctx.fillStyle=m.ageC;ctx.font='700 18px Lato';ctx.letterSpacing='0.10em';
    ctx.textBaseline='middle';ctx.textAlign='center';
    ctx.fillText(m.age,102+agePillW/2,ry+rowH/2);
    ctx.textAlign='left';ctx.textBaseline='alphabetic';

    // Value
    ctx.fillStyle=m.valC||m.ageC;ctx.font=(m.bold?'700':'300')+' 52px "Cormorant Garamond"';ctx.letterSpacing='-0.01em';
    ctx.fillText(m.range,254,ry+rowH/2+18);

    // Note
    ctx.fillStyle=m.noteC;ctx.font='400 20px Lato';ctx.letterSpacing='0em';
    ctx.fillText(m.note,254,ry+rowH-22);

    // Badge chip
    if(m.badge){
      const bw2=ctx.measureText(m.badge).width+24;
      ctx.font='700 13px Lato';ctx.letterSpacing='0.06em';
      const bw3=ctx.measureText(m.badge).width+24;
      rrect(80+840-bw3-16,ry+(rowH-32)/2,bw3,32,16);ctx.fillStyle=P.green;ctx.fill();
      ctx.fillStyle=P.cream;ctx.textBaseline='middle';ctx.textAlign='center';
      ctx.fillText(m.badge,80+840-bw3/2-16,ry+rowH/2);
      ctx.textAlign='left';ctx.textBaseline='alphabetic';
    }
  });

  // CTA
  rrect(310,1356,380,68,34);ctx.fillStyle=P.green;ctx.fill();
  ctx.fillStyle=P.cream;ctx.font='700 20px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';
  ctx.fillText('Find Your Milestone →',500,1390);ctx.textAlign='left';ctx.textBaseline='alphabetic';

  drawFooter();
}
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='fire-26-educational-milestone-tracker-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
