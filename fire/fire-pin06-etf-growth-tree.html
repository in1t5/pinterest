<!doctype html>
<html lang="en">

<link rel="stylesheet" href="../design/templates/pins.css" />

</head>

    <div class="growth-strip">
      <div class="stage">
        <div class="yr">Year 1</div>
        <div class="amt">€6K</div>
      </div>
      <div class="grow"></div>
      <div class="stage">
        <div class="yr">Year 15</div>
        <div class="amt">€160K</div>
      </div>
      <div class="grow"></div>
      <div class="stage">
        <div class="yr">Year 30</div>
        <div class="amt big">€567K</div>
      </div>
    </div>

    <div class="tagline">One fund. Five hundred euros. Thirty years of compounding.</div>

    <div class="footer">
      <div class="footer-brand">
        <img src="../design/logo_brownish_framed_no_text_2501x2500.png" alt="" />
        <div>
          <div class="name">Time &amp; Moneytree</div>
          <div class="url">TIMEANDMONEYTREE.COM</div>
        </div>
      </div>
      <span class="cta-pill">Grow your FIRE number →</span>
    </div>
  </div>
</div>
<script>
function fit() {
  var scale = Math.min(1, (window.innerHeight - 40) / 1500, (window.innerWidth - 40) / 1000);
  document.querySelector('.pin-wrap').style.transform = 'scale(' + scale + ')';
  document.body.style.minHeight = Math.round(1500 * scale + 40) + 'px';
}
fit();
window.addEventListener('resize', fit);
</script>
</body>
</html>
