<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>4% Rule Myth · FIRE Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;width:420px;height:630px;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 19 · 4% Rule Myth · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxWidth&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);return y;
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Cream bg
  ctx.fillStyle=P.cream;ctx.fillRect(0,0,W,1395);

  // Label
  ctx.fillStyle=P.warmGray;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';ctx.textBaseline='alphabetic';
  ctx.fillText('THE FIRE WITHDRAWAL MYTH — BUSTED',76,52);

  // Large italic myth
  ctx.fillStyle=P.nearBlk;ctx.font='italic 300 72px "Cormorant Garamond"';ctx.letterSpacing='-0.01em';
  wrapText('"The 4% rule is too risky for a 50-year retirement"',76,150,840,88);

  // MYTH chip
  rrect(76,368,140,50,25);ctx.fillStyle=P.coral;ctx.fill();
  ctx.fillStyle=P.white;ctx.font='700 20px Lato';ctx.letterSpacing='0.08em';
  ctx.textBaseline='middle';ctx.textAlign='center';
  ctx.fillText('MYTH',146,393);ctx.textAlign='left';ctx.textBaseline='alphabetic';

  // Accent line
  ctx.fillStyle=P.sage;ctx.fillRect(76,438,848,2);

  // Correction card
  ctx.save();ctx.shadowColor='rgba(0,0,0,0.08)';ctx.shadowBlur=20;
  rrect(76,460,848,290,16);ctx.fillStyle=P.white;ctx.fill();
  ctx.strokeStyle=P.sage;ctx.lineWidth=2;ctx.stroke();
  ctx.restore();

  ctx.fillStyle=P.green;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';ctx.textBaseline='alphabetic';
  ctx.fillText('THE RESEARCH',100,500);
  ctx.fillStyle=P.nearBlk;ctx.font='700 34px Lato';ctx.letterSpacing='0em';
  ctx.fillText('95%+ success rate even for 50-year retirements.',100,548);
  ctx.fillStyle=P.warmGray;ctx.font='300 24px Lato';
  wrapText('Historical simulations show the 4% rule survived every major crash including the Great Depression and 2008. A 3.5% rate achieves near-100% success across 50-year horizons.',100,588,720,34);

  // Rate comparison chips
  const chips=[
    {label:'3.5% Rate',sub:'Success',val:'~99%',bg:P.warmGray,text:P.nearBlk,valColor:P.nearBlk,x:80,w:240},
    {label:'4% Rate',sub:'Success',val:'~95%',bg:P.sage,text:P.nearBlk,valColor:P.nearBlk,x:340,w:280},
    {label:'4.5% Rate',sub:'Success',val:'~88%',bg:P.green,text:P.cream,valColor:P.cream,x:640,w:240},
  ];
  chips.forEach(chip=>{
    rrect(chip.x,820,chip.w,156,12);ctx.fillStyle=chip.bg;ctx.fill();
    ctx.fillStyle=chip.text;ctx.font='700 18px Lato';ctx.letterSpacing='0.06em';ctx.textBaseline='alphabetic';
    ctx.fillText(chip.label,chip.x+18,820+30);
    ctx.font='300 18px Lato';ctx.fillText(chip.sub,chip.x+18,820+56);
    ctx.fillStyle=chip.valColor;ctx.font='300 60px "Cormorant Garamond"';ctx.letterSpacing='-0.01em';
    ctx.fillText(chip.val,chip.x+18,820+130);
  });

  // Insight strip
  rrect(76,1026,848,84,14);ctx.fillStyle=P.sageFaint;ctx.fill();
  ctx.fillStyle=P.nearBlk;ctx.font='300 24px Lato';ctx.letterSpacing='0em';
  ctx.textBaseline='middle';ctx.textAlign='center';
  ctx.fillText('The risk is manageable — and the calculator lets you model your specific scenario.',500,1068);
  ctx.textAlign='left';ctx.textBaseline='alphabetic';

  // CTA
  rrect(280,1164,440,68,34);ctx.fillStyle=P.green;ctx.fill();
  ctx.fillStyle=P.cream;ctx.font='700 18px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';
  ctx.fillText('Model Your Withdrawal Rate →',500,1198);
  ctx.textAlign='left';ctx.textBaseline='alphabetic';

  // Keywords
  const kws=['safe withdrawal rate','fire calculator','fire number calculator'];
  let kwx=76;ctx.font='400 18px Lato';ctx.letterSpacing='0.04em';
  kws.forEach(kw=>{
    const tw=ctx.measureText(kw).width+28;
    rrect(kwx,1290,tw,38,19);
    ctx.strokeStyle=rgba(P.warmGray,0.35);ctx.lineWidth=1.5;ctx.stroke();
    ctx.fillStyle=P.warmGray;ctx.textBaseline='middle';ctx.fillText(kw,kwx+14,1309);
    ctx.textBaseline='alphabetic';kwx+=tw+12;
    if(kwx>820){kwx=76;}
  });

  drawFooter();
}
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='fire-19-myth-buster-single-myth-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
