<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Question Hook Permission · FIRE Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 06 · Question Hook Permission · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxWidth&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);return y;
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_no_text_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Cream bg
  ctx.fillStyle=P.cream;
  ctx.fillRect(0,0,W,1395);

  // Script
  ctx.fillStyle=P.sage;
  ctx.font='400 96px "Pinyon Script"';ctx.letterSpacing='0em';ctx.textBaseline='alphabetic';
  ctx.fillText('what if it\'s closer than you think?',76,148);

  // Large italic question
  ctx.fillStyle=P.nearBlk;
  ctx.font='italic 300 80px "Cormorant Garamond"';ctx.letterSpacing='-0.01em';
  wrapText('What if retirement was only 12 years away?',76,272,840,96);

  // Body
  ctx.fillStyle=P.warmGray;ctx.font='300 30px Lato';ctx.letterSpacing='0em';
  wrapText('Enter your income, expenses, and current portfolio. The FIRE calculator gives you your actual date — not an assumption.',76,406,840,46);

  // Accent line sage
  ctx.fillStyle=P.sage;
  ctx.fillRect(76,508,840,2);

  // Metric card sageFaint
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,0.08)';ctx.shadowBlur=20;
  rrect(80,528,840,200,18);ctx.fillStyle=P.sageFaint;ctx.fill();
  ctx.restore();

  ctx.fillStyle=P.nearBlk;ctx.font='700 18px Lato';ctx.letterSpacing='0.10em';
  ctx.textBaseline='alphabetic';
  ctx.fillText('AT 32% SAVINGS RATE:',100,566);
  ctx.fillStyle=P.nearBlk;ctx.font='300 64px "Cormorant Garamond"';ctx.letterSpacing='-0.01em';
  ctx.fillText('FIRE in 12 years',100,638);
  ctx.fillStyle=P.green;ctx.font='700 26px Lato';ctx.letterSpacing='0em';
  ctx.fillText('That\'s age 46. Not 67.',100,682);
  ctx.fillStyle=P.warmGray;ctx.font='300 22px Lato';
  ctx.fillText('Adjust your rate. Watch the date change.',100,710);

  // CTA forest green pill
  rrect(310,796,380,68,34);ctx.fillStyle=P.green;ctx.fill();
  ctx.fillStyle=P.cream;ctx.font='700 20px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';
  ctx.fillText('Find Your Real Date →',500,830);
  ctx.textAlign='left';ctx.textBaseline='alphabetic';

  // Two insight chips
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,0.07)';ctx.shadowBlur=16;
  rrect(80,910,380,150,14);ctx.fillStyle=P.white;ctx.fill();
  rrect(520,910,380,150,14);ctx.fillStyle=P.sage;ctx.fill();
  ctx.restore();

  ctx.fillStyle=P.warmGray;ctx.font='700 18px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='alphabetic';
  ctx.fillText('Traditional plan',100,950);
  ctx.fillStyle=P.warmGray;ctx.font='300 56px "Cormorant Garamond"';ctx.letterSpacing='-0.02em';
  ctx.fillText('Retire at 67',100,1030);

  ctx.fillStyle=P.nearBlk;ctx.font='700 18px Lato';ctx.letterSpacing='0.06em';
  ctx.fillText('FIRE plan',540,950);
  ctx.fillStyle=P.nearBlk;ctx.font='300 56px "Cormorant Garamond"';ctx.letterSpacing='-0.02em';
  ctx.fillText('Retire at 46',540,1030);

  // Keywords
  const kws=['fire calculator','retire early','fire number calculator'];
  let kwx=76;
  ctx.font='400 18px Lato';ctx.letterSpacing='0.04em';
  kws.forEach(kw=>{
    const tw=ctx.measureText(kw).width+28;
    rrect(kwx,1110,tw,38,19);
    ctx.strokeStyle=rgba(P.warmGray,0.35);ctx.lineWidth=1.5;ctx.stroke();
    ctx.fillStyle=P.warmGray;ctx.textBaseline='middle';
    ctx.fillText(kw,kwx+14,1129);
    ctx.textBaseline='alphabetic';
    kwx+=tw+12;
    if(kwx>820){kwx=76;}
  });

  drawFooter();
}
function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='fire-06-question-hook-permission-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
