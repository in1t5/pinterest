<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>What Your FIRE Number Means · FIRE Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 30 · Educational — What Your Number Means · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxWidth&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);return y;
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_no_text_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Forest green full background
  ctx.fillStyle=P.green;ctx.fillRect(0,0,W,1395);

  // Pale sage watermark "your key" at very low alpha behind card area
  ctx.save();
  ctx.globalAlpha=0.08;
  ctx.fillStyle=P.sagePale;
  ctx.font='italic 300 200px "Cormorant Garamond"';
  ctx.letterSpacing='-0.02em';
  ctx.textBaseline='middle';ctx.textAlign='center';
  ctx.fillText('your key',500,750);
  ctx.restore();
  ctx.letterSpacing='0em';ctx.textAlign='left';ctx.textBaseline='alphabetic';

  // Top: Cormorant Garamond italic "what your" in pale sage
  ctx.fillStyle=P.sagePale;ctx.font='italic 300 46px "Cormorant Garamond"';ctx.letterSpacing='0em';
  ctx.textBaseline='alphabetic';ctx.textAlign='center';
  ctx.fillText('what your',500,108);

  // Bold cream "FIRE NUMBER MEANS"
  ctx.fillStyle=P.cream;ctx.font='700 74px Lato';ctx.letterSpacing='-0.02em';
  ctx.fillText('FIRE NUMBER MEANS',500,188);
  ctx.textAlign='left';ctx.letterSpacing='0em';

  // Pale sage divider
  ctx.fillStyle=rgba(P.sagePale,0.35);ctx.fillRect(80,208,840,2);

  // 4 cream implication cards
  const cards=[
    'You never have to work\nfor money again',
    'Every day is spent on\nwhat you choose',
    'Financial stress\nends permanently',
    'Your time belongs\nto you',
  ];

  const cardX=70,cardW=860;
  const cardH=182,gap=18;
  const startY=238;

  cards.forEach((text,i)=>{
    const cy=startY+i*(cardH+gap);

    // Cream card
    rrect(cardX,cy,cardW,cardH,18);ctx.fillStyle=P.cream;ctx.fill();

    // Forest green left accent bar
    ctx.fillStyle=P.greenDk;ctx.fillRect(cardX,cy,8,cardH);

    const midCard=cy+cardH/2;
    const textX=cardX+36;

    // "It means:" label in sage
    ctx.fillStyle=P.sage;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
    ctx.textBaseline='alphabetic';
    ctx.fillText('IT MEANS',textX,midCard-42);

    // Main text in nearBlk
    ctx.fillStyle=P.nearBlk;ctx.font='300 40px "Cormorant Garamond"';ctx.letterSpacing='-0.01em';
    const lines=text.split('\n');
    if(lines.length===2){
      ctx.fillText(lines[0],textX,midCard-4);
      ctx.fillText(lines[1],textX,midCard+44);
    } else {
      ctx.fillText(lines[0],textX,midCard+16);
    }

    // Right decorative mark — small circle in sage
    ctx.beginPath();
    ctx.arc(cardX+cardW-36,midCard,10,0,Math.PI*2);
    ctx.fillStyle=rgba(P.sage,0.45);
    ctx.fill();
  });

  // Pale sage bottom insight strip
  const stripY=1224,stripH=140;
  ctx.fillStyle=rgba(P.sagePale,0.18);ctx.fillRect(0,stripY,W,stripH);
  ctx.strokeStyle=rgba(P.sagePale,0.25);ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(0,stripY);ctx.lineTo(W,stripY);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,stripY+stripH);ctx.lineTo(W,stripY+stripH);ctx.stroke();

  ctx.fillStyle=P.sagePale;ctx.font='italic 300 28px "Cormorant Garamond"';ctx.letterSpacing='0em';
  ctx.textBaseline='middle';ctx.textAlign='center';
  ctx.fillText('The FIRE number is not a destination. It\'s a key.',500,stripY+stripH/2-20);
  ctx.fillText('What you unlock with it is the point.',500,stripY+stripH/2+20);
  ctx.textAlign='left';ctx.textBaseline='alphabetic';

  // CTA
  rrect(280,1384,440,68,34);ctx.fillStyle=P.greenDk;ctx.fill();
  ctx.strokeStyle=rgba(P.sagePale,0.5);ctx.lineWidth=2;
  rrect(280,1384,440,68,34);ctx.stroke();
  ctx.fillStyle=P.cream;ctx.font='700 22px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';
  ctx.fillText('Find Your Number →',500,1418);ctx.textAlign='left';ctx.textBaseline='alphabetic';

  drawFooter();
}
function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='fire-30-educational-what-number-means-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
