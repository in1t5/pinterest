<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Retirement Withdrawal Calculator Preview — See It Before You Use It · Retirement Withdrawal Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;width:420px;height:630px;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 21 · Mockup Browser · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxWidth&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);return y;
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Cream background
  ctx.fillStyle=P.cream;
  ctx.fillRect(0,0,W,1395);

  // Top headline
  ctx.fillStyle=P.nearBlk;
  ctx.font='700 44px Lato';
  ctx.letterSpacing='-0.01em';
  ctx.textAlign='center';
  ctx.textBaseline='top';
  ctx.fillText('RETIREMENT WITHDRAWAL',W/2,40);
  ctx.fillText('STRATEGY CALCULATOR',W/2,96);
  ctx.letterSpacing='0em';

  ctx.fillStyle=P.warmGray;
  ctx.font='300 26px Lato';
  ctx.textAlign='center';
  ctx.textBaseline='top';
  ctx.fillText('See it before you use it',W/2,162);

  // Browser chrome mockup
  const bx=60,by=210,bw=880,bh=700,br=14;
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,0.25)';ctx.shadowBlur=40;ctx.shadowOffsetY=14;
  rrect(bx,by,bw,bh,br);
  ctx.fillStyle=P.white;ctx.fill();
  ctx.restore();

  // Browser bar (forest green)
  rrect(bx,by,bw,52,br);
  ctx.fillStyle=P.green;ctx.fill();
  ctx.fillRect(bx,by+32,bw,20);

  // Browser dots
  ['#F1683F','#C1D5A5','#84A17C'].forEach((c,i)=>{
    ctx.beginPath();ctx.arc(bx+24+i*22,by+26,7,0,Math.PI*2);
    ctx.fillStyle=c;ctx.fill();
  });

  // URL bar
  rrect(bx+110,by+12,bw-250,28,14);
  ctx.fillStyle=rgba(P.white,.2);ctx.fill();
  ctx.fillStyle=P.cream;
  ctx.font='400 16px Lato';
  ctx.letterSpacing='0em';
  ctx.textAlign='left';
  ctx.textBaseline='middle';
  ctx.fillText('Time And Money Tree',bx+124,by+26);

  // Screen area (white)
  ctx.fillStyle=P.white;
  ctx.fillRect(bx,by+52,bw,bh-52);

  // Screen content
  const sx=bx+40,sw=bw-80;

  // Strategy header
  ctx.fillStyle=P.nearBlk;
  ctx.font='700 30px Lato';
  ctx.textAlign='left';
  ctx.textBaseline='top';
  ctx.fillText('Strategy: Dynamic Withdrawal',sx,by+80);

  // Subtitle
  ctx.fillStyle=P.warmGray;
  ctx.font='400 22px Lato';
  ctx.textBaseline='top';
  ctx.fillText('Portfolio: $1,000,000  ·  Rate: 4%',sx,by+124);

  // Sage divider
  ctx.strokeStyle=rgba(P.sage,.4);
  ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(sx,by+162);ctx.lineTo(bx+bw-40,by+162);ctx.stroke();

  // Check items
  const items=[
    {text:'Annual Income: $40,000',bold:false},
    {text:'30-Year Success Rate: 94%',bold:true},
  ];
  items.forEach((item,i)=>{
    const iy=by+188+i*54;
    ctx.fillStyle=P.green;
    ctx.font=item.bold?'700 28px Lato':'400 26px Lato';
    ctx.textAlign='left';
    ctx.textBaseline='middle';
    ctx.fillText('✓  '+item.text,sx,iy);
  });

  // Mini chart area
  const chartX=sx,chartY=by+320,chartW=sw,chartH=280;
  ctx.fillStyle=P.sageFaint;
  ctx.fillRect(chartX,chartY,chartW,chartH);

  // Chart axis labels
  ctx.fillStyle=P.warmGray;
  ctx.font='300 18px Lato';
  ctx.textAlign='left';
  ctx.textBaseline='bottom';
  ctx.fillText('$1.2M',chartX,chartY+chartH-chartH*0.85);
  ctx.fillText('$0',chartX,chartY+chartH-10);

  // X axis labels
  ['Yr 0','Yr 10','Yr 20','Yr 30'].forEach((l,i)=>{
    ctx.fillStyle=P.warmGray;
    ctx.font='300 16px Lato';
    ctx.textAlign='center';
    ctx.textBaseline='top';
    ctx.fillText(l,chartX+i*(chartW/3),chartY+chartH-20);
  });

  // Portfolio survival line
  ctx.beginPath();
  ctx.moveTo(chartX+30,chartY+chartH*0.15);
  ctx.bezierCurveTo(
    chartX+chartW*0.3,chartY+chartH*0.2,
    chartX+chartW*0.6,chartY+chartH*0.35,
    chartX+chartW-30,chartY+chartH*0.42
  );
  ctx.strokeStyle=P.green;ctx.lineWidth=4;ctx.stroke();

  // CTA
  const ctaY=980;
  const ctaW=300,ctaH=68;
  rrect(W/2-ctaW/2,ctaY,ctaW,ctaH,34);
  ctx.fillStyle=P.green;ctx.fill();
  ctx.fillStyle=P.white;
  ctx.font='700 26px Lato';
  ctx.letterSpacing='0.06em';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText('Try It Free  →',W/2,ctaY+ctaH/2);
  ctx.letterSpacing='0em';

  // Supporting text
  ctx.fillStyle=P.warmGray;
  ctx.font='300 24px Lato';
  ctx.textAlign='center';
  ctx.textBaseline='top';
  ctx.fillText('No sign-up required. Free forever.',W/2,1108);

  drawFooter();
}
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='retirement-withdrawal-21-mockup-browser-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
