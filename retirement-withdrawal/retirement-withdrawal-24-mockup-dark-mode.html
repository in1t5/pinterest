<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Retirement Withdrawal Calculator — Dark Mode Preview · Retirement Withdrawal Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 24 · Mockup Dark Mode · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxWidth&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);return y;
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_no_text_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Near-black background
  ctx.fillStyle=P.nearBlk;
  ctx.fillRect(0,0,W,1395);

  // Pinyon Script header
  ctx.fillStyle=P.sagePale;
  ctx.font='400 60px "Pinyon Script"';
  ctx.textAlign='center';
  ctx.textBaseline='top';
  ctx.fillText('retire with confidence',W/2,36);

  // Bold Lato headline
  ctx.fillStyle=P.cream;
  ctx.font='700 44px Lato';
  ctx.letterSpacing='-0.01em';
  ctx.textAlign='center';
  ctx.textBaseline='top';
  ctx.fillText('WITHDRAWAL CALCULATOR',W/2,116);
  ctx.fillStyle=P.sage;
  ctx.font='700 44px Lato';
  ctx.fillText('DARK MODE',W/2,170);
  ctx.letterSpacing='0em';

  // Dark browser chrome mockup
  const bx=60,by=240,bw=880,bh=840,br=14;
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,0.6)';ctx.shadowBlur=50;ctx.shadowOffsetY=20;
  rrect(bx,by,bw,bh,br);
  ctx.fillStyle='#1e2420';ctx.fill();
  ctx.restore();

  // Dark gray browser bar
  ctx.fillStyle='#2a302d';
  rrect(bx,by,bw,50,br);
  ctx.fill();
  ctx.fillRect(bx,by+30,bw,20);

  // Browser dots
  ['#555','#666','#777'].forEach((c,i)=>{
    ctx.beginPath();ctx.arc(bx+22+i*20,by+25,6,0,Math.PI*2);
    ctx.fillStyle=c;ctx.fill();
  });

  // URL bar
  rrect(bx+100,by+12,bw-220,26,13);
  ctx.fillStyle='#333a36';ctx.fill();
  ctx.fillStyle=rgba(P.sagePale,.5);
  ctx.font='400 14px Lato';
  ctx.textAlign='left';
  ctx.textBaseline='middle';
  ctx.fillText('timeandmoneytree.com',bx+114,by+25);

  // Screen near-black
  ctx.fillStyle='#0f1a13';
  ctx.fillRect(bx,by+50,bw,bh-50);

  // Chart area
  const chartX=bx+40,chartY=by+80,chartW=bw-80,chartH=520;
  ctx.fillStyle='#0c1510';
  ctx.fillRect(chartX,chartY,chartW,chartH);

  // Grid lines (very dim)
  for(let i=1;i<4;i++){
    ctx.strokeStyle=rgba(P.sagePale,.05);
    ctx.lineWidth=1;
    ctx.beginPath();
    ctx.moveTo(chartX,chartY+i*(chartH/4));
    ctx.lineTo(chartX+chartW,chartY+i*(chartH/4));
    ctx.stroke();
  }

  // Coral baseline (very faint — barely visible)
  ctx.beginPath();
  ctx.moveTo(chartX,chartY+chartH*0.9);
  ctx.lineTo(chartX+chartW,chartY+chartH*0.9);
  ctx.strokeStyle=rgba(P.coral,.12);
  ctx.lineWidth=2;
  ctx.stroke();

  // Sage glowing portfolio survival line
  // Glow effect: draw multiple strokes with decreasing opacity
  const linePoints=[
    {x:chartX,y:chartY+chartH*0.12},
    {x:chartX+chartW*0.15,y:chartY+chartH*0.16},
    {x:chartX+chartW*0.3,y:chartY+chartH*0.22},
    {x:chartX+chartW*0.5,y:chartY+chartH*0.3},
    {x:chartX+chartW*0.7,y:chartY+chartH*0.36},
    {x:chartX+chartW*0.85,y:chartY+chartH*0.38},
    {x:chartX+chartW,y:chartY+chartH*0.40},
  ];
  // Glow layers
  [[P.sage,0.08,16],[P.sage,0.15,8],[P.sage,0.5,3],[P.sage,1,1.5]].forEach(([color,alpha,lw])=>{
    ctx.beginPath();
    ctx.moveTo(linePoints[0].x,linePoints[0].y);
    for(let i=1;i<linePoints.length;i++){
      const p=linePoints[i-1],n=linePoints[i];
      const cpx=(p.x+n.x)/2;
      ctx.quadraticCurveTo(p.x,p.y,cpx,(p.y+n.y)/2);
    }
    ctx.lineTo(linePoints[linePoints.length-1].x,linePoints[linePoints.length-1].y);
    ctx.strokeStyle=rgba(color,alpha);
    ctx.lineWidth=lw;
    ctx.stroke();
  });

  // Year x-axis labels
  ['Yr 0','Yr 5','Yr 10','Yr 15','Yr 20','Yr 25','Yr 30'].forEach((l,i)=>{
    ctx.fillStyle=rgba(P.cream,.4);
    ctx.font='300 15px Lato';
    ctx.textAlign='center';
    ctx.textBaseline='top';
    ctx.fillText(l,chartX+i*(chartW/6),chartY+chartH-22);
  });

  // Success rate overlay
  ctx.fillStyle=P.cream;
  ctx.font='700 24px Lato';
  ctx.textAlign='right';
  ctx.textBaseline='top';
  ctx.fillText('30-Year Success: 94%',chartX+chartW-10,chartY+12);

  // CTA pill
  const ctaY=1160;
  const ctaW=380,ctaH=68;
  rrect(W/2-ctaW/2,ctaY,ctaW,ctaH,34);
  ctx.strokeStyle=rgba(P.cream,.55);
  ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.cream;
  ctx.font='700 24px Lato';
  ctx.letterSpacing='0.06em';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText('Try Dark Mode Free  →',W/2,ctaY+ctaH/2);
  ctx.letterSpacing='0em';

  ctx.fillStyle=rgba(P.sagePale,.55);
  ctx.font='300 22px Lato';
  ctx.textAlign='center';
  ctx.textBaseline='top';
  ctx.fillText('Free. No sign-up. All devices.',W/2,1292);

  drawFooter();
}
function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='retirement-withdrawal-24-mockup-dark-mode-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
