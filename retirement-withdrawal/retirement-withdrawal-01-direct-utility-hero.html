<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Retirement Withdrawal Strategy Calculator — Safe Withdrawal Rate Tool · Retirement Withdrawal Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;width:420px;height:630px;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 01 · Direct Utility Hero · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxWidth&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);return y;
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Cream background
  ctx.fillStyle=P.cream;
  ctx.fillRect(0,0,W,1395);

  // Top decorative band
  ctx.fillStyle=P.green;
  ctx.fillRect(0,0,W,12);

  // Pinyon Script sage script
  ctx.fillStyle=P.sage;
  ctx.font='italic 58px "Pinyon Script"';
  ctx.textBaseline='alphabetic';
  ctx.textAlign='center';
  ctx.fillText('your retirement income, secured.',W/2,110);

  // Headline
  ctx.fillStyle=P.green;
  ctx.font='400 68px "Cormorant Garamond"';
  ctx.textAlign='center';
  ctx.textBaseline='top';
  let headY=140;
  const headWords='Retirement Withdrawal Strategy Calculator'.split(' ');
  let headLine='';
  const headLines=[];
  for(let i=0;i<headWords.length;i++){
    const test=headLine+headWords[i]+' ';
    if(ctx.measureText(test).width>860&&headLine!==''){headLines.push(headLine.trim());headLine=headWords[i]+' ';}
    else headLine=test;
  }
  headLines.push(headLine.trim());
  headLines.forEach((l,i)=>{ctx.fillText(l,W/2,headY+i*76);});
  const afterHead=headY+headLines.length*76+16;

  // Subtitle
  ctx.fillStyle=P.warmGray;
  ctx.font='300 28px Lato';
  ctx.textAlign='center';
  const subY=wrapText('Find your safe withdrawal rate and model 30-year portfolio survival — free.',W/2,afterHead,820,38)+38;

  // Divider
  ctx.strokeStyle=rgba(P.sage,.35);
  ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(80,subY+10);ctx.lineTo(W-80,subY+10);ctx.stroke();

  // Large metric card
  const cardX=60,cardY=subY+34,cardW=W-120,cardH=280;
  rrect(cardX,cardY,cardW,cardH,18);
  ctx.fillStyle=P.white;ctx.fill();
  ctx.strokeStyle=rgba(P.sage,.4);ctx.lineWidth=2;ctx.stroke();

  // Card header
  ctx.fillStyle=P.green;
  ctx.font='700 17px Lato';
  ctx.letterSpacing='0.12em';
  ctx.textAlign='left';
  ctx.textBaseline='top';
  ctx.fillText('EXAMPLE SCENARIO',cardX+36,cardY+28);

  // Card metrics
  const metrics=[
    {label:'Portfolio',value:'$1,000,000'},
    {label:'Rate',value:'4%'},
    {label:'Annual Income',value:'$40,000/yr'},
    {label:'30-yr Success',value:'94%'},
  ];
  const colW=cardW/4;
  metrics.forEach((m,i)=>{
    const mx=cardX+colW*i+colW/2;
    ctx.fillStyle=P.warmGray;
    ctx.font='300 18px Lato';
    ctx.letterSpacing='0em';
    ctx.textAlign='center';
    ctx.textBaseline='top';
    ctx.fillText(m.label,mx,cardY+70);
    ctx.fillStyle=m.label==='30-yr Success'?P.green:P.nearBlk;
    ctx.font=m.label==='30-yr Success'?'700 36px Lato':'700 30px Lato';
    ctx.fillText(m.value,mx,cardY+100);
  });

  // Card divider
  ctx.strokeStyle=rgba(P.sageFaint,1);
  ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(cardX+36,cardY+155);ctx.lineTo(cardX+cardW-36,cardY+155);ctx.stroke();

  // Card sub-label
  ctx.fillStyle=P.warmGray;
  ctx.font='300 22px Lato';
  ctx.textAlign='center';
  ctx.textBaseline='top';
  ctx.letterSpacing='0em';
  const bodyIn='Compare 4% rule, dynamic withdrawal, and bucket strategies. No email required.';
  wrapText(bodyIn,W/2,cardY+170,cardW-80,32);

  const afterCard=cardY+cardH+36;

  // Body text
  ctx.fillStyle=P.nearBlk;
  ctx.font='300 26px Lato';
  ctx.textAlign='center';
  ctx.letterSpacing='0em';
  ctx.textBaseline='top';
  wrapText('Find your safe withdrawal rate and stress-test your retirement portfolio. No sign-up. No email. Just results.',W/2,afterCard,840,36);

  // Keywords strip
  const kwY=afterCard+130;
  const kws=['safe withdrawal rate','retirement withdrawal calculator','retirement income planning'];
  ctx.font='700 15px Lato';
  ctx.letterSpacing='0.08em';
  ctx.textAlign='center';
  let kwX=W/2-380;
  kws.forEach((kw,i)=>{
    const tw=ctx.measureText(kw.toUpperCase()).width;
    const px=16,py=10;
    rrect(kwX,kwY-py,tw+px*2,30+py*2,20);
    ctx.fillStyle=P.sageFaint;ctx.fill();
    ctx.fillStyle=P.green;
    ctx.textAlign='left';
    ctx.textBaseline='middle';
    ctx.fillText(kw.toUpperCase(),kwX+px,kwY+5);
    kwX+=tw+px*2+18;
  });

  // CTA pill
  const ctaY=kwY+80;
  const ctaW=380,ctaH=70;
  rrect(W/2-ctaW/2,ctaY,ctaW,ctaH,35);
  ctx.fillStyle=P.green;ctx.fill();
  ctx.fillStyle=P.white;
  ctx.font='700 26px Lato';
  ctx.letterSpacing='0.08em';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText('Find Your Rate  →',W/2,ctaY+ctaH/2);

  drawFooter();
}
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='retirement-withdrawal-01-direct-utility-hero-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
