<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>$847000 Difference at Year 30 · Retirement Withdrawal Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 10 · Before After Numbers · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxWidth&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);return y;
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_no_text_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Hero strip
  ctx.fillStyle=P.green;
  ctx.fillRect(0,0,W,130);
  ctx.fillStyle=P.cream;
  ctx.font='300 58px "Cormorant Garamond"';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText('$847,000 difference at Year 30',W/2,65);

  // Two columns
  const gap=18,colW=(W-76-gap)/2,colY=148,colH=740;
  const leftX=38,rightX=38+colW+gap;

  // LEFT warmGray
  rrect(leftX,colY,colW,colH,16);
  ctx.fillStyle=rgba(P.warmGray,.1);ctx.fill();
  ctx.strokeStyle=rgba(P.warmGray,.3);ctx.lineWidth=2;ctx.stroke();

  ctx.fillStyle=P.warmGray;
  ctx.font='700 15px Lato';
  ctx.letterSpacing='0.1em';
  ctx.textAlign='center';
  ctx.textBaseline='top';
  ctx.fillText('FIXED $4K/MO',leftX+colW/2,colY+22);

  // Chart stub left — line drops to zero
  const lChartT=colY+70,lChartB=colY+310,lChartL=leftX+20,lChartR=leftX+colW-20;
  const leftPts=[[0,0.85],[0.3,0.65],[0.6,0.4],[0.73,0]];
  ctx.beginPath();
  leftPts.forEach(([t,v],i)=>{
    const px=lChartL+t*(lChartR-lChartL),py=lChartT+(1-v)*(lChartB-lChartT);
    if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);
  });
  const lGrad=ctx.createLinearGradient(0,lChartT,0,lChartB);
  lGrad.addColorStop(0,rgba(P.coral,.3));lGrad.addColorStop(1,rgba(P.coral,0));
  ctx.strokeStyle=P.coral;ctx.lineWidth=3;ctx.lineJoin='round';ctx.stroke();
  // Zero line
  ctx.strokeStyle=rgba(P.coral,.5);ctx.lineWidth=1.5;ctx.setLineDash([6,5]);
  ctx.beginPath();ctx.moveTo(lChartL,lChartB);ctx.lineTo(lChartR,lChartB);ctx.stroke();
  ctx.setLineDash([]);

  // Coral indicator badge
  rrect(leftX+14,colY+320,colW-28,52,10);
  ctx.fillStyle=rgba(P.coral,.15);ctx.fill();
  ctx.strokeStyle=rgba(P.coral,.5);ctx.lineWidth=1.5;ctx.stroke();
  ctx.fillStyle=P.coral;
  ctx.font='700 18px Lato';
  ctx.letterSpacing='0em';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText('Depleted Year 22',leftX+colW/2,colY+346);

  ctx.strokeStyle=rgba(P.warmGray,.2);ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(leftX+20,colY+390);ctx.lineTo(leftX+colW-20,colY+390);ctx.stroke();

  ctx.fillStyle=P.warmGray;
  ctx.font='300 22px Lato';
  ctx.letterSpacing='0em';
  ctx.textAlign='center';
  ctx.textBaseline='top';
  ctx.fillText('Portfolio at Year 30:',leftX+colW/2,colY+410);
  ctx.fillStyle=P.coral;
  ctx.font='700 34px Lato';
  ctx.fillText('$0',leftX+colW/2,colY+448);
  ctx.fillStyle=P.warmGray;
  ctx.font='300 20px Lato';
  ctx.fillText('Depleted',leftX+colW/2,colY+496);

  // RIGHT forest green
  rrect(rightX,colY,colW,colH,16);
  ctx.fillStyle=P.green;ctx.fill();

  ctx.fillStyle=P.cream;
  ctx.font='700 15px Lato';
  ctx.letterSpacing='0.1em';
  ctx.textAlign='center';
  ctx.textBaseline='top';
  ctx.fillText('DYNAMIC STRATEGY',rightX+colW/2,colY+22);

  // Chart stub right — sage stable
  const rChartT=colY+70,rChartB=colY+310,rChartL=rightX+20,rChartR=rightX+colW-20;
  const rightPts=[[0,0.5],[0.15,0.45],[0.3,0.6],[0.45,0.52],[0.6,0.65],[0.75,0.58],[1.0,0.63]];
  ctx.beginPath();
  rightPts.forEach(([t,v],i)=>{
    const px=rChartL+t*(rChartR-rChartL),py=rChartT+(1-v)*(rChartB-rChartT);
    if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);
  });
  ctx.strokeStyle=P.sage;ctx.lineWidth=3;ctx.lineJoin='round';ctx.stroke();

  rrect(rightX+14,colY+320,colW-28,52,10);
  ctx.fillStyle=rgba(P.sage,.25);ctx.fill();
  ctx.strokeStyle=P.sage;ctx.lineWidth=1.5;ctx.stroke();
  ctx.fillStyle=P.cream;
  ctx.font='700 18px Lato';
  ctx.letterSpacing='0em';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText('Intact Year 30',rightX+colW/2,colY+346);

  ctx.strokeStyle=rgba(P.cream,.2);ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(rightX+20,colY+390);ctx.lineTo(rightX+colW-20,colY+390);ctx.stroke();

  ctx.fillStyle=rgba(P.cream,.7);
  ctx.font='300 22px Lato';
  ctx.letterSpacing='0em';
  ctx.textAlign='center';
  ctx.textBaseline='top';
  ctx.fillText('Portfolio at Year 30:',rightX+colW/2,colY+410);
  ctx.fillStyle=P.sagePale;
  ctx.font='700 34px Lato';
  ctx.fillText('$847,000',rightX+colW/2,colY+448);
  ctx.fillStyle=rgba(P.cream,.7);
  ctx.font='300 20px Lato';
  ctx.fillText('Intact',rightX+colW/2,colY+496);

  // Bottom strip
  const stripY=colY+colH+20;
  ctx.fillStyle=P.green;
  ctx.fillRect(0,stripY,W,90);
  ctx.fillStyle=P.cream;
  ctx.font='300 40px "Cormorant Garamond"';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText('$847,000 difference at Year 30',W/2,stripY+45);

  // CTA
  const ctaY=stripY+120;
  const ctaW=420,ctaH=70;
  rrect(W/2-ctaW/2,ctaY,ctaW,ctaH,35);
  ctx.fillStyle=P.green;ctx.fill();
  ctx.fillStyle=P.white;
  ctx.font='700 26px Lato';
  ctx.letterSpacing='0.08em';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText('Run Your Comparison  →',W/2,ctaY+ctaH/2);

  drawFooter();
}
function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='retirement-withdrawal-10-before-after-numbers-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
