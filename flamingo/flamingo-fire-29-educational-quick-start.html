<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Get Your Retirement Plan in 5 Minutes — Flamingo FIRE Quick Start · Flamingo FIRE Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 29 · Educational — Quick-Start Guide · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxWidth&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);return y;
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_no_text_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
  ctx.letterSpacing='0em';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Cream background
  ctx.fillStyle=P.cream;
  ctx.fillRect(0,0,W,1395);

  // Pinyon Script headline
  ctx.fillStyle=P.sage;
  ctx.font='400 70px "Pinyon Script"';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('your retirement plan',W/2,36);

  // Bold Lato sub
  ctx.fillStyle=P.nearBlk;
  ctx.font='700 80px Lato';ctx.letterSpacing='-0.02em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('IN 5 MINUTES',W/2,116);
  ctx.letterSpacing='0em';

  ctx.fillStyle=P.warmGray;
  ctx.font='italic 300 28px "Cormorant Garamond"';
  ctx.textBaseline='top';
  ctx.fillText('flamingo fire quick-start guide',W/2,210);

  // Step cards
  const steps=[
    {time:'1 MIN',step:'Step 01',action:'Enter',detail:'age, annual expenses, portfolio value, expected return rate',elevated:false,stepNum:'01'},
    {time:'1 MIN',step:'Step 02',action:'Add',detail:'any known income or expense events across your timeline',elevated:false,stepNum:'02'},
    {time:'1 MIN',step:'Step 03',action:'Choose',detail:'your preferred withdrawal strategy — 4% rule, dynamic, or bucket',elevated:false,stepNum:'03'},
    {time:'2 MIN',step:'Step 04',action:'Read',detail:'success rate, retirement age projection, and full 40-year forecast',elevated:true,stepNum:'04'},
  ];

  const cardX=70,cardW=860,cardGap=18;
  let cy=260;
  steps.forEach((step,i)=>{
    const cardH=step.elevated?228:198;

    // Shadow for elevated card
    if(step.elevated){
      ctx.fillStyle=rgba(P.green,0.15);
      rrect(cardX+5,cy+5,cardW,cardH,18);ctx.fill();
    } else {
      ctx.fillStyle=rgba(P.nearBlk,0.06);
      rrect(cardX+3,cy+3,cardW,cardH,18);ctx.fill();
    }

    // Card background
    ctx.fillStyle=step.elevated?P.sagePale:P.white;
    rrect(cardX,cy,cardW,cardH,18);ctx.fill();

    // Elevated card left accent bar
    if(step.elevated){
      ctx.fillStyle=P.green;
      rrect(cardX,cy,8,cardH,4);ctx.fill();
    }

    // Time chip
    const chipW=96,chipH=36,chipX=cardX+24,chipY=cy+22;
    rrect(chipX,chipY,chipW,chipH,18);
    ctx.fillStyle=step.elevated?P.green:rgba(P.sage,0.28);
    ctx.fill();
    if(!step.elevated){
      ctx.strokeStyle=P.sage;ctx.lineWidth=1.5;
      rrect(chipX,chipY,chipW,chipH,18);ctx.stroke();
    }
    ctx.fillStyle=step.elevated?P.cream:P.green;
    ctx.font='700 16px Lato';ctx.letterSpacing='0.08em';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(step.time,chipX+chipW/2,chipY+chipH/2);
    ctx.letterSpacing='0em';

    // Step label + action keyword
    const textX=cardX+24;
    ctx.fillStyle=step.elevated?P.greenDk:P.green;
    ctx.font='700 30px Lato';ctx.letterSpacing='0em';
    ctx.textAlign='left';ctx.textBaseline='top';
    ctx.fillText(step.step+' — '+step.action+':',textX,cy+72);

    // Detail text with wrap
    ctx.fillStyle=step.elevated?P.nearBlk:rgba(P.nearBlk,0.72);
    ctx.font='300 22px Lato';
    ctx.textBaseline='top';
    wrapText(step.detail,textX,cy+114,cardW-48,34);

    // Large step number watermark right side
    ctx.save();
    ctx.globalAlpha=step.elevated?0.10:0.07;
    ctx.fillStyle=P.green;
    ctx.font='700 120px "Cormorant Garamond"';
    ctx.textAlign='right';ctx.textBaseline='middle';
    ctx.fillText(step.stepNum,cardX+cardW-20,cy+cardH/2);
    ctx.restore();

    cy+=cardH+cardGap;
  });

  // Sage italic strip
  const stripY=cy+8,stripH=64;
  ctx.fillStyle=rgba(P.sage,0.18);
  rrect(70,stripY,860,stripH,14);ctx.fill();
  ctx.fillStyle=P.green;
  ctx.font='italic 300 32px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('5 minutes. Complete picture.',W/2,stripY+stripH/2);

  // CTA
  const ctaW=400,ctaH=76,ctaX=(W-ctaW)/2,ctaY=1242;
  rrect(ctaX,ctaY,ctaW,ctaH,38);
  ctx.fillStyle=P.green;ctx.fill();
  ctx.fillStyle=P.cream;ctx.font='700 26px Lato';ctx.letterSpacing='0.06em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Start Now — Free  →',W/2,ctaY+ctaH/2);
  ctx.letterSpacing='0em';

  // URL
  ctx.fillStyle=rgba(P.green,0.4);
  ctx.font='300 18px Lato';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('timeandmoneytree.com',W/2,1354);

  drawFooter();
}
function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='flamingo-fire-29-educational-quick-start-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
