<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Flamingo FIRE Formula — How Scenario Modeling Actually Works · Flamingo FIRE Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;width:420px;height:630px;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 27 · Educational — Formula Explainer · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxWidth&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);return y;
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
  ctx.letterSpacing='0em';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // White background
  ctx.fillStyle=P.white;
  ctx.fillRect(0,0,W,1395);

  // Subtle sageFaint texture band top
  const topGrd=ctx.createLinearGradient(0,0,0,200);
  topGrd.addColorStop(0,P.sageFaint);
  topGrd.addColorStop(1,P.white);
  ctx.fillStyle=topGrd;
  ctx.fillRect(0,0,W,200);

  // Cormorant italic sage sub-headline
  ctx.fillStyle=P.sage;
  ctx.font='italic 300 40px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('how flamingo fire calculates',W/2,48);

  // Bold Lato main headline
  ctx.fillStyle=P.nearBlk;
  ctx.font='700 68px Lato';ctx.letterSpacing='-0.01em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('YOUR RETIREMENT',W/2,100);
  ctx.letterSpacing='0em';

  // Divider line
  ctx.strokeStyle=rgba(P.sage,0.35);ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(140,188);ctx.lineTo(860,188);ctx.stroke();

  // Formula cards
  const formulas=[
    {
      chip:'FORMULA 1',
      title:'Portfolio Growth',
      formula:'Current Portfolio',
      formula2:'× (1 + return rate)^years',
      desc:'How your investments compound over time'
    },
    {
      chip:'FORMULA 2',
      title:'Annual Withdrawal',
      formula:'Portfolio',
      formula2:'× safe withdrawal rate',
      desc:'Your sustainable annual spending amount'
    },
    {
      chip:'FORMULA 3',
      title:'Success Rate',
      formula:'simulations where portfolio > 0',
      formula2:'after target years',
      desc:'Percentage of historical scenarios you survive'
    },
  ];

  const cardX=80,cardW=840,cardH=290,cardGap=24;
  let cy=218;
  formulas.forEach((f,i)=>{
    // Card shadow
    ctx.fillStyle=rgba(P.sagePale,0.4);
    rrect(cardX+4,cy+4,cardW,cardH,20);ctx.fill();

    // Card background
    ctx.fillStyle=P.sageFaint;
    rrect(cardX,cy,cardW,cardH,20);ctx.fill();

    // FORMULA chip top-left
    const chipW=136,chipH=36,chipX=cardX+24,chipY=cy+22;
    rrect(chipX,chipY,chipW,chipH,8);
    ctx.fillStyle=P.green;ctx.fill();
    ctx.fillStyle=P.cream;ctx.font='700 14px Lato';ctx.letterSpacing='0.12em';
    ctx.textAlign='left';ctx.textBaseline='middle';
    ctx.fillText(f.chip,chipX+14,chipY+chipH/2);
    ctx.letterSpacing='0em';

    // Title
    ctx.fillStyle=P.green;
    ctx.font='700 30px Lato';ctx.letterSpacing='0em';
    ctx.textAlign='left';ctx.textBaseline='top';
    ctx.fillText(f.title,cardX+24,cy+74);

    // Formula lines — monospace style, slightly accented
    ctx.fillStyle=P.nearBlk;
    ctx.font='400 26px Lato';
    ctx.textBaseline='top';
    ctx.fillText(f.formula,cardX+24,cy+116);
    ctx.fillText(f.formula2,cardX+24,cy+150);

    // Horizontal rule
    ctx.strokeStyle=rgba(P.sage,0.3);ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(cardX+24,cy+196);ctx.lineTo(cardX+cardW-24,cy+196);ctx.stroke();

    // Description
    ctx.fillStyle=P.warmGray;
    ctx.font='300 21px Lato';
    ctx.textBaseline='top';
    ctx.fillText(f.desc,cardX+24,cy+212);

    cy+=cardH+cardGap;
  });

  // Below cards — Cormorant italic sage insight
  ctx.fillStyle=P.sage;
  ctx.font='italic 300 33px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('In short: enter your numbers → see every possible outcome.',W/2,cy+12);

  // CTA
  const ctaW=420,ctaH=76,ctaX=(W-ctaW)/2,ctaY=1248;
  rrect(ctaX,ctaY,ctaW,ctaH,38);
  ctx.fillStyle=P.green;ctx.fill();
  ctx.fillStyle=P.cream;ctx.font='700 26px Lato';ctx.letterSpacing='0.06em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Run Your Simulation  →',W/2,ctaY+ctaH/2);
  ctx.letterSpacing='0em';

  // URL
  ctx.fillStyle=rgba(P.green,0.4);
  ctx.font='300 18px Lato';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('timeandmoneytree.com',W/2,1360);

  drawFooter();
}
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='flamingo-fire-27-educational-formula-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
