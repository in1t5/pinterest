<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>No Retirement Strategy vs. Flamingo FIRE — The Difference Is Years · Flamingo FIRE Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;width:420px;height:630px;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 09 · Before After Strategy · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // LEFT panel - warm gray
  ctx.fillStyle='#4a4847';
  ctx.fillRect(0,0,W/2,1395);

  // RIGHT panel - forest green
  ctx.fillStyle=P.green;
  ctx.fillRect(W/2,0,W/2,1395);

  // CENTER headline band
  ctx.fillStyle=P.greenDk;
  ctx.fillRect(0,580,W,120);
  ctx.fillStyle=P.cream;
  ctx.font='italic 300 58px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Strategy Changes Your Retirement Date',W/2,640);

  // LEFT - No modeling label
  ctx.fillStyle=rgba(P.cream,0.5);
  ctx.font='700 14px Lato';ctx.letterSpacing='0.16em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('NO MODELING',W/4,40);ctx.letterSpacing='0em';

  // LEFT retire age hero
  ctx.fillStyle=rgba(P.cream,0.55);
  ctx.font='700 100px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('67',W/4,90);

  ctx.fillStyle=rgba(P.cream,0.4);
  ctx.font='700 15px Lato';ctx.letterSpacing='0.08em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('RETIRE AT',W/4,205);ctx.letterSpacing='0em';

  // LEFT metrics
  const leftItems=[
    {label:'Plan',val:'Hope it works'},
    {label:'Confidence',val:'Low'},
    {label:'Scenarios',val:'None'},
  ];
  let ly=280;
  leftItems.forEach(item=>{
    ctx.fillStyle=rgba(P.cream,0.4);
    ctx.font='700 12px Lato';ctx.letterSpacing='0.12em';
    ctx.textAlign='center';ctx.textBaseline='top';
    ctx.fillText(item.label.toUpperCase(),W/4,ly);ctx.letterSpacing='0em';
    ctx.fillStyle=rgba(P.cream,0.5);
    ctx.font='italic 300 32px "Cormorant Garamond"';
    ctx.textBaseline='top';
    ctx.fillText(item.val,W/4,ly+22);
    ly+=80;
  });

  // CENTER divider
  ctx.strokeStyle=P.greenDk;ctx.lineWidth=4;
  ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,580);ctx.stroke();
  ctx.beginPath();ctx.moveTo(W/2,700);ctx.lineTo(W/2,1395);ctx.stroke();

  // RIGHT - Flamingo FIRE label
  ctx.fillStyle=P.sagePale;
  ctx.font='700 14px Lato';ctx.letterSpacing='0.16em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('FLAMINGO FIRE',W/2+W/4,40);ctx.letterSpacing='0em';

  // RIGHT retire age hero
  ctx.fillStyle=P.cream;
  ctx.font='700 100px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('57',W/2+W/4,90);

  ctx.fillStyle=P.sagePale;
  ctx.font='700 15px Lato';ctx.letterSpacing='0.08em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('RETIRE AT',W/2+W/4,205);ctx.letterSpacing='0em';

  // RIGHT metrics
  const rightItems=[
    {label:'Plan',val:'Stress-tested'},
    {label:'Confidence',val:'97%'},
    {label:'Scenarios',val:'All modeled'},
  ];
  let ry=280;
  rightItems.forEach(item=>{
    ctx.fillStyle=P.sagePale;
    ctx.font='700 12px Lato';ctx.letterSpacing='0.12em';
    ctx.textAlign='center';ctx.textBaseline='top';
    ctx.fillText(item.label.toUpperCase(),W/2+W/4,ry);ctx.letterSpacing='0em';
    ctx.fillStyle=P.cream;
    ctx.font='italic 300 32px "Cormorant Garamond"';
    ctx.textBaseline='top';
    ctx.fillText(item.val,W/2+W/4,ry+22);
    ry+=80;
  });

  // Bottom content - full width on dark band
  ctx.fillStyle=rgba(P.cream,0.06);
  ctx.fillRect(0,700,W,180);

  ctx.fillStyle=P.cream;
  ctx.font='300 26px Lato';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('The difference between these two plans:',W/2,724);

  ctx.fillStyle=P.sagePale;
  ctx.font='italic 300 52px "Cormorant Garamond"';
  ctx.textBaseline='top';
  ctx.fillText('10 years of freedom.',W/2,762);

  // Feature strips
  const strips=[
    {left:'Guessing',right:'Scenario modeling'},
    {left:'One outcome',right:'Multiple forecasts'},
    {left:'Anxiety',right:'94%+ confidence'},
  ];
  let sy=920;
  strips.forEach(s=>{
    // left
    ctx.fillStyle=rgba(P.cream,0.4);
    ctx.font='300 23px Lato';ctx.textAlign='center';ctx.textBaseline='top';
    ctx.fillText('✗  '+s.left,W/4,sy);
    // right
    ctx.fillStyle=P.sagePale;
    ctx.fillText('✓  '+s.right,W/2+W/4,sy);
    sy+=52;
  });

  // Thin divider
  ctx.strokeStyle=rgba(P.sagePale,0.25);ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(80,1090);ctx.lineTo(920,1090);ctx.stroke();

  // Body
  ctx.fillStyle=rgba(P.cream,0.7);
  ctx.font='300 25px Lato';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('One calculator models every variable.',W/2,1110);
  ctx.fillText('Free. No email. No advisor needed.',W/2,1148);

  // CTA
  const ctaW=400,ctaH=78,ctaX=(W-ctaW)/2,ctaY=1240;
  rrect(ctaX,ctaY,ctaW,ctaH,39);
  ctx.fillStyle=P.sagePale;ctx.fill();
  ctx.fillStyle=P.green;ctx.font='700 27px Lato';ctx.letterSpacing='0.06em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Build Your Strategy →',W/2,ctaY+ctaH/2);
  ctx.letterSpacing='0em';

  // URL
  ctx.fillStyle=rgba(P.cream,0.35);
  ctx.font='300 18px Lato';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('timeandmoneytree.com',W/2,1352);

  drawFooter();
}
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='flamingo-fire-09-before-after-strategy-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
