<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>What If You Could Model Every Retirement "What If" Before You Decide? · Flamingo FIRE Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 06 · Question Hook Permission · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_no_text_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Cream background
  ctx.fillStyle=P.cream;
  ctx.fillRect(0,0,W,1395);

  // Top accent
  ctx.fillStyle=P.green;
  ctx.fillRect(0,0,W,8);

  // Pinyon Script "what if..."
  ctx.fillStyle=rgba(P.sage,0.55);
  ctx.font='96px "Pinyon Script"';
  ctx.textBaseline='top';
  ctx.textAlign='center';
  ctx.fillText('what if…',W/2,28);

  // Large italic question
  ctx.fillStyle=P.green;
  ctx.font='italic 300 62px "Cormorant Garamond"';
  ctx.textAlign='center';
  ctx.textBaseline='top';
  ctx.fillText('What if you could model',W/2,148);
  ctx.fillText('every retirement "what if"',W/2,224);
  ctx.fillText('before you decide?',W/2,300);

  // Thin divider
  ctx.strokeStyle=rgba(P.sage,0.45);
  ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(120,400);ctx.lineTo(880,400);ctx.stroke();

  // Section label
  ctx.fillStyle=P.warmGray;
  ctx.font='700 16px Lato';ctx.letterSpacing='0.14em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('MODEL ANY SCENARIO',W/2,424);
  ctx.letterSpacing='0em';

  // 2x2 scenario chips
  const scenarios=[
    {text:'Job loss at 52',icon:'⚡'},
    {text:'Market crash at 60',icon:'📉'},
    {text:'Healthcare spike at 65',icon:'🏥'},
    {text:'Inheritance at 70',icon:'💰'},
  ];
  const chipW=400,chipH=120,chipGapX=24,chipGapY=20;
  const startX=(W-(chipW*2+chipGapX))/2;
  const startY=470;
  scenarios.forEach((s,i)=>{
    const col=i%2;
    const row=Math.floor(i/2);
    const cx=startX+col*(chipW+chipGapX);
    const cy=startY+row*(chipH+chipGapY);
    rrect(cx,cy,chipW,chipH,14);
    ctx.fillStyle=P.sageFaint;ctx.fill();
    ctx.strokeStyle=P.sage;ctx.lineWidth=1.5;ctx.stroke();

    // Check mark
    const checkR=20;
    ctx.beginPath();ctx.arc(cx+40,cy+chipH/2,checkR,0,Math.PI*2);
    ctx.fillStyle=P.green;ctx.fill();
    ctx.fillStyle=P.cream;
    ctx.font='700 22px Lato';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('✓',cx+40,cy+chipH/2);

    ctx.fillStyle=P.green;
    ctx.font='700 22px Lato';ctx.letterSpacing='0em';
    ctx.textAlign='left';ctx.textBaseline='middle';
    ctx.fillText(s.text,cx+74,cy+chipH/2);
  });

  // Body
  ctx.fillStyle=P.nearBlk;
  ctx.font='300 28px Lato';
  ctx.textAlign='center';
  ctx.textBaseline='top';
  ctx.fillText('Flamingo FIRE models every variable.',W/2,770);
  ctx.fillText('No surprises at retirement.',W/2,812);

  // Quote strip
  ctx.fillStyle=rgba(P.green,0.08);
  ctx.fillRect(60,870,880,80);
  ctx.strokeStyle=P.sage;ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(60,870);ctx.lineTo(60,950);ctx.stroke();
  ctx.fillStyle=P.green;
  ctx.font='italic 300 30px "Cormorant Garamond"';
  ctx.textAlign='left';ctx.textBaseline='middle';
  ctx.fillText('"Plan for everything. Be surprised by nothing."',90,910);

  // Four scenario labels
  const labels=['Income events','One-off expenses','Market scenarios','Life milestones'];
  ctx.fillStyle=P.green;
  ctx.font='400 24px Lato';
  ctx.textAlign='left';
  ctx.textBaseline='top';
  let fy=990;
  labels.forEach((l,i)=>{
    ctx.fillStyle=P.sage;
    ctx.fillText('✦',80,fy);
    ctx.fillStyle=P.green;
    ctx.fillText('  '+l,80,fy);
    fy+=46;
  });

  // CTA
  const ctaW=420,ctaH=78,ctaX=(W-ctaW)/2,ctaY=1250;
  rrect(ctaX,ctaY,ctaW,ctaH,39);
  ctx.fillStyle=P.green;ctx.fill();
  ctx.fillStyle=P.white;ctx.font='700 27px Lato';ctx.letterSpacing='0.06em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Start Modeling Free →',W/2,ctaY+ctaH/2);
  ctx.letterSpacing='0em';

  // URL
  ctx.fillStyle=P.warmGray;
  ctx.font='300 19px Lato';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('timeandmoneytree.com · flamingo fire calculator',W/2,1358);

  drawFooter();
}
function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='flamingo-fire-06-question-hook-permission-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
