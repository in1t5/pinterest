<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Works at Any Portfolio Level · Flamingo FIRE Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;width:420px;height:630px;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 20 · Myth Buster Misconception · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Pale sage background
  ctx.fillStyle=P.sageFaint;
  ctx.fillRect(0,0,W,1395);

  // Header
  ctx.fillStyle=P.green;
  ctx.font='italic 300 62px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('The Biggest Misconception',W/2,44);
  ctx.fillStyle=rgba(P.green,0.6);
  ctx.font='italic 300 40px "Cormorant Garamond"';
  ctx.fillText('about retirement planning.',W/2,114);

  // MISCONCEPTION card (coral/red)
  ctx.fillStyle=rgba(P.coral,0.12);
  rrect(60,190,880,200,18);ctx.fill();
  ctx.strokeStyle=P.coral;ctx.lineWidth=3;
  rrect(60,190,880,200,18);ctx.stroke();

  // ❌ icon
  ctx.fillStyle=P.coral;
  ctx.font='700 44px Lato';
  ctx.textAlign='left';ctx.textBaseline='top';
  ctx.fillText('✗',88,214);

  ctx.fillStyle=rgba(P.nearBlk,0.8);
  ctx.font='italic 300 34px "Cormorant Garamond"';
  ctx.textBaseline='top';
  ctx.fillText('"This level of planning is only for',140,212);
  ctx.fillText('people with $500k+."',140,256);

  ctx.fillStyle=P.coral;
  ctx.font='700 13px Lato';ctx.letterSpacing='0.16em';
  ctx.textBaseline='top';
  ctx.fillText('WRONG',88,308);
  ctx.letterSpacing='0em';

  // TRUTH card (green)
  ctx.fillStyle=rgba(P.green,0.1);
  rrect(60,418,880,180,18);ctx.fill();
  ctx.strokeStyle=P.green;ctx.lineWidth=3;
  rrect(60,418,880,180,18);ctx.stroke();

  ctx.fillStyle=P.green;
  ctx.font='700 44px Lato';
  ctx.textAlign='left';ctx.textBaseline='top';
  ctx.fillText('✓',88,440);

  ctx.fillStyle=rgba(P.nearBlk,0.82);
  ctx.font='300 27px Lato';
  ctx.textBaseline='top';
  ctx.fillText('Works at any portfolio level.',140,440);
  ctx.fillText('$50k · $200k · $500k · $1M+',140,478);

  // Three proof chips
  const proofChips=['No minimum to start','Same powerful modeling','Scales with your growth'];
  let px=80,py=640;
  proofChips.forEach(chip=>{
    const chipW=ctx.measureText(chip).width+36;
    rrect(px,py,chipW,50,25);
    ctx.fillStyle=P.green;ctx.fill();
    ctx.fillStyle=P.cream;
    ctx.font='700 18px Lato';ctx.letterSpacing='0.04em';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(chip,px+chipW/2,py+25);
    ctx.letterSpacing='0em';
    px+=chipW+16;
    if(px>820){px=80;py+=60;}
  });

  // Explanation cards
  const cards=[
    {icon:'$50k',label:'Early career',desc:'See exactly how much more to save each month'},
    {icon:'$200k',label:'Mid career',desc:'Find your Phase 2 date — when part-time is enough'},
    {icon:'$1M+',label:'Near retirement',desc:'Model 40-year withdrawal safety with precision'},
  ];

  let cy=760;
  cards.forEach(card=>{
    ctx.fillStyle=P.white;
    rrect(60,cy,880,138,14);ctx.fill();

    ctx.fillStyle=P.green;
    ctx.font='700 34px "Cormorant Garamond"';
    ctx.textAlign='left';ctx.textBaseline='top';
    ctx.fillText(card.icon,88,cy+18);

    ctx.fillStyle=P.sage;
    ctx.font='700 13px Lato';ctx.letterSpacing='0.12em';
    ctx.textBaseline='top';
    ctx.fillText(card.label.toUpperCase(),88,cy+68);
    ctx.letterSpacing='0em';

    ctx.fillStyle=rgba(P.nearBlk,0.7);
    ctx.font='300 21px Lato';
    ctx.textBaseline='top';
    ctx.fillText(card.desc,88,cy+96);

    cy+=152;
  });

  // CTA
  const ctaW=380,ctaH=76,ctaX=(W-ctaW)/2,ctaY=1252;
  rrect(ctaX,ctaY,ctaW,ctaH,38);
  ctx.fillStyle=P.green;ctx.fill();
  ctx.fillStyle=P.cream;ctx.font='700 26px Lato';ctx.letterSpacing='0.06em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Start Where You Are →',W/2,ctaY+ctaH/2);
  ctx.letterSpacing='0em';

  // URL
  ctx.fillStyle=rgba(P.green,0.38);
  ctx.font='300 18px Lato';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('timeandmoneytree.com',W/2,1360);

  drawFooter();
}
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='flamingo-fire-20-myth-buster-misconception-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
