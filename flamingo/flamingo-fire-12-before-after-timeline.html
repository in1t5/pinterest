<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>10 Extra Years of Freedom · Flamingo FIRE Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;width:420px;height:630px;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 12 · Before After Timeline · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function drawTimelineNode(x,y,color,age,label,dim){
  // Circle
  ctx.beginPath();ctx.arc(x,y,32,0,Math.PI*2);
  ctx.fillStyle=dim?rgba(color,0.35):color;ctx.fill();
  // Age label inside
  ctx.fillStyle=dim?rgba(P.cream,0.5):P.cream;
  ctx.font='700 22px Lato';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(age,x,y);
  // Label below
  ctx.fillStyle=dim?rgba(P.cream,0.38):P.sagePale;
  ctx.font='700 11px Lato';ctx.letterSpacing='0.12em';
  ctx.textBaseline='top';
  ctx.fillText(label,x,y+38);
  ctx.letterSpacing='0em';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Background - deep greenDk
  ctx.fillStyle=P.nearBlk;
  ctx.fillRect(0,0,W,1395);

  // Headline band at top
  ctx.fillStyle=P.greenDk;
  ctx.fillRect(0,0,W,120);
  ctx.fillStyle=P.cream;
  ctx.font='italic 300 58px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('10 Extra Years of Freedom',W/2,60);

  // Sub-headline
  ctx.fillStyle=rgba(P.sagePale,0.9);
  ctx.font='700 13px Lato';ctx.letterSpacing='0.16em';
  ctx.textBaseline='top';ctx.textAlign='center';
  ctx.fillText('TWO PATHS · SAME STARTING POINT',W/2,130);
  ctx.letterSpacing='0em';

  // --- TIMELINE ROW 1: No strategy ---
  const rowLabel1Y=195;
  ctx.fillStyle=rgba(P.cream,0.38);
  ctx.font='700 12px Lato';ctx.letterSpacing='0.16em';
  ctx.textBaseline='top';ctx.textAlign='left';
  ctx.fillText('WITHOUT FLAMINGO FIRE',72,rowLabel1Y);
  ctx.letterSpacing='0em';

  // Gray connecting line
  const nodes1=[
    {x:80,age:'30',label:'WORK'},
    {x:280,age:'40',label:'WORK'},
    {x:480,age:'50',label:'WORK'},
    {x:680,age:'60',label:'WORK'},
    {x:880,age:'67',label:'RETIRE'},
  ];
  const lineY1=310;
  ctx.strokeStyle=rgba(P.warmGray,0.4);ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(nodes1[0].x,lineY1);ctx.lineTo(nodes1[4].x,lineY1);ctx.stroke();

  nodes1.forEach((n,i)=>{
    drawTimelineNode(n.x,lineY1,P.warmGray,n.age,n.label,true);
  });

  // Arrow label at end
  ctx.fillStyle=rgba(P.cream,0.35);
  ctx.font='italic 300 24px "Cormorant Garamond"';
  ctx.textAlign='right';ctx.textBaseline='top';
  ctx.fillText('Retire at 67',920,350);

  // --- TIMELINE ROW 2: Flamingo FIRE ---
  const rowLabel2Y=440;
  ctx.fillStyle=P.sagePale;
  ctx.font='700 12px Lato';ctx.letterSpacing='0.16em';
  ctx.textBaseline='top';ctx.textAlign='left';
  ctx.fillText('WITH FLAMINGO FIRE',72,rowLabel2Y);
  ctx.letterSpacing='0em';

  const lineY2=555;
  // Accumulate phase line (green)
  ctx.strokeStyle=P.green;ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(80,lineY2);ctx.lineTo(480,lineY2);ctx.stroke();
  // Transition phase (sage)
  ctx.strokeStyle=P.sage;
  ctx.beginPath();ctx.moveTo(480,lineY2);ctx.lineTo(680,lineY2);ctx.stroke();
  // Freedom (pale sage)
  ctx.strokeStyle=P.sagePale;
  ctx.beginPath();ctx.moveTo(680,lineY2);ctx.lineTo(880,lineY2);ctx.stroke();

  // Nodes row 2
  drawTimelineNode(80,lineY2,P.green,'30','ACCUMULATE',false);
  drawTimelineNode(280,lineY2,P.green,'40','GROW',false);
  drawTimelineNode(480,lineY2,P.sage,'50','TRANSITION',false);
  drawTimelineNode(680,lineY2,P.sage,'57+','RETIRE',false);
  // Freedom flag at end
  ctx.fillStyle=P.sagePale;
  ctx.font='italic 300 24px "Cormorant Garamond"';
  ctx.textAlign='right';ctx.textBaseline='top';
  ctx.fillText('Freedom at 57+',920,595);

  // Phase legend
  const legendY=650;
  const phases=[
    {color:P.green,label:'Accumulate — build aggressively'},
    {color:P.sage,label:'Transition — reduce work gradually'},
    {color:P.sagePale,label:'Retire — full independence'},
  ];
  let lx=80;
  phases.forEach(ph=>{
    ctx.beginPath();ctx.arc(lx+10,legendY+10,10,0,Math.PI*2);
    ctx.fillStyle=ph.color;ctx.fill();
    ctx.fillStyle=rgba(P.cream,0.65);
    ctx.font='300 19px Lato';ctx.textAlign='left';ctx.textBaseline='middle';
    ctx.fillText(ph.label,lx+28,legendY+10);
    lx+=310;
  });

  // Divider
  ctx.strokeStyle=rgba(P.sagePale,0.2);ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(80,720);ctx.lineTo(920,720);ctx.stroke();

  // Gain highlight card
  ctx.fillStyle=rgba(P.green,0.35);
  rrect(120,750,760,120,16);ctx.fill();
  ctx.fillStyle=P.sagePale;
  ctx.font='italic 300 42px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('That\'s 10 additional years of freedom.',W/2,810);

  // Three insight pills
  const insights=[
    {t:'Age 57 vs 67'},
    {t:'Same portfolio'},
    {t:'Better strategy'},
  ];
  let px=100;
  insights.forEach(ins=>{
    const tw=ctx.measureText(ins.t).width+40;
    rrect(px,910,tw,48,24);
    ctx.fillStyle=rgba(P.sagePale,0.18);ctx.fill();
    ctx.fillStyle=P.sagePale;
    ctx.font='700 18px Lato';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(ins.t,px+tw/2,934);
    px+=tw+24;
  });

  // Body text
  ctx.fillStyle=rgba(P.cream,0.7);
  ctx.font='300 25px Lato';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('The difference isn\'t income or luck.',W/2,996);
  ctx.fillText('It\'s knowing the right strategy.',W/2,1032);

  // CTA
  const ctaW=380,ctaH=76,ctaX=(W-ctaW)/2,ctaY=1240;
  rrect(ctaX,ctaY,ctaW,ctaH,38);
  ctx.fillStyle=P.sagePale;ctx.fill();
  ctx.fillStyle=P.green;ctx.font='700 26px Lato';ctx.letterSpacing='0.06em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('See Your Timeline →',W/2,ctaY+ctaH/2);
  ctx.letterSpacing='0em';

  // URL
  ctx.fillStyle=rgba(P.cream,0.32);
  ctx.font='300 18px Lato';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('timeandmoneytree.com',W/2,1358);

  drawFooter();
}
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='flamingo-fire-12-before-after-timeline-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
