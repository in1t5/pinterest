<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flamingo FIRE Calculator — Conservative vs. Optimistic Retirement Scenarios · Flamingo FIRE Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 04 · Direct Utility Two Outcome · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_no_text_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // LEFT panel - pale sage
  ctx.fillStyle=P.sageFaint;
  ctx.fillRect(0,0,W/2,1395);

  // RIGHT panel - forest green
  ctx.fillStyle=P.green;
  ctx.fillRect(W/2,0,W/2,1395);

  // Center headline band
  ctx.fillStyle=P.greenDk;
  ctx.fillRect(0,540,W,110);
  ctx.fillStyle=P.cream;
  ctx.font='italic 300 62px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Two Scenarios. One Decision.',W/2,595);

  // LEFT label
  ctx.fillStyle=P.green;
  ctx.font='700 14px Lato';ctx.letterSpacing='0.18em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('CONSERVATIVE',W/4,60);
  ctx.letterSpacing='0em';

  // LEFT retire age hero
  ctx.fillStyle=P.green;
  ctx.font='700 100px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('62',W/4,110);

  ctx.fillStyle=P.warmGray;
  ctx.font='700 16px Lato';ctx.letterSpacing='0.08em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('RETIRE AT',W/4,230);
  ctx.letterSpacing='0em';

  // LEFT divider
  ctx.strokeStyle=rgba(P.sage,0.5);ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(40,280);ctx.lineTo(460,280);ctx.stroke();

  // LEFT metrics
  const leftMetrics=[
    {label:'Portfolio',val:'$980k'},
    {label:'Success Rate',val:'89%'},
  ];
  let ly=310;
  leftMetrics.forEach(m=>{
    ctx.fillStyle=P.warmGray;ctx.font='700 13px Lato';ctx.letterSpacing='0.12em';
    ctx.textAlign='center';ctx.textBaseline='top';
    ctx.fillText(m.label.toUpperCase(),W/4,ly);ctx.letterSpacing='0em';
    ctx.fillStyle=P.green;ctx.font='700 52px "Cormorant Garamond"';
    ctx.textBaseline='top';
    ctx.fillText(m.val,W/4,ly+24);
    ly+=110;
  });

  // LEFT description tags
  const leftTags=['Base savings rate','Standard timeline','Single scenario'];
  ly=490;
  leftTags.forEach(t=>{
    ctx.fillStyle=rgba(P.warmGray,0.7);
    ctx.font='300 17px Lato';
    ctx.textAlign='center';ctx.textBaseline='top';
    ctx.fillText('· '+t,W/4,ly);
    ly+=30;
  });

  // RIGHT label
  ctx.fillStyle=P.sagePale;
  ctx.font='700 14px Lato';ctx.letterSpacing='0.18em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('OPTIMISTIC',W/2+W/4,60);
  ctx.letterSpacing='0em';

  // RIGHT retire age hero
  ctx.fillStyle=P.cream;
  ctx.font='700 100px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('56',W/2+W/4,110);

  ctx.fillStyle=P.sagePale;
  ctx.font='700 16px Lato';ctx.letterSpacing='0.08em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('RETIRE AT',W/2+W/4,230);
  ctx.letterSpacing='0em';

  // RIGHT divider
  ctx.strokeStyle=rgba(P.sagePale,0.4);ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(W/2+40,280);ctx.lineTo(W-40,280);ctx.stroke();

  // RIGHT metrics
  const rightMetrics=[
    {label:'Portfolio',val:'$1.4M'},
    {label:'Success Rate',val:'97%'},
  ];
  let ry=310;
  rightMetrics.forEach(m=>{
    ctx.fillStyle=P.sagePale;ctx.font='700 13px Lato';ctx.letterSpacing='0.12em';
    ctx.textAlign='center';ctx.textBaseline='top';
    ctx.fillText(m.label.toUpperCase(),W/2+W/4,ry);ctx.letterSpacing='0em';
    ctx.fillStyle=P.cream;ctx.font='700 52px "Cormorant Garamond"';
    ctx.textBaseline='top';
    ctx.fillText(m.val,W/2+W/4,ry+24);
    ry+=110;
  });

  // RIGHT description tags
  const rightTags=['Optimized savings','Events modeled','Scenario planning'];
  ry=490;
  rightTags.forEach(t=>{
    ctx.fillStyle=rgba(P.sagePale,0.8);
    ctx.font='300 17px Lato';
    ctx.textAlign='center';ctx.textBaseline='top';
    ctx.fillText('· '+t,W/2+W/4,ry);
    ry+=30;
  });

  // Center divider line
  ctx.strokeStyle=P.greenDk;ctx.lineWidth=4;
  ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,540);ctx.stroke();
  ctx.beginPath();ctx.moveTo(W/2,650);ctx.lineTo(W/2,1395);ctx.stroke();

  // Bottom section - cream band
  ctx.fillStyle=P.cream;
  ctx.fillRect(0,670,W,180);
  ctx.fillStyle=P.nearBlk;
  ctx.font='300 28px Lato';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('Flamingo FIRE lets you model both.',W/2,700);
  ctx.fillText('Choose your path.',W/2,742);

  // Highlight both
  ctx.fillStyle=P.green;
  ctx.font='italic 300 38px "Cormorant Garamond"';
  ctx.textBaseline='top';
  ctx.fillText('"Same inputs. Different assumptions. Different outcomes."',W/2,800);

  // Feature list
  ctx.fillStyle=P.green;
  ctx.fillRect(0,870,W,130);
  const features=['Scenario A vs. B  ·  Sensitivity analysis  ·  Income events  ·  Withdrawal strategies'];
  ctx.fillStyle=P.sagePale;
  ctx.font='300 24px Lato';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText(features[0],W/2,920);

  // Full width body
  ctx.fillStyle=P.cream;
  ctx.fillRect(0,1000,W,200);
  ctx.fillStyle=P.warmGray;
  ctx.font='300 26px Lato';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('Two scenarios. One free calculator.',W/2,1030);
  ctx.fillText('Model both before you decide.',W/2,1070);

  // CTA
  const ctaW=420,ctaH=78,ctaX=(W-ctaW)/2,ctaY=1210;
  rrect(ctaX,ctaY,ctaW,ctaH,39);
  ctx.fillStyle=P.green;ctx.fill();
  ctx.fillStyle=P.white;ctx.font='700 27px Lato';ctx.letterSpacing='0.06em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Run Your Scenarios →',W/2,ctaY+ctaH/2);
  ctx.letterSpacing='0em';

  // URL
  ctx.fillStyle=P.warmGray;
  ctx.font='300 19px Lato';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('flamingo fire calculator · retirement financial planning',W/2,1330);

  drawFooter();
}
function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='flamingo-fire-04-direct-utility-two-outcome-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
