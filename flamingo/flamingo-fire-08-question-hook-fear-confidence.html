<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Are You Sure Your Retirement Won't Run Out of Money? · Flamingo FIRE Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 08 · Question Hook Fear &amp; Confidence · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_no_text_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // SPECIAL: Dark forest green bg (greenDk with darker overlay)
  ctx.fillStyle=P.greenDk;
  ctx.fillRect(0,0,W,1395);
  ctx.fillStyle=rgba('#000000',0.3);
  ctx.fillRect(0,0,W,1395);

  // Subtle dot grid
  ctx.fillStyle=rgba(P.sagePale,0.06);
  for(let x=40;x<W;x+=50){
    for(let y=40;y<1395;y+=50){
      ctx.beginPath();ctx.arc(x,y,1.5,0,Math.PI*2);ctx.fill();
    }
  }

  // Top accent - cornflower
  ctx.fillStyle=P.cornflower;
  ctx.fillRect(0,0,W,6);

  // Small label
  ctx.fillStyle=rgba(P.cream,0.45);
  ctx.font='700 15px Lato';ctx.letterSpacing='0.18em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('THE #1 RETIREMENT FEAR',W/2,34);
  ctx.letterSpacing='0em';

  // Cream italic headline
  ctx.fillStyle=P.cream;
  ctx.font='italic 300 64px "Cormorant Garamond"';
  ctx.textAlign='center';
  ctx.textBaseline='top';
  ctx.fillText('Are you sure your',W/2,72);
  ctx.fillText('retirement won\'t',W/2,150);
  ctx.fillText('run out of money?',W/2,228);

  // Divider
  ctx.strokeStyle=rgba(P.sagePale,0.3);
  ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(120,330);ctx.lineTo(880,330);ctx.stroke();

  // Body
  ctx.fillStyle=rgba(P.cream,0.8);
  ctx.font='300 27px Lato';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('It\'s the #1 retirement fear.',W/2,354);
  ctx.fillText('And it\'s testable — before you retire.',W/2,394);

  // Portfolio survival chart stub
  const chartX=60,chartY=460,chartW=880,chartH=220;
  ctx.fillStyle=rgba(P.sagePale,0.06);
  rrect(chartX,chartY,chartW,chartH,12);ctx.fill();
  ctx.strokeStyle=rgba(P.sagePale,0.2);ctx.lineWidth=1.5;ctx.stroke();

  // Y axis label
  ctx.fillStyle=rgba(P.cream,0.4);
  ctx.font='300 16px Lato';
  ctx.save();ctx.translate(chartX+16,chartY+chartH/2);ctx.rotate(-Math.PI/2);
  ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('Portfolio Value',0,0);
  ctx.restore();

  // X axis label
  ctx.fillStyle=rgba(P.cream,0.4);
  ctx.font='300 16px Lato';
  ctx.textAlign='center';ctx.textBaseline='bottom';
  ctx.fillText('Years in Retirement  →  30 Years',chartX+chartW/2,chartY+chartH-8);

  // Sage survival line — never hits zero
  ctx.strokeStyle=P.sage;
  ctx.lineWidth=3;
  ctx.shadowColor=P.sage;ctx.shadowBlur=8;
  ctx.beginPath();
  const pts=[
    [chartX+50,chartY+50],
    [chartX+160,chartY+65],
    [chartX+300,chartY+90],
    [chartX+420,chartY+100],
    [chartX+560,chartY+120],
    [chartX+680,chartY+135],
    [chartX+chartW-50,chartY+145],
  ];
  ctx.moveTo(pts[0][0],pts[0][1]);
  for(let i=1;i<pts.length;i++){
    const mx=(pts[i-1][0]+pts[i][0])/2;
    ctx.bezierCurveTo(mx,pts[i-1][1],mx,pts[i][1],pts[i][0],pts[i][1]);
  }
  ctx.stroke();
  ctx.shadowBlur=0;

  // Zero line dashed
  ctx.strokeStyle=rgba(P.coral,0.4);
  ctx.lineWidth=1.5;
  ctx.setLineDash([8,6]);
  ctx.beginPath();ctx.moveTo(chartX+50,chartY+chartH-30);ctx.lineTo(chartX+chartW-50,chartY+chartH-30);ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle=rgba(P.coral,0.5);
  ctx.font='300 14px Lato';
  ctx.textAlign='left';ctx.textBaseline='top';
  ctx.fillText('Portfolio depletion zone',chartX+60,chartY+chartH-26);

  // End dot
  ctx.beginPath();ctx.arc(pts[pts.length-1][0],pts[pts.length-1][1],8,0,Math.PI*2);
  ctx.fillStyle=P.sagePale;ctx.fill();

  // 97% hero
  ctx.fillStyle=P.sagePale;
  ctx.font='700 120px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('97%',W/2,710);

  ctx.fillStyle=rgba(P.cream,0.6);
  ctx.font='300 24px Lato';
  ctx.textBaseline='top';
  ctx.fillText('portfolio survival rate over 30 years',W/2,840);

  // Info cards row
  const infos=[
    {label:'Scenarios tested',val:'100+'},
    {label:'Time horizon',val:'30 yr'},
    {label:'Risk mitigated',val:'3%'},
  ];
  const iW=260,iH=100,iY=910,iGap=20;
  const iTotalW=infos.length*iW+(infos.length-1)*iGap;
  let ix=(W-iTotalW)/2;
  infos.forEach(info=>{
    rrect(ix,iY,iW,iH,10);
    ctx.fillStyle=rgba(P.sagePale,0.1);ctx.fill();
    ctx.strokeStyle=rgba(P.sagePale,0.25);ctx.lineWidth=1.5;ctx.stroke();
    ctx.fillStyle=P.sagePale;
    ctx.font='700 13px Lato';ctx.letterSpacing='0.12em';
    ctx.textAlign='center';ctx.textBaseline='top';
    ctx.fillText(info.label.toUpperCase(),ix+iW/2,iY+14);ctx.letterSpacing='0em';
    ctx.fillStyle=P.cream;
    ctx.font='700 36px "Cormorant Garamond"';
    ctx.textBaseline='top';
    ctx.fillText(info.val,ix+iW/2,iY+40);
    ix+=iW+iGap;
  });

  // Body
  ctx.fillStyle=rgba(P.cream,0.7);
  ctx.font='300 25px Lato';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('Dynamic withdrawal adjusts if markets dip.',W/2,1060);
  ctx.fillText('Your plan bends. It doesn\'t break.',W/2,1096);

  // SPECIAL: Cornflower CTA pill
  const ctaW=380,ctaH=78,ctaX=(W-ctaW)/2,ctaY=1230;
  rrect(ctaX,ctaY,ctaW,ctaH,39);
  ctx.fillStyle=P.cornflower;ctx.fill();
  ctx.fillStyle=P.white;ctx.font='700 27px Lato';ctx.letterSpacing='0.06em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Test Your Plan →',W/2,ctaY+ctaH/2);
  ctx.letterSpacing='0em';

  // URL
  ctx.fillStyle=rgba(P.cream,0.35);
  ctx.font='700 14px Lato';ctx.letterSpacing='0.10em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('TIMEANDMONEYTREE.COM',W/2,1352);
  ctx.letterSpacing='0em';

  drawFooter();
}
function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='flamingo-fire-08-question-hook-fear-confidence-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
