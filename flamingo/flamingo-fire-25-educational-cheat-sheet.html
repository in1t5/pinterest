<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Retirement Planning Cheat Sheet — 5 Numbers You Need to Know · Flamingo FIRE Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;width:420px;height:630px;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 25 · Educational — Cheat Sheet · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxWidth&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);return y;
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
  ctx.letterSpacing='0em';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Cream background
  ctx.fillStyle=P.cream;
  ctx.fillRect(0,0,W,1395);

  // Top header area
  ctx.fillStyle=P.nearBlk;
  ctx.font='700 13px Lato';ctx.letterSpacing='0.20em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('FLAMINGO FIRE CALCULATOR',W/2,44);
  ctx.letterSpacing='0em';

  ctx.fillStyle=P.nearBlk;
  ctx.font='700 52px Lato';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('5 RETIREMENT NUMBERS',W/2,80);
  ctx.fillText('YOU MUST KNOW',W/2,140);

  ctx.fillStyle=P.sage;
  ctx.font='italic 300 28px "Cormorant Garamond"';
  ctx.textBaseline='top';
  ctx.fillText('your planning cheat sheet',W/2,205);

  // Color ramp rows
  const rows=[
    {bg:'#47584F',numBg:P.cream,numColor:P.green,textColor:P.cream,num:'01',label:'Retirement Age Target',sub:'when you want to stop working'},
    {bg:'#5A6E63',numBg:P.cream,numColor:'#5A6E63',textColor:P.cream,num:'02',label:'Annual Expenses in Retirement',sub:'your real spending, today\'s dollars'},
    {bg:P.sage,numBg:P.green,numColor:P.cream,textColor:P.nearBlk,num:'03',label:'Portfolio Survival Rate',sub:'how long your money lasts'},
    {bg:'#A8C19E',numBg:P.green,numColor:P.cream,textColor:P.nearBlk,num:'04',label:'Safe Withdrawal Rate',sub:'percentage you take each year'},
    {bg:P.sagePale,numBg:P.green,numColor:P.cream,textColor:P.nearBlk,num:'05',label:'Break-Even Return Rate',sub:'minimum return to sustain plan'},
  ];

  const rowX=80,rowW=840,rowH=170,rowGap=0;
  let ry=240;
  rows.forEach((row,i)=>{
    // Row background
    rrect(rowX,ry,rowW,rowH,i===0?16:0);
    if(i===0){ctx.fill();}
    ctx.fillStyle=row.bg;
    if(i===0){
      rrect(rowX,ry,rowW,rowH,16);ctx.fill();
    } else if(i===rows.length-1){
      rrect(rowX,ry,rowW,rowH,16);ctx.fill();
    } else {
      ctx.fillRect(rowX,ry,rowW,rowH);
    }

    // Number chip pill
    const chipW=72,chipH=46,chipX=rowX+28,chipY=ry+(rowH-chipH)/2;
    rrect(chipX,chipY,chipW,chipH,23);
    ctx.fillStyle=row.numBg;ctx.fill();
    ctx.fillStyle=row.numColor;
    ctx.font='700 28px Lato';ctx.letterSpacing='0em';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(row.num,chipX+chipW/2,chipY+chipH/2);

    // Label and sub
    const textX=chipX+chipW+28;
    ctx.fillStyle=row.textColor;
    ctx.font='700 29px Lato';ctx.letterSpacing='0em';
    ctx.textAlign='left';ctx.textBaseline='top';
    ctx.fillText(row.label,textX,ry+38);

    ctx.fillStyle=i<2?rgba(P.cream,0.72):rgba(P.nearBlk,0.6);
    ctx.font='300 22px Lato';
    ctx.textBaseline='top';
    ctx.fillText(row.sub,textX,ry+78);

    ry+=rowH+rowGap;
  });

  // Fix last row — last row ends at ry after loop, add separator line
  // Horizontal separator between rows (subtle)

  // CTA button
  const ctaW=400,ctaH=76,ctaX=(W-ctaW)/2,ctaY=1180;
  rrect(ctaX,ctaY,ctaW,ctaH,38);
  ctx.fillStyle=P.green;ctx.fill();
  ctx.fillStyle=P.cream;ctx.font='700 27px Lato';ctx.letterSpacing='0.06em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Calculate All 5  →',W/2,ctaY+ctaH/2);
  ctx.letterSpacing='0em';

  // URL
  ctx.fillStyle=rgba(P.green,0.45);
  ctx.font='300 18px Lato';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('timeandmoneytree.com',W/2,1300);

  drawFooter();
}
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='flamingo-fire-25-educational-cheat-sheet-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
