<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Your Timeline. Your Choice. · Barista FIRE Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 12 · Before After Timeline · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxWidth&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);return y;
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../../../studio/assets/logo_brownish_framed_no_text_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Cream background
  ctx.fillStyle=P.cream;ctx.fillRect(0,0,W,H);

  // Top headline area
  ctx.fillStyle=P.white;ctx.fillRect(0,0,W,174);
  ctx.strokeStyle=rgba(P.sage,0.25);ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(0,170);ctx.lineTo(W,170);ctx.stroke();

  ctx.fillStyle=P.nearBlk;ctx.font='300 68px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('Your Timeline.',W/2,20);
  ctx.fillStyle=P.green;ctx.font='italic 300 68px "Cormorant Garamond"';
  ctx.fillText('Your Choice.',W/2,94);
  ctx.textAlign='left';

  // Section label
  ctx.fillStyle=P.warmGray;ctx.font='700 13px Lato';ctx.letterSpacing='0.14em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('TWO PATHS FROM AGE 30',W/2,192);
  ctx.textAlign='left';

  // Timeline area
  const tlLeft=80,tlRight=W-80,tlW=tlRight-tlLeft;
  const ageStart=30,ageEnd=70;
  const ageRange=ageEnd-ageStart;

  function ageX(age){return tlLeft+(age-ageStart)/ageRange*tlW;}

  // ---- PATH A: Traditional (warmGray) ----
  const pathAY=350,pathAH=80;
  const pathALabel='Traditional: Full-time to 67';

  ctx.fillStyle=P.warmGray;
  ctx.fillRect(ageX(30),pathAY,ageX(67)-ageX(30),pathAH);

  // "WORK" hatching via lighter overlay
  ctx.fillStyle=rgba(P.nearBlk,0.08);
  for(let x=ageX(30);x<ageX(67);x+=18){
    ctx.fillRect(x,pathAY,9,pathAH);
  }

  // 67 end cap
  ctx.fillStyle=rgba(P.nearBlk,0.25);ctx.fillRect(ageX(67)-3,pathAY,3,pathAH);

  ctx.fillStyle=P.white;ctx.font='700 22px Lato';ctx.letterSpacing='0em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Full-time work  →  67',ageX(30)+(ageX(67)-ageX(30))/2,pathAY+pathAH/2);
  ctx.textAlign='left';

  // Year labels on path A
  [30,40,50,60,67].forEach(age=>{
    const x=ageX(age);
    ctx.strokeStyle=rgba(P.cream,0.4);ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(x,pathAY+pathAH);ctx.lineTo(x,pathAY+pathAH+14);ctx.stroke();
    ctx.fillStyle=rgba(P.nearBlk,0.5);ctx.font='700 18px Lato';ctx.letterSpacing='0em';
    ctx.textAlign='center';ctx.textBaseline='top';
    ctx.fillText(age,x,pathAY+pathAH+18);
  });
  ctx.textAlign='left';

  // Path A row label
  ctx.fillStyle=rgba(P.nearBlk,0.5);ctx.font='italic 300 26px "Cormorant Garamond"';
  ctx.textAlign='left';ctx.textBaseline='middle';
  ctx.fillText('Path A',tlLeft,pathAY-28);

  // Retirement marker A
  const retX=ageX(67);
  ctx.fillStyle=rgba(P.warmGray,0.18);
  rrect(retX+8,pathAY,120,pathAH,6);ctx.fill();
  ctx.fillStyle=P.warmGray;ctx.font='300 19px Lato';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('retire',retX+68,pathAY+pathAH/2);
  ctx.textAlign='left';

  // VS divider
  ctx.fillStyle=P.green;ctx.font='700 30px Lato';ctx.letterSpacing='0.1em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('VS',W/2,578);
  // decorative lines
  ctx.strokeStyle=rgba(P.sage,0.3);ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(80,578);ctx.lineTo(430,578);ctx.stroke();
  ctx.beginPath();ctx.moveTo(570,578);ctx.lineTo(920,578);ctx.stroke();
  ctx.textAlign='left';

  // ---- PATH B: Barista FIRE (three phases) ----
  const pathBY=755,pathBH=80;

  // Phase 1: Accumulate (30–38) forest green
  const p1W=ageX(38)-ageX(30);
  ctx.fillStyle=P.green;ctx.fillRect(ageX(30),pathBY,p1W,pathBH);

  // Phase 2: Bridge (38–47) sage
  const p2W=ageX(47)-ageX(38);
  ctx.fillStyle=P.sage;ctx.fillRect(ageX(38),pathBY,p2W,pathBH);

  // Phase 3: Free (47+) pale sage
  const p3W=ageX(67)-ageX(47);
  ctx.fillStyle=P.sagePale;ctx.fillRect(ageX(47),pathBY,p3W,pathBH);

  // Phase labels inside bars
  ctx.font='700 17px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';
  ctx.textAlign='center';
  ctx.fillStyle=P.cream;ctx.fillText('FULL-TIME',ageX(30)+p1W/2,pathBY+pathBH/2);
  ctx.fillStyle=P.white;ctx.fillText('PART-TIME',ageX(38)+p2W/2,pathBY+pathBH/2);
  ctx.fillStyle=P.greenDk;ctx.fillText('FREE',ageX(47)+p3W/2,pathBY+pathBH/2);
  ctx.textAlign='left';

  // Age tick labels on Path B
  [30,38,47,67].forEach(age=>{
    const x=ageX(age);
    ctx.strokeStyle=age===38||age===47?P.greenDk:rgba(P.sage,0.4);
    ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(x,pathBY+pathBH);ctx.lineTo(x,pathBY+pathBH+14);ctx.stroke();
    const bold=age===38||age===47;
    ctx.fillStyle=bold?P.green:rgba(P.nearBlk,0.5);
    ctx.font=(bold?'700':'400')+' 18px Lato';ctx.letterSpacing='0em';
    ctx.textAlign='center';ctx.textBaseline='top';
    ctx.fillText(age,x,pathBY+pathBH+18);
  });
  ctx.textAlign='left';

  // Path B row label — topmost, above all annotations
  ctx.fillStyle=P.green;ctx.font='italic 300 26px "Cormorant Garamond"';
  ctx.textAlign='left';ctx.textBaseline='middle';
  ctx.fillText('Path B  —  Barista FIRE',tlLeft,pathBY-100);

  // Phase annotation arrows (close to bar, below Path B label)
  const annots=[
    {x:ageX(38)+p2W/2,txt:'Barista FI\nAge 38'},
    {x:ageX(47)+p3W/2,txt:'Full FIRE\nAge 47'},
  ];
  annots.forEach(a=>{
    ctx.strokeStyle=rgba(P.sage,0.5);ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(a.x,pathBY-10);ctx.lineTo(a.x,pathBY-44);ctx.stroke();
    ctx.fillStyle=P.green;ctx.font='700 17px Lato';ctx.letterSpacing='0em';
    ctx.textAlign='center';ctx.textBaseline='bottom';
    const lines=a.txt.split('\n');
    ctx.fillText(lines[0],a.x,pathBY-46);
    ctx.fillStyle=P.warmGray;ctx.font='300 16px Lato';
    ctx.fillText(lines[1],a.x,pathBY-26);
  });
  ctx.textAlign='left';

  // Savings strip
  const savY=pathBY+pathBH+105,savH=80;
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,savY,W,savH);
  ctx.fillStyle=P.cream;ctx.font='300 38px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('20 extra years of reduced work.',W/2,savY+savH/2-1);
  ctx.textAlign='left';

  // Sub text
  ctx.fillStyle=P.green;ctx.font='italic 300 30px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('"Priceless."',W/2,savY+savH+18);
  ctx.textAlign='left';

  // Key insight card
  const insY=1120,insH=195;
  ctx.fillStyle=rgba(P.sageFaint,0.6);
  rrect(80,insY,W-160,insH,12);ctx.fill();
  ctx.strokeStyle=rgba(P.sage,0.3);ctx.lineWidth=1.5;rrect(80,insY,W-160,insH,12);ctx.stroke();
  // left accent bar
  ctx.fillStyle=P.green;ctx.fillRect(80,insY,6,insH);
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(80,insY,6,insH,[12,0,0,12]);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.nearBlk;ctx.font='700 23px Lato';ctx.letterSpacing='0em';
  ctx.textAlign='left';ctx.textBaseline='top';
  ctx.fillText('Why it matters',110,insY+30);
  ctx.fillStyle=P.warmGray;ctx.font='300 23px Lato';
  wrapText('Same start. Same finish. But Barista FIRE gives you 9 extra years of freedom before traditional retirement even begins.',110,insY+72,W-220,38);


  drawFooter();
}
function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='barista-fire-12-before-after-timeline-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
