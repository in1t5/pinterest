<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Barista FIRE: 3 Phases · Barista FIRE Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 14 · Step Ladder 3-Phase · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxWidth&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);return y;
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../../../studio/assets/logo_brownish_framed_no_text_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Cream background
  ctx.fillStyle=P.cream;ctx.fillRect(0,0,W,H);

  // Headline band (cream)
  ctx.fillStyle=P.white;ctx.fillRect(0,0,W,148);
  ctx.strokeStyle=rgba(P.sage,0.25);ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(0,148);ctx.lineTo(W,148);ctx.stroke();
  ctx.fillStyle=P.nearBlk;ctx.font='300 70px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Barista FIRE: 3 Phases',W/2,74);
  ctx.textAlign='left';

  // Phase definitions
  const phases=[
    {
      bg:P.green,
      numColor:rgba(P.sagePale,0.18),
      label:'ACCUMULATE',
      sub:'Work full-time, build to Barista FI',
      body:'Save aggressively. Every dollar accelerates Phase 2. Full-time work is the engine — not the destination.',
      textColor:P.cream,
      subColor:P.sagePale,
      bodyColor:rgba(P.cream,0.75),
    },
    {
      bg:P.sage,
      numColor:rgba(P.white,0.15),
      label:'BRIDGE',
      sub:'Work part-time, portfolio grows to Full FIRE',
      body:'Full-time work ends. Part-time income covers the gap. Compound growth silently closes the distance to Full FIRE.',
      textColor:P.white,
      subColor:P.cream,
      bodyColor:rgba(P.white,0.80),
    },
    {
      bg:P.sagePale,
      numColor:rgba(P.green,0.12),
      label:'FREE',
      sub:'Full FIRE achieved, work optional',
      body:'Portfolio reaches 25× annual expenses. Every day is yours. Work — or don\'t. This is the finish line.',
      textColor:P.greenDk,
      subColor:P.green,
      bodyColor:rgba(P.greenDk,0.70),
    },
  ];

  const phaseBandH=372;
  phases.forEach((ph,i)=>{
    const bandY=148+i*phaseBandH;
    ctx.fillStyle=ph.bg;ctx.fillRect(0,bandY,W,phaseBandH);

    // Large phase number watermark Cormorant
    ctx.fillStyle=ph.numColor;
    ctx.font='300 260px "Cormorant Garamond"';
    ctx.textBaseline='top';ctx.textAlign='right';
    ctx.fillText(String(i+1),W-30,bandY-30);
    ctx.textAlign='left';

    // Phase label
    ctx.fillStyle=ph.textColor;ctx.font='700 15px Lato';ctx.letterSpacing='0.20em';
    ctx.textBaseline='top';
    ctx.fillText('PHASE '+String(i+1).padStart(2,'0'),80,bandY+48);

    ctx.font='300 56px "Cormorant Garamond"';ctx.letterSpacing='0em';
    ctx.fillText(ph.label,80,bandY+76);

    ctx.fillStyle=ph.subColor;ctx.font='italic 300 28px "Cormorant Garamond"';
    ctx.fillText(ph.sub,80,bandY+148);

    ctx.fillStyle=ph.bodyColor;ctx.font='300 22px Lato';
    wrapText(ph.body,80,bandY+200,W-240,34);

    // Divider bottom (not last)
    if(i<phases.length-1){
      ctx.strokeStyle=rgba(P.cream,0.2);ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(0,bandY+phaseBandH);ctx.lineTo(W,bandY+phaseBandH);ctx.stroke();
      // Arrow
      ctx.fillStyle=rgba(P.cream,0.5);ctx.font='700 30px Lato';
      ctx.textAlign='center';ctx.textBaseline='bottom';
      ctx.fillText('↓',W/2,bandY+phaseBandH-8);
      ctx.textAlign='left';
    }
  });

  // CTA
  const ctaW=440,ctaH=62,ctaX=(W-ctaW)/2,ctaY=1268+30;
  ctx.save();
  ctx.shadowColor='rgba(71,88,79,0.4)';ctx.shadowBlur=24;ctx.shadowOffsetY=10;
  rrect(ctaX,ctaY,ctaW,ctaH,31);ctx.fillStyle=P.green;ctx.fill();
  ctx.restore();
  ctx.fillStyle=P.cream;ctx.font='700 22px Lato';ctx.letterSpacing='0.10em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('FIND YOUR PHASE 2 DATE →',W/2,ctaY+ctaH/2);
  ctx.textAlign='left';

  drawFooter();
}
function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='barista-fire-14-step-ladder-3-phase-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
