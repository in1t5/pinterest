<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>4 Levers That Accelerate Barista FIRE · Barista FIRE Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 16 · Step Ladder Advanced · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxWidth&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);return y;
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../../../studio/assets/logo_brownish_framed_no_text_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Near-black background
  ctx.fillStyle=P.nearBlk;ctx.fillRect(0,0,W,H);

  // Header
  ctx.fillStyle=P.sagePale;ctx.font='700 14px Lato';ctx.letterSpacing='0.18em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('ADVANCED OPTIMISATION',W/2,38);
  ctx.fillStyle=P.cream;ctx.font='300 66px "Cormorant Garamond"';ctx.letterSpacing='0em';
  ctx.fillText('4 Levers That Move',W/2,70);
  ctx.fillStyle=P.sage;ctx.font='italic 300 66px "Cormorant Garamond"';
  ctx.fillText('Your Barista FI Date',W/2,142);
  ctx.textAlign='left';

  // Separator
  ctx.strokeStyle=rgba(P.sage,0.25);ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(80,228);ctx.lineTo(W-80,228);ctx.stroke();

  // Cards
  const layers=[
    {num:'01',title:'Savings rate',body:'Every 5% increase = approximately 2 years earlier Barista FI. The single most powerful lever you control.',badge:'HIGH IMPACT'},
    {num:'02',title:'Part-time income level',body:'Higher Phase 2 income shrinks the portfolio target. More income = smaller Barista FI number.',badge:'HIGH IMPACT'},
    {num:'03',title:'Investment return rate',body:'Even 0.5% more annual return = years of difference over a 10–20 year horizon. Asset allocation matters.',badge:'MEDIUM IMPACT'},
    {num:'04',title:'Current portfolio',body:'Already ahead of schedule? Your Barista FI date may be closer than you think. Model it now.',badge:'CHECK NOW'},
  ];

  let cy=320;
  const cardH=216;
  layers.forEach((layer,i)=>{
    const cardX=60,cardW=W-120;

    // Card bg
    ctx.save();
    ctx.shadowColor='rgba(0,0,0,0.35)';ctx.shadowBlur=20;ctx.shadowOffsetY=8;
    rrect(cardX,cy,cardW,cardH,14);ctx.fillStyle=rgba(P.cream,0.05);ctx.fill();
    ctx.restore();
    ctx.strokeStyle=rgba(P.sagePale,0.18);ctx.lineWidth=1.5;
    rrect(cardX,cy,cardW,cardH,14);ctx.stroke();

    // Large number watermark Cormorant pale sage
    ctx.fillStyle=rgba(P.sagePale,0.12);
    ctx.font='300 130px "Cormorant Garamond"';
    ctx.textBaseline='bottom';ctx.textAlign='right';
    ctx.fillText(layer.num,cardX+cardW-20,cy+cardH-16);
    ctx.textAlign='left';

    // Badge pill
    ctx.font='700 13px Lato';ctx.letterSpacing='0.08em';
    const bw=ctx.measureText(layer.badge).width+32;
    rrect(cardX+cardW-bw-20,cy+16,bw,30,15);ctx.fillStyle=rgba(P.sage,0.25);ctx.fill();
    ctx.strokeStyle=rgba(P.sagePale,0.35);ctx.lineWidth=1;rrect(cardX+cardW-bw-20,cy+16,bw,30,15);ctx.stroke();
    ctx.fillStyle=P.sagePale;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(layer.badge,cardX+cardW-bw/2-20,cy+31);
    ctx.textAlign='left';

    // Layer number label
    ctx.fillStyle=P.sagePale;ctx.font='700 13px Lato';ctx.letterSpacing='0.14em';
    ctx.textBaseline='top';
    ctx.fillText('LAYER '+layer.num,cardX+22,cy+22);

    // Title
    ctx.fillStyle=P.cream;ctx.font='700 28px Lato';ctx.letterSpacing='0em';
    ctx.fillText(layer.title,cardX+22,cy+56);

    // Body
    ctx.fillStyle=rgba(P.cream,0.65);ctx.font='300 21px Lato';
    wrapText(layer.body,cardX+22,cy+98,cardW-50,30);

    cy+=cardH+16;
  });

  // CTA pill
  const ctaW=440,ctaH=58,ctaX=(W-ctaW)/2,ctaY=cy+14;
  ctx.save();
  ctx.shadowColor='rgba(132,161,124,0.4)';ctx.shadowBlur=28;ctx.shadowOffsetY=10;
  rrect(ctaX,ctaY,ctaW,ctaH,29);ctx.fillStyle=P.sage;ctx.fill();
  ctx.restore();
  ctx.fillStyle=P.nearBlk;ctx.font='700 21px Lato';ctx.letterSpacing='0.10em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('MODEL ALL 4 VARIABLES →',W/2,ctaY+ctaH/2);
  ctx.textAlign='left';

  drawFooter();
}
function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='barista-fire-16-step-ladder-advanced-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
