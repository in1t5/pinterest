<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Two Milestones. Your Phone. · Barista FIRE Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 22 · Mockup Phone · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxWidth&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);return y;
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../../studio/assets/logo_brownish_framed_no_text_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Cream background
  ctx.fillStyle=P.cream;ctx.fillRect(0,0,W,H);

  // Headlines
  ctx.fillStyle=P.nearBlk;ctx.font='300 68px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('Two Milestones.',W/2,32);
  ctx.fillStyle=P.green;ctx.font='italic 300 68px "Cormorant Garamond"';
  ctx.fillText('Your Phone.',W/2,104);
  ctx.fillStyle=P.warmGray;ctx.font='300 22px Lato';ctx.letterSpacing='0em';
  ctx.fillText('No account. No downloads. 100% free.',W/2,190);
  ctx.textAlign='left';

  // Phone frame
  const phW=360,phH=740,phX=(W-phW)/2,phY=242;
  const phR=36;

  // Phone shadow
  ctx.save();ctx.shadowColor='rgba(0,0,0,0.22)';ctx.shadowBlur=50;ctx.shadowOffsetY=20;
  rrect(phX,phY,phW,phH,phR);ctx.fillStyle=P.green;ctx.fill();
  ctx.restore();
  ctx.strokeStyle=rgba(P.greenDk,0.8);ctx.lineWidth=3;rrect(phX,phY,phW,phH,phR);ctx.stroke();

  // Speaker notch
  rrect(phX+phW/2-50,phY+16,100,8,4);ctx.fillStyle=rgba(P.cream,0.15);ctx.fill();

  // Home button indicator
  ctx.beginPath();ctx.arc(phX+phW/2,phY+phH-20,10,0,Math.PI*2);
  ctx.fillStyle=rgba(P.cream,0.25);ctx.fill();

  // Screen
  const scX=phX+14,scY=phY+42,scW=phW-28,scH=phH-80;
  rrect(scX,scY,scW,scH,20);ctx.fillStyle=P.cream;ctx.fill();

  // Screen content
  const padX=scX+18;

  // App header
  ctx.fillStyle=P.green;ctx.fillRect(scX,scY,scW,48);
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(scX,scY,scW,48,[20,20,0,0]);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.cream;ctx.font='700 14px Lato';ctx.letterSpacing='0.08em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('BARISTA FIRE CALC',scX+scW/2,scY+24);
  ctx.textAlign='left';

  let cy=scY+62;

  // Milestone 1
  rrect(padX,cy,scW-36,64,8);ctx.fillStyle=rgba(P.sage,0.12);ctx.fill();
  ctx.strokeStyle=rgba(P.sage,0.35);ctx.lineWidth=1.5;rrect(padX,cy,scW-36,64,8);ctx.stroke();
  ctx.fillStyle=P.sage;ctx.font='700 14px Lato';ctx.letterSpacing='0em';
  ctx.textBaseline='top';ctx.fillText('BARISTA FI',padX+12,cy+10);
  ctx.fillStyle=P.nearBlk;ctx.font='700 28px Lato';
  ctx.fillText('Age 38',padX+12,cy+30);
  ctx.fillStyle=P.warmGray;ctx.font='300 14px Lato';
  ctx.textAlign='right';ctx.textBaseline='middle';
  ctx.fillText('8 years',padX+scW-60,cy+32);
  ctx.textAlign='left';
  cy+=74;

  // Milestone 2
  rrect(padX,cy,scW-36,64,8);ctx.fillStyle=rgba(P.green,0.08);ctx.fill();
  ctx.strokeStyle=rgba(P.green,0.3);ctx.lineWidth=1.5;rrect(padX,cy,scW-36,64,8);ctx.stroke();
  ctx.fillStyle=P.green;ctx.font='700 14px Lato';ctx.letterSpacing='0em';
  ctx.textBaseline='top';ctx.fillText('FULL FIRE',padX+12,cy+10);
  ctx.fillStyle=P.nearBlk;ctx.font='700 28px Lato';
  ctx.fillText('Age 47',padX+12,cy+30);
  ctx.fillStyle=P.warmGray;ctx.font='300 14px Lato';
  ctx.textAlign='right';ctx.textBaseline='middle';
  ctx.fillText('17 years',padX+scW-60,cy+32);
  ctx.textAlign='left';
  cy+=74;

  // Two-phase bar
  ctx.fillStyle=rgba(P.nearBlk,0.45);ctx.font='700 11px Lato';ctx.letterSpacing='0.08em';
  ctx.textBaseline='top';
  ctx.fillText('TIMELINE',padX,cy);
  cy+=18;
  const barW=scW-36,barH=20;
  const p1=0.38;
  rrect(padX,cy,barW,barH,10);ctx.fillStyle=rgba(P.warmGray,0.15);ctx.fill();
  rrect(padX,cy,barW*p1,barH,10);ctx.fillStyle=P.sage;ctx.fill();
  rrect(padX+barW*p1,cy,barW*(1-p1),barH,10);ctx.fillStyle=P.green;ctx.fill();
  cy+=barH+8;

  // Bar labels
  ctx.fillStyle=P.sage;ctx.font='700 12px Lato';ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('BARISTA',padX+barW*p1/2,cy);
  ctx.fillStyle=P.cream;
  ctx.fillText('FULL FIRE',padX+barW*p1+barW*(1-p1)/2,cy);
  ctx.textAlign='left';
  cy+=22;

  // Timeline labels
  ctx.fillStyle=rgba(P.nearBlk,0.5);ctx.font='300 12px Lato';ctx.textBaseline='top';
  ctx.fillText('Age 30',padX,cy);
  ctx.textAlign='center';ctx.fillText('38',padX+barW*p1,cy);
  ctx.textAlign='right';ctx.fillText('47+',padX+barW,cy);
  ctx.textAlign='left';
  cy+=24;

  // Pinyon script tagline
  ctx.fillStyle=rgba(P.green,0.6);ctx.font='300 22px "Pinyon Script"';ctx.letterSpacing='0em';
  ctx.textBaseline='top';
  ctx.fillText('work less, live more',padX+10,cy+4);

  // CTA section below phone
  const ctaW=300,ctaH=62,ctaX=(W-ctaW)/2,ctaY=phY+phH+36;
  ctx.save();
  ctx.shadowColor='rgba(71,88,79,0.35)';ctx.shadowBlur=22;ctx.shadowOffsetY=8;
  rrect(ctaX,ctaY,ctaW,ctaH,31);ctx.fillStyle=P.green;ctx.fill();
  ctx.restore();
  ctx.fillStyle=P.cream;ctx.font='700 23px Lato';ctx.letterSpacing='0.10em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('OPEN FREE →',W/2,ctaY+ctaH/2);
  ctx.textAlign='left';

  // Sub note
  ctx.fillStyle=P.warmGray;ctx.font='300 20px Lato';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('Works on any device · No download needed',W/2,ctaY+ctaH+18);
  ctx.textAlign='left';

  drawFooter();
}
function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='barista-fire-22-mockup-phone-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
