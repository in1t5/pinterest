<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Barista FIRE Dark Mode · Barista FIRE Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 24 · Mockup Dark Mode · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxWidth&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);return y;
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../../../studio/assets/logo_brownish_framed_no_text_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Near-black background
  ctx.fillStyle=P.nearBlk;ctx.fillRect(0,0,W,H);

  // Star field texture
  ctx.fillStyle=rgba(P.sagePale,0.04);
  for(let i=0;i<80;i++){
    const sx=Math.sin(i*73.1)*W/2+W/2;
    const sy=Math.cos(i*43.7)*H/2+H/2;
    ctx.beginPath();ctx.arc(sx,sy,Math.abs(Math.sin(i))*1.5+0.5,0,Math.PI*2);ctx.fill();
  }

  // Headline - Pinyon Script pale sage
  ctx.fillStyle=P.sagePale;ctx.font='300 92px "Pinyon Script"';ctx.letterSpacing='0em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('work less. live more.',W/2,36);

  ctx.fillStyle=P.cream;ctx.font='300 60px "Cormorant Garamond"';
  ctx.fillText('Barista FIRE',W/2,148);
  ctx.fillStyle=P.sage;ctx.font='700 16px Lato';ctx.letterSpacing='0.22em';
  ctx.fillText('DARK MODE CALCULATOR',W/2,222);
  ctx.textAlign='left';

  // Dark browser mockup
  const bwX=50,bwY=268,bwW=W-100,bwH=830;
  ctx.save();ctx.shadowColor=rgba(P.sage,0.15);ctx.shadowBlur=60;ctx.shadowOffsetY=0;
  rrect(bwX,bwY,bwW,bwH,18);ctx.fillStyle='#0f1a15';ctx.fill();
  ctx.restore();
  ctx.strokeStyle=rgba(P.sage,0.25);ctx.lineWidth=1.5;rrect(bwX,bwY,bwW,bwH,18);ctx.stroke();

  // Chrome bar
  const chromeH=48;
  ctx.fillStyle='#162018';
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(bwX,bwY,bwW,chromeH,[18,18,0,0]);ctx.fill();}
  else{ctx.fillRect(bwX,bwY,bwW,chromeH);}
  // Traffic lights
  [P.coral,'#F5A623',P.sagePale].forEach((c,i)=>{
    ctx.beginPath();ctx.arc(bwX+20+i*20,bwY+24,6,0,Math.PI*2);ctx.fillStyle=rgba(c,0.6);ctx.fill();
  });
  ctx.fillStyle=rgba(P.sage,0.5);ctx.font='300 14px Lato';ctx.letterSpacing='0em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('timeandmoneytree.com',bwX+bwW/2,bwY+24);
  ctx.textAlign='left';

  // Screen content (dark)
  const scY=bwY+chromeH;

  // App header in dark
  ctx.fillStyle='#162018';ctx.fillRect(bwX,scY,bwW,60);
  ctx.fillStyle=P.sagePale;ctx.font='700 14px Lato';ctx.letterSpacing='0.12em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('BARISTA FIRE CALCULATOR',bwX+bwW/2,scY+30);
  ctx.textAlign='left';

  // Two phase chart area - with glow
  const chartY=scY+70,chartH=200;
  ctx.fillStyle='#0f1a15';ctx.fillRect(bwX,chartY,bwW,chartH);

  // Chart bars
  const barsY=chartY+30,barsH=120;
  const barData=[
    {label:'Phase 1\nAccumulate',portions:0.38,color:P.sage,glowColor:rgba(P.sage,0.3)},
    {label:'Phase 2\nBridge',portions:0.35,color:rgba(P.sage,0.5),glowColor:rgba(P.sage,0.15)},
    {label:'Phase 3\nFull FIRE',portions:0.27,color:P.green,glowColor:rgba(P.green,0.3)},
  ];

  const barAreaW=bwW-80,barX=bwX+40;
  let bx=barX;
  barData.forEach(bar=>{
    const bw=barAreaW*bar.portions-8;
    // glow
    ctx.save();ctx.shadowColor=bar.glowColor;ctx.shadowBlur=20;
    rrect(bx,barsY,bw,barsH,8);ctx.fillStyle=bar.color;ctx.fill();
    ctx.restore();
    // label
    const lines=bar.label.split('\n');
    ctx.fillStyle=P.cream;ctx.font='700 14px Lato';ctx.letterSpacing='0em';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(lines[0],bx+bw/2,barsY+barsH/2-10);
    ctx.fillStyle=rgba(P.cream,0.65);ctx.font='300 13px Lato';
    ctx.fillText(lines[1],bx+bw/2,barsY+barsH/2+12);
    bx+=bw+8;
  });
  ctx.textAlign='left';

  // Timeline labels
  ctx.fillStyle=rgba(P.sagePale,0.5);ctx.font='300 14px Lato';
  ctx.textAlign='left';ctx.textBaseline='top';
  ctx.fillText('Age 30',barX,barsY+barsH+10);
  ctx.textAlign='center';
  ctx.fillText('38',barX+barAreaW*0.38,barsY+barsH+10);
  ctx.fillText('47',barX+barAreaW*0.73,barsY+barsH+10);
  ctx.textAlign='right';
  ctx.fillText('65+',barX+barAreaW,barsY+barsH+10);
  ctx.textAlign='left';

  // Metric cards
  const metrics=[
    {label:'BARISTA FI DATE',value:'Age 38',sub:'8 years · Sage glow'},
    {label:'FULL FIRE DATE',value:'Age 47',sub:'17 years · Green glow'},
    {label:'PORTFOLIO TARGET',value:'$540k → $1.1M',sub:'Two-phase journey'},
  ];
  let my=chartY+chartH+14;
  metrics.forEach((m,i)=>{
    const mH=108;
    rrect(bwX+20,my,bwW-40,mH,10);ctx.fillStyle='#162018';ctx.fill();
    ctx.strokeStyle=rgba(P.sage,0.15);ctx.lineWidth=1;rrect(bwX+20,my,bwW-40,mH,10);ctx.stroke();
    ctx.fillStyle=P.sagePale;ctx.font='700 12px Lato';ctx.letterSpacing='0.12em';
    ctx.textBaseline='top';
    ctx.fillText(m.label,bwX+38,my+14);
    ctx.fillStyle=P.cream;ctx.font='700 28px Lato';ctx.letterSpacing='0em';
    ctx.fillText(m.value,bwX+38,my+38);
    ctx.fillStyle=rgba(P.sagePale,0.55);ctx.font='300 16px Lato';
    ctx.fillText(m.sub,bwX+38,my+76);
    my+=mH+8;
  });

  // CTA
  const ctaW=340,ctaH=62,ctaX=(W-ctaW)/2,ctaY=1240;
  ctx.save();
  ctx.shadowColor=rgba(P.sage,0.4);ctx.shadowBlur=30;ctx.shadowOffsetY=10;
  rrect(ctaX,ctaY,ctaW,ctaH,31);ctx.fillStyle=P.sage;ctx.fill();
  ctx.restore();
  ctx.fillStyle=P.nearBlk;ctx.font='700 22px Lato';ctx.letterSpacing='0.10em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('TRY DARK MODE FREE →',W/2,ctaY+ctaH/2);
  ctx.textAlign='left';

  drawFooter();
}
function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='barista-fire-24-mockup-dark-mode-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
