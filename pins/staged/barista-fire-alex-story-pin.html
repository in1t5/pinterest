<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Alex Story Pin · Barista FIRE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">Alex Story Pin (#8) · 1000 × 1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F', greenDk:'#3B4B42', greenDkk:'#2e3c34',
  sage:'#84A17C', sagePale:'#C1D5A5', sageFaint:'#EAEDCE',
  cream:'#F5EEED', nearBlk:'#1A1A18', warmGray:'#6E686A', white:'#FFFFFF',
  appPrimary:'#2e7d32', appText:'#1f2b21', appMuted:'#55635a',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../../studio/assets/logo_brownish_framed_no_text_2501x2500.png';}

function render(){
  ctx.clearRect(0,0,W,H);
  const HERO_H=480,CREAM_Y=480,FOOT_Y=1395;

  // ── Hero ─────────────────────────────────────────────────────────────────
  ctx.fillStyle=P.green;ctx.fillRect(0,0,W,HERO_H+12);
  ctx.save();
  ctx.globalAlpha=0.11;ctx.strokeStyle=P.sagePale;ctx.lineWidth=5;
  ctx.beginPath();ctx.arc(880,200,230,0,Math.PI*2);ctx.stroke();
  ctx.globalAlpha=0.07;ctx.fillStyle=P.sagePale;
  ctx.beginPath();ctx.arc(920,440,100,0,Math.PI*2);ctx.fill();
  ctx.restore();

  ctx.font='700 19px Lato';ctx.letterSpacing='0.10em';
  const bt='FREE CALCULATOR · FIRE & EARLY RETIREMENT';
  const bw=ctx.measureText(bt).width+72,bh=44,bx=76,by=68;
  rrect(bx,by-bh/2,bw,bh,22);ctx.strokeStyle=rgba(P.sagePale,.50);ctx.lineWidth=1.5;ctx.stroke();
  ctx.fillStyle=P.sagePale;
  ctx.beginPath();ctx.arc(bx+23,by,6,0,Math.PI*2);ctx.fill();
  ctx.textBaseline='middle';ctx.fillText(bt,bx+39,by);

  ctx.textBaseline='top';ctx.letterSpacing='-0.01em';
  ctx.fillStyle=P.cream;ctx.font='300 100px "Cormorant Garamond"';
  ctx.fillText('Meet Alex.',76,112);
  ctx.fillStyle=P.sagePale;ctx.font='300 82px "Cormorant Garamond"';
  ctx.fillText('Age 30. $150k saved.',76,230);

  ctx.fillStyle=rgba(P.cream,.74);ctx.font='300 30px Lato';ctx.letterSpacing='0em';
  ctx.fillText('He ran the Barista FIRE calculator.',76,368);
  ctx.fillText('Here’s what changed.',76,408);

  // ── Cream ─────────────────────────────────────────────────────────────────
  ctx.fillStyle=P.cream;ctx.fillRect(0,CREAM_Y,W,FOOT_Y-CREAM_Y);

  // ── Profile card ──────────────────────────────────────────────────────────
  const profY=CREAM_Y+28,profH=212;
  ctx.save();
  ctx.shadowColor='rgba(26,26,24,0.10)';ctx.shadowBlur=18;ctx.shadowOffsetY=5;
  rrect(76,profY,848,profH,14);ctx.fillStyle=P.white;ctx.fill();
  ctx.restore();
  rrect(76,profY,848,profH,14);ctx.strokeStyle='#dde8df';ctx.lineWidth=1;ctx.stroke();

  // Avatar
  const avCx=76+68,avCy=profY+profH/2,avR=60;
  ctx.beginPath();ctx.arc(avCx,avCy,avR,0,Math.PI*2);
  ctx.fillStyle=P.sage;ctx.fill();
  ctx.fillStyle=P.white;ctx.font='700 52px Lato';ctx.letterSpacing='0em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('A',avCx,avCy+4);

  // Name + label below avatar
  ctx.fillStyle=P.appText;ctx.font='700 20px Lato';ctx.letterSpacing='0em';
  ctx.textBaseline='top';ctx.textAlign='center';
  ctx.fillText('Alex',avCx,avCy+avR+10);

  // Profile stats — 2×2 grid
  const gx=76+160,gw=764,gy=profY+24;
  const stats=[
    ['PORTFOLIO','$150,000'],
    ['EXPENSES / YEAR','$36,000'],
    ['PART-TIME INCOME TARGET','$1,500 / mo'],
    ['CURRENT AGE','30 years old'],
  ];
  const colW=gw/2;
  stats.forEach((s,i)=>{
    const col=i%2,row=Math.floor(i/2);
    const sx=gx+col*colW,sy=gy+row*92;
    ctx.fillStyle=P.appMuted;ctx.font='700 13px Lato';ctx.letterSpacing='0.08em';
    ctx.textBaseline='top';ctx.textAlign='left';
    ctx.fillText(s[0],sx,sy);
    ctx.fillStyle=P.appText;ctx.font='300 32px "Cormorant Garamond"';ctx.letterSpacing='0em';
    ctx.fillText(s[1],sx,sy+16);
  });
  ctx.textAlign='left';

  // ── Connector ─────────────────────────────────────────────────────────────
  const conY=profY+profH+20;
  ctx.fillStyle=P.appMuted;ctx.font='400 italic 27px "Cormorant Garamond"';ctx.letterSpacing='0em';
  ctx.textBaseline='top';ctx.textAlign='center';
  ctx.fillText('→  He entered his numbers. The calculator replied:',W/2,conY);
  ctx.textAlign='left';

  // ── Results card ──────────────────────────────────────────────────────────
  const resY=conY+52,resH=310;
  ctx.save();
  ctx.shadowColor='rgba(26,26,24,0.12)';ctx.shadowBlur=20;ctx.shadowOffsetY=6;
  rrect(76,resY,848,resH,14);ctx.fillStyle=P.white;ctx.fill();
  ctx.restore();

  // Green header
  ctx.save();
  rrect(76,resY,848,resH,14);ctx.clip();
  ctx.fillStyle=P.appPrimary;ctx.fillRect(76,resY,848,52);
  ctx.restore();
  ctx.fillStyle=P.white;ctx.font='700 18px Lato';ctx.letterSpacing='0.10em';
  ctx.textBaseline='middle';ctx.textAlign='center';
  ctx.fillText('BARISTA FIRE CALCULATOR RESULT',W/2,resY+26);
  ctx.textAlign='left';

  // 2×2 result cells
  const cells=[
    {l:'BARISTA FIRE',v:'Age 37',big:true,accent:P.sage},
    {l:'YEARS TO FREEDOM',v:'7 years',big:true,accent:P.appPrimary},
    {l:'PORTFOLIO NEEDED',v:'$450,000',big:false,accent:null},
    {l:'FULL FIRE AGE',v:'Age 52',big:false,accent:null},
  ];
  const cellH=100,cellW=424;
  cells.forEach((c,i)=>{
    const col=i%2,row=Math.floor(i/2);
    const cx=76+col*cellW,cy=resY+52+row*cellH;
    // Cell border
    if(col===1){ctx.strokeStyle='#eef3ef';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx,cy+cellH);ctx.stroke();}
    if(row===1){ctx.strokeStyle='#eef3ef';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+cellW,cy);ctx.stroke();}
    ctx.fillStyle=P.appMuted;ctx.font='700 13px Lato';ctx.letterSpacing='0.08em';
    ctx.textBaseline='top';ctx.fillText(c.l,cx+22,cy+18);
    ctx.fillStyle=c.accent?c.accent:P.appText;
    ctx.font=(c.big?'700':'300')+' 42px "Cormorant Garamond"';ctx.letterSpacing='-0.01em';
    ctx.fillText(c.v,cx+22,cy+36);
  });

  // Highlight strip at bottom of results card
  const stripY=resY+52+200;
  ctx.save();
  rrect(76,resY,848,resH,14);ctx.clip();
  ctx.fillStyle=rgba(P.appPrimary,0.07);ctx.fillRect(76,stripY,848,58);
  ctx.restore();
  ctx.strokeStyle='#dde8df';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(76,stripY);ctx.lineTo(924,stripY);ctx.stroke();
  ctx.fillStyle=P.appPrimary;ctx.font='700 19px Lato';ctx.letterSpacing='0.06em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('11 YEARS EARLIER THAN THE FULL FIRE PATH',W/2,stripY+29);
  ctx.textAlign='left';

  // ── Quote card ────────────────────────────────────────────────────────────
  const quoteY=resY+resH+24,quoteH=162;
  ctx.save();
  ctx.shadowColor='rgba(26,26,24,0.08)';ctx.shadowBlur=14;ctx.shadowOffsetY=4;
  rrect(76,quoteY,848,quoteH,14);ctx.fillStyle=P.white;ctx.fill();
  ctx.restore();
  // Sage left border
  ctx.fillStyle=P.sage;ctx.fillRect(76,quoteY+14,4,quoteH-28);
  // Round left corners of border
  ctx.beginPath();ctx.arc(80,quoteY+14,4,Math.PI,Math.PI*1.5);ctx.fill();
  ctx.beginPath();ctx.arc(80,quoteY+quoteH-14,4,Math.PI*0.5,Math.PI);ctx.fill();

  // Decorative quote mark
  ctx.save();ctx.globalAlpha=0.10;
  ctx.fillStyle=P.sage;ctx.font='300 140px "Cormorant Garamond"';
  ctx.textBaseline='top';ctx.fillText('"',88,quoteY-12);
  ctx.restore();

  // Quote text
  ctx.fillStyle=P.appText;ctx.font='300 italic 29px "Cormorant Garamond"';ctx.letterSpacing='0em';
  ctx.textBaseline='top';
  ctx.fillText('"I had no idea my target could be $450k, not $900k.',108,quoteY+24);
  ctx.fillText(' That changes everything."',108,quoteY+58);

  // Attribution
  ctx.strokeStyle=P.sage;ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(108,quoteY+102);ctx.lineTo(126,quoteY+102);ctx.stroke();
  ctx.fillStyle=rgba(P.appMuted,0.80);ctx.font='400 italic 22px "Cormorant Garamond"';ctx.letterSpacing='0.04em';
  ctx.fillText('Alex, age 30',130,quoteY+94);

  // ── Call-to-action ────────────────────────────────────────────────────────
  const ctaY=quoteY+quoteH+36;
  ctx.font='700 18px Lato';ctx.letterSpacing='0.08em';
  const pillTxt='CALCULATE YOUR BARISTA FIRE NUMBER';
  const pillW=ctx.measureText(pillTxt).width+56,pillH=48,pillX=(W-pillW)/2;
  rrect(pillX,ctaY,pillW,pillH,24);
  ctx.fillStyle=P.appPrimary;ctx.fill();
  ctx.fillStyle=P.white;ctx.textBaseline='middle';ctx.textAlign='center';
  ctx.fillText(pillTxt,W/2,ctaY+pillH/2);

  ctx.textAlign='left';

  drawFooter(FOOT_Y);
}

function drawFooter(y){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,y,W,H-y);
  const midY=y+52;
  if(logo){const sz=72;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.fillStyle='#ffffff';ctx.fill();ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  ctx.fillStyle=P.white;ctx.font='700 24px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';
  ctx.fillText('Try it free — no sign-up',200,midY-14);
  ctx.fillStyle=P.sagePale;ctx.font='700 15px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',200,midY+14);
  const bw=210,bh=48,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,24);ctx.strokeStyle=rgba(P.sagePale,0.60);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 20px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';
  ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}

function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{const a=document.createElement('a');a.download='barista-fire-alex-story-pin.png';a.href=canvas.toDataURL('image/png');a.click();});
document.fonts.ready.then(()=>{ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);render();});
</script>
</body>
</html>
