<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Calculator Browser Mockup · Flamingo FIRE Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 21 · Mockup Browser · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../../../studio/assets/logo_brownish_framed_no_text_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Near-black background
  ctx.fillStyle=P.nearBlk;
  ctx.fillRect(0,0,W,1395);

  // Headline above browser
  ctx.fillStyle=P.cream;
  ctx.font='italic 300 56px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('See Your Retirement Plan',W/2,36);
  ctx.fillStyle=P.sagePale;
  ctx.font='italic 300 36px "Cormorant Garamond"';
  ctx.fillText('in under 5 minutes.',W/2,100);

  // Browser chrome
  const bx=48,by=158,bw=904,bh=940;
  // Browser outer (forest green frame)
  ctx.fillStyle=P.green;
  rrect(bx,by,bw,bh,22);ctx.fill();

  // Browser address bar row
  ctx.fillStyle=P.greenDk;
  ctx.fillRect(bx,by,bw,58);
  // rounded top only trick
  rrect(bx,by,bw,58,22);ctx.fill();
  ctx.fillRect(bx,by+30,bw,28);

  // Traffic circles
  [{c:'#F1683F',x:80},{c:'#F5EEED',x:112},{c:'#84A17C',x:144}].forEach(d=>{
    ctx.beginPath();ctx.arc(d.x,by+29,10,0,Math.PI*2);
    ctx.fillStyle=d.c;ctx.fill();
  });

  // URL bar
  ctx.fillStyle=rgba(P.nearBlk,0.5);
  rrect(175,by+14,640,30,15);ctx.fill();
  ctx.fillStyle=rgba(P.cream,0.5);
  ctx.font='300 14px Lato';ctx.textAlign='left';ctx.textBaseline='middle';
  ctx.fillText('timeandmoneytree.com/flamingo-fire-calculator',190,by+29);

  // Browser content area (white)
  ctx.fillStyle=P.white;
  ctx.fillRect(bx+2,by+58,bw-4,bh-60);
  // bottom rounded
  rrect(bx+2,by+bh-30,bw-4,30,20);ctx.fill();

  // Tab bar
  const tabs=['Baseline','Life Events','Withdrawals'];
  let tx=bx+16,ty=by+72;
  tabs.forEach((tab,i)=>{
    const tw=180;
    ctx.fillStyle=i===0?P.sageFaint:rgba(P.warmGray,0.15);
    rrect(tx,ty,tw,40,8);ctx.fill();
    if(i===0){
      ctx.strokeStyle=P.sage;ctx.lineWidth=2;
      rrect(tx,ty,tw,40,8);ctx.stroke();
    }
    ctx.fillStyle=i===0?P.green:rgba(P.nearBlk,0.45);
    ctx.font=i===0?'700 16px Lato':'300 16px Lato';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(tab,tx+tw/2,ty+20);
    tx+=tw+8;
  });

  // Input area mockup
  const fields=[
    {label:'Current Age',val:'38'},
    {label:'Annual Expenses',val:'$48,000'},
    {label:'Portfolio Value',val:'$320,000'},
    {label:'Return Rate',val:'7%'},
    {label:'Target Retire Age',val:'58'},
  ];
  let fy=by+130;
  fields.forEach((f,i)=>{
    if(i>=3)return;// show only 3 fields visible
    ctx.fillStyle=rgba(P.nearBlk,0.55);
    ctx.font='700 14px Lato';ctx.letterSpacing='0.10em';
    ctx.textAlign='left';ctx.textBaseline='top';
    ctx.fillText(f.label.toUpperCase(),bx+24,fy);
    ctx.letterSpacing='0em';

    ctx.fillStyle=rgba(P.nearBlk,0.08);
    rrect(bx+24,fy+22,bw-48,42,8);ctx.fill();
    ctx.strokeStyle=rgba(P.sage,0.4);ctx.lineWidth=1.5;
    rrect(bx+24,fy+22,bw-48,42,8);ctx.stroke();

    ctx.fillStyle=P.green;
    ctx.font='700 22px Lato';
    ctx.textBaseline='middle';
    ctx.fillText(f.val,bx+40,fy+43);

    fy+=82;
  });

  // Divider
  ctx.strokeStyle=rgba(P.sage,0.3);ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(bx+24,by+386);ctx.lineTo(bx+bw-24,by+386);ctx.stroke();

  // Output area header
  ctx.fillStyle=P.green;
  ctx.font='700 14px Lato';ctx.letterSpacing='0.14em';
  ctx.textAlign='left';ctx.textBaseline='top';
  ctx.fillText('YOUR RESULTS',bx+24,by+400);
  ctx.letterSpacing='0em';

  // Output rows
  const outputs=[
    {label:'Retire Age',val:'58',unit:'years'},
    {label:'Portfolio at Retirement',val:'$1,200,000',unit:''},
  ];
  let oy=by+432;
  outputs.forEach(o=>{
    ctx.fillStyle=rgba(P.nearBlk,0.55);
    ctx.font='300 16px Lato';
    ctx.textBaseline='top';
    ctx.fillText(o.label,bx+24,oy);

    ctx.fillStyle=P.green;
    ctx.font='700 34px Lato';
    ctx.textBaseline='top';
    ctx.fillText(o.val,bx+24,oy+22);

    oy+=84;
  });

  // Success rate
  ctx.fillStyle=rgba(P.nearBlk,0.55);
  ctx.font='300 16px Lato';ctx.textAlign='left';ctx.textBaseline='top';
  ctx.fillText('40-Year Success Rate',bx+24,oy);

  ctx.fillStyle=P.green;
  ctx.font='700 44px Lato';
  ctx.textBaseline='top';
  ctx.fillText('97%',bx+24,oy+22);

  // Progress bar
  const pbX=bx+24,pbY=oy+80,pbW=bw-48,pbH=18;
  rrect(pbX,pbY,pbW,pbH,9);
  ctx.fillStyle=rgba(P.sage,0.25);ctx.fill();
  rrect(pbX,pbY,pbW*0.97,pbH,9);
  ctx.fillStyle=P.green;ctx.fill();

  ctx.fillStyle=P.cream;
  ctx.font='700 12px Lato';ctx.letterSpacing='0.08em';
  ctx.textAlign='right';ctx.textBaseline='middle';
  ctx.fillText('97%',pbX+pbW*0.97-8,pbY+pbH/2);
  ctx.letterSpacing='0em';

  // Mini chart area (40-year portfolio line)
  const chartX=bx+24,chartY=oy+120,chartW=bw-48,chartH=200;
  ctx.fillStyle=rgba(P.sageFaint,0.6);
  ctx.fillRect(chartX,chartY,chartW,chartH);

  // Chart label
  ctx.fillStyle=rgba(P.warmGray,0.6);
  ctx.font='300 13px Lato';ctx.textAlign='left';ctx.textBaseline='top';
  ctx.fillText('40-Year Portfolio Projection',chartX+8,chartY+8);

  // Sage rising line
  ctx.strokeStyle=P.green;ctx.lineWidth=3;
  ctx.beginPath();
  const pts=[[0,0.85],[0.15,0.75],[0.3,0.6],[0.45,0.45],[0.6,0.35],[0.75,0.28],[0.9,0.22],[1,0.18]];
  pts.forEach((p,i)=>{
    const px=chartX+p[0]*chartW;
    const py=chartY+chartH-p[1]*chartH*0.9-10;
    i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
  });
  ctx.stroke();

  // Fill under line
  ctx.beginPath();
  pts.forEach((p,i)=>{
    const px=chartX+p[0]*chartW;
    const py=chartY+chartH-p[1]*chartH*0.9-10;
    i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
  });
  ctx.lineTo(chartX+chartW,chartY+chartH);
  ctx.lineTo(chartX,chartY+chartH);
  ctx.closePath();
  ctx.fillStyle=rgba(P.sage,0.2);ctx.fill();

  // Bottom of browser content
  ctx.fillStyle=P.sageFaint;
  ctx.fillRect(bx+2,by+bh-40,bw-4,38);
  rrect(bx+2,by+bh-40,bw-4,38,18);ctx.fill();

  // CTA
  const ctaW=300,ctaH=70,ctaX=(W-ctaW)/2,ctaY=1270;
  rrect(ctaX,ctaY,ctaW,ctaH,35);
  ctx.fillStyle=P.sagePale;ctx.fill();
  ctx.fillStyle=P.green;ctx.font='700 26px Lato';ctx.letterSpacing='0.06em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Try It Free →',W/2,ctaY+ctaH/2);
  ctx.letterSpacing='0em';

  // URL
  ctx.fillStyle=rgba(P.cream,0.32);
  ctx.font='300 18px Lato';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('timeandmoneytree.com',W/2,1360);

  drawFooter();
}
function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='flamingo-fire-21-mockup-browser-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
