<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dark Mode Elegant Planning · Flamingo FIRE Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 24 · Mockup Dark Mode · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../../../studio/assets/logo_brownish_framed_no_text_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Near-black background (dark mode aesthetic)
  ctx.fillStyle='#0f1410';
  ctx.fillRect(0,0,W,1395);

  // Subtle grid lines for depth
  ctx.strokeStyle=rgba(P.green,0.08);ctx.lineWidth=1;
  for(let x=0;x<W;x+=80){
    ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,1395);ctx.stroke();
  }
  for(let y=0;y<1395;y+=80){
    ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();
  }

  // Glow effect top
  const grd=ctx.createRadialGradient(W/2,300,0,W/2,300,500);
  grd.addColorStop(0,rgba(P.sage,0.12));
  grd.addColorStop(1,'transparent');
  ctx.fillStyle=grd;
  ctx.fillRect(0,0,W,700);

  // Pinyon Script elegant label
  ctx.fillStyle=rgba(P.sagePale,0.45);
  ctx.font='400 68px "Pinyon Script"';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('elegant planning',W/2,38);

  // Display serif headline
  ctx.fillStyle=P.cream;
  ctx.font='300 54px "Cormorant Garamond"';
  ctx.textBaseline='top';
  ctx.fillText('Flamingo FIRE',W/2,120);

  ctx.fillStyle=P.sagePale;
  ctx.font='700 14px Lato';ctx.letterSpacing='0.22em';
  ctx.textBaseline='top';
  ctx.fillText('DARK MODE',W/2,186);
  ctx.letterSpacing='0em';

  // Dark browser chrome
  const bx=52,by=230,bw=896,bh=840;
  ctx.fillStyle='#0a0f0b';
  rrect(bx,by,bw,bh,22);ctx.fill();
  ctx.strokeStyle=rgba(P.sage,0.25);ctx.lineWidth=1.5;
  rrect(bx,by,bw,bh,22);ctx.stroke();

  // Address bar
  ctx.fillStyle='#131a14';
  rrect(bx+14,by+14,bw-28,36,18);ctx.fill();
  ctx.fillStyle=rgba(P.sagePale,0.45);
  ctx.font='300 13px Lato';ctx.textAlign='left';ctx.textBaseline='middle';
  ctx.fillText('timeandmoneytree.com/flamingo-fire-calculator',bx+32,by+32);

  // Dark header bar
  ctx.fillStyle='#152018';
  ctx.fillRect(bx+2,by+62,bw-4,54);

  ctx.fillStyle=P.sagePale;
  ctx.font='700 15px Lato';ctx.letterSpacing='0.14em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('FLAMINGO FIRE CALCULATOR',W/2,by+89);
  ctx.letterSpacing='0em';

  // Dark tabs
  const tabs=['Baseline','Life Events','Withdrawals'];
  let tx=bx+18;
  tabs.forEach((tab,i)=>{
    const tw=170;
    ctx.fillStyle=i===0?'#1f2e22':'#101810';
    rrect(tx,by+128,tw,36,8);ctx.fill();
    if(i===0){
      ctx.strokeStyle=rgba(P.sage,0.6);ctx.lineWidth=1.5;
      rrect(tx,by+128,tw,36,8);ctx.stroke();
    }
    ctx.fillStyle=i===0?P.sagePale:rgba(P.sagePale,0.4);
    ctx.font=i===0?'700 15px Lato':'300 15px Lato';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(tab,tx+tw/2,by+146);
    tx+=tw+8;
  });

  // Glowing sage chart area
  const chartX=bx+20,chartY=by+184,chartW=bw-40,chartH=300;
  ctx.fillStyle='#0e1710';
  ctx.fillRect(chartX,chartY,chartW,chartH);

  // Chart glow
  const chartGrd=ctx.createLinearGradient(chartX,chartY+chartH,chartX,chartY);
  chartGrd.addColorStop(0,rgba(P.sage,0.0));
  chartGrd.addColorStop(1,rgba(P.sage,0.18));
  ctx.fillStyle=chartGrd;
  ctx.fillRect(chartX,chartY,chartW,chartH);

  // Sage glowing line
  ctx.shadowColor=P.sage;ctx.shadowBlur=16;
  ctx.strokeStyle=P.sagePale;ctx.lineWidth=3;
  ctx.beginPath();
  const pts=[[0,0.88],[0.15,0.72],[0.3,0.57],[0.45,0.44],[0.6,0.34],[0.75,0.27],[0.9,0.21],[1,0.17]];
  pts.forEach((p,i)=>{
    const px=chartX+p[0]*chartW;
    const py=chartY+chartH-p[1]*chartH*0.92-8;
    i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
  });
  ctx.stroke();
  ctx.shadowBlur=0;

  // Chart fill with gradient
  ctx.beginPath();
  pts.forEach((p,i)=>{
    const px=chartX+p[0]*chartW;
    const py=chartY+chartH-p[1]*chartH*0.92-8;
    i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
  });
  ctx.lineTo(chartX+chartW,chartY+chartH);
  ctx.lineTo(chartX,chartY+chartH);
  ctx.closePath();
  ctx.fillStyle=rgba(P.sage,0.12);ctx.fill();

  // Chart label
  ctx.fillStyle=rgba(P.sagePale,0.5);
  ctx.font='300 13px Lato';ctx.textAlign='left';ctx.textBaseline='top';
  ctx.fillText('40-Year Portfolio Projection',chartX+10,chartY+10);

  // Metric rows below chart
  const metrics=[
    {label:'Retire Age',val:'58',glow:false},
    {label:'Portfolio',val:'$1,200,000',glow:false},
    {label:'Success Rate',val:'97%',glow:true},
  ];
  let my=by+502;
  metrics.forEach((m,i)=>{
    ctx.fillStyle=i===2?rgba(P.sage,0.12):'#0e1710';
    ctx.fillRect(chartX,my,chartW,90);

    ctx.fillStyle=rgba(P.sagePale,0.45);
    ctx.font='700 13px Lato';ctx.letterSpacing='0.12em';
    ctx.textAlign='left';ctx.textBaseline='top';
    ctx.fillText(m.label.toUpperCase(),chartX+16,my+10);
    ctx.letterSpacing='0em';

    if(m.glow){ctx.shadowColor=P.sagePale;ctx.shadowBlur=12;}
    ctx.fillStyle=P.cream;
    ctx.font='700 42px Lato';
    ctx.textBaseline='top';
    ctx.fillText(m.val,chartX+16,my+32);
    ctx.shadowBlur=0;

    ctx.strokeStyle=rgba(P.sage,0.15);ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(chartX,my+90);ctx.lineTo(chartX+chartW,my+90);ctx.stroke();

    my+=90;
  });

  // Bottom bar in browser
  ctx.fillStyle='#152018';
  ctx.fillRect(bx+2,by+bh-42,bw-4,40);
  rrect(bx+2,by+bh-42,bw-4,40,20);ctx.fill();

  ctx.fillStyle=rgba(P.sagePale,0.5);
  ctx.font='300 13px Lato';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Dark mode · No email · Free forever',W/2,by+bh-22);

  // Bottom tagline
  ctx.fillStyle=rgba(P.cream,0.65);
  ctx.font='italic 300 34px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('Plan your retirement in style.',W/2,1118);

  // CTA
  const ctaW=380,ctaH=72,ctaX=(W-ctaW)/2,ctaY=1264;
  rrect(ctaX,ctaY,ctaW,ctaH,36);
  ctx.fillStyle=P.sagePale;ctx.fill();
  ctx.fillStyle=P.green;ctx.font='700 24px Lato';ctx.letterSpacing='0.06em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Try Dark Mode Free →',W/2,ctaY+ctaH/2);
  ctx.letterSpacing='0em';

  // URL
  ctx.fillStyle=rgba(P.cream,0.28);
  ctx.font='300 18px Lato';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('timeandmoneytree.com',W/2,1360);

  drawFooter();
}
function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='flamingo-fire-24-mockup-dark-mode-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
