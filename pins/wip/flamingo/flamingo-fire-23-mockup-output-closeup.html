<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Confident Retirement Plan Output · Flamingo FIRE Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 23 · Mockup Output Closeup · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../../../studio/assets/logo_brownish_framed_no_text_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Near-black background
  ctx.fillStyle=P.nearBlk;
  ctx.fillRect(0,0,W,1395);

  // Top headline
  ctx.fillStyle=P.cream;
  ctx.font='italic 300 54px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('This Is What a Confident',W/2,38);
  ctx.fillText('Retirement Plan Looks Like.',W/2,100);

  ctx.fillStyle=rgba(P.sagePale,0.7);
  ctx.font='700 13px Lato';ctx.letterSpacing='0.16em';
  ctx.textBaseline='top';
  ctx.fillText('FLAMINGO FIRE CALCULATOR OUTPUT',W/2,174);
  ctx.letterSpacing='0em';

  // Big output card
  const cardX=54,cardY=210,cardW=892,cardH=740;
  // Shadow
  ctx.fillStyle=rgba(P.nearBlk,0.6);
  rrect(cardX+8,cardY+8,cardW,cardH,24);ctx.fill();

  // Card background
  ctx.fillStyle=P.cream;
  rrect(cardX,cardY,cardW,cardH,24);ctx.fill();

  // Card header
  ctx.fillStyle=P.green;
  rrect(cardX,cardY,cardW,80,24);ctx.fill();
  ctx.fillRect(cardX,cardY+56,cardW,24);

  ctx.fillStyle=P.cream;
  ctx.font='700 22px Lato';ctx.letterSpacing='0.12em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('YOUR RETIREMENT PLAN',W/2,cardY+40);
  ctx.letterSpacing='0em';

  // Output rows
  const rows=[
    {label:'Retirement Age',val:'58',sub:'9 years early'},
    {label:'Portfolio at Retirement',val:'$1,200,000',sub:'Fully stress-tested'},
    {label:'Annual Retirement Income',val:'$48,000',sub:'4% safe withdrawal'},
    {label:'40-Year Success Rate',val:'97%',sub:'Historical scenarios passed'},
  ];
  let ry=cardY+100;
  rows.forEach((row,idx)=>{
    const rh=145;
    // Alternating row bg
    ctx.fillStyle=idx%2===0?P.cream:rgba(P.sageFaint,0.5);
    ctx.fillRect(cardX,ry,cardW,rh);

    // Green checkmark
    ctx.fillStyle=P.green;
    ctx.font='700 30px Lato';
    ctx.textAlign='left';ctx.textBaseline='middle';
    ctx.fillText('✓',cardX+24,ry+rh/2-10);

    // Label
    ctx.fillStyle=rgba(P.nearBlk,0.5);
    ctx.font='700 14px Lato';ctx.letterSpacing='0.12em';
    ctx.textBaseline='top';
    ctx.fillText(row.label.toUpperCase(),cardX+64,ry+16);
    ctx.letterSpacing='0em';

    // Value
    ctx.fillStyle=P.green;
    ctx.font='700 52px Lato';
    ctx.textBaseline='top';
    ctx.fillText(row.val,cardX+64,ry+44);

    // Sub text
    ctx.fillStyle=P.sage;
    ctx.font='italic 300 22px "Cormorant Garamond"';
    ctx.textBaseline='top';
    ctx.fillText(row.sub,cardX+64,ry+106);

    // Row separator
    if(idx<3){
      ctx.strokeStyle=rgba(P.sage,0.2);ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(cardX+24,ry+rh);ctx.lineTo(cardX+cardW-24,ry+rh);ctx.stroke();
    }
    ry+=rh;
  });

  // Card footer
  ctx.fillStyle=rgba(P.sage,0.15);
  rrect(cardX,ry,cardW,cardY+cardH-ry,24);ctx.fill();
  ctx.fillRect(cardX,ry,cardW,16);

  ctx.fillStyle=P.green;
  ctx.font='italic 300 30px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Calculated in under 5 minutes. Free. No sign-up.',W/2,ry+40);

  // Body text below card
  ctx.fillStyle=rgba(P.cream,0.7);
  ctx.font='300 25px Lato';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('These are your numbers. Not generic advice.',W/2,1000);
  ctx.fillText('Your age. Your expenses. Your plan.',W/2,1036);

  // Three proof chips
  const proofs=['Free to use','No sign-up required','Shareable results'];
  let px=100,py=1096;
  proofs.forEach(p=>{
    const pw=ctx.measureText(p).width+34;
    rrect(px,py,pw,46,23);
    ctx.fillStyle=rgba(P.sagePale,0.16);ctx.fill();
    ctx.strokeStyle=rgba(P.sagePale,0.45);ctx.lineWidth=1.5;ctx.stroke();
    ctx.fillStyle=P.sagePale;
    ctx.font='300 18px Lato';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(p,px+pw/2,py+23);
    px+=pw+20;
  });

  // CTA
  const ctaW=380,ctaH=76,ctaX=(W-ctaW)/2,ctaY=1260;
  rrect(ctaX,ctaY,ctaW,ctaH,38);
  ctx.fillStyle=P.sagePale;ctx.fill();
  ctx.fillStyle=P.green;ctx.font='700 26px Lato';ctx.letterSpacing='0.06em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Get Your Numbers →',W/2,ctaY+ctaH/2);
  ctx.letterSpacing='0em';

  // URL
  ctx.fillStyle=rgba(P.cream,0.3);
  ctx.font='300 18px Lato';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('timeandmoneytree.com',W/2,1362);

  drawFooter();
}
function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='flamingo-fire-23-mockup-output-closeup-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
