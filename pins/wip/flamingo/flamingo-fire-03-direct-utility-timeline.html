<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flamingo FIRE Calculator — See Your 40-Year Retirement Timeline · Flamingo FIRE Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 03 · Direct Utility Timeline · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxWidth&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);return y;
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../../../studio/assets/logo_brownish_framed_no_text_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Cream background
  ctx.fillStyle=P.cream;
  ctx.fillRect(0,0,W,1395);

  // Top green accent
  ctx.fillStyle=P.green;
  ctx.fillRect(0,0,W,10);

  // Pinyon Script whisper
  ctx.fillStyle=rgba(P.sage,0.3);
  ctx.font='68px "Pinyon Script"';
  ctx.textBaseline='top';
  ctx.textAlign='center';
  ctx.fillText('your entire financial life, planned',W/2,30);

  // Display serif headline
  ctx.fillStyle=P.green;
  ctx.font='italic 300 82px "Cormorant Garamond"';
  ctx.textAlign='center';
  ctx.textBaseline='top';
  ctx.fillText('40-Year Retirement',W/2,130);
  ctx.fillText('Timeline',W/2,220);

  // Subtitle
  ctx.fillStyle=P.warmGray;
  ctx.font='300 28px Lato';
  ctx.textAlign='center';
  ctx.textBaseline='top';
  ctx.fillText('One calculator. Every life stage modeled.',W/2,330);

  // Timeline bar
  const tlX=60,tlY=420,tlW=880,tlH=100;
  const phases=[
    {label:'WORK',color:P.green,w:0.22},
    {label:'ACCUMULATE',color:P.sage,w:0.26},
    {label:'TRANSITION',color:P.sagePale,w:0.24},
    {label:'RETIRE',color:P.sageFaint,w:0.28},
  ];
  let px=tlX;
  phases.forEach((phase,i)=>{
    const pw=tlW*phase.w;
    const r=i===0?[14,0,0,14]:i===phases.length-1?[0,14,14,0]:[0,0,0,0];
    ctx.beginPath();
    if(ctx.roundRect){
      ctx.roundRect(px,tlY,pw,tlH,r);
    } else {
      ctx.rect(px,tlY,pw,tlH);
    }
    ctx.fillStyle=phase.color;
    ctx.fill();
    // label
    const textColor=i>=2?P.green:P.cream;
    ctx.fillStyle=textColor;
    ctx.font='700 18px Lato';ctx.letterSpacing='0.10em';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(phase.label,px+pw/2,tlY+tlH/2);
    ctx.letterSpacing='0em';
    px+=pw;
  });

  // Age markers below timeline
  const ageMarkers=[
    {label:'Age 30',x:60+880*0},
    {label:'Age 45',x:60+880*0.22},
    {label:'Age 52',x:60+880*0.48},
    {label:'Age 58+',x:60+880*0.72},
  ];
  ageMarkers.forEach(m=>{
    // tick
    ctx.strokeStyle=P.green;ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(m.x,tlY+tlH);ctx.lineTo(m.x,tlY+tlH+20);ctx.stroke();
    ctx.fillStyle=P.warmGray;
    ctx.font='700 20px Lato';ctx.letterSpacing='0em';
    ctx.textAlign='center';ctx.textBaseline='top';
    ctx.fillText(m.label,m.x,tlY+tlH+28);
  });

  // Phase description cards
  const cards=[
    {title:'Work Phase',desc:'Build career income and savings rate',color:P.green,textC:P.cream},
    {title:'Accumulate',desc:'Compound growth, maximize contributions',color:P.sage,textC:P.white},
    {title:'Transition',desc:'Part-time income, coast FIRE territory',color:P.sagePale,textC:P.green},
    {title:'Retire',desc:'Portfolio income, sustainable withdrawals',color:P.sageFaint,textC:P.greenDk},
  ];
  const cw=200,ch=140,cy=640,cgap=18;
  const totalCW=cards.length*cw+(cards.length-1)*cgap;
  let cx=(W-totalCW)/2;
  cards.forEach(card=>{
    rrect(cx,cy,cw,ch,12);
    ctx.fillStyle=card.color;ctx.fill();
    ctx.fillStyle=card.textC;
    ctx.font='700 17px Lato';ctx.letterSpacing='0em';
    ctx.textAlign='center';ctx.textBaseline='top';
    ctx.fillText(card.title,cx+cw/2,cy+18);
    ctx.font='300 14px Lato';
    ctx.fillText(card.desc.split(',')[0],cx+cw/2,cy+50);
    if(card.desc.includes(',')){
      ctx.fillText(card.desc.split(',')[1].trim(),cx+cw/2,cy+72);
    }
    cx+=cw+cgap;
  });

  // Middle divider
  ctx.strokeStyle=rgba(P.sage,0.4);
  ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(80,840);ctx.lineTo(920,840);ctx.stroke();

  // Body
  ctx.fillStyle=P.nearBlk;
  ctx.font='300 28px Lato';
  ctx.textAlign='center';
  ctx.textBaseline='top';
  ctx.fillText('Enter your numbers. The calculator maps',W/2,870);
  ctx.fillText('every phase of your financial life —',W/2,910);
  ctx.fillText('from first job to final withdrawal.',W/2,950);

  // Feature bullets
  const feats=['✦  Retirement age optimization','✦  Phase transition planning','✦  40-year portfolio forecast','✦  Success rate modeling'];
  ctx.fillStyle=P.green;
  ctx.font='400 24px Lato';
  ctx.textAlign='left';
  ctx.textBaseline='top';
  let fy=1020;
  feats.forEach(f=>{ctx.fillText(f,100,fy);fy+=46;});

  // CTA
  const ctaW=420,ctaH=78,ctaX=(W-ctaW)/2,ctaY=1240;
  rrect(ctaX,ctaY,ctaW,ctaH,39);
  ctx.fillStyle=P.green;ctx.fill();
  ctx.fillStyle=P.white;ctx.font='700 27px Lato';ctx.letterSpacing='0.06em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Model Your Timeline →',W/2,ctaY+ctaH/2);
  ctx.letterSpacing='0em';

  // Keywords
  ctx.fillStyle=P.warmGray;
  ctx.font='300 20px Lato';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('flamingo fire calculator · retirement financial planning · retirement income planning',W/2,1350);

  drawFooter();
}
function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='flamingo-fire-03-direct-utility-timeline-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
