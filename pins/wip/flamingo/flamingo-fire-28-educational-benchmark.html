<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flamingo FIRE vs. Basic Retirement Calculator — What's the Difference? · Flamingo FIRE Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 28 · Educational — Benchmark Comparison · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../../../studio/assets/logo_brownish_framed_no_text_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
  ctx.letterSpacing='0em';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Cream background
  ctx.fillStyle=P.cream;
  ctx.fillRect(0,0,W,1395);

  // Top headline
  ctx.fillStyle=P.green;
  ctx.font='700 72px Lato';ctx.letterSpacing='-0.01em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('FLAMINGO FIRE',W/2,44);
  ctx.letterSpacing='0em';

  ctx.fillStyle=P.warmGray;
  ctx.font='300 32px Lato';
  ctx.textBaseline='top';
  ctx.fillText('vs. Basic Retirement Calculator',W/2,128);

  ctx.fillStyle=P.nearBlk;
  ctx.font='italic 300 26px "Cormorant Garamond"';
  ctx.textBaseline='top';
  ctx.fillText('what\'s the real difference?',W/2,176);

  // Comparison card
  const cardX=60,cardY=228,cardW=880,cardTotalH=730;
  // Card shadow
  ctx.fillStyle=rgba(P.sage,0.2);
  rrect(cardX+5,cardY+5,cardW,cardTotalH,20);ctx.fill();
  // Card bg
  ctx.fillStyle=P.white;
  rrect(cardX,cardY,cardW,cardTotalH,20);ctx.fill();

  // Table header row
  const colFeatureX=cardX+30,colFeatureW=380;
  const colBasicX=cardX+430,colBasicW=170;
  const colFlamingoX=cardX+630,colFlamingoW=200;
  const headerH=66;

  ctx.fillStyle=P.sageFaint;
  rrect(cardX,cardY,cardW,headerH,20);ctx.fill();
  // Flatten bottom corners of header
  ctx.fillRect(cardX,cardY+headerH-20,cardW,20);

  ctx.fillStyle=P.warmGray;
  ctx.font='700 18px Lato';ctx.letterSpacing='0.10em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('BASIC CALC',colBasicX+colBasicW/2,cardY+headerH/2);

  ctx.fillStyle=P.green;
  ctx.font='700 18px Lato';ctx.letterSpacing='0.10em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('FLAMINGO FIRE',colFlamingoX+colFlamingoW/2,cardY+headerH/2);
  ctx.letterSpacing='0em';

  ctx.fillStyle=P.warmGray;
  ctx.font='700 18px Lato';ctx.letterSpacing='0.06em';
  ctx.textAlign='left';ctx.textBaseline='middle';
  ctx.fillText('FEATURE',colFeatureX,cardY+headerH/2);
  ctx.letterSpacing='0em';

  // Table rows
  const tableRows=[
    {feature:'Retirement date',basic:true,flamingo:true},
    {feature:'Portfolio projection',basic:true,flamingo:true},
    {feature:'Success rate',basic:false,flamingo:true},
    {feature:'Life events',basic:false,flamingo:true},
    {feature:'Withdrawal strategies',basic:false,flamingo:true},
    {feature:'40-year simulation',basic:false,flamingo:true},
  ];

  const rowH=110;
  let rowY=cardY+headerH;
  tableRows.forEach((row,i)=>{
    const isEven=i%2===0;
    // Alternating row bg
    ctx.fillStyle=isEven?P.white:P.sageFaint;
    if(i===tableRows.length-1){
      ctx.fillRect(cardX,rowY,cardW,rowH);
      // Round bottom corners
      rrect(cardX,rowY,cardW,rowH,20);ctx.fill();
      // Flatten top corners
      ctx.fillStyle=isEven?P.white:P.sageFaint;
      ctx.fillRect(cardX,rowY,cardW,20);
    } else {
      ctx.fillRect(cardX,rowY,cardW,rowH);
    }

    // Feature label
    ctx.fillStyle=P.nearBlk;
    ctx.font='400 26px Lato';ctx.letterSpacing='0em';
    ctx.textAlign='left';ctx.textBaseline='middle';
    ctx.fillText(row.feature,colFeatureX,rowY+rowH/2);

    // Column dividers
    ctx.strokeStyle=rgba(P.sage,0.2);ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(colBasicX-20,rowY);ctx.lineTo(colBasicX-20,rowY+rowH);ctx.stroke();
    ctx.beginPath();ctx.moveTo(colFlamingoX-20,rowY);ctx.lineTo(colFlamingoX-20,rowY+rowH);ctx.stroke();

    // Basic check/cross
    const basicSymbol=row.basic?'✓':'✗';
    ctx.fillStyle=row.basic?P.green:P.coral;
    ctx.font='700 40px Lato';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(basicSymbol,colBasicX+colBasicW/2,rowY+rowH/2);

    // Flamingo check/cross
    const flamingoSymbol=row.flamingo?'✓':'✗';
    ctx.fillStyle=row.flamingo?P.green:P.coral;
    ctx.font='700 40px Lato';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(flamingoSymbol,colFlamingoX+colFlamingoW/2,rowY+rowH/2);

    // Row separator
    if(i<tableRows.length-1){
      ctx.strokeStyle=rgba(P.sage,0.15);ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(cardX+20,rowY+rowH);ctx.lineTo(cardX+cardW-20,rowY+rowH);ctx.stroke();
    }

    rowY+=rowH;
  });

  // Sage italic insight strip
  const stripY=rowY+16,stripH=70;
  ctx.fillStyle=rgba(P.sagePale,0.5);
  rrect(60,stripY,880,stripH,14);ctx.fill();
  ctx.fillStyle=P.green;
  ctx.font='italic 300 32px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('The tool built for complete retirement modeling.',W/2,stripY+stripH/2);

  // CTA
  const ctaW=440,ctaH=76,ctaX=(W-ctaW)/2,ctaY=1240;
  rrect(ctaX,ctaY,ctaW,ctaH,38);
  ctx.fillStyle=P.green;ctx.fill();
  ctx.fillStyle=P.cream;ctx.font='700 24px Lato';ctx.letterSpacing='0.05em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Use Flamingo FIRE Free  →',W/2,ctaY+ctaH/2);
  ctx.letterSpacing='0em';

  // URL
  ctx.fillStyle=rgba(P.green,0.4);
  ctx.font='300 18px Lato';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('timeandmoneytree.com',W/2,1354);

  drawFooter();
}
function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='flamingo-fire-28-educational-benchmark-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
