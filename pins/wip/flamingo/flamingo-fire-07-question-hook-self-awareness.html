<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Do You Know If Your Retirement Plan Survives a Market Crash? · Flamingo FIRE Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 07 · Question Hook Self-Awareness · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../../../studio/assets/logo_brownish_framed_no_text_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // SPECIAL: Navy background
  ctx.fillStyle=P.navy;
  ctx.fillRect(0,0,W,1395);

  // Subtle grid lines
  ctx.strokeStyle=rgba(P.white,0.04);
  ctx.lineWidth=1;
  for(let y=0;y<1395;y+=60){
    ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();
  }

  // Top accent
  ctx.fillStyle=P.cornflower;
  ctx.fillRect(0,0,W,6);

  // Small label
  ctx.fillStyle=rgba(P.white,0.5);
  ctx.font='700 15px Lato';ctx.letterSpacing='0.18em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('STRESS-TEST YOUR PLAN',W/2,38);
  ctx.letterSpacing='0em';

  // Cream italic headline
  ctx.fillStyle=P.cream;
  ctx.font='italic 300 68px "Cormorant Garamond"';
  ctx.textAlign='center';
  ctx.textBaseline='top';
  ctx.fillText('Does your retirement',W/2,80);
  ctx.fillText('plan survive a',W/2,162);
  ctx.fillText('market crash?',W/2,244);

  // Thin divider
  ctx.strokeStyle=rgba(P.cornflower,0.4);
  ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(120,348);ctx.lineTo(880,348);ctx.stroke();

  // Body
  ctx.fillStyle=rgba(P.cream,0.85);
  ctx.font='300 28px Lato';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('Optimistic forecasts feel good.',W/2,374);
  ctx.fillText('Stress-tested plans feel confident.',W/2,416);

  // Comparison row
  const cY=520,cH=160;

  // LEFT - untested
  rrect(60,cY,400,cH,14);
  ctx.fillStyle=rgba(P.white,0.06);ctx.fill();
  ctx.strokeStyle=rgba(P.white,0.15);ctx.lineWidth=1.5;ctx.stroke();
  ctx.fillStyle=rgba(P.cream,0.45);
  ctx.font='700 14px Lato';ctx.letterSpacing='0.12em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('UNTESTED PLAN',260,cY+22);ctx.letterSpacing='0em';
  ctx.fillStyle=rgba(P.cream,0.5);
  ctx.font='italic 300 44px "Cormorant Garamond"';
  ctx.textBaseline='top';
  ctx.fillText('Unknown',260,cY+52);
  ctx.fillStyle=rgba(P.cream,0.4);
  ctx.font='300 20px Lato';ctx.textBaseline='top';
  ctx.fillText('success rate',260,cY+108);

  // RIGHT - Flamingo FIRE glowing
  const grad=ctx.createLinearGradient(540,cY,940,cY+cH);
  grad.addColorStop(0,rgba(P.sage,0.25));
  grad.addColorStop(1,rgba(P.sagePale,0.15));
  rrect(540,cY,400,cH,14);
  ctx.fillStyle=grad;ctx.fill();
  ctx.strokeStyle=rgba(P.sagePale,0.5);ctx.lineWidth=1.5;ctx.stroke();
  ctx.fillStyle=P.sagePale;
  ctx.font='700 14px Lato';ctx.letterSpacing='0.12em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('FLAMINGO FIRE',740,cY+22);ctx.letterSpacing='0em';
  ctx.fillStyle=P.cream;
  ctx.font='700 56px "Cormorant Garamond"';
  ctx.textBaseline='top';
  ctx.fillText('94%',740,cY+46);
  ctx.fillStyle=P.sagePale;
  ctx.font='300 20px Lato';ctx.textBaseline='top';
  ctx.fillText('success rate',740,cY+112);

  // VS label
  ctx.fillStyle=rgba(P.cream,0.3);
  ctx.font='700 28px Lato';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('vs',W/2,cY+cH/2);

  // Crash scenario labels
  const scenarios=['2008 Financial Crisis modeled','Dot-com crash scenario','Inflation + rate shock tested'];
  ctx.fillStyle=rgba(P.cream,0.6);
  ctx.font='300 22px Lato';
  ctx.textAlign='center';ctx.textBaseline='top';
  let sy=720;
  scenarios.forEach(s=>{ctx.fillText('· '+s,W/2,sy);sy+=38;});

  // Quote strip
  ctx.fillStyle=rgba(P.cornflower,0.15);
  ctx.fillRect(60,860,880,90);
  ctx.strokeStyle=P.cornflower;ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(60,860);ctx.lineTo(60,950);ctx.stroke();
  ctx.fillStyle=P.cream;
  ctx.font='italic 300 28px "Cormorant Garamond"';
  ctx.textAlign='left';ctx.textBaseline='middle';
  ctx.fillText('"Know your odds before the storm hits."',90,905);

  // Feature list
  const features=['✦  Sequence of returns tested','✦  30-year crash scenarios','✦  Dynamic withdrawal buffers','✦  Success rate confidence score'];
  ctx.fillStyle=rgba(P.sagePale,0.85);
  ctx.font='400 22px Lato';
  ctx.textAlign='left';
  ctx.textBaseline='top';
  let fy=990;
  features.forEach(f=>{ctx.fillText(f,80,fy);fy+=46;});

  // SPECIAL: Cornflower CTA pill
  const ctaW=440,ctaH=80,ctaX=(W-ctaW)/2,ctaY=1240;
  rrect(ctaX,ctaY,ctaW,ctaH,40);
  ctx.fillStyle=P.cornflower;ctx.fill();
  ctx.fillStyle=P.white;ctx.font='700 28px Lato';ctx.letterSpacing='0.06em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Stress-Test Yours Free →',W/2,ctaY+ctaH/2);
  ctx.letterSpacing='0em';

  // URL
  ctx.fillStyle=rgba(P.cream,0.4);
  ctx.font='700 15px Lato';ctx.letterSpacing='0.10em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('TIMEANDMONEYTREE.COM',W/2,1355);
  ctx.letterSpacing='0em';

  drawFooter();
}
function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='flamingo-fire-07-question-hook-self-awareness-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
