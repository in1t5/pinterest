<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>4-Step Retirement Plan Build · Flamingo FIRE Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 13 · Step Ladder 4 Step · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../../../studio/assets/logo_brownish_framed_no_text_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Cream background
  ctx.fillStyle=P.sageFaint;
  ctx.fillRect(0,0,W,1395);

  // Top header band
  ctx.fillStyle=P.green;
  ctx.fillRect(0,0,W,130);
  ctx.fillStyle=P.cream;
  ctx.font='italic 300 56px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Build Your Retirement Plan',W/2,65);

  ctx.fillStyle=P.sagePale;
  ctx.font='700 13px Lato';ctx.letterSpacing='0.16em';
  ctx.textBaseline='top';ctx.textAlign='center';
  ctx.fillText('4 STEPS · FLAMINGO FIRE CALCULATOR',W/2,100);
  ctx.letterSpacing='0em';

  // Connecting dotted sage line (left edge of cards)
  const lineX=100;
  ctx.strokeStyle=rgba(P.sage,0.45);
  ctx.lineWidth=3;
  ctx.setLineDash([8,10]);
  ctx.beginPath();ctx.moveTo(lineX,190);ctx.lineTo(lineX,1310);ctx.stroke();
  ctx.setLineDash([]);

  // Steps data
  const steps=[
    {num:'01',title:'Set your baseline',desc:'Enter your current age, annual expenses, and portfolio value. Set your expected return rate.',chips:null,elevated:false},
    {num:'02',title:'Add life events',desc:'Model income changes, career transitions, one-off expenses, and expected inheritance.',chips:null,elevated:false},
    {num:'03',title:'Choose your withdrawal strategy',desc:'Select the approach that fits your risk comfort.',chips:['4% Rule','Dynamic','Bucket'],elevated:true},
    {num:'04',title:'Run 40-year simulation',desc:'Adjust variables until your success rate reaches 90%+. Your plan is ready.',chips:null,elevated:false},
  ];

  let sy=160;
  steps.forEach((step,idx)=>{
    const cardH=step.elevated?220:180;
    const cardX=140,cardW=W-220;

    // Card shadow/depth
    if(step.elevated){
      ctx.fillStyle=rgba(P.green,0.12);
      rrect(cardX+6,sy+6,cardW,cardH,16);ctx.fill();
    }

    // Card bg
    ctx.fillStyle=step.elevated?P.white:rgba(P.white,0.82);
    rrect(cardX,sy,cardW,cardH,16);ctx.fill();

    // Elevated accent border left
    if(step.elevated){
      ctx.fillStyle=P.sage;
      rrect(cardX,sy,6,cardH,3);ctx.fill();
    }

    // Step number circle
    ctx.beginPath();ctx.arc(lineX,sy+cardH/2,34,0,Math.PI*2);
    ctx.fillStyle=P.green;ctx.fill();
    ctx.fillStyle=P.cream;
    ctx.font='700 28px "Cormorant Garamond"';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(step.num,lineX,sy+cardH/2);

    // Title
    ctx.fillStyle=P.green;
    ctx.font='700 28px Lato';
    ctx.textAlign='left';ctx.textBaseline='top';
    ctx.fillText(step.title,cardX+28,sy+22);

    // Description
    ctx.fillStyle=rgba(P.nearBlk,0.75);
    ctx.font='300 21px Lato';
    ctx.textBaseline='top';
    ctx.fillText(step.desc,cardX+28,sy+62);

    // Strategy chips for step 03
    if(step.chips){
      let cx=cardX+28,cy=sy+130;
      step.chips.forEach(chip=>{
        const tw=ctx.measureText(chip).width+32;
        rrect(cx,cy,tw,38,19);
        ctx.fillStyle=rgba(P.sage,0.25);ctx.fill();
        ctx.strokeStyle=P.sage;ctx.lineWidth=1.5;ctx.stroke();
        ctx.fillStyle=P.green;
        ctx.font='700 16px Lato';ctx.letterSpacing='0.05em';
        ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText(chip,cx+tw/2,cy+19);
        ctx.letterSpacing='0em';
        cx+=tw+14;
      });
    }

    sy+=cardH+28;
  });

  // Bottom tagline
  ctx.fillStyle=P.green;
  ctx.font='italic 300 32px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('Four steps to retirement confidence.',W/2,sy+10);

  // CTA
  const ctaW=380,ctaH=76,ctaX=(W-ctaW)/2,ctaY=1242;
  rrect(ctaX,ctaY,ctaW,ctaH,38);
  ctx.fillStyle=P.green;ctx.fill();
  ctx.fillStyle=P.cream;ctx.font='700 26px Lato';ctx.letterSpacing='0.06em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Start Building Free →',W/2,ctaY+ctaH/2);
  ctx.letterSpacing='0em';

  // URL
  ctx.fillStyle=rgba(P.green,0.4);
  ctx.font='300 18px Lato';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('timeandmoneytree.com',W/2,1352);

  drawFooter();
}
function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='flamingo-fire-13-step-ladder-4-step-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
