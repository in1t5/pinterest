<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Budget Calculator — The slow, inevitable horizon · 1000×1500</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../../studio/templates/pins.css" />
<link rel="stylesheet" href="../../../studio/templates/pins-fresh-b.css" />
<style>
  html, body { margin: 0; padding: 20px; background: #f0eee9; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; box-sizing: border-box; }
  .pin-wrap { transform-origin: top center; }
</style>
</head>
<body>
<div class="pin-wrap">
  <div class="pin pin-22">
    <div class="top">
      <span class="eyebrow">
        <span class="dot"></span>
        <span>Budget Calculator</span>
      </span>
      <span class="tag">— a budget that actually works —</span>
    </div>

    <div class="quote">
      A budget isn't a spreadsheet<br>
      <em>— it's a decision made in advance.</em>
    </div>

    <div class="sun"></div>
    <div class="sun-disk"></div>

    <div class="horizon-line"></div>

    <div class="lower">
      <div class="lbl">monthly savings · 50/30/20 rule</div>
      <div class="num">€700</div>
      <div class="sub">from €3,500 take-home · needs €1,750 · wants €1,050 · savings €700</div>
    </div>

    <div class="footer">
      <div class="footer-brand">
        <img src="../../../studio/assets/logo_brownish_framed_no_text_2501x2500.png" alt="" />
        <div>
          <div class="name">Time &amp; Moneytree</div>
          <div class="url">TIMEANDMONEYTREE.COM</div>
        </div>
      </div>
      <span class="cta-pill">Budget Calculator →</span>
    </div>
  </div>
</div>
<script>
function fit() {
  var scale = Math.min(1, (window.innerHeight - 40) / 1500, (window.innerWidth - 40) / 1000);
  document.querySelector('.pin-wrap').style.transform = 'scale(' + scale + ')';
  document.body.style.minHeight = Math.round(1500 * scale + 40) + 'px';
}
fit();
window.addEventListener('resize', fit);
</script>
</body>
</html>
