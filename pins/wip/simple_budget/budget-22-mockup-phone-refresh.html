<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Budget Calculator — Your Budget, Organized Like This · 1000×1500</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600&family=Lato:wght@300;400;500;700;900&family=Pinyon+Script&display=swap" rel="stylesheet" />
<style>
html, body { margin: 0; padding: 20px; background: #2b2f2d; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; box-sizing: border-box; }
.pin-wrap { transform-origin: top center; }
.grain { position: absolute; inset: 0; pointer-events: none; opacity: 0.06; mix-blend-mode: multiply; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/%3E%3CfeColorMatrix values='0 0 0 0 0.28 0 0 0 0 0.34 0 0 0 0 0.31 0 0 0 1 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); }
</style>
</head>
<body>
<div class="pin-wrap">
<div style="width:1000px;height:1500px;background:#1A1A18;position:relative;overflow:hidden;font-family:Lato,sans-serif;">
  <div class="grain"></div>
  <div style="position:absolute;inset:0;opacity:0.1;background:radial-gradient(ellipse at top,#47584F 0%,transparent 60%);"></div>

  <div style="padding:80px 80px 0;text-align:center;position:relative;">
    <div style="font-family:Lato,sans-serif;font-size:16px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#C1D5A5;margin-bottom:16px;">In your pocket</div>
    <div style="font-family:'Cormorant Garamond',Georgia,serif;font-weight:300;font-size:78px;line-height:1.05;color:#F5EEED;margin-bottom:4px;">Your budget.</div>
    <div style="font-family:'Cormorant Garamond',Georgia,serif;font-weight:300;font-style:italic;font-size:78px;line-height:1.05;color:#C1D5A5;margin-bottom:14px;">Organized like this.</div>
    <div style="font-family:'Pinyon Script',cursive;font-size:48px;line-height:1;color:#84A17C;">free, on any device.</div>
  </div>

  <!-- Phone frame -->
  <div style="display:flex;justify-content:center;margin-top:50px;">
    <div style="width:320px;height:540px;background:#1f2620;border-radius:38px;padding:12px;position:relative;box-shadow:0 20px 60px rgba(0,0,0,0.4),inset 0 0 0 2px #47584F;">
      <!-- Notch -->
      <div style="position:absolute;top:14px;left:50%;transform:translateX(-50%);width:90px;height:6px;background:#000;border-radius:999px;"></div>

      <div style="background:#1f2620;border-radius:28px;height:100%;padding:32px 18px;color:#F5EEED;position:relative;">
        <!-- Header -->
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid rgba(193,213,165,0.2);">
          <div style="font-family:Lato,sans-serif;font-weight:700;font-size:18px;color:#F5EEED;">May Budget</div>
        </div>
        <!-- Budget rows -->
        <div style="font-size:13px;letter-spacing:2px;color:#84A17C;font-weight:700;margin-bottom:8px;">INCOME</div>
        <div style="display:flex;justify-content:space-between;margin-bottom:10px;">
          <div style="font-size:16px;color:#EAEDCE;">Salary</div>
          <div style="font-family:'Cormorant Garamond',serif;font-size:20px;color:#F5EEED;">$4,800</div>
        </div>
        <div style="display:flex;justify-content:space-between;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid rgba(193,213,165,0.15);">
          <div style="font-size:16px;color:#EAEDCE;">Side income</div>
          <div style="font-family:'Cormorant Garamond',serif;font-size:20px;color:#F5EEED;">$400</div>
        </div>
        <div style="font-size:13px;letter-spacing:2px;color:#84A17C;font-weight:700;margin-bottom:8px;">EXPENSES</div>
        <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
          <div style="font-size:15px;color:#EAEDCE;">Housing</div>
          <div style="font-family:'Cormorant Garamond',serif;font-size:18px;color:#F5EEED;">$1,400</div>
        </div>
        <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
          <div style="font-size:15px;color:#EAEDCE;">Food</div>
          <div style="font-family:'Cormorant Garamond',serif;font-size:18px;color:#F5EEED;">$520</div>
        </div>
        <div style="display:flex;justify-content:space-between;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid rgba(193,213,165,0.15);">
          <div style="font-size:15px;color:#EAEDCE;">Other</div>
          <div style="font-family:'Cormorant Garamond',serif;font-size:18px;color:#F5EEED;">$830</div>
        </div>
        <!-- Savings highlight -->
        <div style="position:absolute;bottom:24px;left:18px;right:18px;padding:14px;background:#C1D5A5;border-radius:12px;text-align:center;">
          <div style="font-size:12px;letter-spacing:2px;color:#47584F;font-weight:700;text-transform:uppercase;">Saved this month</div>
          <div style="font-family:'Cormorant Garamond',serif;font-weight:400;font-size:32px;color:#47584F;line-height:1.1;">$1,450</div>
        </div>
      </div>
    </div>
  </div>

  <div style="text-align:center;margin-top:40px;">
    <div style="font-family:Lato,sans-serif;font-size:27px;font-weight:400;color:#EAEDCE;">Free · no sign-up · works anywhere.</div>
  </div>

  <!-- Dark footer -->
  <div style="position:absolute;bottom:0;left:0;right:0;height:90px;background:#3a473f;display:flex;align-items:center;padding:0 36px;gap:16px;">
    <div style="width:44px;height:44px;border-radius:50%;background:#F5EEED;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid rgba(71,88,79,0.15);">
      <img src="../design/templates/old/logo.svg" style="width:32px;height:32px;" alt="" />
    </div>
    <div style="flex:1;line-height:1.2;">
      <div style="font-family:Lato,sans-serif;font-size:21px;font-weight:700;color:#F5EEED;">Free tool — no sign-up</div>
      <div style="font-family:Lato,sans-serif;font-size:16px;color:#C1D5A5;letter-spacing:2px;text-transform:uppercase;margin-top:3px;">timeandmoneytree.com</div>
    </div>
    <div style="padding:12px 22px;border:1px solid rgba(245,238,237,0.4);border-radius:999px;font-family:Lato,sans-serif;font-size:18px;font-weight:700;color:#F5EEED;letter-spacing:1.5px;text-transform:uppercase;">Calculate →</div>
  </div>
</div>
</div>
<script>
function fit() {
  var scale = Math.min(1, (window.innerHeight - 40) / 1500, (window.innerWidth - 40) / 1000);
  document.querySelector('.pin-wrap').style.transform = 'scale(' + scale + ')';
  document.body.style.minHeight = Math.round(1500 * scale + 40) + 'px';
}
fit();
window.addEventListener('resize', fit);
</script>
</body>
</html>
