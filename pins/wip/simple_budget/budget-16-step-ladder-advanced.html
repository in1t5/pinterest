<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced Budget Layers · Budget Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 16 · Step Ladder Advanced · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../../../studio/assets/logo_brownish_framed_no_text_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Near-black background
  ctx.fillStyle=P.nearBlk;
  ctx.fillRect(0,0,W,1395);

  // Subtle dot texture
  for(let xi=0;xi<W;xi+=60){
    for(let yi=0;yi<1395;yi+=60){
      ctx.fillStyle=rgba(P.white,.012);
      ctx.beginPath();ctx.arc(xi,yi,1,0,Math.PI*2);ctx.fill();
    }
  }

  // Top section
  ctx.fillStyle=P.sagePale;
  ctx.font='400 40px "Pinyon Script"';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('for the advanced tracker',W/2,20);

  ctx.fillStyle=P.white;ctx.font='700 40px Lato';ctx.letterSpacing='0.06em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('4 LAYERS OF BUDGET INSIGHT',W/2,72);

  ctx.fillStyle=rgba(P.sagePale,.6);ctx.font='300 24px Lato';ctx.letterSpacing='0em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('Beyond basic tracking — into optimization',W/2,126);

  // Layer cards
  const layers=[
    {
      num:'01',
      title:'Savings Rate Trend',
      body:'Month-over-month: is your savings rate growing? Track the direction, not just the number.',
      metric:'→ Growing? Shrinking? Stalled?',
    },
    {
      num:'02',
      title:'Fixed vs. Variable Ratio',
      body:'Where does flexibility live in your budget? High fixed costs = less room to optimize.',
      metric:'→ Fixed 60% · Variable 40%',
    },
    {
      num:'03',
      title:'Annual Projection',
      body:'Current monthly savings rate extrapolated to 12 months. What\'s your yearly trajectory?',
      metric:'→ On pace for $12,480 / year',
    },
    {
      num:'04',
      title:'FIRE Contribution Rate',
      body:'What % of your savings goes to investments? This is the speed dial for financial independence.',
      metric:'→ 80% invested · 20% buffer',
    },
  ];

  const cardH=220,cardGap=16,cardX=50,cardW=W-100,startY=162;
  layers.forEach((layer,i)=>{
    const cy=startY+i*(cardH+cardGap);
    ctx.fillStyle=rgba(P.cream,.06);
    rrect(cardX,cy,cardW,cardH,16);ctx.fill();
    ctx.strokeStyle=rgba(P.sagePale,.15);ctx.lineWidth=1.5;
    rrect(cardX,cy,cardW,cardH,16);ctx.stroke();

    // Large number - pale sage 72px
    ctx.fillStyle=rgba(P.sagePale,.15);
    ctx.font='700 96px Lato';ctx.letterSpacing='0em';
    ctx.textAlign='right';ctx.textBaseline='middle';
    ctx.fillText(layer.num,cardX+cardW-24,cy+cardH/2);

    // Number chip left
    ctx.fillStyle=P.sagePale;
    rrect(cardX+20,cy+20,64,36,18);ctx.fill();
    ctx.fillStyle=P.nearBlk;ctx.font='700 20px Lato';ctx.letterSpacing='0em';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(layer.num,cardX+52,cy+38);

    // Title
    ctx.fillStyle=P.white;ctx.font='700 28px Lato';ctx.letterSpacing='0em';
    ctx.textAlign='left';ctx.textBaseline='top';
    ctx.fillText(layer.title,cardX+24,cy+66);

    // Body
    ctx.fillStyle=rgba(P.cream,.65);ctx.font='300 22px Lato';ctx.letterSpacing='0em';
    ctx.textAlign='left';ctx.textBaseline='top';
    const words=layer.body.split(' ');let line='';let ly=cy+104;const mx=cardW-100;
    for(let n=0;n<words.length;n++){
      const test=line+words[n]+' ';
      if(ctx.measureText(test).width>mx&&n>0){ctx.fillText(line,cardX+24,ly);line=words[n]+' ';ly+=28;}
      else line=test;
    }
    ctx.fillText(line,cardX+24,ly);

    // Metric line
    ctx.fillStyle=P.sagePale;ctx.font='700 20px Lato';ctx.letterSpacing='0em';
    ctx.textAlign='left';ctx.textBaseline='top';
    ctx.fillText(layer.metric,cardX+24,cy+cardH-38);
  });

  // Divider
  ctx.strokeStyle=rgba(P.sagePale,.2);ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(60,1084);ctx.lineTo(W-60,1084);ctx.stroke();

  // Insight
  ctx.fillStyle=P.cream;ctx.font='italic 300 38px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('"The budget is your financial',W/2,1104);
  ctx.fillText('instrument panel."',W/2,1150);

  // CTA - pale sage pill
  ctx.fillStyle=rgba(P.sagePale,.15);
  rrect(W/2-220,1228,440,80,40);ctx.fill();
  ctx.strokeStyle=P.sagePale;ctx.lineWidth=2;
  rrect(W/2-220,1228,440,80,40);ctx.stroke();
  ctx.fillStyle=P.sagePale;ctx.font='700 28px Lato';ctx.letterSpacing='0.06em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Track All 4  →',W/2,1268);

  // Tag
  ctx.fillStyle=rgba(P.sagePale,.45);ctx.font='300 22px Lato';ctx.letterSpacing='0em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('advanced budget · FIRE · savings rate · timeandmoneytree.com',W/2,1336);

  drawFooter();
}
function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='budget-16-step-ladder-advanced-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
