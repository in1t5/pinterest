<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Savings Rate Milestones · Simple Budget Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 26 · Educational Milestone Tracker · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxWidth&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);return y;
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../../../studio/assets/logo_brownish_framed_no_text_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Cream background
  ctx.fillStyle=P.cream;
  ctx.fillRect(0,0,W,1395);

  // Header
  ctx.fillStyle=P.nearBlk;
  ctx.fillRect(0,0,W,136);

  ctx.fillStyle=P.sagePale;ctx.font='700 18px Lato';ctx.letterSpacing='0.16em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('WHERE DO YOU STAND?',W/2,20);ctx.letterSpacing='0em';

  ctx.fillStyle=P.white;ctx.font='700 44px Lato';ctx.letterSpacing='0.04em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('SAVINGS RATE MILESTONES',W/2,58);ctx.letterSpacing='0em';

  ctx.fillStyle=rgba(P.sagePale,.75);ctx.font='300 22px Lato';ctx.letterSpacing='0em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('from baseline to FIRE fast-track',W/2,110);

  // Ramp: forest green → pale sage
  const rowBgs=['#47584F','#526659','#5E7463','#84A17C','#A8C498',P.sagePale];
  const textColors=[P.cream,P.cream,P.cream,P.cream,P.nearBlk,P.nearBlk];
  const chipColors=[
    rgba(P.white,.2),rgba(P.white,.2),rgba(P.white,.2),
    rgba(P.white,.25),rgba(P.green,.18),rgba(P.green,.18)
  ];

  const milestones=[
    {rate:'0–5%',label:'Baseline — covering expenses only',badge:null},
    {rate:'5–10%',label:'Foundation — starting to build a cushion',badge:null},
    {rate:'10–20%',label:'Progress — emergency fund building, slow wealth growth',badge:null},
    {rate:'20–30%',label:'Strong — FIRE trajectory begins',badge:'MOST COMMON FIRE ENTRY'},
    {rate:'30–50%',label:'Accelerating — FIRE within 15–20 years',badge:null},
    {rate:'50%+',label:'FIRE fast-track — financial independence within 10 years',badge:null},
  ];

  const rowH=140,rowGap=12,rowX=80,rowW=840,startY=154;
  milestones.forEach((m,i)=>{
    const ry=startY+i*(rowH+rowGap);

    ctx.save();
    ctx.shadowColor='rgba(0,0,0,0.1)';ctx.shadowBlur=10;ctx.shadowOffsetY=3;
    ctx.fillStyle=rowBgs[i];
    rrect(rowX,ry,rowW,rowH,16);ctx.fill();
    ctx.restore();

    ctx.fillStyle=rowBgs[i];
    rrect(rowX,ry,rowW,rowH,16);ctx.fill();

    // Rate chip (sage rounded pill)
    const chipW=110,chipH=44;
    ctx.fillStyle=chipColors[i];
    rrect(rowX+20,ry+rowH/2-chipH/2,chipW,chipH,22);ctx.fill();
    ctx.fillStyle=textColors[i];ctx.font='700 24px Lato';ctx.letterSpacing='0em';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(m.rate,rowX+20+chipW/2,ry+rowH/2);

    // Label text
    const labelX=rowX+150,labelW=rowW-170;
    const labelY=m.badge?ry+24:ry+rowH/2;
    ctx.fillStyle=textColors[i];ctx.font='300 26px Lato';ctx.letterSpacing='0em';
    ctx.textAlign='left';ctx.textBaseline=m.badge?'top':'middle';
    // simple wrap
    const words=m.label.split(' ');let line='';let ly=labelY;
    for(let n=0;n<words.length;n++){
      const test=line+words[n]+' ';
      if(ctx.measureText(test).width>labelW&&n>0){ctx.fillText(line,labelX,ly);line=words[n]+' ';ly+=34;}
      else line=test;
    }
    ctx.fillText(line,labelX,ly);

    // Badge
    if(m.badge){
      const bpW=340,bpH=32,bpX=labelX,bpY=ry+rowH-48;
      ctx.fillStyle=P.green;
      rrect(bpX,bpY,bpW,bpH,16);ctx.fill();
      ctx.fillStyle=P.white;ctx.font='700 15px Lato';ctx.letterSpacing='0.10em';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(m.badge,bpX+bpW/2,bpY+bpH/2);ctx.letterSpacing='0em';
    }
  });

  // CTA
  const ctaY=startY+6*(rowH+rowGap)-rowGap+24;
  ctx.fillStyle=P.green;
  rrect(W/2-200,ctaY,400,88,44);ctx.fill();
  ctx.fillStyle=P.white;ctx.font='700 28px Lato';ctx.letterSpacing='0.06em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Find Your Rate  →',W/2,ctaY+44);ctx.letterSpacing='0em';

  drawFooter();
}
function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='budget-26-educational-milestone-tracker-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
