<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Safe Withdrawal Rate Formula — How Retirement Income Is Calculated · Retirement Withdrawal Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 27 · Educational Formula · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxWidth&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);return y;
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../../../studio/assets/logo_brownish_framed_no_text_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // White background
  ctx.fillStyle=P.white;
  ctx.fillRect(0,0,W,1395);

  // Top Cormorant italic header
  ctx.fillStyle=P.sage;
  ctx.font='italic 300 44px "Cormorant Garamond"';
  ctx.textAlign='center';
  ctx.textBaseline='top';
  ctx.fillText('the retirement income formulas',W/2,36);

  // Bold Lato EXPLAINED
  ctx.fillStyle=P.nearBlk;
  ctx.font='700 56px Lato';
  ctx.letterSpacing='-0.01em';
  ctx.textAlign='center';
  ctx.textBaseline='top';
  ctx.fillText('EXPLAINED',W/2,98);
  ctx.letterSpacing='0em';

  // Divider
  ctx.strokeStyle=rgba(P.sagePale,.6);
  ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(80,172);ctx.lineTo(920,172);ctx.stroke();

  // Formula card 1
  const card1Y=196,cardX=80,cardW=840,card1H=390,cardR=16;
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,0.07)';ctx.shadowBlur=18;ctx.shadowOffsetY=4;
  rrect(cardX,card1Y,cardW,card1H,cardR);
  ctx.fillStyle=P.sageFaint;ctx.fill();
  ctx.restore();

  // FORMULA 01 chip
  const chip1W=160,chip1H=40;
  rrect(cardX+28,card1Y+28,chip1W,chip1H,20);
  ctx.fillStyle=P.green;ctx.fill();
  ctx.fillStyle=P.white;
  ctx.font='700 18px Lato';
  ctx.letterSpacing='0.10em';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText('FORMULA 01',cardX+28+chip1W/2,card1Y+28+chip1H/2);
  ctx.letterSpacing='0em';

  ctx.fillStyle=P.nearBlk;
  ctx.font='700 28px Lato';
  ctx.textAlign='left';
  ctx.textBaseline='top';
  ctx.letterSpacing='-0.01em';
  ctx.fillText('Safe Annual Income =',cardX+28,card1Y+88);
  ctx.fillText('Portfolio × Withdrawal Rate',cardX+28,card1Y+128);
  ctx.letterSpacing='0em';

  // Example
  ctx.fillStyle=P.sage;
  ctx.font='italic 300 36px "Cormorant Garamond"';
  ctx.textAlign='left';
  ctx.textBaseline='top';
  ctx.fillText('$1,000,000 × 4% = $40,000/year',cardX+28,card1Y+206);

  // Divider in card
  ctx.strokeStyle=rgba(P.sage,.3);
  ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(cardX+28,card1Y+268);ctx.lineTo(cardX+cardW-28,card1Y+268);ctx.stroke();

  // Note
  ctx.fillStyle=P.warmGray;
  ctx.font='300 22px Lato';
  ctx.textAlign='left';
  ctx.textBaseline='top';
  wrapText('Simple, predictable, used as the baseline for all strategies.',cardX+28,card1Y+288,cardW-56,30);

  // Formula card 2
  const card2Y=610,card2H=420;
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,0.07)';ctx.shadowBlur=18;ctx.shadowOffsetY=4;
  rrect(cardX,card2Y,cardW,card2H,cardR);
  ctx.fillStyle=P.sageFaint;ctx.fill();
  ctx.restore();

  // FORMULA 02 chip
  rrect(cardX+28,card2Y+28,chip1W,chip1H,20);
  ctx.fillStyle=P.green;ctx.fill();
  ctx.fillStyle=P.white;
  ctx.font='700 18px Lato';
  ctx.letterSpacing='0.10em';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText('FORMULA 02',cardX+28+chip1W/2,card2Y+28+chip1H/2);
  ctx.letterSpacing='0em';

  ctx.fillStyle=P.nearBlk;
  ctx.font='700 26px Lato';
  ctx.textAlign='left';
  ctx.textBaseline='top';
  ctx.letterSpacing='-0.01em';
  ctx.fillText('Dynamic Annual Income =',cardX+28,card2Y+88);
  ctx.fillText('Portfolio × Rate, adjusted each year',cardX+28,card2Y+126);
  ctx.letterSpacing='0em';

  ctx.fillStyle=P.sage;
  ctx.font='italic 300 34px "Cormorant Garamond"';
  ctx.textAlign='left';
  ctx.textBaseline='top';
  ctx.fillText('Good year: $44,000  ·  Bad year: $36,000',cardX+28,card2Y+196);

  ctx.strokeStyle=rgba(P.sage,.3);
  ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(cardX+28,card2Y+268);ctx.lineTo(cardX+cardW-28,card2Y+268);ctx.stroke();

  ctx.fillStyle=P.warmGray;
  ctx.font='300 22px Lato';
  ctx.textAlign='left';
  ctx.textBaseline='top';
  wrapText('Flexes with market performance — reduces portfolio depletion risk significantly.',cardX+28,card2Y+290,cardW-56,30);

  // Italic sage strip
  ctx.fillStyle=P.sagePale;
  ctx.fillRect(0,1052,W,80);
  ctx.fillStyle=P.nearBlk;
  ctx.font='italic 300 32px "Cormorant Garamond"';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText('Fixed rate = predictable. Dynamic = sustainable. Both valid.',W/2,1092);

  // CTA
  const ctaY=1190;
  const ctaW=360,ctaH=68;
  rrect(W/2-ctaW/2,ctaY,ctaW,ctaH,34);
  ctx.fillStyle=P.green;ctx.fill();
  ctx.fillStyle=P.white;
  ctx.font='700 24px Lato';
  ctx.letterSpacing='0.06em';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText('Model Your Formula  →',W/2,ctaY+ctaH/2);
  ctx.letterSpacing='0em';

  drawFooter();
}
function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='retirement-withdrawal-27-educational-formula-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
