<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Retirement Withdrawal — The portfolio that outlasts you · 1000×1500</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../../studio/templates/pins.css" />
<link rel="stylesheet" href="../../../studio/templates/pins-fresh-b.css" />
<style>
  html, body { margin: 0; padding: 20px; background: #f0eee9; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; box-sizing: border-box; }
  .pin-wrap { transform-origin: top center; }
</style>
</head>
<body>
<div class="pin-wrap">
  <div class="pin pin-22">
    <div class="top">
      <span class="eyebrow">
        <span class="dot"></span>
        <span>Retirement Withdrawal Calculator</span>
      </span>
      <span class="tag">— the 4% rule, horizon edition —</span>
    </div>

    <div class="quote">
      The right withdrawal rate<br>
      <em>— turns a portfolio into an income.</em>
    </div>

    <div class="sun"></div>
    <div class="sun-disk"></div>

    <div class="horizon-line"></div>

    <div class="lower">
      <div class="lbl">annual retirement income</div>
      <div class="num">€28,800</div>
      <div class="sub">€720K portfolio · 4% safe withdrawal rate · inflation-adjusted</div>
    </div>

    <div class="footer">
      <div class="footer-brand">
        <img src="../../../studio/assets/logo_brownish_framed_no_text_2501x2500.png" alt="" />
        <div>
          <div class="name">Time &amp; Moneytree</div>
          <div class="url">TIMEANDMONEYTREE.COM</div>
        </div>
      </div>
      <span class="cta-pill">Retirement Withdrawal Calculator →</span>
    </div>
  </div>
</div>
<script>
function fit() {
  var scale = Math.min(1, (window.innerHeight - 40) / 1500, (window.innerWidth - 40) / 1000);
  document.querySelector('.pin-wrap').style.transform = 'scale(' + scale + ')';
  document.body.style.minHeight = Math.round(1500 * scale + 40) + 'px';
}
fit();
window.addEventListener('resize', fit);
</script>
</body>
</html>
