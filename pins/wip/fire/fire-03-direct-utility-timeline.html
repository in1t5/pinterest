<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Portfolio Timeline · FIRE Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 03 · Year-by-Year Timeline · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxWidth&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);return y;
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../../../studio/assets/logo_brownish_framed_no_text_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Near-black bg
  ctx.fillStyle=P.nearBlk;
  ctx.fillRect(0,0,W,1395);

  // Decorative circles
  ctx.save();
  ctx.globalAlpha=0.10;
  ctx.fillStyle=P.sagePale;
  ctx.beginPath();ctx.arc(874,265,238,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(944,510,118,0,Math.PI*2);ctx.fill();
  ctx.restore();

  // Badge
  ctx.font='700 18px Lato';ctx.letterSpacing='0.12em';
  const badgeText='FREE FIRE CALCULATOR · YEAR-BY-YEAR PROJECTION';
  const bw2=ctx.measureText(badgeText).width+48;
  rrect(76,66,bw2,44,22);
  ctx.strokeStyle=rgba(P.sagePale,0.6);ctx.lineWidth=1.5;ctx.stroke();
  ctx.fillStyle=P.sagePale;ctx.textBaseline='middle';
  ctx.fillText(badgeText,76+24,88);
  ctx.textBaseline='alphabetic';

  // Headline
  ctx.fillStyle=P.cream;
  ctx.font='300 88px "Cormorant Garamond"';ctx.letterSpacing='-0.01em';
  ctx.fillText('Your Portfolio.',76,200);
  ctx.fillText('Year by Year.',76,296);

  // Chart data points: [x, y, age, value, label]
  const pts=[
    {x:100,y:750,age:'Age 30',val:'$50k'},
    {x:270,y:650,age:'Age 35',val:'$180k'},
    {x:450,y:510,age:'Age 40',val:'$420k'},
    {x:630,y:340,age:'Age 45',val:'$840k'},
    {x:810,y:200,age:'Age 49',val:'$1.125M'},
  ];

  // Draw line with sage glow
  ctx.save();
  ctx.shadowColor=P.sage;ctx.shadowBlur=15;
  ctx.beginPath();
  ctx.moveTo(pts[0].x,pts[0].y);
  pts.slice(1).forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.strokeStyle=P.sage;ctx.lineWidth=3;ctx.stroke();
  ctx.restore();

  // Fill area under line
  ctx.save();
  ctx.globalAlpha=0.08;
  ctx.beginPath();
  ctx.moveTo(pts[0].x,pts[0].y);
  pts.slice(1).forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.lineTo(pts[pts.length-1].x,850);
  ctx.lineTo(pts[0].x,850);
  ctx.closePath();
  ctx.fillStyle=P.sage;ctx.fill();
  ctx.restore();

  // Draw nodes and labels
  pts.forEach((p,i)=>{
    const isLast=(i===pts.length-1);

    // Value label above
    ctx.fillStyle=P.cream;ctx.font='700 22px Lato';ctx.letterSpacing='0em';
    ctx.textBaseline='alphabetic';ctx.textAlign='center';
    ctx.fillText(p.val,p.x,p.y-22);

    // Node circle
    if(isLast){
      ctx.save();
      ctx.shadowColor=P.sage;ctx.shadowBlur=20;
      ctx.beginPath();ctx.arc(p.x,p.y,14,0,Math.PI*2);
      ctx.fillStyle=P.green;ctx.fill();
      ctx.restore();
      // Star label
      ctx.fillStyle=P.sagePale;ctx.font='700 18px Lato';ctx.letterSpacing='0.06em';
      ctx.fillText('★ FIRE',p.x,p.y-44);
    } else {
      ctx.beginPath();ctx.arc(p.x,p.y,10,0,Math.PI*2);
      ctx.fillStyle=P.sage;ctx.fill();
    }

    // Age label below
    ctx.fillStyle=P.sagePale;ctx.font='300 20px Lato';ctx.letterSpacing='0em';
    ctx.textBaseline='top';
    ctx.fillText(p.age,p.x,p.y+18);
  });
  ctx.textAlign='left';ctx.textBaseline='alphabetic';

  // Body text
  ctx.fillStyle=rgba(P.cream,0.75);ctx.font='300 28px Lato';ctx.letterSpacing='0em';
  wrapText('Every year mapped. Every milestone visible. FIRE date locked in.',76,900,840,44);

  // CTA sage pill
  rrect(310,980,380,68,34);ctx.fillStyle=P.sage;ctx.fill();
  ctx.fillStyle=P.greenDk;ctx.font='700 22px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';
  ctx.fillText('Build Your Timeline →',500,1014);
  ctx.textAlign='left';ctx.textBaseline='alphabetic';

  // Keyword chips
  const kws=['fire calculator','fire number calculator','retirement financial planning'];
  let kwx=80;
  ctx.font='400 17px Lato';ctx.letterSpacing='0.04em';
  kws.forEach(kw=>{
    const tw=ctx.measureText(kw).width+26;
    rrect(kwx,1100,tw,36,18);
    ctx.strokeStyle=rgba(P.sagePale,0.4);ctx.lineWidth=1.5;ctx.stroke();
    ctx.fillStyle=P.sagePale;ctx.textBaseline='middle';
    ctx.fillText(kw,kwx+13,1118);
    ctx.textBaseline='alphabetic';
    kwx+=tw+10;
    if(kwx>820){kwx=76;}
  });

  drawFooter();
}
function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='fire-03-direct-utility-timeline-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
