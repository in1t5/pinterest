<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>5 FIRE Numbers Cheat Sheet · FIRE Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 25 · 5 FIRE Numbers Cheat Sheet · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxWidth&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);return y;
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../../../studio/assets/logo_brownish_framed_no_text_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Cream bg
  ctx.fillStyle=P.cream;ctx.fillRect(0,0,W,1395);

  // Green header band
  ctx.fillStyle=P.green;ctx.fillRect(0,0,W,110);
  ctx.fillStyle=P.cream;ctx.font='700 22px Lato';ctx.letterSpacing='0.18em';
  ctx.textBaseline='middle';ctx.textAlign='center';
  ctx.fillText('FIRE CHEAT SHEET',500,55);ctx.textAlign='left';ctx.textBaseline='alphabetic';

  // Headline
  ctx.fillStyle=P.nearBlk;ctx.font='300 84px "Cormorant Garamond"';ctx.letterSpacing='-0.01em';
  ctx.fillText('5 FIRE Numbers to Know',76,198);
  ctx.fillStyle=P.warmGray;ctx.font='300 28px Lato';ctx.letterSpacing='0em';
  wrapText('Know these five numbers — know your complete FIRE plan.',76,244,840,38);

  // 5 color-ramp rows
  const rows=[
    {
      num:'#01',bg:P.green,numColor:P.sagePale,
      title:'Annual expenses in retirement',titleColor:P.cream,
      body:'What you spend each year? (e.g. $45,000/yr) This is your baseline.',bodyColor:rgba(P.cream,0.85),
      tag:'→  input',tagColor:P.sagePale,
    },
    {
      num:'#02',bg:'#5f7a65',numColor:P.sagePale,
      title:'Your FIRE number',titleColor:P.cream,
      body:'Annual expenses × 25 = $1,125,000',bodyColor:P.sagePale,
      tag:'→  input',tagColor:P.sagePale,
    },
    {
      num:'#03',bg:P.sage,numColor:P.cream,
      title:'Current portfolio value',titleColor:P.cream,
      body:'Where you are today vs where you need to be',bodyColor:rgba(P.cream,0.85),
      tag:'→  input',tagColor:P.cream,
    },
    {
      num:'#04',bg:P.sagePale,numColor:P.sage,
      title:'Current savings rate',titleColor:P.nearBlk,
      body:'(Income − Expenses) ÷ Income × 100',bodyColor:P.warmGray,
      tag:'→  input',tagColor:P.sage,
    },
    {
      num:'#05',bg:P.white,numColor:P.green,borderLeft:P.green,
      title:'Years to FIRE',titleColor:P.nearBlk,
      body:'Calculated instantly by the tool ← THE RESULT',bodyColor:P.green,bodyBold:true,
      tag:'Adjust your rate. Watch this change.',tagColor:P.warmGray,tagItalic:true,
    },
  ];

  const rowH=198,gap=14,startY=278;
  rows.forEach((row,i)=>{
    const ry=startY+i*(rowH+gap);
    rrect(80,ry,840,rowH,0);ctx.fillStyle=row.bg;ctx.fill();
    if(row.borderLeft){ctx.fillStyle=row.borderLeft;ctx.fillRect(80,ry,6,rowH);}

    ctx.fillStyle=row.numColor;ctx.font='700 40px Lato';ctx.letterSpacing='0em';ctx.textBaseline='alphabetic';
    ctx.fillText(row.num,108,ry+52);

    ctx.fillStyle=row.titleColor;ctx.font='700 26px Lato';ctx.letterSpacing='0em';
    ctx.fillText(row.title,108,ry+92);

    ctx.fillStyle=row.bodyColor;ctx.font=(row.bodyBold?'700':'300')+' 22px Lato';
    wrapText(row.body,108,ry+128,600,30);

    ctx.fillStyle=row.tagColor;ctx.font=(row.tagItalic?'italic ':'')+'300 20px Lato';
    const tagW=ctx.measureText(row.tag).width;
    ctx.fillText(row.tag,80+840-tagW-24,ry+rowH-22);
  });

  // CTA
  rrect(310,1356,380,68,34);ctx.fillStyle=P.green;ctx.fill();
  ctx.fillStyle=P.cream;ctx.font='700 20px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';
  ctx.fillText('Calculate All 5 →',500,1390);ctx.textAlign='left';ctx.textBaseline='alphabetic';

  drawFooter();
}
function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='fire-25-educational-cheat-sheet-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
