<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>FIRE Calculator Type Specimen · 1000×1500</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../../studio/templates/pins.css" />
<link rel="stylesheet" href="../../../studio/templates/pins-29-32.css" />
<style>
  html, body { margin: 0; padding: 20px; background: #f0eee9; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; box-sizing: border-box; }
  .pin-wrap { transform-origin: top center; }
</style>
</head>
<body>
<div class="pin-wrap">
  <div class="pin pin-29">
    <div class="top-rule">
      <span>FIRE CALCULATOR</span>
      <span class="center">— retire early, retire free —</span>
      <span>FREE TOOL</span>
    </div>

    <div class="glyph">F</div>

    <div class="corners">
      <div class="c tl"></div>
      <div class="c tr"></div>
      <div class="c bl"></div>
      <div class="c br"></div>
    </div>

    <div class="center-label">FIRE CALCULATOR</div>
    <h1 class="headline">
      The number that ends<br />
      <em>the alarm clock.</em>
    </h1>

    <div class="scale">
      <span class="s1">€150K</span>
      <span class="s2">→ €300K</span>
      <span class="s3">→ €750K</span>
      <span class="s4"><em>€1.2M</em></span>
      <span class="s5">at 4%</span>
    </div>

    <div class="footer">
      <div class="footer-brand">
        <img src="../../../studio/assets/logo_brownish_framed_no_text_2501x2500.png" alt="" />
        <div>
          <div class="name">Time &amp; Moneytree</div>
          <div class="url">TIMEANDMONEYTREE.COM</div>
        </div>
      </div>
      <span class="cta-pill">Calculate →</span>
    </div>
  </div>
</div>
<script>
function fit() {
  var scale = Math.min(1, (window.innerHeight - 40) / 1500, (window.innerWidth - 40) / 1000);
  document.querySelector('.pin-wrap').style.transform = 'scale(' + scale + ')';
  document.body.style.minHeight = Math.round(1500 * scale + 40) + 'px';
}
fit();
window.addEventListener('resize', fit);
</script>
</body>
</html>
