<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dark Mode Mockup · FIRE Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 24 · Dark Mode Mockup · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../../../studio/assets/logo_brownish_framed_no_text_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Near-black bg
  ctx.fillStyle=P.nearBlk;ctx.fillRect(0,0,W,1395);

  // Script
  ctx.fillStyle=P.sagePale;ctx.font='400 90px "Pinyon Script"';ctx.letterSpacing='0em';ctx.textBaseline='alphabetic';
  ctx.fillText('your future, calculated',76,148);

  // Headline
  ctx.fillStyle=P.cream;ctx.font='300 110px "Cormorant Garamond"';ctx.letterSpacing='-0.02em';
  ctx.fillText('FIRE Calculator',76,272);

  // Sub
  ctx.fillStyle=P.sagePale;ctx.font='italic 300 80px "Cormorant Garamond"';ctx.letterSpacing='-0.01em';
  ctx.fillText('Dark Mode',76,366);

  // Dark browser frame
  ctx.save();ctx.shadowColor='rgba(0,0,0,0.6)';ctx.shadowBlur=60;ctx.shadowOffsetY=20;
  rrect(60,418,880,830,16);ctx.fillStyle='#1a2420';ctx.fill();
  ctx.restore();

  // Chrome bar dark
  ctx.fillStyle='#111d17';ctx.fillRect(60,418,880,50);
  // Three dots
  [{c:P.coral},{c:P.sage},{c:P.green}].forEach((d,i)=>{
    ctx.beginPath();ctx.arc(90+i*22,443,7,0,Math.PI*2);ctx.fillStyle=d.c;ctx.fill();
  });
  // URL bar dark
  rrect(150,431,550,20,10);ctx.fillStyle='#1f2f26';ctx.fill();
  ctx.fillStyle='#557060';ctx.font='300 13px Lato';ctx.letterSpacing='0em';
  ctx.textBaseline='middle';ctx.fillText('timeandmoneytree.com/fire-calculator',162,441);ctx.textBaseline='alphabetic';

  // Content area dark
  ctx.fillStyle='#1a2420';ctx.fillRect(60,468,880,780);

  // Header bar
  ctx.fillStyle='#2a3c32';ctx.fillRect(60,468,880,50);
  ctx.fillStyle=P.sagePale;ctx.font='700 18px Lato';ctx.letterSpacing='0em';
  ctx.textBaseline='middle';ctx.textAlign='center';
  ctx.fillText('🌿 FIRE Calculator',500,493);ctx.textAlign='left';ctx.textBaseline='alphabetic';

  // Input fields 2x2 dark
  const inputs=[
    {label:'CURRENT AGE',val:'34'},{label:'ANNUAL INCOME',val:'$85k'},
    {label:'ANNUAL EXPENSES',val:'$45k'},{label:'PORTFOLIO',val:'$124k'},
  ];
  const iw=395,ih=68,iGap=14,iSX=76,iSY=530;
  inputs.forEach((inp,i)=>{
    const col=i%2,row=Math.floor(i/2);
    const ix=iSX+col*(iw+iGap),iy=iSY+row*(ih+iGap);
    rrect(ix,iy,iw,ih,8);ctx.fillStyle='#0f1a14';ctx.fill();
    ctx.fillStyle=P.sagePale;ctx.font='700 12px Lato';ctx.letterSpacing='0.06em';ctx.textBaseline='alphabetic';
    ctx.fillText(inp.label,ix+12,iy+20);
    ctx.fillStyle=P.cream;ctx.font='300 30px "Cormorant Garamond"';ctx.letterSpacing='-0.01em';
    ctx.fillText(inp.val,ix+12,iy+58);
  });

  // Divider
  ctx.fillStyle='#2a3c32';ctx.fillRect(76,700,848,1);

  // FIRE NUMBER display with glow
  ctx.fillStyle=P.sagePale;ctx.font='700 14px Lato';ctx.letterSpacing='0.10em';ctx.textBaseline='alphabetic';
  ctx.fillText('FIRE NUMBER',76,730);

  ctx.save();
  ctx.shadowColor=P.sagePale;ctx.shadowBlur=20;
  ctx.fillStyle=P.cream;ctx.font='300 80px "Cormorant Garamond"';ctx.letterSpacing='-0.02em';
  ctx.fillText('$1,125,000',76,820);
  ctx.restore();

  ctx.fillStyle=P.sage;ctx.font='400 20px Lato';ctx.letterSpacing='0em';
  ctx.fillText('FIRE Date: Age 49',76,852);

  // Rising chart with glow
  const cPts=[
    {x:82,y:1000},{x:220,y:980},{x:380,y:950},{x:540,y:910},{x:700,y:860},{x:840,y:800},
  ];
  ctx.save();
  ctx.shadowColor=P.sagePale;ctx.shadowBlur=15;
  ctx.beginPath();ctx.moveTo(cPts[0].x,cPts[0].y);
  cPts.slice(1).forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.strokeStyle=P.sage;ctx.lineWidth=4;ctx.stroke();
  ctx.restore();

  // Fill area under chart
  ctx.save();ctx.globalAlpha=0.06;
  ctx.beginPath();ctx.moveTo(cPts[0].x,cPts[0].y);
  cPts.slice(1).forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.lineTo(840,1100);ctx.lineTo(82,1100);ctx.closePath();
  ctx.fillStyle=P.sage;ctx.fill();
  ctx.restore();

  ctx.fillStyle=P.sage;ctx.font='300 16px Lato';ctx.letterSpacing='0em';
  ctx.textBaseline='alphabetic';
  ctx.fillText('✓ 35% savings rate achieves this',76,1048);

  // Label
  ctx.fillStyle=rgba(P.cream,0.6);ctx.font='300 28px Lato';ctx.letterSpacing='0em';
  ctx.textBaseline='middle';ctx.textAlign='center';
  ctx.fillText('Premium planning experience — free',500,1298);ctx.textAlign='left';ctx.textBaseline='alphabetic';

  // CTA
  rrect(310,1330,380,68,34);ctx.fillStyle=P.sagePale;ctx.fill();
  ctx.fillStyle=P.greenDk;ctx.font='700 18px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';
  ctx.fillText('Try Dark Mode Free →',500,1364);ctx.textAlign='left';ctx.textBaseline='alphabetic';

  drawFooter();
}
function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='fire-24-mockup-dark-mode-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
