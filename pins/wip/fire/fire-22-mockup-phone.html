<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Phone Mockup · FIRE Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 22 · Phone Mockup · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../../../studio/assets/logo_brownish_framed_no_text_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Cream bg
  ctx.fillStyle=P.cream;ctx.fillRect(0,0,W,1395);

  // Headline
  ctx.fillStyle=P.nearBlk;ctx.font='300 90px "Cormorant Garamond"';ctx.letterSpacing='-0.01em';ctx.textBaseline='alphabetic';
  ctx.fillText('Your FIRE Date.',76,152);
  ctx.fillStyle=P.sage;ctx.font='italic 300 80px "Cormorant Garamond"';ctx.letterSpacing='-0.01em';
  ctx.fillText('Your Phone.',76,242);

  // Body
  ctx.fillStyle=P.warmGray;ctx.font='300 30px Lato';ctx.letterSpacing='0em';
  ctx.fillText('FIRE Calculator — mobile-optimized, free, instant results.',76,296);

  // Phone frame
  const phX=300,phY=370,phW=400,phH=760,phR=40;
  ctx.save();ctx.shadowColor='rgba(0,0,0,0.25)';ctx.shadowBlur=48;ctx.shadowOffsetY=16;
  rrect(phX,phY,phW,phH,phR);ctx.fillStyle=P.nearBlk;ctx.fill();
  ctx.restore();

  // Screen
  const sX=phX+20,sY=phY+44,sW=phW-40,sH=phH-80;
  rrect(sX,sY,sW,sH,20);ctx.fillStyle=P.white;ctx.fill();

  // Header bar
  ctx.fillStyle=P.green;ctx.fillRect(sX,sY,sW,44);
  ctx.fillStyle=P.cream;ctx.font='700 16px Lato';ctx.letterSpacing='0em';
  ctx.textBaseline='middle';ctx.textAlign='center';
  ctx.fillText('🌿 FIRE Calculator',phX+phW/2,sY+22);
  ctx.textAlign='left';ctx.textBaseline='alphabetic';

  // Metrics on screen
  const metrics=[
    {label:'FIRE Age',val:'49',valColor:P.nearBlk,valFont:'52px'},
    {label:'FIRE Year',val:'2041',valColor:P.green,valFont:'52px'},
    {label:'Portfolio Now',val:'$124,000',valColor:P.nearBlk,valFont:'40px'},
  ];
  const mStartY=sY+60,mH=100;
  metrics.forEach((m,i)=>{
    const my=mStartY+i*mH;
    ctx.fillStyle=P.warmGray;ctx.font='700 13px Lato';ctx.letterSpacing='0.06em';ctx.textBaseline='alphabetic';
    ctx.fillText(m.label,sX+18,my+20);
    ctx.fillStyle=m.valColor;ctx.font=`300 ${m.valFont} "Cormorant Garamond"`;ctx.letterSpacing='-0.01em';
    ctx.fillText(m.val,sX+18,my+76);
    ctx.fillStyle='#e8eceb';ctx.fillRect(sX+10,my+84,sW-20,1);
  });

  // Mini chart
  const chartY=sY+360;
  ctx.save();
  ctx.shadowColor=P.sage;ctx.shadowBlur=6;
  ctx.beginPath();
  ctx.moveTo(sX+10,chartY+56);
  ctx.lineTo(sX+70,chartY+46);
  ctx.lineTo(sX+140,chartY+34);
  ctx.lineTo(sX+210,chartY+20);
  ctx.lineTo(sX+280,chartY+8);
  ctx.lineTo(sX+336,chartY);
  ctx.strokeStyle=P.sage;ctx.lineWidth=2.5;ctx.stroke();
  ctx.restore();

  // CTA on phone
  rrect(sX+18,sY+460,sW-36,44,22);ctx.fillStyle=P.green;ctx.fill();
  ctx.fillStyle=P.cream;ctx.font='700 16px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';
  ctx.fillText('View Full Plan →',phX+phW/2,sY+482);
  ctx.textAlign='left';ctx.textBaseline='alphabetic';

  // Home bar
  ctx.fillStyle=rgba(P.white,0.5);
  ctx.fillRect(phX+150,phY+phH-28,100,5);
  ctx.beginPath();ctx.arc(phX+200,phY+phH-26,2.5,0,Math.PI*2);
  ctx.fillStyle=P.white;ctx.fill();

  // Label below phone
  ctx.fillStyle=P.warmGray;ctx.font='300 28px Lato';ctx.letterSpacing='0em';
  ctx.textBaseline='alphabetic';ctx.textAlign='center';
  ctx.fillText('Full FIRE plan in seconds',500,1192);ctx.textAlign='left';

  // CTA
  rrect(370,1218,260,68,34);ctx.fillStyle=P.green;ctx.fill();
  ctx.fillStyle=P.cream;ctx.font='700 20px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';
  ctx.fillText('Open Free →',500,1252);ctx.textAlign='left';ctx.textBaseline='alphabetic';

  // Keywords
  const kws=['fire calculator','fire number calculator','retire early'];
  let kwx=76;ctx.font='400 18px Lato';ctx.letterSpacing='0.04em';
  kws.forEach(kw=>{
    const tw=ctx.measureText(kw).width+28;
    rrect(kwx,1318,tw,38,19);
    ctx.strokeStyle=rgba(P.warmGray,0.35);ctx.lineWidth=1.5;ctx.stroke();
    ctx.fillStyle=P.warmGray;ctx.textBaseline='middle';ctx.fillText(kw,kwx+14,1337);
    ctx.textBaseline='alphabetic';kwx+=tw+12;
    if(kwx>820){kwx=76;}
  });

  drawFooter();
}
function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='fire-22-mockup-phone-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
