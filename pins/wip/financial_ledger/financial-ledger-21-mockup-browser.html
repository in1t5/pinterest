<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Browser Mockup · Financial Ledger · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 21 · Mockup Browser · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../../../studio/assets/logo_brownish_framed_no_text_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle=P.cream;ctx.fillRect(0,0,W,H);
  ctx.fillStyle=P.green;ctx.fillRect(0,0,W,8);

  // Headline
  ctx.fillStyle=P.green;ctx.font='italic 300 56px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('Financial Ledger',W/2,68);
  ctx.fillStyle=P.warmGray;ctx.font='300 24px Lato';
  ctx.fillText('Your net worth. Tracked. Visualized.',W/2,108);

  // Browser chrome
  const bx=44,by=136,bw=912,bh=910;
  rrect(bx,by,bw,bh,20);
  ctx.fillStyle=P.green;ctx.fill();
  ctx.strokeStyle=P.greenDk;ctx.lineWidth=2;ctx.stroke();

  // Browser toolbar
  ctx.fillStyle=P.greenDk;ctx.fillRect(bx,by,bw,52);
  // Traffic lights
  [P.coral,'#F5C518',P.sage].forEach((c,i)=>{
    ctx.beginPath();ctx.arc(bx+28+i*28,by+26,9,0,Math.PI*2);
    ctx.fillStyle=c;ctx.fill();
  });
  // URL bar
  rrect(bx+130,by+14,550,24,12);
  ctx.fillStyle=rgba(P.white,.15);ctx.fill();
  ctx.fillStyle=rgba(P.white,.6);ctx.font='300 14px Lato';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('timeandmoneytree.com/financial-ledger',bx+405,by+26);

  // Dark screen inside browser
  const sx=bx+8,sy=by+60,sw=bw-16,sh=bh-68;
  ctx.fillStyle=P.nearBlk;ctx.fillRect(sx,sy,sw,sh);

  // Screen header bar
  ctx.fillStyle=rgba(P.green,.3);ctx.fillRect(sx,sy,sw,56);
  ctx.fillStyle=P.sagePale;ctx.font='700 22px Lato';ctx.letterSpacing='0.06em';
  ctx.textAlign='left';ctx.textBaseline='middle';
  ctx.fillText('FINANCIAL LEDGER',sx+24,sy+28);
  ctx.letterSpacing='0em';
  ctx.fillStyle=rgba(P.sagePale,.5);ctx.font='300 16px Lato';
  ctx.textAlign='right';ctx.textBaseline='middle';
  ctx.fillText('Net Worth Tracker',sx+sw-24,sy+28);

  // Chart area
  const chartX=sx+24,chartY=sy+80,chartW=sw-48,chartH=280;
  ctx.fillStyle=rgba(P.green,.15);ctx.fillRect(chartX,chartY,chartW,chartH);

  // Grid
  ctx.strokeStyle=rgba(P.sage,.1);ctx.lineWidth=1;
  for(let i=1;i<4;i++){
    const gy=chartY+chartH*(i/4);
    ctx.beginPath();ctx.moveTo(chartX,gy);ctx.lineTo(chartX+chartW,gy);ctx.stroke();
  }

  // Rising line
  const pts=[
    [chartX,chartY+chartH-30],
    [chartX+chartW*0.2,chartY+chartH-70],
    [chartX+chartW*0.4,chartY+chartH-130],
    [chartX+chartW*0.6,chartY+chartH-185],
    [chartX+chartW*0.8,chartY+chartH-230],
    [chartX+chartW,chartY+30],
  ];
  ctx.beginPath();
  ctx.moveTo(pts[0][0],chartY+chartH);
  pts.forEach(([x,y])=>ctx.lineTo(x,y));
  ctx.lineTo(chartX+chartW,chartY+chartH);
  ctx.closePath();
  const gr=ctx.createLinearGradient(0,chartY,0,chartY+chartH);
  gr.addColorStop(0,rgba(P.sage,.4));
  gr.addColorStop(1,rgba(P.sage,0.02));
  ctx.fillStyle=gr;ctx.fill();

  ctx.beginPath();pts.forEach(([x,y],i)=>i===0?ctx.moveTo(x,y):ctx.lineTo(x,y));
  ctx.strokeStyle=P.sage;ctx.lineWidth=3;ctx.stroke();
  // Glow dot at end
  ctx.beginPath();ctx.arc(pts[pts.length-1][0],pts[pts.length-1][1],8,0,Math.PI*2);
  ctx.fillStyle=P.sage;ctx.fill();

  // Table
  const tableY=sy+380,tableX=sx+24,tableW=sw-48;
  const headers=['Year','Assets','Liabilities','Net Worth'];
  const hWidths=[0.15,0.25,0.28,0.32];
  // Header row
  ctx.fillStyle=rgba(P.green,.4);ctx.fillRect(tableX,tableY,tableW,40);
  let hx=tableX;
  headers.forEach((h,i)=>{
    ctx.fillStyle=rgba(P.sagePale,.8);ctx.font='700 15px Lato';ctx.letterSpacing='0.06em';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(h,hx+tableW*hWidths[i]/2,tableY+20);
    hx+=tableW*hWidths[i];
    ctx.letterSpacing='0em';
  });

  const rows=[
    ['2021','$185k','$85k','$100k'],
    ['2022','$220k','$62k','$158k'],
    ['2023','$275k','$40k','$235k'],
  ];
  rows.forEach((row,ri)=>{
    const ry=tableY+40+ri*52;
    ctx.fillStyle=ri%2===0?rgba(P.green,.1):rgba(P.green,.06);
    ctx.fillRect(tableX,ry,tableW,52);
    let rx=tableX;
    row.forEach((cell,ci)=>{
      const isNW=ci===3;
      ctx.fillStyle=isNW?P.cream:rgba(P.cream,.6);
      ctx.font=isNW?'700 20px Lato':'300 18px Lato';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(cell,rx+tableW*hWidths[ci]/2,ry+26);
      rx+=tableW*hWidths[ci];
    });
    // Row divider
    ctx.strokeStyle=rgba(P.sage,.1);ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(tableX,ry+52);ctx.lineTo(tableX+tableW,ry+52);ctx.stroke();
  });

  // Growth callout
  const callY=sy+556+8;
  rrect(tableX,callY,tableW,60,10);
  ctx.fillStyle=rgba(P.sage,.2);ctx.fill();
  ctx.strokeStyle=rgba(P.sage,.3);ctx.lineWidth=1;ctx.stroke();
  ctx.fillStyle=P.sagePale;ctx.font='700 22px Lato';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('▲ Total growth: +$135,000  ·  5-year trajectory: +$230k',tableX+tableW/2,callY+30);

  // Bottom of screen — PDF export label
  ctx.fillStyle=rgba(P.sagePale,.25);ctx.font='300 16px Lato';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('📄 Export to PDF  ·  Share  ·  Reset',W/2,sy+sh-24);

  // CTA
  const pw=360,ph=68,ppx=W/2-pw/2,ppy=1088;
  rrect(ppx,ppy,pw,ph,34);
  ctx.fillStyle=P.green;ctx.fill();
  ctx.fillStyle=P.white;ctx.font='700 26px Lato';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.letterSpacing='0.04em';
  ctx.fillText('Start Your Ledger  →',W/2,ppy+ph/2);
  ctx.letterSpacing='0em';

  ctx.fillStyle=rgba(P.warmGray,.72);ctx.font='300 17px Lato';ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('financial ledger  ·  net worth tracker  ·  free tool',W/2,1240);

  drawFooter();
}
function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='financial-ledger-21-mockup-browser-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
