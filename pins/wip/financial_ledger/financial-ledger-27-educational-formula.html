<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Net Worth Formula Explained · Financial Ledger · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 27 · Educational — Formula Explainer · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxWidth&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);return y;
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../../../studio/assets/logo_brownish_framed_no_text_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  ctx.letterSpacing='0em';
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);
  ctx.textAlign='left';ctx.letterSpacing='0em';
}
function drawPill(text,x,y,bgColor,textColor){
  ctx.font='700 20px Lato';
  const tw=ctx.measureText(text).width;
  const pw=tw+32,ph=40;
  rrect(x,y,pw,ph,20);ctx.fillStyle=bgColor;ctx.fill();
  ctx.fillStyle=textColor;ctx.textAlign='left';ctx.textBaseline='middle';
  ctx.fillText(text,x+16,y+ph/2);
  return pw+12;
}
function render(){
  ctx.clearRect(0,0,W,H);

  // White bg
  ctx.fillStyle=P.white;ctx.fillRect(0,0,W,H);
  ctx.fillStyle=P.green;ctx.fillRect(0,0,W,8);

  // Script sub-headline
  ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillStyle=P.sage;ctx.font='italic 300 46px "Cormorant Garamond"';
  ctx.fillText('the formula that matters most',W/2,78);

  // Main headline
  ctx.fillStyle=P.nearBlk;ctx.font='700 60px Lato';ctx.letterSpacing='-0.01em';
  ctx.fillText('NET WORTH',W/2,152);
  ctx.fillText('EXPLAINED',W/2,222);
  ctx.letterSpacing='0em';

  // Formula card
  const fcX=80,fcY=248,fcW=840,fcH=200,fcR=20;
  rrect(fcX,fcY,fcW,fcH,fcR);ctx.fillStyle=P.sageFaint;ctx.fill();
  ctx.strokeStyle=rgba(P.sage,.3);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.nearBlk;ctx.font='700 36px Lato';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Net Worth = Total Assets − Total Liabilities',W/2,fcY+fcH/2);

  // Two columns
  const colY=490;
  const leftX=80,rightX=520;

  // Assets column
  ctx.fillStyle=P.green;ctx.font='700 26px Lato';ctx.letterSpacing='0.06em';
  ctx.textAlign='left';ctx.textBaseline='alphabetic';
  ctx.fillText('ASSETS',leftX,colY);
  ctx.letterSpacing='0em';
  // Separator line
  ctx.strokeStyle=P.sage;ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(leftX,colY+10);ctx.lineTo(leftX+360,colY+10);ctx.stroke();

  const assetPills=['Cash','Investments','Property','Pension','Car'];
  let ax=leftX,ay=colY+36;
  assetPills.forEach(p=>{
    const pw=drawPill(p,ax,ay,P.sage,P.white);
    ax+=pw;
    if(ax>leftX+370){ax=leftX;ay+=54;}
  });

  // Liabilities column
  ctx.fillStyle=P.warmGray;ctx.font='700 26px Lato';ctx.letterSpacing='0.06em';
  ctx.textAlign='left';ctx.textBaseline='alphabetic';
  ctx.fillText('LIABILITIES',rightX,colY);
  ctx.letterSpacing='0em';
  ctx.strokeStyle=rgba(P.warmGray,.4);ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(rightX,colY+10);ctx.lineTo(rightX+360,colY+10);ctx.stroke();

  const liabPills=['Mortgage','Student loans','Car loan','Credit cards'];
  let lx=rightX,ly=colY+36;
  liabPills.forEach(p=>{
    const pw=drawPill(p,lx,ly,rgba(P.warmGray,.18),P.warmGray);
    lx+=pw;
    if(lx>rightX+360){lx=rightX;ly+=54;}
  });

  // Divider
  ctx.strokeStyle=rgba(P.sage,.3);ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(80,830);ctx.lineTo(920,830);ctx.stroke();

  // Key insight
  ctx.fillStyle=P.sage;ctx.font='italic 300 34px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('"Track it annually.',W/2,898);
  ctx.fillText('A growing net worth = financial health."',W/2,944);

  // Second divider
  ctx.strokeStyle=rgba(P.sage,.3);ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(80,968);ctx.lineTo(920,968);ctx.stroke();

  // Tip strip
  ctx.fillStyle=P.sageFaint;ctx.fillRect(80,982,840,80);
  ctx.fillStyle=P.green;ctx.font='700 22px Lato';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Enter once a year. Your ledger does the rest.',W/2,1022);

  // CTA
  const ctaW=360,ctaH=64,ctaX=W/2-ctaW/2,ctaY=1094;
  rrect(ctaX,ctaY,ctaW,ctaH,32);
  ctx.fillStyle=P.green;ctx.fill();
  ctx.fillStyle=P.white;ctx.font='700 26px Lato';ctx.letterSpacing='0.04em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Calculate Yours Free →',W/2,ctaY+ctaH/2);
  ctx.letterSpacing='0em';

  ctx.fillStyle=rgba(P.warmGray,.72);ctx.font='300 17px Lato';ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('financial ledger  ·  net worth formula  ·  free tool',W/2,1248);

  drawFooter();
}
function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='financial-ledger-27-educational-formula-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
