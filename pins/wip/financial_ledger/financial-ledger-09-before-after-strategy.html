<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Before vs After Tracking Strategy · Financial Ledger · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 09 · Before/After Strategy · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../../../studio/assets/logo_brownish_framed_no_text_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Left half warmGray, right half near-black
  ctx.fillStyle=rgba(P.warmGray,.18);ctx.fillRect(0,0,W/2,H);
  ctx.fillStyle=P.nearBlk;ctx.fillRect(W/2,0,W/2,H);

  // Center divider
  ctx.strokeStyle=rgba(P.sage,.4);ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,1395);ctx.stroke();

  // Top label band
  ctx.fillStyle=rgba(P.warmGray,.3);ctx.fillRect(0,0,W/2,80);
  ctx.fillStyle=P.nearBlk;ctx.fillRect(W/2,0,W/2,80);

  ctx.fillStyle=rgba(P.cream,.45);ctx.font='700 18px Lato';ctx.letterSpacing='0.12em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('NO TRACKING',W/4,40);
  ctx.fillStyle=P.sagePale;
  ctx.fillText('WITH LEDGER',W*3/4,40);
  ctx.letterSpacing='0em';

  // Top heading
  ctx.fillStyle=rgba(P.cream,.6);ctx.font='italic 300 52px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('Before',W/4,160);
  ctx.fillStyle=P.cream;
  ctx.fillText('After',W*3/4,160);

  // LEFT items
  const leftItems=[
    'Vague savings',
    'Net worth:',
    'Unknown',
    'Growth:',
    'Inconsistent',
  ];
  const rightItems=[
    'Annual targets',
    'Net worth:',
    '$231k',
    'Growth:',
    '24%/yr',
  ];

  // LEFT card items
  const itemY=220,itemGap=130;
  const leftLabels=['No tracking','Vague savings','Net worth: Unknown','Growth: Inconsistent'];
  leftLabels.forEach((txt,i)=>{
    const y=itemY+i*itemGap;
    rrect(40,y,420,100,12);
    ctx.fillStyle=rgba(P.warmGray,.15);ctx.fill();
    ctx.strokeStyle=rgba(P.warmGray,.25);ctx.lineWidth=1.5;ctx.stroke();
    ctx.fillStyle=rgba(P.cream,.5);ctx.font='300 22px Lato';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(txt,250,y+50);
  });

  // RIGHT card items
  const rightLabels=['With Ledger','Annual targets','Net worth: $231k','Growth: 24%/yr'];
  rightLabels.forEach((txt,i)=>{
    const y=itemY+i*itemGap;
    rrect(W/2+40,y,420,100,12);
    const isBig=(i===2||i===3);
    ctx.fillStyle=isBig?rgba(P.green,.35):rgba(P.green,.18);ctx.fill();
    ctx.strokeStyle=isBig?P.sage:rgba(P.sage,.4);ctx.lineWidth=isBig?2:1.5;ctx.stroke();
    ctx.fillStyle=isBig?P.sagePale:P.cream;ctx.font=isBig?'700 24px Lato':'300 22px Lato';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(txt,W/2+250,y+50);
  });

  // VS chip
  rrect(W/2-36,itemY+itemGap*1.5+10,72,50,25);
  ctx.fillStyle=rgba(P.nearBlk,.8);ctx.fill();
  ctx.strokeStyle=rgba(P.sage,.5);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.cream;ctx.font='700 22px Lato';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('VS',W/2,itemY+itemGap*1.5+35);

  // Middle insight
  ctx.fillStyle=rgba(P.cream,.7);ctx.font='italic 300 36px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('"What gets measured',W/2,770);
  ctx.fillText('gets managed."',W/2,814);

  // Thin rule
  ctx.strokeStyle=rgba(P.sage,.25);ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(120,840);ctx.lineTo(880,840);ctx.stroke();

  // Bottom summary chips
  const chips=[['✓ Clarity','#47584F'],['✓ Confidence','#84A17C'],['✓ Growth','#47584F']];
  const cw=240,ch=52,cGap=14,cStart=W/2-(cw*3+cGap*2)/2;
  chips.forEach(([label,col],i)=>{
    const cx=cStart+i*(cw+cGap),cy=880;
    rrect(cx,cy,cw,ch,26);
    ctx.fillStyle=col;ctx.fill();
    ctx.fillStyle=P.white;ctx.font='700 20px Lato';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(label,cx+cw/2,cy+ch/2);
  });

  // Body copy
  ctx.fillStyle=rgba(P.cream,.65);ctx.font='300 26px Lato';ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('Data turns hope into a strategy.',W/2,1010);
  ctx.fillText('Start your financial ledger today.',W/2,1048);

  // CTA band
  ctx.fillStyle=P.cream;ctx.fillRect(0,1110,W,120);
  ctx.fillStyle=P.green;ctx.font='700 30px Lato';ctx.letterSpacing='0.06em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Start Tracking  →',W/2,1170);
  ctx.letterSpacing='0em';

  ctx.fillStyle=rgba(P.warmGray,.72);ctx.font='300 17px Lato';ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('financial ledger  ·  net worth tracker  ·  free tool',W/2,1310);

  drawFooter();
}
function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='financial-ledger-09-before-after-strategy-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
