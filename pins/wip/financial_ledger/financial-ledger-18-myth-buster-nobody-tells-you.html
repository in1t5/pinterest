<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>What Nobody Tells You About Tracking · Financial Ledger · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 18 · Myth Buster Nobody Tells You · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../../../studio/assets/logo_brownish_framed_no_text_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);
  // Forest green background
  ctx.fillStyle=P.green;ctx.fillRect(0,0,W,H);
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,0,W,8);

  // Headline
  ctx.fillStyle=P.sagePale;ctx.font='700 20px Lato';ctx.letterSpacing='0.16em';
  ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('WHAT NOBODY TELLS YOU',W/2,56);
  ctx.letterSpacing='0em';
  ctx.fillStyle=P.cream;ctx.font='italic 300 62px "Cormorant Garamond"';
  ctx.fillText('about tracking',W/2,128);
  ctx.fillStyle=P.sagePale;ctx.font='italic 300 46px "Cormorant Garamond"';
  ctx.fillText('your net worth',W/2,180);

  // Thin line
  ctx.strokeStyle=rgba(P.sagePale,.3);ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(100,206);ctx.lineTo(900,206);ctx.stroke();

  const reveals=[
    {
      num:'1',
      text:'Seeing your number consistently makes you spend differently — automatically, without willpower.',
    },
    {
      num:'2',
      text:'Small monthly habits move your net worth more than income raises. The math is surprising.',
    },
    {
      num:'3',
      text:'Your first entry is always a surprise. For most people — it\'s a good one.',
    },
  ];

  const cardX=60,cardW=880,cardH=280,cardGap=30,startY=240;
  reveals.forEach((rev,i)=>{
    const cy=startY+i*(cardH+cardGap);
    rrect(cardX,cy,cardW,cardH,18);
    ctx.fillStyle=rgba(P.cream,.09);ctx.fill();
    ctx.strokeStyle=rgba(P.sagePale,.25);ctx.lineWidth=1.5;ctx.stroke();

    // Large Cormorant number pale sage
    ctx.fillStyle=rgba(P.sagePale,.35);
    ctx.font='300 52px "Cormorant Garamond"';
    ctx.textAlign='left';ctx.textBaseline='alphabetic';
    ctx.fillText(rev.num,cardX+30,cy+68);

    // Horizontal accent line
    ctx.strokeStyle=rgba(P.sagePale,.4);ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(cardX+78,cy+40);ctx.lineTo(cardX+78,cy+80);ctx.stroke();

    // Reveal text
    ctx.fillStyle=P.cream;ctx.font='300 26px Lato';ctx.textAlign='left';ctx.textBaseline='alphabetic';
    const words=rev.text.split(' ');let line='';let textY=cy+50;
    words.forEach((word,wi)=>{
      const test=line+word+' ';
      if(ctx.measureText(test).width>720&&wi>0){ctx.fillText(line,cardX+108,textY);line=word+' ';textY+=38;}
      else line=test;
    });
    ctx.fillText(line,cardX+108,textY);
  });

  // Bottom insight
  ctx.strokeStyle=rgba(P.sagePale,.25);ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(100,1140);ctx.lineTo(900,1140);ctx.stroke();

  ctx.fillStyle=P.sagePale;ctx.font='italic 300 34px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('"The numbers tell the story.',W/2,1190);
  ctx.fillText('Start writing yours."',W/2,1230);

  // CTA
  const pw=360,ph=68,ppx=W/2-pw/2,ppy=1270;
  rrect(ppx,ppy,pw,ph,34);
  ctx.fillStyle=P.cream;ctx.fill();
  ctx.fillStyle=P.green;ctx.font='700 26px Lato';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.letterSpacing='0.04em';
  ctx.fillText('Get Your Surprise  →',W/2,ppy+ph/2);
  ctx.letterSpacing='0em';

  ctx.fillStyle=rgba(P.sagePale,.35);ctx.font='300 17px Lato';ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('financial ledger  ·  net worth tracker  ·  free tool',W/2,1360);

  drawFooter();
}
function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='financial-ledger-18-myth-buster-nobody-tells-you-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
