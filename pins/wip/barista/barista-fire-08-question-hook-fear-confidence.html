<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Worried You Can't Retire Early Enough? Barista FIRE Might Be Your Answer · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 08 · Question Hook Fear Confidence · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxWidth&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);return y;
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../../../studio/assets/logo_brownish_framed_no_text_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Near-black bg
  ctx.fillStyle=P.nearBlk;ctx.fillRect(0,0,W,H);

  // Subtle texture lines
  for(let i=0;i<20;i++){
    ctx.strokeStyle=rgba(P.green,0.04);ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(0,i*80);ctx.lineTo(W,i*80);ctx.stroke();
  }

  // Top label
  ctx.fillStyle=rgba(P.warmGray,0.5);ctx.font='700 14px Lato';ctx.letterSpacing='0.20em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('MANY PEOPLE FEEL THIS WAY',W/2,44);
  ctx.textAlign='left';

  // Cream italic headline
  ctx.fillStyle=P.cream;ctx.font='italic 300 62px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('Full retirement feels far.',W/2,80);
  ctx.fillText('But what about',W/2,152);
  ctx.fillStyle=P.sagePale;
  ctx.fillText('part-time freedom?',W/2,224);
  ctx.textAlign='left';

  // Divider
  ctx.strokeStyle=rgba(P.sage,0.25);ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(80,316);ctx.lineTo(920,316);ctx.stroke();

  // Two metric comparison chips
  const chipY=346,chipH=220,chipW=400,chipGap=20;
  const chip1X=W/2-chipW-chipGap/2;
  const chip2X=W/2+chipGap/2;

  // Left chip - warm gray (muted)
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,0.3)';ctx.shadowBlur=20;ctx.shadowOffsetY=8;
  rrect(chip1X,chipY,chipW,chipH,16);ctx.fillStyle=rgba(P.warmGray,0.15);ctx.fill();
  ctx.restore();
  ctx.strokeStyle=rgba(P.warmGray,0.3);ctx.lineWidth=1.5;
  rrect(chip1X,chipY,chipW,chipH,16);ctx.stroke();
  ctx.fillStyle=rgba(P.cream,0.5);ctx.font='700 17px Lato';ctx.letterSpacing='0.12em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('FULL FIRE ONLY',chip1X+chipW/2,chipY+24);
  ctx.fillStyle=rgba(P.cream,0.7);ctx.font='300 56px "Cormorant Garamond"';ctx.letterSpacing='0em';
  ctx.fillText('25×',chip1X+chipW/2,chipY+58);
  ctx.fillStyle=rgba(P.cream,0.5);ctx.font='300 22px Lato';
  ctx.fillText('expenses needed',chip1X+chipW/2,chipY+124);
  ctx.fillStyle=rgba(P.cream,0.35);ctx.font='300 20px Lato';
  ctx.fillText('Feels very far away',chip1X+chipW/2,chipY+154);
  ctx.fillStyle=rgba(P.warmGray,0.6);ctx.font='700 16px Lato';ctx.letterSpacing='0.08em';
  ctx.fillText('HARDER TARGET',chip1X+chipW/2,chipY+188);

  // Right chip - sage elevated
  ctx.save();
  ctx.shadowColor='rgba(132,161,124,0.25)';ctx.shadowBlur=30;ctx.shadowOffsetY=0;
  rrect(chip2X,chipY,chipW,chipH,16);ctx.fillStyle=rgba(P.green,0.9);ctx.fill();
  ctx.restore();
  ctx.strokeStyle=rgba(P.sagePale,0.5);ctx.lineWidth=2;
  rrect(chip2X,chipY,chipW,chipH,16);ctx.stroke();
  ctx.fillStyle=P.sagePale;ctx.font='700 17px Lato';ctx.letterSpacing='0.12em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('BARISTA FIRE',chip2X+chipW/2,chipY+24);
  ctx.fillStyle=P.cream;ctx.font='300 56px "Cormorant Garamond"';ctx.letterSpacing='0em';
  ctx.fillText('12–15×',chip2X+chipW/2,chipY+58);
  ctx.fillStyle=P.cream;ctx.font='300 22px Lato';
  ctx.fillText('income gap needed',chip2X+chipW/2,chipY+124);
  ctx.fillStyle=rgba(P.sagePale,0.8);ctx.font='300 20px Lato';
  ctx.fillText('Within reach sooner',chip2X+chipW/2,chipY+154);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.08em';
  ctx.fillText('ACHIEVABLE FIRST',chip2X+chipW/2,chipY+188);
  ctx.textAlign='left';

  // Divider
  ctx.strokeStyle=rgba(P.sage,0.2);ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(80,598);ctx.lineTo(920,598);ctx.stroke();

  // Body in pale sage
  ctx.fillStyle=P.sagePale;ctx.font='300 28px Lato';
  ctx.textAlign='center';ctx.textBaseline='top';
  wrapText('Barista FIRE requires a smaller portfolio than Full FIRE. You might be closer than you think.',W/2,626,800,40);
  ctx.textAlign='left';

  // Three reassurance cards
  const cards=[
    {title:'Smaller Target',desc:'Build to income gap × 300 — not 25× all expenses'},
    {title:'Part-Time Works',desc:'Any part-time income bridges the gap while portfolio grows'},
    {title:'Both Calculated',desc:'Free calculator shows Barista FI date AND Full FIRE date'},
  ];
  let cy=730;
  cards.forEach(c=>{
    ctx.save();
    ctx.shadowColor='rgba(0,0,0,0.2)';ctx.shadowBlur=12;ctx.shadowOffsetY=4;
    rrect(80,cy,840,110,12);ctx.fillStyle=rgba(P.green,0.3);ctx.fill();
    ctx.restore();
    ctx.strokeStyle=rgba(P.sage,0.3);ctx.lineWidth=1;
    rrect(80,cy,840,110,12);ctx.stroke();
    ctx.strokeStyle=P.sage;ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(80,cy);ctx.lineTo(80,cy+110);ctx.stroke();
    ctx.fillStyle=P.cream;ctx.font='700 22px Lato';ctx.letterSpacing='0.06em';
    ctx.textAlign='left';ctx.textBaseline='top';
    ctx.fillText(c.title.toUpperCase(),108,cy+16);
    ctx.fillStyle=rgba(P.cream,0.7);ctx.font='300 24px Lato';ctx.letterSpacing='0em';
    ctx.fillText(c.desc,108,cy+50);
    cy+=126;
  });

  // Divider
  ctx.strokeStyle=rgba(P.sage,0.2);ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(80,1118);ctx.lineTo(920,1118);ctx.stroke();

  // Keywords
  const tags=['barista fire calculator','barista fire','retire early part time'];
  const tagY=1148,tagH=40,tagGap=8,tagPad=16;
  ctx.font='700 17px Lato';ctx.letterSpacing='0.04em';
  const tagMetrics=tags.map(label=>({label,width:ctx.measureText(label).width+tagPad*2}));
  const totalTagW=tagMetrics.reduce((sum,{width})=>sum+width,0)+tagGap*(tagMetrics.length-1);
  let tx=(W-totalTagW)/2;
  tagMetrics.forEach(({label,width})=>{
    rrect(tx,tagY,width,tagH,20);ctx.fillStyle=rgba(P.sage,0.14);ctx.fill();
    ctx.strokeStyle=rgba(P.sage,0.28);ctx.lineWidth=1;ctx.stroke();
    ctx.fillStyle=P.sagePale;ctx.textBaseline='middle';ctx.textAlign='center';
    ctx.fillText(label,tx+width/2,tagY+tagH/2);
    tx+=width+tagGap;
  });

  // Closing insight
  ctx.fillStyle=rgba(P.cream,0.6);ctx.font='italic 300 30px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('"You\'re probably closer to Barista FI than you are to Full FIRE."',W/2,1212);
  ctx.textAlign='left';

  // CTA
  const ctaW=460,ctaH=64,ctaX=(W-ctaW)/2,ctaY=1300;
  ctx.save();
  ctx.shadowColor='rgba(132,161,124,0.3)';ctx.shadowBlur=22;ctx.shadowOffsetY=8;
  rrect(ctaX,ctaY,ctaW,ctaH,32);ctx.fillStyle=P.sage;ctx.fill();
  ctx.restore();
  ctx.fillStyle=P.nearBlk;ctx.font='700 23px Lato';ctx.letterSpacing='0.10em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('CHECK YOUR BARISTA DATE →',W/2,ctaY+ctaH/2);
  ctx.textAlign='left';

  drawFooter();
}
function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='barista-fire-08-question-hook-fear-confidence-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
