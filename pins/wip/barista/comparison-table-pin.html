<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Comparison Table Pin · Barista FIRE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">Comparison Table Pin (#4) · 1000 × 1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F', greenDk:'#3B4B42', greenDkk:'#2e3c34',
  sage:'#84A17C', sagePale:'#C1D5A5', sageFaint:'#EAEDCE',
  cream:'#F5EEED', nearBlk:'#1A1A18', warmGray:'#6E686A', white:'#FFFFFF',
  appPrimary:'#2e7d32', appText:'#1f2b21', appMuted:'#55635a', appInputBg:'#edf2ee',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../../../studio/assets/logo_brownish_framed_no_text_2501x2500.png';}

function render(){
  ctx.clearRect(0,0,W,H);
  const HERO_H=490, CREAM_Y=490, FOOT_Y=1395;

  // ── Hero ──────────────────────────────────────────────────────────────────
  ctx.fillStyle=P.green; ctx.fillRect(0,0,W,HERO_H+12);
  ctx.save();
  ctx.globalAlpha=0.11; ctx.strokeStyle=P.sagePale; ctx.lineWidth=5;
  ctx.beginPath(); ctx.arc(870,180,220,0,Math.PI*2); ctx.stroke();
  ctx.globalAlpha=0.07; ctx.fillStyle=P.sagePale;
  ctx.beginPath(); ctx.arc(920,420,100,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // Badge
  ctx.font='700 19px Lato'; ctx.letterSpacing='0.10em';
  const bt='FREE CALCULATOR · FIRE & EARLY RETIREMENT';
  const bw=ctx.measureText(bt).width+72,bh=44,bx=76,by=68;
  rrect(bx,by-bh/2,bw,bh,22); ctx.strokeStyle=rgba(P.sagePale,.50); ctx.lineWidth=1.5; ctx.stroke();
  ctx.fillStyle=P.sagePale;
  ctx.beginPath(); ctx.arc(bx+23,by,6,0,Math.PI*2); ctx.fill();
  ctx.textBaseline='middle'; ctx.fillText(bt,bx+39,by);

  ctx.textBaseline='top'; ctx.letterSpacing='-0.01em';
  ctx.fillStyle=P.cream; ctx.font='300 100px "Cormorant Garamond"';
  ctx.fillText('Full FIRE vs.',76,112);
  ctx.fillStyle=P.sagePale; ctx.font='300 100px "Cormorant Garamond"';
  ctx.fillText('Barista FIRE.',76,226);

  ctx.fillStyle=rgba(P.cream,.76); ctx.font='300 30px Lato'; ctx.letterSpacing='0em';
  ctx.fillText('Same destination. Very different paths.',76,360);
  ctx.fillText('Starting point: age 30, $150k portfolio.',76,400);

  // ── Cream ─────────────────────────────────────────────────────────────────
  ctx.fillStyle=P.cream; ctx.fillRect(0,CREAM_Y,W,FOOT_Y-CREAM_Y);

  // ── Comparison table ───────────────────────────────────────────────────────
  const tX=76, tY=CREAM_Y+28, tW=848;
  const col0=260, colW=(tW-col0)/2; // label col + 2 value cols
  const rowH=100;
  const rows=[
    {label:'Portfolio needed',   v1:'$900,000',   v2:'$450,000',   win:2},
    {label:'Years to freedom',   v1:'18 years',   v2:'7 years',    win:2},
    {label:'Freedom age',        v1:'Age 48',      v2:'Age 37',     win:2},
    {label:'Work required',      v1:'None',        v2:'20 hrs/wk',  win:0},
    {label:'Full FIRE age',      v1:'Age 48',      v2:'Age 52',     win:1},
    {label:'Freedom now',        v1:'Wait 18 yrs', v2:'In 7 years', win:2},
  ];

  // Table header
  ctx.save();
  ctx.shadowColor='rgba(26,26,24,0.08)'; ctx.shadowBlur=24; ctx.shadowOffsetY=8;
  rrect(tX,tY,tW,rowH*rows.length+58,14); ctx.fillStyle=P.white; ctx.fill();
  ctx.shadowColor='transparent';
  rrect(tX,tY,tW,rowH*rows.length+58,14); ctx.strokeStyle='#dde8df'; ctx.lineWidth=1; ctx.stroke();
  ctx.restore();

  // Header row
  ctx.fillStyle=P.appPrimary; ctx.fillRect(tX,tY,tW,52);
  // Rounded top
  rrect(tX,tY,tW,52,14); ctx.fillStyle=P.appPrimary; ctx.fill();
  ctx.fillStyle=P.white; ctx.font='700 20px Lato'; ctx.letterSpacing='0.10em'; ctx.textBaseline='middle';
  ctx.textAlign='center';
  ctx.fillText('FULL FIRE',tX+col0+colW/2,tY+26);
  ctx.fillStyle=P.sagePale;
  ctx.fillText('BARISTA FIRE ✓',tX+col0+colW+colW/2,tY+26);
  ctx.textAlign='left';
  ctx.fillStyle=rgba(P.white,0.5); ctx.font='700 15px Lato'; ctx.letterSpacing='0.08em';
  ctx.fillText('COMPARISON',tX+22,tY+26);

  // Data rows
  rows.forEach((row,i)=>{
    const ry=tY+52+i*rowH;
    // Alternate row bg
    if(i%2===0){ctx.fillStyle=rgba(P.appPrimary,0.03);ctx.fillRect(tX,ry,tW,rowH);}
    // Divider
    ctx.strokeStyle='#eef3ef'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(tX,ry); ctx.lineTo(tX+tW,ry); ctx.stroke();
    // Vertical dividers
    ctx.strokeStyle='#eef3ef';
    ctx.beginPath(); ctx.moveTo(tX+col0,ry); ctx.lineTo(tX+col0,ry+rowH); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(tX+col0+colW,ry); ctx.lineTo(tX+col0+colW,ry+rowH); ctx.stroke();

    // Label
    ctx.fillStyle=P.appMuted; ctx.font='700 16px Lato'; ctx.letterSpacing='0.06em'; ctx.textBaseline='middle';
    ctx.fillText(row.label.toUpperCase(),tX+22,ry+rowH/2);

    // Value 1 (Full FIRE)
    const isWin1=row.win===1;
    ctx.fillStyle=isWin1?P.appPrimary:P.appText;
    ctx.font=(isWin1?'700':'400')+' 32px "Cormorant Garamond"'; ctx.letterSpacing='0em';
    ctx.textAlign='center';
    ctx.fillText(row.v1,tX+col0+colW/2,ry+rowH/2+2);

    // Value 2 (Barista FIRE) — highlighted if win
    const isWin2=row.win===2;
    if(isWin2){
      // Highlight chip
      ctx.font='700 32px "Cormorant Garamond"'; ctx.letterSpacing='0em';
      const vw=ctx.measureText(row.v2).width;
      rrect(tX+col0+colW+(colW-vw-24)/2,ry+(rowH-44)/2,vw+24,44,8);
      ctx.fillStyle=rgba(P.appPrimary,0.10); ctx.fill();
      ctx.fillStyle=P.appPrimary;
    } else {
      ctx.fillStyle=P.appText; ctx.font='400 32px "Cormorant Garamond"'; ctx.letterSpacing='0em';
    }
    ctx.fillText(row.v2,tX+col0+colW+colW/2,ry+rowH/2+2);
    ctx.textAlign='left';
  });

  // Footer note below table
  const noteY=tY+52+rows.length*rowH+12;
  ctx.fillStyle=P.appMuted; ctx.font='300 italic 24px "Cormorant Garamond"'; ctx.letterSpacing='0em'; ctx.textBaseline='top';
  ctx.fillText('✓ Barista FIRE wins on 4 of 5 metrics that matter most.',tX+8,noteY);

  drawFooter(FOOT_Y);
}

function drawFooter(y){
  ctx.fillStyle=P.greenDk; ctx.fillRect(0,y,W,H-y);
  const midY=y+52;
  if(logo){const sz=64;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  ctx.fillStyle=P.white; ctx.font='700 24px Lato'; ctx.letterSpacing='0em'; ctx.textBaseline='middle';
  ctx.fillText('Try it free — no sign-up',174,midY-14);
  ctx.fillStyle=P.sagePale; ctx.font='700 15px Lato'; ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+14);
  const bw=210,bh=48,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,24); ctx.strokeStyle=rgba(P.sagePale,0.60); ctx.lineWidth=2; ctx.stroke();
  ctx.fillStyle=P.white; ctx.font='700 20px Lato'; ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle'; ctx.textAlign='center';
  ctx.fillText('CALCULATE  →',bx+bw/2,midY); ctx.textAlign='left';
}

function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{const a=document.createElement('a');a.download='barista-fire-comparison-pin.png';a.href=canvas.toDataURL('image/png');a.click();});
document.fonts.ready.then(()=>{ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);render();});
</script>
</body>
</html>
