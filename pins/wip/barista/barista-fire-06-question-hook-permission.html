<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>What If You Only Had to Work 20 Hours a Week? · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 06 · Question Hook Permission · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxWidth&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);return y;
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../../../studio/assets/logo_brownish_framed_no_text_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Cream bg
  ctx.fillStyle=P.cream;ctx.fillRect(0,0,W,H);

  // Sage faint top accent
  ctx.fillStyle=P.sageFaint;ctx.fillRect(0,0,W,130);

  // Pinyon Script accent
  ctx.fillStyle=P.sage;ctx.font='400 72px "Pinyon Script"';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('work less. live more.',W/2,72);
  ctx.textAlign='left';

  // Decorative top line
  ctx.strokeStyle=rgba(P.sage,0.4);ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(80,130);ctx.lineTo(920,130);ctx.stroke();

  // Large italic question
  ctx.fillStyle=P.nearBlk;ctx.font='italic 300 62px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('What if you only had',W/2,158);
  ctx.fillText('to work 20 hours',W/2,230);
  ctx.fillStyle=P.green;
  ctx.fillText('a week?',W/2,302);
  ctx.textAlign='left';

  // Divider
  ctx.strokeStyle=rgba(P.sage,0.3);ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(80,388);ctx.lineTo(920,388);ctx.stroke();

  // Body text
  ctx.fillStyle=P.warmGray;ctx.font='300 28px Lato';
  ctx.textAlign='center';ctx.textBaseline='top';
  wrapText('Barista FIRE makes part-time work the bridge to full financial independence — not a compromise.',W/2,412,800,40);
  ctx.textAlign='left';

  // Three feature chips horizontal
  const chips=[
    {label:'20 hrs/wk',sub:'Part-time',color:P.sage,tcolor:P.white},
    {label:'Portfolio',sub:'Still grows',color:P.green,tcolor:P.cream},
    {label:'Full FIRE',sub:'Ahead',color:P.sagePale,tcolor:P.greenDk},
  ];
  const chipY=532,chipH=140,chipW=256,chipGap=16;
  const totalCW=chips.length*chipW+(chips.length-1)*chipGap;
  let cx=(W-totalCW)/2;
  chips.forEach(c=>{
    ctx.save();
    ctx.shadowColor='rgba(0,0,0,0.12)';ctx.shadowBlur=16;ctx.shadowOffsetY=5;
    rrect(cx,chipY,chipW,chipH,14);ctx.fillStyle=c.color;ctx.fill();
    ctx.restore();
    ctx.fillStyle=c.tcolor;ctx.font='700 20px Lato';ctx.letterSpacing='0.10em';
    ctx.textAlign='center';ctx.textBaseline='top';
    ctx.fillText(c.sub.toUpperCase(),cx+chipW/2,chipY+16);
    ctx.font='300 44px "Cormorant Garamond"';ctx.letterSpacing='0em';
    ctx.fillText(c.label,cx+chipW/2,chipY+42);
    cx+=chipW+chipGap;
  });
  ctx.textAlign='left';

  // Divider 2
  ctx.strokeStyle=rgba(P.sage,0.3);ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(80,700);ctx.lineTo(920,700);ctx.stroke();

  // How it works
  ctx.fillStyle=P.nearBlk;ctx.font='300 36px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('How Barista FIRE works',W/2,728);
  ctx.textAlign='left';

  const steps=[
    {n:'1',text:'Build portfolio to Barista FI target (12–15× expenses gap)'},
    {n:'2',text:'Shift to part-time work — income covers daily expenses'},
    {n:'3',text:'Portfolio grows unassisted to Full FIRE (25× expenses)'},
    {n:'4',text:'Full FIRE achieved — work becomes completely optional'},
  ];
  let sy=782;
  steps.forEach(s=>{
    // Number circle
    ctx.save();
    ctx.shadowColor='rgba(0,0,0,0.10)';ctx.shadowBlur=8;
    ctx.beginPath();ctx.arc(104,sy+16,22,0,Math.PI*2);
    ctx.fillStyle=P.green;ctx.fill();
    ctx.restore();
    ctx.fillStyle=P.cream;ctx.font='700 22px Lato';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(s.n,104,sy+16);
    ctx.fillStyle=P.nearBlk;ctx.font='300 26px Lato';ctx.letterSpacing='0em';
    ctx.textAlign='left';ctx.textBaseline='top';
    wrapText(s.text,138,sy,740,36);
    sy+=72;
  });

  // Divider 3
  ctx.strokeStyle=rgba(P.sage,0.3);ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(80,1080);ctx.lineTo(920,1080);ctx.stroke();

  // Keywords
  const tags=['barista fire calculator','barista fire','retire early part time'];
  const tagY=1106,tagH=40,tagGap=8,tagPad=16;
  ctx.font='700 17px Lato';ctx.letterSpacing='0.04em';
  const tagMetrics=tags.map(label=>({label,width:ctx.measureText(label).width+tagPad*2}));
  const totalTagW=tagMetrics.reduce((sum,{width})=>sum+width,0)+tagGap*(tagMetrics.length-1);
  let tx=(W-totalTagW)/2;
  tagMetrics.forEach(({label,width})=>{
    rrect(tx,tagY,width,tagH,20);ctx.fillStyle=rgba(P.sage,0.18);ctx.fill();
    ctx.strokeStyle=rgba(P.sage,0.38);ctx.lineWidth=1;ctx.stroke();
    ctx.fillStyle=P.green;ctx.textBaseline='middle';ctx.textAlign='center';
    ctx.fillText(label,tx+width/2,tagY+tagH/2);
    tx+=width+tagGap;
  });

  // Insight card
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,0.07)';ctx.shadowBlur=10;ctx.shadowOffsetY=4;
  rrect(80,1168,840,140,14);ctx.fillStyle=P.white;ctx.fill();
  ctx.restore();
  ctx.strokeStyle=P.green;ctx.lineWidth=4;
  ctx.beginPath();ctx.moveTo(80,1168);ctx.lineTo(80,1308);ctx.stroke();
  ctx.fillStyle=P.warmGray;ctx.font='300 26px Lato';
  ctx.textAlign='left';ctx.textBaseline='top';
  wrapText('The free calculator shows your exact Barista FI date and Full FIRE date based on your real numbers.',108,1186,780,36);
  ctx.textAlign='left';

  // CTA
  const ctaW=460,ctaH=64,ctaX=(W-ctaW)/2,ctaY=1308;
  ctx.save();
  ctx.shadowColor='rgba(71,88,79,0.35)';ctx.shadowBlur=22;ctx.shadowOffsetY=8;
  rrect(ctaX,ctaY,ctaW,ctaH,32);ctx.fillStyle=P.green;ctx.fill();
  ctx.restore();
  ctx.fillStyle=P.cream;ctx.font='700 23px Lato';ctx.letterSpacing='0.10em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('FIND YOUR BARISTA DATE →',W/2,ctaY+ctaH/2);
  ctx.textAlign='left';

  drawFooter();
}
function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='barista-fire-06-question-hook-permission-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
