<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Burnout vs. Barista FIRE — What Happens When Work Becomes Optional · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 11 · Before After Emotional · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxWidth&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);return y;
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../../../studio/assets/logo_brownish_framed_no_text_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Cream bg
  ctx.fillStyle=P.cream;ctx.fillRect(0,0,W,H);

  // Top headline band
  ctx.fillStyle=P.white;ctx.fillRect(0,0,W,154);
  ctx.strokeStyle=rgba(P.sage,0.3);ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(0,148);ctx.lineTo(W,148);ctx.stroke();

  ctx.fillStyle=P.nearBlk;ctx.font='300 64px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('When Work Becomes',W/2,20);
  ctx.fillText('Optional',W/2,92);
  ctx.textAlign='left';

  // Split panels
  const panelY=154,panelH=760;

  // Left panel - muted gray
  ctx.fillStyle=rgba(P.warmGray,0.10);ctx.fillRect(0,panelY,W/2,panelH);

  // Right panel - forest green warm
  ctx.fillStyle=P.green;ctx.fillRect(W/2,panelY,W/2,panelH);

  // Divider line
  ctx.strokeStyle=rgba(P.cream,0.2);ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(W/2,panelY);ctx.lineTo(W/2,panelY+panelH);ctx.stroke();

  // Left - BURNOUT label
  ctx.fillStyle=rgba(P.warmGray,0.25);ctx.font='300 110px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('B',W/4,panelY+14);

  ctx.fillStyle=rgba(P.nearBlk,0.4);ctx.font='italic 300 72px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('Burnout',W/4,panelY+118);

  const leftFeelings=['Counting down years','Dreading Mondays','Work defines identity','No autonomy','No end in sight'];
  let lfy=panelY+210;
  leftFeelings.forEach(f=>{
    ctx.fillStyle=rgba(P.nearBlk,0.4);ctx.font='300 24px Lato';ctx.letterSpacing='0em';
    ctx.textAlign='center';ctx.textBaseline='top';
    ctx.fillText(f,W/4,lfy);
    lfy+=44;
  });

  // Right - FREEDOM label
  ctx.fillStyle=rgba(P.sagePale,0.15);ctx.font='300 110px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('F',W/2+W/4,panelY+14);

  ctx.fillStyle=P.cream;ctx.font='italic 300 72px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('Freedom',W/2+W/4,panelY+118);

  const rightFeelings=['Choosing your hours','Energized by purpose','Work on your terms','Full autonomy','Phase 3 ahead'];
  let rfy=panelY+210;
  rightFeelings.forEach(f=>{
    ctx.fillStyle=P.cream;ctx.font='300 24px Lato';ctx.letterSpacing='0em';
    ctx.textAlign='center';ctx.textBaseline='top';
    ctx.fillText(f,W/2+W/4,rfy);
    rfy+=44;
  });
  ctx.textAlign='left';

  // Bridge strip
  const stripY=panelY+panelH,stripH=90;
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,stripY,W,stripH);
  ctx.fillStyle=P.cream;ctx.font='300 44px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Barista FIRE is the bridge',W/2,stripY+stripH/2);
  ctx.textAlign='left';

  // Three comparison rows
  const rows=[
    {left:'Sunday dread',right:'Sunday freedom'},
    {left:'Work controls you',right:'You control work'},
    {left:'One speed: full-time',right:'Your pace, your choice'},
  ];
  let ry=stripY+stripH+20;
  rows.forEach(r=>{
    // Left side
    rrect(80,ry,400,68,10);ctx.fillStyle=rgba(P.warmGray,0.10);ctx.fill();
    ctx.strokeStyle=rgba(P.warmGray,0.2);ctx.lineWidth=1;rrect(80,ry,400,68,10);ctx.stroke();
    ctx.fillStyle=rgba(P.nearBlk,0.5);ctx.font='300 24px Lato';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(r.left,280,ry+34);

    // Arrow
    ctx.fillStyle=P.green;ctx.font='700 24px Lato';
    ctx.fillText('→',W/2,ry+34);

    // Right side
    rrect(520,ry,400,68,10);ctx.fillStyle=rgba(P.green,0.12);ctx.fill();
    ctx.strokeStyle=rgba(P.sage,0.3);ctx.lineWidth=1;rrect(520,ry,400,68,10);ctx.stroke();
    ctx.fillStyle=P.green;ctx.font='300 24px Lato';
    ctx.fillText(r.right,720,ry+34);
    ry+=84;
  });
  ctx.textAlign='left';

  // Divider
  ctx.strokeStyle=rgba(P.sage,0.3);ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(80,1170);ctx.lineTo(920,1170);ctx.stroke();

  // Keywords
  const tags=['barista fire calculator','barista fire','retire early part time'];
  const tagY=1194,tagH=40,tagGap=8,tagPad=16;
  ctx.font='700 17px Lato';ctx.letterSpacing='0.04em';
  const tagMetrics=tags.map(label=>({label,width:ctx.measureText(label).width+tagPad*2}));
  const totalTagW=tagMetrics.reduce((sum,{width})=>sum+width,0)+tagGap*(tagMetrics.length-1);
  let tx=(W-totalTagW)/2;
  tagMetrics.forEach(({label,width})=>{
    rrect(tx,tagY,width,tagH,20);ctx.fillStyle=rgba(P.sage,0.18);ctx.fill();
    ctx.strokeStyle=rgba(P.sage,0.38);ctx.lineWidth=1;ctx.stroke();
    ctx.fillStyle=P.green;ctx.textBaseline='middle';ctx.textAlign='center';
    ctx.fillText(label,tx+width/2,tagY+tagH/2);
    tx+=width+tagGap;
  });

  // Insight
  ctx.fillStyle=P.warmGray;ctx.font='italic 300 28px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('"The goal isn\'t to stop working. It\'s to work on your terms."',W/2,1252);
  ctx.textAlign='left';

  // CTA
  const ctaW=340,ctaH=62,ctaX=(W-ctaW)/2,ctaY=1308;
  ctx.save();
  ctx.shadowColor='rgba(71,88,79,0.35)';ctx.shadowBlur=22;ctx.shadowOffsetY=8;
  rrect(ctaX,ctaY,ctaW,ctaH,31);ctx.fillStyle=P.green;ctx.fill();
  ctx.restore();
  ctx.fillStyle=P.cream;ctx.font='700 23px Lato';ctx.letterSpacing='0.10em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('PLAN YOUR EXIT →',W/2,ctaY+ctaH/2);
  ctx.textAlign='left';

  drawFooter();
}
function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='barista-fire-11-before-after-emotional-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
