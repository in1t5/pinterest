<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Barista FIRE — The quiet middle road · 1000×1500</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../../studio/templates/pins.css" />
<link rel="stylesheet" href="../../../studio/templates/pins-fresh-b.css" />
<style>
  html, body { margin: 0; padding: 20px; background: #f0eee9; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; box-sizing: border-box; }
  .pin-wrap { transform-origin: top center; }
</style>
</head>
<body>
<div class="pin-wrap">
  <div class="pin pin-22">
    <div class="top">
      <span class="eyebrow">
        <span class="dot"></span>
        <span>Barista FIRE Calculator</span>
      </span>
      <span class="tag">— the quiet middle road —</span>
    </div>

    <div class="quote">
      Between full hustle<br>
      and full retirement —<br>
      <em>there's a barista.</em>
    </div>

    <div class="sun"></div>
    <div class="sun-disk"></div>

    <div class="horizon-line"></div>

    <div class="lower">
      <div class="lbl">barista fire number</div>
      <div class="num">€420,000</div>
      <div class="sub">the portfolio that lets you choose your hours</div>
    </div>

    <div class="footer">
      <div class="footer-brand">
        <img src="../../../studio/assets/logo_brownish_framed_no_text_2501x2500.png" alt="" />
        <div>
          <div class="name">Time &amp; Moneytree</div>
          <div class="url">TIMEANDMONEYTREE.COM</div>
        </div>
      </div>
      <span class="cta-pill">Barista FIRE Calculator →</span>
    </div>
  </div>
</div>
<script>
function fit() {
  var scale = Math.min(1, (window.innerHeight - 40) / 1500, (window.innerWidth - 40) / 1000);
  document.querySelector('.pin-wrap').style.transform = 'scale(' + scale + ')';
  document.body.style.minHeight = Math.round(1500 * scale + 40) + 'px';
}
fit();
window.addEventListener('resize', fit);
</script>
</body>
</html>
