<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Barista FIRE Calculator Browser Mockup · Barista FIRE Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 21 · Mockup Browser · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxWidth&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);return y;
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../../../studio/assets/logo_brownish_framed_no_text_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Cream background
  ctx.fillStyle=P.cream;ctx.fillRect(0,0,W,H);

  // Headline
  ctx.fillStyle=P.nearBlk;ctx.font='300 64px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('See Your Results',W/2,32);
  ctx.fillStyle=P.green;ctx.font='italic 300 64px "Cormorant Garamond"';
  ctx.fillText('Instantly',W/2,104);
  ctx.fillStyle=P.warmGray;ctx.font='300 22px Lato';ctx.letterSpacing='0em';
  ctx.fillText('Free calculator — no sign-up required',W/2,182);
  ctx.textAlign='left';

  // Browser window mockup
  const bwX=50,bwY=230,bwW=W-100,bwH=850;
  // Browser shadow
  ctx.save();ctx.shadowColor='rgba(0,0,0,0.18)';ctx.shadowBlur=40;ctx.shadowOffsetY=16;
  rrect(bwX,bwY,bwW,bwH,18);ctx.fillStyle=P.white;ctx.fill();
  ctx.restore();
  ctx.strokeStyle=rgba(P.warmGray,0.2);ctx.lineWidth=1.5;rrect(bwX,bwY,bwW,bwH,18);ctx.stroke();

  // Browser chrome (top bar) — forest green
  const chromeH=52;
  ctx.fillStyle=P.green;
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(bwX,bwY,bwW,chromeH,[18,18,0,0]);ctx.fill();}
  else{ctx.fillRect(bwX,bwY,bwW,chromeH);}

  // Traffic lights
  [P.coral,'#F5A623',P.sagePale].forEach((c,i)=>{
    ctx.beginPath();ctx.arc(bwX+22+i*22,bwY+26,7,0,Math.PI*2);ctx.fillStyle=c;ctx.fill();
  });

  // URL bar
  rrect(bwX+90,bwY+13,bwW-140,26,13);ctx.fillStyle=rgba(P.cream,0.15);ctx.fill();
  ctx.fillStyle=rgba(P.cream,0.7);ctx.font='300 15px Lato';ctx.letterSpacing='0em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('timeandmoneytree.com/barista-fire-calculator',bwX+90+(bwW-140)/2,bwY+26);
  ctx.textAlign='left';

  // Screen content
  const screenY=bwY+chromeH;
  const screenH=bwH-chromeH;

  // Screen header
  ctx.fillStyle=P.sageFaint;ctx.fillRect(bwX,screenY,bwW,80);
  ctx.fillStyle=P.green;ctx.font='700 24px Lato';ctx.letterSpacing='0.06em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('BARISTA FIRE CALCULATOR',bwX+bwW/2,screenY+40);
  ctx.textAlign='left';

  // Input section (left column mockup)
  const inputX=bwX+30,inputY=screenY+100;
  ctx.fillStyle=P.green;ctx.font='700 15px Lato';ctx.letterSpacing='0.10em';
  ctx.textBaseline='top';
  ctx.fillText('YOUR DETAILS',inputX,inputY);

  const inputs=[
    {label:'Current Age',value:'30'},
    {label:'Portfolio Value','value':'$150,000'},
    {label:'Monthly Expenses',value:'$3,000'},
    {label:'Part-time Income (Phase 2)',value:'$1,200/mo'},
    {label:'Annual Savings',value:'$18,000'},
  ];
  let iy=inputY+32;
  inputs.forEach(inp=>{
    ctx.fillStyle=rgba(P.nearBlk,0.45);ctx.font='300 16px Lato';ctx.letterSpacing='0em';
    ctx.fillText(inp.label,inputX,iy);
    rrect(inputX,iy+22,380,36,6);ctx.fillStyle=P.white;ctx.fill();
    ctx.strokeStyle=rgba(P.sage,0.3);ctx.lineWidth=1;rrect(inputX,iy+22,380,36,6);ctx.stroke();
    ctx.fillStyle=P.nearBlk;ctx.font='700 18px Lato';
    ctx.textBaseline='middle';
    ctx.fillText(inp.value,inputX+14,iy+40);
    iy+=72;
  });

  // Divider
  ctx.strokeStyle=rgba(P.sage,0.25);ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(bwX+30,iy+10);ctx.lineTo(bwX+bwW-30,iy+10);ctx.stroke();

  // Results section
  const resY=iy+28;
  ctx.fillStyle=P.green;ctx.font='700 15px Lato';ctx.letterSpacing='0.10em';
  ctx.textBaseline='top';
  ctx.fillText('YOUR RESULTS',inputX,resY);

  const results=[
    {icon:'✓',label:'Barista FI: Age 38',sub:'8 years from now',color:P.green},
    {icon:'✓',label:'Full FIRE: Age 47',sub:'17 years from now',color:P.sage},
  ];
  let riy=resY+32;
  results.forEach(r=>{
    rrect(inputX,riy,bwW-60,58,8);ctx.fillStyle=rgba(r.color,0.08);ctx.fill();
    ctx.strokeStyle=rgba(r.color,0.3);ctx.lineWidth=1.5;rrect(inputX,riy,bwW-60,58,8);ctx.stroke();
    ctx.fillStyle=r.color;ctx.font='700 22px Lato';
    ctx.textBaseline='middle';
    ctx.fillText(r.icon,inputX+16,riy+29);
    ctx.fillStyle=P.nearBlk;ctx.font='700 22px Lato';
    ctx.fillText(r.label,inputX+46,riy+19);
    ctx.fillStyle=P.warmGray;ctx.font='300 17px Lato';
    ctx.fillText(r.sub,inputX+46,riy+42);
    riy+=68;
  });

  // Mini two-phase bar
  const barY=riy+12,barH=28,barX=inputX,barW=bwW-60;
  const p1=0.40,p2=0.60;
  ctx.fillStyle=P.sage;ctx.fillRect(barX,barY,barW*p1,barH);
  ctx.fillStyle=P.green;ctx.fillRect(barX+barW*p1,barY,barW*p2,barH);
  ctx.fillStyle=P.cream;ctx.font='700 14px Lato';ctx.letterSpacing='0em';
  ctx.textBaseline='middle';ctx.textAlign='center';
  ctx.fillText('Barista Phase',barX+barW*p1/2,barY+14);
  ctx.fillText('Full FIRE Phase',barX+barW*p1+barW*p2/2,barY+14);
  ctx.textAlign='left';

  // CTA
  const ctaW=300,ctaH=62,ctaX=(W-ctaW)/2,ctaY=1290;
  ctx.save();
  ctx.shadowColor='rgba(71,88,79,0.35)';ctx.shadowBlur=22;ctx.shadowOffsetY=8;
  rrect(ctaX,ctaY,ctaW,ctaH,31);ctx.fillStyle=P.green;ctx.fill();
  ctx.restore();
  ctx.fillStyle=P.cream;ctx.font='700 23px Lato';ctx.letterSpacing='0.10em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('TRY IT FREE →',W/2,ctaY+ctaH/2);
  ctx.textAlign='left';

  drawFooter();
}
function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='barista-fire-21-mockup-browser-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
