<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Numbers Behind Barista FIRE vs. Full FIRE · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 10 · Before After Numbers · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxWidth&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);return y;
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../../../studio/assets/logo_brownish_framed_no_text_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Cream bg
  ctx.fillStyle=P.cream;ctx.fillRect(0,0,W,H);

  // Top headline band
  ctx.fillStyle=P.white;ctx.fillRect(0,0,W,152);
  ctx.strokeStyle=rgba(P.sage,0.3);ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(0,150);ctx.lineTo(W,150);ctx.stroke();

  ctx.fillStyle=P.nearBlk;ctx.font='300 68px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('The Numbers That',W/2,20);
  ctx.fillText('Change Everything',W/2,94);
  ctx.textAlign='left';

  // Left/right column cards
  const colY=172,colH=780,colW=455,colGap=20;
  const col1X=W/2-colW-colGap/2;
  const col2X=W/2+colGap/2;

  // Left col header
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,0.10)';ctx.shadowBlur=14;ctx.shadowOffsetY=5;
  rrect(col1X,colY,colW,colH,16);ctx.fillStyle=rgba(P.warmGray,0.10);ctx.fill();
  ctx.restore();
  ctx.strokeStyle=rgba(P.warmGray,0.2);ctx.lineWidth=1.5;
  rrect(col1X,colY,colW,colH,16);ctx.stroke();

  // Right col
  ctx.save();
  ctx.shadowColor='rgba(71,88,79,0.20)';ctx.shadowBlur=24;ctx.shadowOffsetY=8;
  rrect(col2X,colY,colW,colH,16);ctx.fillStyle=P.green;ctx.fill();
  ctx.restore();

  // Left header
  ctx.fillStyle=rgba(P.warmGray,0.6);ctx.font='700 17px Lato';ctx.letterSpacing='0.12em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('FULL FIRE ONLY',col1X+colW/2,colY+20);

  // Left metrics
  const leftMetrics=[
    {label:'Portfolio Needed',val:'$1,125,000',note:'25× expenses'},
    {label:'Years Full-Time',val:'15',note:'Age 30 → 45'},
    {label:'Part-Time Work',val:'No',note:'Still full-time at 44'},
    {label:'Freedom',val:'Age 45',note:'One milestone only'},
  ];
  let lmy=colY+62;
  leftMetrics.forEach(m=>{
    ctx.fillStyle=rgba(P.warmGray,0.4);ctx.font='700 14px Lato';ctx.letterSpacing='0.10em';
    ctx.textAlign='center';ctx.textBaseline='top';
    ctx.fillText(m.label.toUpperCase(),col1X+colW/2,lmy);
    ctx.fillStyle=rgba(P.nearBlk,0.55);ctx.font='300 44px "Cormorant Garamond"';ctx.letterSpacing='0em';
    ctx.fillText(m.val,col1X+colW/2,lmy+22);
    ctx.fillStyle=rgba(P.warmGray,0.4);ctx.font='300 20px Lato';
    ctx.fillText(m.note,col1X+colW/2,lmy+74);
    // divider
    ctx.strokeStyle=rgba(P.warmGray,0.12);ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(col1X+20,lmy+100);ctx.lineTo(col1X+colW-20,lmy+100);ctx.stroke();
    lmy+=114;
  });

  // Right header
  ctx.fillStyle=P.sagePale;ctx.font='700 17px Lato';ctx.letterSpacing='0.12em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('BARISTA FIRE',col2X+colW/2,colY+20);

  const rightMetrics=[
    {label:'Barista FI Portfolio',val:'$540,000',note:'12–15× income gap'},
    {label:'Full-Time Years',val:'8',note:'Age 30 → 38'},
    {label:'Part-Time',val:'Age 38',note:'Phase 2 begins'},
    {label:'Full FIRE',val:'Age 47',note:'Two milestones!'},
  ];
  let rmy=colY+62;
  rightMetrics.forEach(m=>{
    ctx.fillStyle=rgba(P.sagePale,0.7);ctx.font='700 14px Lato';ctx.letterSpacing='0.10em';
    ctx.textAlign='center';ctx.textBaseline='top';
    ctx.fillText(m.label.toUpperCase(),col2X+colW/2,rmy);
    ctx.fillStyle=P.cream;ctx.font='300 44px "Cormorant Garamond"';ctx.letterSpacing='0em';
    ctx.fillText(m.val,col2X+colW/2,rmy+22);
    ctx.fillStyle=rgba(P.sagePale,0.7);ctx.font='300 20px Lato';
    ctx.fillText(m.note,col2X+colW/2,rmy+74);
    ctx.strokeStyle=rgba(P.sagePale,0.15);ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(col2X+20,rmy+100);ctx.lineTo(col2X+colW-20,rmy+100);ctx.stroke();
    rmy+=114;
  });
  ctx.textAlign='left';

  // Hero forest green strip
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,980,W,96);
  ctx.fillStyle=P.cream;ctx.font='300 40px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('7 years of part-time freedom — while portfolio grows to Full FIRE',W/2,980+48);
  ctx.textAlign='left';

  // Keywords
  const tags=['barista fire calculator','barista fire','fire retirement calculator'];
  const tagY=1108,tagH=40,tagGap=8,tagPad=16;
  ctx.font='700 17px Lato';ctx.letterSpacing='0.04em';
  const tagMetrics=tags.map(label=>({label,width:ctx.measureText(label).width+tagPad*2}));
  const totalTagW=tagMetrics.reduce((sum,{width})=>sum+width,0)+tagGap*(tagMetrics.length-1);
  let tx=(W-totalTagW)/2;
  tagMetrics.forEach(({label,width})=>{
    rrect(tx,tagY,width,tagH,20);ctx.fillStyle=rgba(P.sage,0.18);ctx.fill();
    ctx.strokeStyle=rgba(P.sage,0.38);ctx.lineWidth=1;ctx.stroke();
    ctx.fillStyle=P.green;ctx.textBaseline='middle';ctx.textAlign='center';
    ctx.fillText(label,tx+width/2,tagY+tagH/2);
    tx+=width+tagGap;
  });

  // Insight
  ctx.fillStyle=P.warmGray;ctx.font='300 26px Lato';
  ctx.textAlign='center';ctx.textBaseline='top';
  wrapText('Same destination. The Barista path delivers 7 years of freedom along the way.',W/2,1170,800,38);
  ctx.textAlign='left';

  // Savings comparison
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,0.06)';ctx.shadowBlur=8;ctx.shadowOffsetY=3;
  rrect(80,1250,840,80,12);ctx.fillStyle=P.white;ctx.fill();
  ctx.restore();
  ctx.strokeStyle=rgba(P.sage,0.3);ctx.lineWidth=1;rrect(80,1250,840,80,12);ctx.stroke();
  ctx.fillStyle=P.green;ctx.font='700 22px Lato';ctx.letterSpacing='0.06em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('$585,000 less needed at Barista FI vs Full FIRE',W/2,1290);
  ctx.textAlign='left';

  // CTA
  const ctaW=340,ctaH=62,ctaX=(W-ctaW)/2,ctaY=1312;
  ctx.save();
  ctx.shadowColor='rgba(71,88,79,0.35)';ctx.shadowBlur=22;ctx.shadowOffsetY=8;
  rrect(ctaX,ctaY,ctaW,ctaH,31);ctx.fillStyle=P.green;ctx.fill();
  ctx.restore();
  ctx.fillStyle=P.cream;ctx.font='700 23px Lato';ctx.letterSpacing='0.10em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('RUN YOUR NUMBERS →',W/2,ctaY+ctaH/2);
  ctx.textAlign='left';

  drawFooter();
}
function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='barista-fire-10-before-after-numbers-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
