<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Coast FIRE Calculator — Conservative vs. Aggressive Scenarios · Coast FIRE · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">coast-fire-04 · Two Scenarios · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');

const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',
};

function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxWidth&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);return y;
}

let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../../../studio/assets/logo_brownish_framed_no_text_2501x2500.png';}

function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}

function drawMetric(label,value,x,y,labelColor,valueColor){
  ctx.fillStyle=labelColor;ctx.font='700 16px Lato';ctx.letterSpacing='0.12em';ctx.textBaseline='top';
  ctx.fillText(label,x,y);
  ctx.fillStyle=valueColor;ctx.font='300 72px "Cormorant Garamond"';ctx.letterSpacing='-0.02em';ctx.textBaseline='top';
  ctx.fillText(value,x,y+20);
}

function render(){
  ctx.clearRect(0,0,W,H);

  // Headline band top
  ctx.fillStyle=P.cream;ctx.fillRect(0,0,W,160);
  ctx.fillStyle=P.nearBlk;ctx.font='300 68px "Cormorant Garamond"';ctx.letterSpacing='-0.01em';ctx.textBaseline='top';
  ctx.fillText('Two Scenarios. Your Choice.',76,20);

  // LEFT panel — pale sage
  ctx.fillStyle=P.sageFaint;ctx.fillRect(0,160,500,1235);

  // RIGHT panel — forest green
  ctx.fillStyle=P.green;ctx.fillRect(500,160,500,1235);

  // Vertical divider
  ctx.strokeStyle=rgba(P.sage,.6);ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(500,160);ctx.lineTo(500,1395);ctx.stroke();

  // LEFT content
  ctx.fillStyle=P.nearBlk;ctx.font='700 16px Lato';ctx.letterSpacing='0.15em';ctx.textBaseline='top';
  ctx.fillText('CONSERVATIVE',40,200);

  drawMetric('SAVINGS RATE','20%',40,240,P.warmGray,P.nearBlk);
  drawMetric('COAST AT','Age 43',40,400,P.warmGray,P.nearBlk);
  drawMetric('COAST NUMBER','$198,000',40,555,P.warmGray,P.nearBlk);

  ctx.fillStyle=P.warmGray;ctx.font='italic 300 24px "Cormorant Garamond"';ctx.letterSpacing='0em';ctx.textBaseline='top';
  ctx.fillText('Slower pace.',40,710);
  ctx.fillText('Still reaches coast.',40,745);

  // Bar visual LEFT
  const barY=810,barH=60,barW=420;
  rrect(40,barY,barW,barH,8);ctx.fillStyle=rgba(P.warmGray,.25);ctx.fill();
  rrect(40,barY,barW*0.20,barH,8);ctx.fillStyle=P.warmGray;ctx.fill();
  ctx.fillStyle=P.nearBlk;ctx.font='700 14px Lato';ctx.letterSpacing='0.08em';ctx.textBaseline='middle';
  ctx.fillText('SAVE 20%',50,barY+barH/2);
  ctx.fillStyle=P.warmGray;ctx.font='300 16px Lato';ctx.letterSpacing='0em';ctx.textBaseline='top';
  ctx.fillText('Retirement: $1.1M',40,barY+barH+12);

  // Emotional tag LEFT
  ctx.fillStyle=rgba(P.nearBlk,.20);ctx.font='italic 300 52px "Cormorant Garamond"';ctx.letterSpacing='0em';ctx.textBaseline='bottom';
  ctx.fillText('steady & sure.',40,1110);

  // RIGHT content
  ctx.fillStyle=P.cream;ctx.font='700 16px Lato';ctx.letterSpacing='0.15em';ctx.textBaseline='top';
  ctx.fillText('AGGRESSIVE',540,200);

  // Metrics right
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.12em';ctx.textBaseline='top';
  ctx.fillText('SAVINGS RATE',540,240);
  ctx.fillStyle=P.cream;ctx.font='300 72px "Cormorant Garamond"';ctx.letterSpacing='-0.02em';
  ctx.fillText('35%',540,260);

  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.12em';ctx.textBaseline='top';
  ctx.fillText('COAST AT',540,400);
  ctx.fillStyle=P.cream;ctx.font='300 72px "Cormorant Garamond"';ctx.letterSpacing='-0.02em';
  ctx.fillText('Age 36',540,420);

  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.12em';ctx.textBaseline='top';
  ctx.fillText('COAST NUMBER',540,555);
  ctx.fillStyle=P.cream;ctx.font='300 72px "Cormorant Garamond"';ctx.letterSpacing='-0.02em';
  ctx.fillText('$147,000',540,575);

  ctx.fillStyle=rgba(P.cream,.8);ctx.font='italic 300 24px "Cormorant Garamond"';ctx.letterSpacing='0em';ctx.textBaseline='top';
  ctx.fillText('More hustle now.',540,710);
  ctx.fillText('Coast 7 years earlier.',540,745);

  // Bar visual RIGHT
  rrect(540,barY,barW,barH,8);ctx.fillStyle=rgba(P.sagePale,.20);ctx.fill();
  rrect(540,barY,barW*0.35,barH,8);ctx.fillStyle=P.sagePale;ctx.fill();
  ctx.fillStyle=P.green;ctx.font='700 14px Lato';ctx.letterSpacing='0.08em';ctx.textBaseline='middle';
  ctx.fillText('SAVE 35%',550,barY+barH/2);
  ctx.fillStyle=rgba(P.cream,.7);ctx.font='300 16px Lato';ctx.letterSpacing='0em';ctx.textBaseline='top';
  ctx.fillText('Retirement: $1.1M',540,barY+barH+12);

  // Emotional tag RIGHT
  ctx.fillStyle=rgba(P.sagePale,.22);ctx.font='italic 300 52px "Cormorant Garamond"';ctx.letterSpacing='0em';ctx.textBaseline='bottom';
  ctx.fillText('coast sooner.',540,1110);

  // Hero stat band
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1275,W,120);
  ctx.fillStyle=P.cream;ctx.font='300 46px "Cormorant Garamond"';ctx.letterSpacing='-0.01em';ctx.textBaseline='middle';ctx.textAlign='center';
  ctx.fillText('$51,000 difference in coast number',W/2,1302);
  ctx.fillStyle=P.sagePale;ctx.font='700 20px Lato';ctx.letterSpacing='0.04em';
  ctx.fillText('Choose your pace →',W/2,1356);
  ctx.textAlign='left';

  ctx.textBaseline='alphabetic';ctx.letterSpacing='0em';
  drawFooter();
}

function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='coast-fire-04-direct-utility-two-outcome-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});

document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
