<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Coast FIRE Cheat Sheet — 5 Numbers That Define Your Plan · Coast FIRE · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">coast-fire-25 · Coast FIRE Cheat Sheet · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');

const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',
};

function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxWidth&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);return y;
}

let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../../../studio/assets/logo_brownish_framed_no_text_2501x2500.png';}

function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}

function render(){
  ctx.clearRect(0,0,W,H);

  // Cream bg
  ctx.fillStyle=P.cream;ctx.fillRect(0,0,W,1395);

  // Forest green top band
  ctx.fillStyle=P.green;ctx.fillRect(0,0,W,110);
  ctx.fillStyle=P.cream;ctx.font='700 22px Lato';ctx.letterSpacing='0.18em';ctx.textBaseline='middle';ctx.textAlign='center';
  ctx.fillText('COAST FIRE CHEAT SHEET',W/2,55);ctx.textAlign='left';

  // Headline
  ctx.fillStyle=P.nearBlk;ctx.font='300 82px "Cormorant Garamond"';ctx.letterSpacing='-0.01em';ctx.textBaseline='top';
  ctx.fillText('5 Coast FIRE Numbers to Know',76,120);

  // Sub
  ctx.fillStyle=P.warmGray;ctx.font='300 28px Lato';ctx.letterSpacing='0em';ctx.textBaseline='top';
  ctx.fillText('Know these five numbers — know your complete plan.',76,214);

  // 5 color-ramp rows
  const rows=[
    {bg:P.green,num:'#01',numC:P.sagePale,nameC:P.cream,bodyC:rgba(P.cream,.85),
     name:'Retirement income needed',body:'Your annual expenses in retirement (e.g. $45,000)',note:'→  input'},
    {bg:P.sage,num:'#02',numC:P.cream,nameC:P.cream,bodyC:rgba(P.cream,.85),
     name:'Full FIRE number',body:'Expenses × 25 = $1,125,000',note:'→  input'},
    {bg:P.sagePale,num:'#03',numC:P.green,nameC:P.nearBlk,bodyC:P.nearBlk,
     name:'Years to retirement',body:'From today to target retirement age (e.g. 24 years)',note:'→  input'},
    {bg:P.sageFaint,num:'#04',numC:P.sage,nameC:P.nearBlk,bodyC:P.warmGray,
     name:'Expected annual return rate',body:'Typically 5–8% (conservative: 6%, moderate: 7%)',note:'→  input'},
    {bg:P.white,border:P.green,borderW:4,num:'#05',numC:P.green,nameC:P.nearBlk,bodyC:P.green,
     name:'Your Coast Number',body:'Full FIRE ÷ (1.07)^24 = $207,000 ← THIS IS IT',note:'The number everything works toward',noteItalic:true},
  ];

  const rowH=168,gap=10,rowY0=252,rowX=80,rowW=840;
  rows.forEach((row,i)=>{
    const ry=rowY0+i*(rowH+gap);
    rrect(rowX,ry,rowW,rowH,14);ctx.fillStyle=row.bg;ctx.fill();
    if(row.border){
      ctx.strokeStyle=row.border;ctx.lineWidth=row.borderW;
      ctx.beginPath();ctx.moveTo(rowX,ry+14);ctx.lineTo(rowX,ry+rowH-14);ctx.stroke();
    }
    // Number
    ctx.fillStyle=row.numC;ctx.font='700 40px Lato';ctx.letterSpacing='0em';ctx.textBaseline='top';
    ctx.fillText(row.num,rowX+22,ry+20);

    // Name
    ctx.fillStyle=row.nameC;ctx.font='700 28px Lato';ctx.letterSpacing='0em';ctx.textBaseline='top';
    ctx.fillText(row.name,rowX+22,ry+68);

    // Body
    ctx.fillStyle=row.bodyC;ctx.font=i===4?'700 22px Lato':'300 22px Lato';ctx.letterSpacing='0em';ctx.textBaseline='top';
    ctx.fillText(row.body,rowX+22,ry+102);

    // Note (right-aligned)
    if(row.noteItalic){
      ctx.fillStyle=P.warmGray;ctx.font='italic 300 20px "Cormorant Garamond"';ctx.letterSpacing='0em';
    } else {
      ctx.fillStyle=row.numC;ctx.font='400 18px Lato';ctx.letterSpacing='0em';
    }
    ctx.textBaseline='bottom';ctx.textAlign='right';
    ctx.fillText(row.note,rowX+rowW-22,ry+rowH-12);ctx.textAlign='left';
  });

  // CTA
  const ctaW=380,ctaH=68,ctaX=(W-ctaW)/2,ctaY=1314;
  rrect(ctaX,ctaY,ctaW,ctaH,34);ctx.fillStyle=P.green;ctx.fill();
  ctx.fillStyle=P.cream;ctx.font='700 22px Lato';ctx.letterSpacing='0.04em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('Calculate All 5 →',ctaX+ctaW/2,ctaY+ctaH/2);ctx.textAlign='left';

  ctx.textBaseline='alphabetic';ctx.letterSpacing='0em';
  drawFooter();
}

function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='coast-fire-25-educational-cheat-sheet-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});

document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
