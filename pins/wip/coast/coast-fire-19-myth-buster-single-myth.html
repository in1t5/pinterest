<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Coast FIRE Only Works If You Start Young — Busted · Coast FIRE · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">coast-fire-19 · Late Starters Myth Busted · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');

const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',
};

function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxWidth&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);return y;
}

let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../../../studio/assets/logo_brownish_framed_no_text_2501x2500.png';}

function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}

function render(){
  ctx.clearRect(0,0,W,H);

  // Cream bg
  ctx.fillStyle=P.cream;ctx.fillRect(0,0,W,1395);

  // Label
  ctx.fillStyle=P.warmGray;ctx.font='700 14px Lato';ctx.letterSpacing='0.12em';ctx.textBaseline='top';
  ctx.fillText('THE COAST FIRE MYTH THAT STOPS LATE STARTERS',76,44);

  // Large italic myth
  ctx.fillStyle=P.nearBlk;ctx.font='italic 300 82px "Cormorant Garamond"';ctx.letterSpacing='-0.01em';ctx.textBaseline='top';
  wrapText('"Coast FIRE only works if you start in your 20s"',76,76,848,92);

  // MYTH chip
  rrect(76,330,130,50,25);ctx.fillStyle=P.coral;ctx.fill();
  ctx.fillStyle=P.white;ctx.font='700 20px Lato';ctx.letterSpacing='0.08em';ctx.textBaseline='middle';ctx.textAlign='center';
  ctx.fillText('MYTH',141,355);ctx.textAlign='left';

  // Divider accent
  ctx.strokeStyle=rgba(P.sage,.5);ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(76,402);ctx.lineTo(924,402);ctx.stroke();

  // Correction card
  rrect(76,424,848,264,16);ctx.fillStyle=P.white;ctx.fill();
  ctx.strokeStyle=P.sage;ctx.lineWidth=2;ctx.stroke();

  ctx.fillStyle=P.green;ctx.font='700 16px Lato';ctx.letterSpacing='0.12em';ctx.textBaseline='top';
  ctx.fillText('THE REALITY',104,448);
  ctx.fillStyle=P.nearBlk;ctx.font='700 32px Lato';ctx.letterSpacing='0em';ctx.textBaseline='top';
  ctx.fillText('Coast FIRE works at any age.',104,478);
  ctx.fillStyle=P.warmGray;ctx.font='300 24px Lato';ctx.letterSpacing='0em';ctx.textBaseline='top';
  wrapText('The number changes. The strategy doesn\'t. Starting at 40 with $200k invested and a 62 retirement target = coast number still within reach.',104,524,790,32);

  // Age example chips
  const ageChips=[
    {x:80,w:240,label:'START AT 25',cnLabel:'Coast #',cn:'~$80,000',bg:P.sageFaint,labelC:P.nearBlk,cnC:P.green},
    {x:340,w:280,label:'START AT 35',cnLabel:'Coast #',cn:'~$180,000',bg:P.sage,labelC:P.nearBlk,cnC:P.nearBlk},
    {x:640,w:240,label:'START AT 40',cnLabel:'Coast #',cn:'~$280,000',bg:P.green,labelC:P.cream,cnC:P.cream},
  ];
  ageChips.forEach(ch=>{
    rrect(ch.x,740,ch.w,156,12);ctx.fillStyle=ch.bg;ctx.fill();
    ctx.fillStyle=ch.labelC;ctx.font='700 16px Lato';ctx.letterSpacing='0.08em';ctx.textBaseline='top';
    ctx.fillText(ch.label,ch.x+18,758);
    ctx.fillStyle=ch.cnC;ctx.font='400 18px Lato';ctx.letterSpacing='0em';ctx.textBaseline='top';
    ctx.fillText(ch.cnLabel,ch.x+18,786);
    ctx.fillStyle=ch.cnC;ctx.font='300 58px "Cormorant Garamond"';ctx.letterSpacing='-0.02em';ctx.textBaseline='top';
    ctx.fillText(ch.cn,ch.x+18,806);
  });

  // Insight strip
  rrect(76,942,848,92,14);ctx.fillStyle=P.sageFaint;ctx.fill();
  ctx.fillStyle=P.nearBlk;ctx.font='300 26px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='center';
  ctx.fillText('Late starter? Your coast number is larger — but your strategy is identical.',W/2,988);ctx.textAlign='left';

  // CTA
  const ctaW=420,ctaH=68,ctaX=(W-ctaW)/2,ctaY=1086;
  rrect(ctaX,ctaY,ctaW,ctaH,34);ctx.fillStyle=P.green;ctx.fill();
  ctx.fillStyle=P.cream;ctx.font='700 22px Lato';ctx.letterSpacing='0.02em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('Find Your Age-Specific Number →',ctaX+ctaW/2,ctaY+ctaH/2);ctx.textAlign='left';

  // Keywords
  const tags=['coast fire calculator','coast fire number','financial independence calculator'];
  const tagY=1216,tagH=40,tagGap=12,tagPad=16;
  ctx.font='400 17px Lato';ctx.letterSpacing='0em';
  const tagMetrics=tags.map(label=>({label,width:ctx.measureText(label).width+tagPad*2}));
  const totalTagW=tagMetrics.reduce((sum,{width})=>sum+width,0)+tagGap*(tagMetrics.length-1);
  let tx=(W-totalTagW)/2;
  tagMetrics.forEach(({label,width})=>{
    rrect(tx,tagY,width,tagH,20);ctx.strokeStyle=rgba(P.sage,.6);ctx.lineWidth=1.5;ctx.stroke();
    ctx.fillStyle=P.sage;ctx.textBaseline='middle';ctx.textAlign='center';
    ctx.fillText(label,tx+width/2,tagY+tagH/2);
    tx+=width+tagGap;
  });

  ctx.textBaseline='alphabetic';ctx.letterSpacing='0em';
  drawFooter();
}

function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='coast-fire-19-myth-buster-single-myth-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});

document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
