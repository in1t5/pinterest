<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Coast FIRE Notebook Calculation · 1000×1500</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../../studio/templates/pins.css" />
<link rel="stylesheet" href="../../../studio/templates/pins-29-32.css" />
<style>
  html, body { margin: 0; padding: 20px; background: #f0eee9; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; box-sizing: border-box; }
  .pin-wrap { transform-origin: top center; }
</style>
</head>
<body>
<div class="pin-wrap">
  <div class="pin pin-32">
    <div class="notebook"></div>
    <div class="margin-line"></div>

    <div class="top">
      <span class="eyebrow"><span class="dot"></span><span>Coast FIRE Calculator</span></span>
    </div>

    <h1 class="headline">
      The calculation that<br />
      <em>changed my savings plan.</em>
    </h1>

    <div class="work">
      <div class="step-line">
        <span class="kk">Monthly savings</span>
        <span class="vv">€850</span>
      </div>
      <div class="step-line">
        <span class="kk">Years of saving</span>
        <span class="vv">8 yrs</span>
        <span class="annot">that's it</span>
      </div>
      <div class="step-line">
        <span class="kk">Return rate</span>
        <span class="vv">7% p.a.</span>
      </div>
      <div class="equation-line">
        <span class="label">Coast FIRE Number</span>
        <span class="arrow">→</span>
      </div>
    </div>

    <div class="answer">
      <span class="label">Answer:</span>
      <span class="val">€240K</span>
    </div>

    <div class="scribble">
      Stop saving at 38
      <small>COAST FIRE CALCULATOR · TIMEANDMONEYTREE.COM</small>
    </div>

    <div class="footer">
      <div class="footer-brand">
        <img src="../../../studio/assets/logo_brownish_framed_no_text_2501x2500.png" alt="" />
        <div>
          <div class="name">Time &amp; Moneytree</div>
          <div class="url">TIMEANDMONEYTREE.COM</div>
        </div>
      </div>
      <span class="cta-pill">Calculate yours →</span>
    </div>
  </div>
</div>
<script>
function fit() {
  var scale = Math.min(1, (window.innerHeight - 40) / 1500, (window.innerWidth - 40) / 1000);
  document.querySelector('.pin-wrap').style.transform = 'scale(' + scale + ')';
  document.body.style.minHeight = Math.round(1500 * scale + 40) + 'px';
}
fit();
window.addEventListener('resize', fit);
</script>
</body>
</html>
