<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Find Your Coast FIRE Number in 5 Minutes — Free Calculator Guide · Coast FIRE · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;width:420px;height:630px;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">coast-fire-29 · Quick-Start Guide · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');

const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',
};

function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxWidth&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);return y;
}

let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_2501x2500.png';}

function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}

function drawTimeChip(text,x,y,isGreen){
  const tw=ctx.measureText(text).width+30,th=32;
  rrect(x,y-th/2,tw,th,16);
  ctx.fillStyle=isGreen?P.green:P.sageFaint;ctx.fill();
  ctx.fillStyle=isGreen?P.cream:P.sage;ctx.font='700 14px Lato';ctx.letterSpacing='0.06em';ctx.textBaseline='middle';
  ctx.fillText(text,x+15,y);
}

function render(){
  ctx.clearRect(0,0,W,H);

  // Cream bg
  ctx.fillStyle=P.cream;ctx.fillRect(0,0,W,1395);

  // Green top band
  ctx.fillStyle=P.green;ctx.fillRect(0,0,W,100);
  ctx.fillStyle=P.cream;ctx.font='700 20px Lato';ctx.letterSpacing='0.15em';ctx.textBaseline='middle';ctx.textAlign='center';
  ctx.fillText('COAST FIRE QUICK-START GUIDE',W/2,50);ctx.textAlign='left';

  // Headline
  ctx.fillStyle=P.nearBlk;ctx.font='300 84px "Cormorant Garamond"';ctx.letterSpacing='-0.01em';ctx.textBaseline='top';
  ctx.fillText('Your Coast Number in 5 Minutes',76,110);

  // Sub
  ctx.fillStyle=P.warmGray;ctx.font='300 28px Lato';ctx.letterSpacing='0em';ctx.textBaseline='top';
  ctx.fillText('Four steps. One number. Complete plan.',76,208);

  // 4 step cards
  const steps=[
    {border:P.sagePale,bg:P.white,num:'01',numC:P.sagePale,time:'1 min',
     title:'Enter your basic info',
     body:'Current age · Target retirement age · Current portfolio value'},
    {border:P.sage,bg:P.white,num:'02',numC:P.sage,time:'1 min',
     title:'Enter your retirement expenses',
     body:'Annual expenses + expected return rate'},
    {border:P.green,bg:P.sageFaint,num:'03',numC:P.green,time:'1 min',timeGreen:true,elevated:true,
     title:'See your coast number instantly',
     body:null,result:'$207,000',resultNote:'← Your coast target'},
    {border:P.sagePale,bg:P.white,num:'04',numC:P.warmGray,time:'2 min',
     title:'Explore scenarios',
     body:'What if you retire earlier? Or save more now?'},
  ];

  const cardH=222,gap=12,cardY0=250,cardX=80,cardW=840;
  steps.forEach((step,i)=>{
    const sy=cardY0+i*(cardH+gap);
    if(step.elevated){
      ctx.save();ctx.shadowColor='rgba(26,26,24,0.12)';ctx.shadowBlur=24;ctx.shadowOffsetY=10;
    }
    rrect(cardX,sy,cardW,cardH,14);ctx.fillStyle=step.bg;ctx.fill();
    if(step.elevated) ctx.restore();

    // Left border
    ctx.strokeStyle=step.border;ctx.lineWidth=6;
    ctx.beginPath();ctx.moveTo(cardX,sy+14);ctx.lineTo(cardX,sy+cardH-14);ctx.stroke();

    // Step number
    ctx.fillStyle=step.numC;ctx.font='700 60px Lato';ctx.letterSpacing='0em';ctx.textBaseline='top';
    ctx.fillText(step.num,cardX+22,sy+18);

    // Time chip
    ctx.font='700 14px Lato';
    drawTimeChip(step.time,cardX+110,sy+36,step.timeGreen||false);

    // Title
    ctx.fillStyle=P.nearBlk;ctx.font='700 28px Lato';ctx.letterSpacing='0em';ctx.textBaseline='top';
    ctx.fillText(step.title,cardX+22,sy+96);

    if(step.body){
      ctx.fillStyle=P.warmGray;ctx.font='300 24px Lato';ctx.letterSpacing='0em';ctx.textBaseline='top';
      ctx.fillText(step.body,cardX+22,sy+138);
    }

    if(step.result){
      ctx.fillStyle=P.green;ctx.font='300 70px "Cormorant Garamond"';ctx.letterSpacing='-0.02em';ctx.textBaseline='top';
      ctx.fillText(step.result,cardX+22,sy+130);
      ctx.fillStyle=P.sage;ctx.font='italic 400 22px Lato';ctx.letterSpacing='0em';ctx.textBaseline='top';
      ctx.fillText(step.resultNote,cardX+22+ctx.measureText(step.result).width+8,sy+162);
    }
  });

  // Tagline strip
  const tagY=1240;
  rrect(80,tagY,840,76,14);ctx.fillStyle=P.sage;ctx.fill();
  ctx.fillStyle=P.cream;ctx.font='italic 300 42px "Cormorant Garamond"';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='center';
  ctx.fillText('One number. One milestone. Complete freedom.',W/2,tagY+38);ctx.textAlign='left';

  // CTA
  const ctaW=380,ctaH=68,ctaX=(W-ctaW)/2,ctaY=1340;
  rrect(ctaX,ctaY,ctaW,ctaH,34);ctx.fillStyle=P.green;ctx.fill();
  ctx.fillStyle=P.cream;ctx.font='700 22px Lato';ctx.letterSpacing='0.04em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('Start Now — Free →',ctaX+ctaW/2,ctaY+ctaH/2);ctx.textAlign='left';

  ctx.textBaseline='alphabetic';ctx.letterSpacing='0em';
  drawFooter();
}

document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='coast-fire-29-educational-quick-start-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});

document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
