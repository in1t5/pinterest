<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Do You Know What Your Coast FIRE Number Is · Coast FIRE · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">coast-fire-07 · Do You Know Your Coast FIRE Number · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');

const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',
};

function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxWidth&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);return y;
}

let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_no_text_2501x2500.png';}

function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}

function render(){
  ctx.clearRect(0,0,W,H);

  // Cream bg
  ctx.fillStyle=P.cream;ctx.fillRect(0,0,W,1395);

  // Large italic question
  ctx.fillStyle=P.nearBlk;ctx.font='italic 300 96px "Cormorant Garamond"';ctx.letterSpacing='-0.01em';ctx.textBaseline='top';
  wrapText('Do you know your Coast FIRE number?',76,90,848,108);

  // Body
  ctx.fillStyle=P.warmGray;ctx.font='300 32px Lato';ctx.letterSpacing='0em';ctx.textBaseline='top';
  wrapText('It\'s the portfolio size where compound growth retires you — with zero additional saving required.',76,340,848,44);

  // Accent line sage
  ctx.strokeStyle=rgba(P.sage,.5);ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(76,456);ctx.lineTo(924,456);ctx.stroke();

  // Contrast strip 1 — WITHOUT target
  const s1y=490;
  rrect(80,s1y,840,120,10);ctx.fillStyle=P.white;ctx.fill();
  ctx.strokeStyle=P.warmGray;ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(80,s1y);ctx.lineTo(80,s1y+120);ctx.stroke();
  ctx.fillStyle=P.nearBlk;ctx.font='700 20px Lato';ctx.letterSpacing='0em';ctx.textBaseline='top';
  ctx.fillText('Saving without a coast target:',110,s1y+14);
  ctx.fillStyle=P.warmGray;ctx.font='300 28px Lato';ctx.textBaseline='top';
  ctx.fillText('contributions: indefinitely',110,s1y+46);
  ctx.fillStyle=P.coral;ctx.font='300 26px Lato';ctx.textBaseline='top';
  ctx.fillText('end date: unknown',110,s1y+80);

  // Contrast strip 2 — WITH target
  const s2y=628;
  rrect(80,s2y,840,120,10);ctx.fillStyle=P.sageFaint;ctx.fill();
  ctx.strokeStyle=P.green;ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(80,s2y);ctx.lineTo(80,s2y+120);ctx.stroke();
  ctx.fillStyle=P.nearBlk;ctx.font='700 20px Lato';ctx.letterSpacing='0em';ctx.textBaseline='top';
  ctx.fillText('With a coast target:',110,s2y+14);
  ctx.fillStyle=P.green;ctx.font='300 28px Lato';ctx.textBaseline='top';
  ctx.fillText('contributions: stop at Age 38',110,s2y+46);
  ctx.fillStyle=P.sage;ctx.font='300 26px Lato';ctx.textBaseline='top';
  ctx.fillText('end date: certain',110,s2y+80);

  // Large calculation
  ctx.fillStyle=P.nearBlk;ctx.font='300 58px "Cormorant Garamond"';ctx.letterSpacing='-0.01em';ctx.textBaseline='top';ctx.textAlign='center';
  ctx.fillText('Your number. 2 minutes. Free.',W/2,810);ctx.textAlign='left';

  // Calculator prompt card
  ctx.save();ctx.shadowColor='rgba(26,26,24,0.09)';ctx.shadowBlur=24;ctx.shadowOffsetY=10;
  rrect(80,900,840,250,18);ctx.fillStyle=P.white;ctx.fill();ctx.restore();

  ctx.fillStyle=P.warmGray;ctx.font='700 16px Lato';ctx.letterSpacing='0.12em';ctx.textBaseline='top';
  ctx.fillText('TO FIND YOUR COAST NUMBER, YOU NEED:',110,930);

  const reqItems=['• Current age','• Target retirement age','• Current portfolio value','• Annual expenses'];
  reqItems.forEach((item,i)=>{
    ctx.fillStyle=P.nearBlk;ctx.font='300 26px Lato';ctx.letterSpacing='0em';ctx.textBaseline='top';
    const col=i%2,row=Math.floor(i/2);
    ctx.fillText(item,110+col*380,965+row*38);
  });

  ctx.fillStyle=P.green;ctx.font='italic 300 46px "Cormorant Garamond"';ctx.letterSpacing='0em';ctx.textBaseline='top';
  ctx.fillText('That\'s it.',110,1060);

  // CTA
  const ctaW=380,ctaH=68,ctaX=(W-ctaW)/2,ctaY=1220;
  rrect(ctaX,ctaY,ctaW,ctaH,34);ctx.fillStyle=P.green;ctx.fill();
  ctx.fillStyle=P.cream;ctx.font='700 22px Lato';ctx.letterSpacing='0.04em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('Calculate Yours Free →',ctaX+ctaW/2,ctaY+ctaH/2);ctx.textAlign='left';

  ctx.textBaseline='alphabetic';ctx.letterSpacing='0em';
  drawFooter();
}

function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='coast-fire-07-question-hook-self-awareness-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});

document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
