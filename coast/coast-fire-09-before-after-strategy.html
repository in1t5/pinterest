<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Saving Forever vs. Coast FIRE — Two Ways to the Same Retirement · Coast FIRE · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;width:420px;height:630px;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">coast-fire-09 · Saving Forever vs. Coast FIRE · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');

const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',
};

function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}

let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_2501x2500.png';}

function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}

function drawStat(label,value,x,y,labelColor,valueColor){
  ctx.fillStyle=labelColor;ctx.font='700 14px Lato';ctx.letterSpacing='0.10em';ctx.textBaseline='top';
  ctx.fillText(label,x,y);
  ctx.fillStyle=valueColor;ctx.font='300 34px "Cormorant Garamond"';ctx.letterSpacing='0em';ctx.textBaseline='top';
  ctx.fillText(value,x,y+18);
}

function render(){
  ctx.clearRect(0,0,W,H);

  // Top headline band
  ctx.fillStyle=P.green;ctx.fillRect(0,0,W,160);
  ctx.fillStyle=P.cream;ctx.font='300 64px "Cormorant Garamond"';ctx.letterSpacing='-0.01em';ctx.textBaseline='top';
  ctx.fillText('Saving Forever vs. Coast FIRE',76,30);
  ctx.fillStyle=P.sagePale;ctx.font='300 26px Lato';ctx.letterSpacing='0em';ctx.textBaseline='top';
  ctx.fillText('Two ways to the same retirement',76,108);

  // LEFT panel — warmGray tint
  ctx.fillStyle='#888080';ctx.fillRect(0,160,500,1075);

  // RIGHT panel — forest green
  ctx.fillStyle=P.green;ctx.fillRect(500,160,500,1075);

  // LEFT content
  ctx.fillStyle=P.cream;ctx.font='700 16px Lato';ctx.letterSpacing='0.15em';ctx.textBaseline='top';
  ctx.fillText('TRADITIONAL PATH',40,210);

  // Stats stack LEFT
  const statsL=[
    ['SAVINGS PERIOD','37 years'],
    ['MONTHLY SAVINGS','forever'],
    ['CONTRIBUTIONS','$420,000'],
    ['PORTFOLIO AT 67','$1.2M'],
  ];
  statsL.forEach((s,i)=>{
    drawStat(s[0],s[1],40,270+i*150,rgba(P.cream,.6),P.cream);
  });

  // Timeline bar LEFT
  const tlY=880,tlH=50,tlW=420;
  rrect(40,tlY,tlW,tlH,6);ctx.fillStyle=rgba(P.cream,.25);ctx.fill();
  ctx.fillStyle=rgba(P.cream,.7);ctx.font='700 14px Lato';ctx.letterSpacing='0.06em';ctx.textBaseline='middle';ctx.textAlign='center';
  ctx.fillText('30 ─────────── always saving ─────────── 67',40+tlW/2,tlY+tlH/2);ctx.textAlign='left';

  // Emotional tag LEFT
  ctx.fillStyle=rgba(P.cream,.25);ctx.font='italic 300 52px "Cormorant Garamond"';ctx.letterSpacing='0em';ctx.textBaseline='bottom';
  ctx.fillText('always saving.',40,1155);

  // RIGHT content
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.15em';ctx.textBaseline='top';
  ctx.fillText('COAST FIRE PATH',540,210);

  const statsR=[
    ['SAVINGS PERIOD','8 years'],
    ['MONTHLY SAVINGS','stops at 38'],
    ['CONTRIBUTIONS','$87,000'],
    ['PORTFOLIO AT 62','$1.1M'],
  ];
  statsR.forEach((s,i)=>{
    ctx.fillStyle=rgba(P.sagePale,.7);ctx.font='700 14px Lato';ctx.letterSpacing='0.10em';ctx.textBaseline='top';
    ctx.fillText(s[0],540,270+i*150);
    ctx.fillStyle=P.cream;ctx.font='300 34px "Cormorant Garamond"';ctx.letterSpacing='0em';ctx.textBaseline='top';
    ctx.fillText(s[1],540,288+i*150);
  });

  // Two-phase timeline bar RIGHT
  rrect(540,tlY,80,tlH,6);ctx.fillStyle=P.sagePale;ctx.fill();
  rrect(620,tlY,340,tlH,0);ctx.fillStyle=rgba(P.sagePale,.4);ctx.fill();
  ctx.fillStyle=P.greenDk;ctx.font='700 13px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='center';
  ctx.fillText('30–38',580,tlY+tlH/2);
  ctx.fillStyle=P.cream;ctx.fillText('38–62 →',790,tlY+tlH/2);
  ctx.textAlign='left';

  // Emotional tag RIGHT
  ctx.fillStyle=rgba(P.sagePale,.3);ctx.font='italic 300 52px "Cormorant Garamond"';ctx.letterSpacing='0em';ctx.textBaseline='bottom';
  ctx.fillText('coasting free.',540,1155);

  // Hero stat band
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1235,W,160);
  ctx.fillStyle=P.cream;ctx.font='300 46px "Cormorant Garamond"';ctx.letterSpacing='-0.01em';ctx.textBaseline='top';ctx.textAlign='center';
  ctx.fillText('$333,000 less contributed. Same retirement.',W/2,1252);
  ctx.fillStyle=P.sagePale;ctx.font='700 20px Lato';ctx.letterSpacing='0.04em';ctx.textBaseline='top';ctx.textAlign='center';
  ctx.fillText('→  Find your coast number free',W/2,1310);
  ctx.textAlign='left';

  ctx.textBaseline='alphabetic';ctx.letterSpacing='0em';
  drawFooter();
}

document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='coast-fire-09-before-after-strategy-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});

document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
