<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Coast FIRE Timeline — From Saving to Coasting to Retiring · Coast FIRE · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">coast-fire-03 · Coast FIRE Timeline · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');

const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',
};

function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxWidth&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);return y;
}

let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_no_text_2501x2500.png';}

function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}

function render(){
  ctx.clearRect(0,0,W,H);

  // Cream bg
  ctx.fillStyle=P.cream;ctx.fillRect(0,0,W,1395);

  // Header band
  ctx.fillStyle=P.green;ctx.fillRect(0,0,W,100);
  ctx.fillStyle=P.cream;ctx.font='700 22px Lato';ctx.letterSpacing='0.15em';ctx.textBaseline='middle';ctx.textAlign='center';
  ctx.fillText('COAST FIRE TIMELINE',W/2,50);
  ctx.textAlign='left';

  // Large headline
  ctx.fillStyle=P.nearBlk;ctx.font='300 88px "Cormorant Garamond"';ctx.letterSpacing='-0.01em';ctx.textBaseline='top';
  ctx.fillText('Your Coast FIRE',76,130);
  ctx.fillText('Journey',76,228);

  // Sub
  ctx.fillStyle=P.warmGray;ctx.font='300 32px Lato';ctx.letterSpacing='0em';ctx.textBaseline='top';
  ctx.fillText('8 years of saving. 24 years of compound growth.',76,332);

  // 3-phase timeline bar
  const phases=[
    {label:'SAVE AGGRESSIVELY',age:'Age 30',port:'$0 → $247k',x:80,w:248,fill:P.green,textColor:P.cream,portColor:P.green},
    {label:'COAST',age:'Age 38',port:'$247k growing…',x:348,w:290,fill:P.sage,textColor:P.cream,portColor:P.nearBlk},
    {label:'RETIRE',age:'Age 62',port:'$1.1M',x:658,w:262,fill:P.sagePale,textColor:P.nearBlk,portColor:P.green},
  ];

  phases.forEach((ph,i)=>{
    const barY=480,barH=90;
    // Label above
    ctx.fillStyle=P.nearBlk;ctx.font='700 16px Lato';ctx.letterSpacing='0.12em';ctx.textBaseline='bottom';
    ctx.textAlign='center';
    ctx.fillText(ph.label,ph.x+ph.w/2,barY-8);
    // Bar
    rrect(ph.x,barY,ph.w,barH,10);ctx.fillStyle=ph.fill;ctx.fill();
    // Arrow connector
    if(i<2){
      ctx.fillStyle=P.warmGray;ctx.font='700 28px Lato';ctx.textBaseline='middle';ctx.textAlign='center';
      ctx.fillText('→',ph.x+ph.w+phases[i+1>2?2:i+1].x===undefined?ph.x+ph.w+20:ph.x+ph.w+((phases[i+1].x-ph.x-ph.w)/2),barY+barH/2);
    }
    // Age below
    ctx.fillStyle=P.sage;ctx.font='400 22px Lato';ctx.letterSpacing='0em';ctx.textBaseline='top';ctx.textAlign='center';
    ctx.fillText(ph.age,ph.x+ph.w/2,barY+barH+8);
    // Portfolio below
    ctx.fillStyle=ph.portColor;ctx.font='700 20px Lato';ctx.textBaseline='top';ctx.textAlign='center';
    ctx.fillText(ph.port,ph.x+ph.w/2,barY+barH+34);
  });
  ctx.textAlign='left';

  // Insight card
  const icY=640,icH=190;
  ctx.save();ctx.shadowColor='rgba(26,26,24,0.08)';ctx.shadowBlur=20;ctx.shadowOffsetY=8;
  rrect(80,icY,840,icH,18);ctx.fillStyle=P.sageFaint;ctx.fill();ctx.restore();

  ctx.fillStyle=P.nearBlk;ctx.font='300 26px Lato';ctx.textBaseline='top';ctx.letterSpacing='0em';
  ctx.fillText('8 years of active saving',120,icY+30);
  ctx.fillStyle=P.warmGray;ctx.font='300 22px Lato';
  ctx.fillText('then compound growth takes over',120,icY+66);

  ctx.fillStyle=P.green;ctx.font='300 130px "Cormorant Garamond"';ctx.letterSpacing='-0.02em';ctx.textBaseline='top';ctx.textAlign='right';
  ctx.fillText('24',880,icY+14);
  ctx.textAlign='left';
  ctx.fillStyle=P.warmGray;ctx.font='400 22px Lato';ctx.letterSpacing='0em';ctx.textBaseline='top';
  ctx.fillText('years of effortless compound growth',120,icY+108);

  // Formula row
  const fY=880;
  const fChips=[
    {label:'Annual savings: $15,000',x:80,w:290,bg:P.sageFaint,text:P.nearBlk},
    {label:'×',x:390,w:50,bg:'transparent',text:P.warmGray},
    {label:'Years: 8',x:458,w:190,bg:P.sageFaint,text:P.nearBlk},
    {label:'=',x:668,w:50,bg:'transparent',text:P.warmGray},
    {label:'Coast Number: $247,000',x:736,w:0,bg:P.green,text:P.cream},
  ];
  fChips[4].w=ctx.measureText(fChips[4].label).width+40;

  fChips.forEach(fc=>{
    if(fc.bg==='transparent'){
      ctx.fillStyle=fc.text;ctx.font='300 40px "Cormorant Garamond"';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='center';
      ctx.fillText(fc.label,fc.x+fc.w/2,fY+36);
    } else {
      rrect(fc.x,fY,fc.w,72,10);ctx.fillStyle=fc.bg;ctx.fill();
      ctx.fillStyle=fc.text;ctx.font='400 20px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='center';
      ctx.fillText(fc.label,fc.x+fc.w/2,fY+36);
    }
  });
  ctx.textAlign='left';

  // Body text
  ctx.fillStyle=P.warmGray;ctx.font='300 27px Lato';ctx.letterSpacing='0em';ctx.textBaseline='top';
  wrapText('Set your coast target, save aggressively to hit it, then let 7% compound growth build $1.1M by retirement.',76,1010,848,38);

  // CTA
  const ctaW=380,ctaH=68,ctaX=(W-ctaW)/2,ctaY2=1110;
  rrect(ctaX,ctaY2,ctaW,ctaH,34);ctx.fillStyle=P.green;ctx.fill();
  ctx.fillStyle=P.cream;ctx.font='700 22px Lato';ctx.letterSpacing='0.04em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('Map Your Timeline →',ctaX+ctaW/2,ctaY2+ctaH/2);ctx.textAlign='left';

  // Keyword tags
  const tags=['coast fire calculator','coast fire investing strategy','fire calculator'];
  const tagY=1230,tagH=42,tagGap=14,tagPad=18;
  ctx.font='400 19px Lato';ctx.letterSpacing='0em';
  const tagMetrics=tags.map(label=>({label,width:ctx.measureText(label).width+tagPad*2}));
  const totalTagW=tagMetrics.reduce((sum,{width})=>sum+width,0)+tagGap*(tagMetrics.length-1);
  let tx=(W-totalTagW)/2;
  tagMetrics.forEach(({label,width})=>{
    rrect(tx,tagY,width,tagH,21);ctx.strokeStyle=rgba(P.sage,.6);ctx.lineWidth=1.5;ctx.stroke();
    ctx.fillStyle=P.sage;ctx.textBaseline='middle';ctx.textAlign='center';
    ctx.fillText(label,tx+width/2,tagY+tagH/2);
    tx+=width+tagGap;
  });

  ctx.textBaseline='alphabetic';ctx.letterSpacing='0em';
  drawFooter();
}

function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='coast-fire-03-direct-utility-timeline-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});

document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
