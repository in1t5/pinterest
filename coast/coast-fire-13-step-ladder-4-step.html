<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>How to Calculate Your Coast FIRE Number in 4 Steps · Coast FIRE · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;width:420px;height:630px;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">coast-fire-13 · Coast FIRE Number in 4 Steps · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');

const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',
};

function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}

let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_2501x2500.png';}

function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}

function render(){
  ctx.clearRect(0,0,W,H);

  // Cream bg
  ctx.fillStyle=P.cream;ctx.fillRect(0,0,W,1395);

  // Header band
  ctx.fillStyle=P.green;ctx.fillRect(0,0,W,110);
  ctx.fillStyle=P.cream;ctx.font='700 20px Lato';ctx.letterSpacing='0.15em';ctx.textBaseline='middle';ctx.textAlign='center';
  ctx.fillText('YOUR COAST FIRE NUMBER IN 4 STEPS',W/2,55);ctx.textAlign='left';

  // 4 step cards
  const steps=[
    {
      num:'01',border:P.green,bg:P.white,numColor:P.green,
      title:'Know your target retirement income',
      body:'Your annual expenses in retirement (e.g. $45,000/year)',
      tip:'Tip: include housing, food, travel, healthcare',tipColor:P.sage,
    },
    {
      num:'02',border:P.sage,bg:P.white,numColor:P.sage,
      title:'Calculate your Full FIRE target',
      body:'Annual expenses × 25 = $45,000 × 25 = $1,125,000',
      tip:'This is the portfolio that funds retirement forever',tipColor:P.sage,
    },
    {
      num:'03',border:P.green,bg:P.sageFaint,numColor:P.green,elevated:true,
      title:'Discount back to today\'s dollars',
      body:'Coast Number = Full FIRE ÷ (1 + return)^years',
      tip:'Example: $1,125,000 ÷ (1.07)^24 = $207,000',tipColor:P.green,
      tip2:'← This is the key insight',tip2Color:P.sage,tip2italic:true,
    },
    {
      num:'04',border:P.sagePale,bg:P.white,numColor:P.warmGray,
      title:'Track your portfolio to your coast number',
      body:'Once you hit it: stop saving. Compound growth handles the rest.',
      tip:'You\'re coasting.',tipColor:P.sage,tipItalic:true,tipFont:'italic 300 30px "Cormorant Garamond"',
    },
  ];

  steps.forEach((step,i)=>{
    const sy=130+i*(210+18),sh=210,sw=840,sx=80;
    if(step.elevated){
      ctx.save();ctx.shadowColor='rgba(26,26,24,0.12)';ctx.shadowBlur=24;ctx.shadowOffsetY=10;
    }
    rrect(sx,sy,sw,sh,14);ctx.fillStyle=step.bg;ctx.fill();
    if(step.elevated) ctx.restore();

    // Left border
    ctx.fillStyle=step.border;ctx.fillRect(sx,sy,6,sh);

    // Step number
    ctx.fillStyle=step.numColor;ctx.font='700 46px Lato';ctx.letterSpacing='0em';ctx.textBaseline='top';
    ctx.fillText(step.num,sx+24,sy+20);

    // Title
    ctx.fillStyle=P.nearBlk;ctx.font='700 26px Lato';ctx.letterSpacing='0em';ctx.textBaseline='top';
    ctx.fillText(step.title,sx+90,sy+22);

    // Body
    ctx.fillStyle=P.warmGray;ctx.font='300 24px Lato';ctx.letterSpacing='0em';ctx.textBaseline='top';
    ctx.fillText(step.body,sx+90,sy+60);

    // Tip
    if(step.tipFont){
      ctx.fillStyle=step.tipColor;ctx.font=step.tipFont;ctx.textBaseline='top';
      ctx.fillText(step.tip,sx+90,sy+100);
    } else {
      ctx.fillStyle=step.tipColor;ctx.font='300 21px Lato';ctx.letterSpacing='0em';ctx.textBaseline='top';
      ctx.fillText(step.tip,sx+90,sy+100);
    }
    if(step.tip2){
      ctx.fillStyle=step.tip2Color;ctx.font='italic 400 22px Lato';ctx.letterSpacing='0em';ctx.textBaseline='top';
      ctx.fillText(step.tip2,sx+90,sy+130);
    }
  });

  // Example strip
  const exY=1068;
  rrect(80,exY,840,92,14);ctx.fillStyle=P.sageFaint;ctx.fill();
  ctx.fillStyle=P.nearBlk;ctx.font='400 24px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='center';
  ctx.fillText('Full FIRE $900k  ·  24 years  ·  7% return  →  Coast Number: $207,000',W/2,exY+46);ctx.textAlign='left';

  // CTA
  const ctaW=380,ctaH=68,ctaX=(W-ctaW)/2,ctaY=1200;
  rrect(ctaX,ctaY,ctaW,ctaH,34);ctx.fillStyle=P.green;ctx.fill();
  ctx.fillStyle=P.cream;ctx.font='700 22px Lato';ctx.letterSpacing='0.04em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('Use the Free Calculator →',ctaX+ctaW/2,ctaY+ctaH/2);ctx.textAlign='left';

  ctx.textBaseline='alphabetic';ctx.letterSpacing='0em';
  drawFooter();
}

document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='coast-fire-13-step-ladder-4-step-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});

document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
