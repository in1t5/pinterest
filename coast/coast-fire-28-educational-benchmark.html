<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Coast FIRE vs. Full FIRE vs. Barista FIRE — Which Strategy Fits You · Coast FIRE · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">coast-fire-28 · FIRE Strategy Comparison · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');

const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',
};

function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}

let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_no_text_2501x2500.png';}

function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}

function render(){
  ctx.clearRect(0,0,W,H);

  // Cream bg
  ctx.fillStyle=P.cream;ctx.fillRect(0,0,W,1395);

  // Green top band
  ctx.fillStyle=P.green;ctx.fillRect(0,0,W,100);
  ctx.fillStyle=P.cream;ctx.font='700 20px Lato';ctx.letterSpacing='0.15em';ctx.textBaseline='middle';ctx.textAlign='center';
  ctx.fillText('FIRE STRATEGY COMPARISON',W/2,50);ctx.textAlign='left';

  // Headline
  ctx.fillStyle=P.nearBlk;ctx.font='300 80px "Cormorant Garamond"';ctx.letterSpacing='-0.01em';ctx.textBaseline='top';
  ctx.fillText('Which FIRE Path Is Right for You?',76,110);

  // Sub
  ctx.fillStyle=P.warmGray;ctx.font='300 28px Lato';ctx.letterSpacing='0em';ctx.textBaseline='top';
  ctx.fillText('Three strategies. Three different portfolio targets.',76,210);

  // Table
  const tX=80,tY=262,tW=840,tHdr=60;

  // Header row
  ctx.save();
  ctx.beginPath();if(ctx.roundRect)ctx.roundRect(tX,tY,tW,tHdr,{upperLeft:18,upperRight:18,lowerLeft:0,lowerRight:0});else ctx.rect(tX,tY,tW,tHdr);
  ctx.fillStyle=P.green;ctx.fill();ctx.restore();

  const colW=tW/4;
  const cols=['STRATEGY','PORTFOLIO TARGET','SAVINGS STOP?','WORK NEEDED'];
  cols.forEach((col,i)=>{
    ctx.fillStyle=P.cream;ctx.font='700 14px Lato';ctx.letterSpacing='0.08em';ctx.textBaseline='middle';ctx.textAlign='center';
    ctx.fillText(col,tX+i*colW+colW/2,tY+tHdr/2);
  });
  ctx.textAlign='left';

  // Rows
  const rows=[
    {strategy:'Full FIRE',portfolio:'25× expenses',savings:'At retirement',work:'None',bg:P.white,highlight:false},
    {strategy:'Barista FIRE',portfolio:'12–15× expenses',savings:'At barista FI',work:'Part-time',bg:P.white,highlight:false},
    {strategy:'Coast FIRE ★',portfolio:'Varies by age',savings:'At coast date',work:'Full-time OK ★',bg:P.sageFaint,highlight:true,note:'★ Coast FIRE allows continued full-time work — without needing the income for savings'},
  ];
  const rowH=186;
  rows.forEach((row,i)=>{
    const ry=tY+tHdr+i*(rowH+1);
    rrect(tX,ry,tW,row.note?rowH+36:rowH,0);ctx.fillStyle=row.bg;ctx.fill();
    ctx.strokeStyle='#e8eceb';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(tX,ry+rowH);ctx.lineTo(tX+tW,ry+rowH);ctx.stroke();

    const cells=[row.strategy,row.portfolio,row.savings,row.work];
    cells.forEach((cell,j)=>{
      const cx2=tX+j*colW,cy2=ry+rowH/2;
      if(j===0){
        ctx.fillStyle=row.highlight?P.green:P.nearBlk;ctx.font=row.highlight?'700 22px Lato':'700 22px Lato';
      } else {
        ctx.fillStyle=row.highlight?P.green:j===2?P.warmGray:P.warmGray;
        ctx.font=row.highlight?'700 22px Lato':'300 22px Lato';
      }
      ctx.letterSpacing='0em';ctx.textBaseline='top';ctx.textAlign='center';
      // Value
      ctx.fillStyle=row.highlight?P.green:P.nearBlk;
      if(j===0)ctx.font='700 22px Lato';else ctx.font=row.highlight?'700 20px Lato':'300 20px Lato';
      if(j===1){
        // Large Cormorant
        ctx.fillStyle=row.highlight?P.green:P.nearBlk;
        ctx.font=row.highlight?'300 36px "Cormorant Garamond"':'300 36px "Cormorant Garamond"';
        ctx.letterSpacing='-0.01em';
      }
      ctx.fillText(cell,cx2+colW/2,ry+20);
      ctx.textAlign='left';ctx.letterSpacing='0em';
    });
    if(row.note){
      ctx.fillStyle=P.warmGray;ctx.font='300 17px Lato';ctx.letterSpacing='0em';ctx.textBaseline='top';ctx.textAlign='center';
      ctx.fillText(row.note,tX+tW/2,ry+rowH+6);ctx.textAlign='left';
    }
  });

  // Body insight
  ctx.fillStyle=P.nearBlk;ctx.font='italic 300 40px "Cormorant Garamond"';ctx.letterSpacing='0em';ctx.textBaseline='top';
  ctx.fillText('Coast FIRE: the smallest target, the earliest freedom milestone.',76,980);

  // CTA
  const ctaW=380,ctaH=68,ctaX=(W-ctaW)/2,ctaY=1082;
  rrect(ctaX,ctaY,ctaW,ctaH,34);ctx.fillStyle=P.green;ctx.fill();
  ctx.fillStyle=P.cream;ctx.font='700 22px Lato';ctx.letterSpacing='0.04em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('Find Your Coast Number →',ctaX+ctaW/2,ctaY+ctaH/2);ctx.textAlign='left';

  // Keywords
  const tags=['coast fire calculator','barista fire calculator','fire calculator'];
  const tagY=1200,tagH=42,tagGap=12,tagPad=17;
  ctx.font='400 18px Lato';ctx.letterSpacing='0em';
  const tagMetrics=tags.map(label=>({label,width:ctx.measureText(label).width+tagPad*2}));
  const totalTagW=tagMetrics.reduce((sum,{width})=>sum+width,0)+tagGap*(tagMetrics.length-1);
  let tx=(W-totalTagW)/2;
  tagMetrics.forEach(({label,width})=>{
    rrect(tx,tagY,width,tagH,21);ctx.strokeStyle=rgba(P.sage,.6);ctx.lineWidth=1.5;ctx.stroke();
    ctx.fillStyle=P.sage;ctx.textBaseline='middle';ctx.textAlign='center';
    ctx.fillText(label,tx+width/2,tagY+tagH/2);
    tx+=width+tagGap;
  });

  ctx.textBaseline='alphabetic';ctx.letterSpacing='0em';
  drawFooter();
}

function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='coast-fire-28-educational-benchmark-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});

document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
