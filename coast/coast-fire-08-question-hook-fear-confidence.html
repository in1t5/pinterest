<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scared You're Behind on Retirement Savings — Coast FIRE · Coast FIRE · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;width:420px;height:630px;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">coast-fire-08 · Closer Than You Think · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');

const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',
};

function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxWidth&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);return y;
}

let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_2501x2500.png';}

function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}

function drawDecorCircles(){
  ctx.save();
  ctx.globalAlpha=0.10;ctx.strokeStyle=P.sagePale;ctx.lineWidth=4;
  ctx.beginPath();ctx.arc(874,265,238,0,Math.PI*2);ctx.stroke();
  ctx.globalAlpha=0.07;ctx.fillStyle=P.sagePale;
  ctx.beginPath();ctx.arc(944,510,118,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function render(){
  ctx.clearRect(0,0,W,H);

  // Near-black bg
  ctx.fillStyle=P.nearBlk;ctx.fillRect(0,0,W,1395);
  drawDecorCircles();

  // Script
  ctx.fillStyle=P.sagePale;ctx.font='400 88px "Pinyon Script"';ctx.textBaseline='top';ctx.letterSpacing='0em';
  ctx.fillText('closer than you think.',76,70);

  // Large italic headline
  ctx.fillStyle=P.cream;ctx.font='italic 300 80px "Cormorant Garamond"';ctx.letterSpacing='-0.01em';ctx.textBaseline='top';
  wrapText('Behind on retirement savings? Coast FIRE might be closer than you think.',76,188,848,92);

  // Body
  ctx.fillStyle=rgba(P.cream,.75);ctx.font='300 30px Lato';ctx.letterSpacing='0em';ctx.textBaseline='top';
  wrapText('Coast FIRE doesn\'t require 25× expenses. It requires the portfolio where time does the work for you.',76,438,848,42);

  // Accent line
  ctx.strokeStyle=rgba(P.sagePale,.4);ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(76,552);ctx.lineTo(924,552);ctx.stroke();

  // Two comparison chips
  const chipY=575;

  // Left chip — Full FIRE
  rrect(80,chipY,400,230,14);ctx.fillStyle=rgba(P.cream,.06);ctx.fill();
  ctx.strokeStyle=rgba(P.cream,.2);ctx.lineWidth=1.5;ctx.stroke();
  ctx.fillStyle=P.warmGray;ctx.font='700 18px Lato';ctx.letterSpacing='0.10em';ctx.textBaseline='top';
  ctx.fillText('FULL FIRE',110,chipY+24);
  ctx.fillStyle=P.cream;ctx.font='300 68px "Cormorant Garamond"';ctx.letterSpacing='-0.02em';ctx.textBaseline='top';
  ctx.fillText('$1,125,000',110,chipY+48);
  ctx.fillStyle=P.warmGray;ctx.font='300 20px Lato';ctx.letterSpacing='0em';ctx.textBaseline='top';
  ctx.fillText('needed total portfolio',110,chipY+128);
  ctx.fillText('(25× $45k expenses)',110,chipY+155);

  // "vs." label
  ctx.fillStyle=P.warmGray;ctx.font='700 28px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='center';
  ctx.fillText('vs.',500,chipY+115);ctx.textAlign='left';

  // Right chip — Coast FIRE
  rrect(515,chipY,405,230,14);ctx.fillStyle=rgba(P.sagePale,.12);ctx.fill();
  ctx.strokeStyle=rgba(P.sagePale,.4);ctx.lineWidth=1.5;ctx.stroke();
  ctx.fillStyle=P.sagePale;ctx.font='700 18px Lato';ctx.letterSpacing='0.10em';ctx.textBaseline='top';
  ctx.fillText('COAST FIRE',540,chipY+24);
  ctx.fillStyle=P.sagePale;ctx.font='300 68px "Cormorant Garamond"';ctx.letterSpacing='-0.02em';ctx.textBaseline='top';
  ctx.fillText('$247,000',540,chipY+48);
  ctx.fillStyle=P.sagePale;ctx.font='300 20px Lato';ctx.letterSpacing='0em';ctx.textBaseline='top';
  ctx.fillText('needed at age 30',540,chipY+128);
  ctx.fillStyle=rgba(P.sagePale,.8);ctx.font='300 20px Lato';ctx.textBaseline='top';
  ctx.fillText('for age 62 retirement',540,chipY+155);

  // Insight
  ctx.fillStyle=P.cream;ctx.font='italic 300 42px "Cormorant Garamond"';ctx.letterSpacing='0em';ctx.textBaseline='top';
  ctx.fillText('Same retirement. 78% less portfolio needed today.',76,860);

  // CTA
  const ctaW=380,ctaH=68,ctaX=(W-ctaW)/2,ctaY=980;
  rrect(ctaX,ctaY,ctaW,ctaH,34);ctx.fillStyle=P.sagePale;ctx.fill();
  ctx.fillStyle=P.green;ctx.font='700 22px Lato';ctx.letterSpacing='0.02em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('Check Your Coast Number →',ctaX+ctaW/2,ctaY+ctaH/2);ctx.textAlign='left';

  // Body below
  ctx.fillStyle=rgba(P.cream,.6);ctx.font='300 26px Lato';ctx.letterSpacing='0em';ctx.textBaseline='top';
  ctx.fillText('Free Coast FIRE Calculator — no account required',76,1090);

  // Three keyword chips
  const kws=['coast fire calculator','coast fire number','financial independence calculator'];
  let kx=76;
  kws.forEach(kw=>{
    ctx.font='400 17px Lato';ctx.letterSpacing='0em';
    const kw2=ctx.measureText(kw).width,kpw=kw2+32,kph=40;
    rrect(kx,1168,kpw,kph,20);ctx.strokeStyle=rgba(P.sagePale,.4);ctx.lineWidth=1.5;ctx.stroke();
    ctx.fillStyle=P.sagePale;ctx.textBaseline='middle';ctx.fillText(kw,kx+16,1188);
    kx+=kpw+12;
  });

  // Bottom quote
  ctx.fillStyle=rgba(P.sagePale,.7);ctx.font='italic 300 34px "Cormorant Garamond"';ctx.letterSpacing='0em';ctx.textBaseline='top';
  ctx.fillText('"The milestone is smaller than you think."',76,1280);

  ctx.textBaseline='alphabetic';ctx.letterSpacing='0em';
  drawFooter();
}

document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='coast-fire-08-question-hook-fear-confidence-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});

document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
