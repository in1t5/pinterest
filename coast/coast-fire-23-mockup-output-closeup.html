<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>This Is What a Coast FIRE Plan Looks Like · Coast FIRE · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">coast-fire-23 · Calculator Output Closeup · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');

const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',
};

function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}

let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_no_text_2501x2500.png';}

function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}

function drawDecorCircles(){
  ctx.save();
  ctx.globalAlpha=0.10;ctx.strokeStyle=P.sagePale;ctx.lineWidth=4;
  ctx.beginPath();ctx.arc(874,265,238,0,Math.PI*2);ctx.stroke();
  ctx.globalAlpha=0.07;ctx.fillStyle=P.sagePale;
  ctx.beginPath();ctx.arc(944,510,118,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function render(){
  ctx.clearRect(0,0,W,H);

  // Near-black bg
  ctx.fillStyle=P.nearBlk;ctx.fillRect(0,0,W,1395);
  drawDecorCircles();

  // Label
  ctx.fillStyle=P.sagePale;ctx.font='700 15px Lato';ctx.letterSpacing='0.15em';ctx.textBaseline='top';
  ctx.fillText('COAST FIRE CALCULATOR OUTPUT',76,44);

  // Headline
  ctx.fillStyle=P.cream;ctx.font='300 76px "Cormorant Garamond"';ctx.letterSpacing='-0.01em';ctx.textBaseline='top';
  ctx.fillText('This Is What a Coast FIRE',76,72);
  ctx.fillText('Plan Looks Like',76,162);

  // Large output card
  const cardX=80,cardY=240,cardW=840,cardH=680,cardR=20;
  ctx.save();ctx.shadowColor='rgba(0,0,0,0.40)';ctx.shadowBlur=60;ctx.shadowOffsetY=28;
  rrect(cardX,cardY,cardW,cardH,cardR);ctx.fillStyle=P.white;ctx.fill();ctx.restore();

  // Card header bar
  ctx.save();
  ctx.beginPath();if(ctx.roundRect)ctx.roundRect(cardX,cardY,cardW,56,{upperLeft:cardR,upperRight:cardR,lowerLeft:0,lowerRight:0});else ctx.rect(cardX,cardY,cardW,56);
  ctx.fillStyle=P.green;ctx.fill();ctx.restore();
  ctx.fillStyle=P.cream;ctx.font='700 17px Lato';ctx.letterSpacing='0.10em';ctx.textBaseline='middle';
  ctx.fillText('✓  YOUR COAST FIRE PLAN',cardX+32,cardY+28);

  // 5 output rows
  const rows=[
    {label:'Your Coast FIRE Number:',value:'$247,000',valueFont:'300 58px "Cormorant Garamond"',valueC:P.nearBlk,highlight:false},
    {label:'Coast Date:',value:'Age 38 (8 years away)',valueFont:'300 46px "Cormorant Garamond"',valueC:P.nearBlk,highlight:false},
    {label:'Monthly Contributions Stop:',value:'$1,200/mo freed up',valueFont:'300 46px "Cormorant Garamond"',valueC:P.green,highlight:true},
    {label:'Portfolio at Retirement:',value:'$1,100,000',valueFont:'300 46px "Cormorant Garamond"',valueC:P.nearBlk,highlight:false},
    {label:'Retire at:',value:'Age 62',valueFont:'300 58px "Cormorant Garamond"',valueC:P.nearBlk,check:true},
  ];

  const rowH=(cardH-56)/5;
  rows.forEach((row,i)=>{
    const ry=cardY+56+i*rowH;
    if(row.highlight){
      ctx.fillStyle='#f0faf0';ctx.fillRect(cardX,ry,cardW,rowH);
    }
    // Divider
    if(i>0){
      ctx.strokeStyle='#e8eceb';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(cardX+30,ry);ctx.lineTo(cardX+cardW-30,ry);ctx.stroke();
    }
    if(row.check){
      ctx.beginPath();ctx.arc(cardX+56,ry+26,16,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();
      ctx.fillStyle=P.white;ctx.font='700 16px Lato';ctx.textBaseline='middle';ctx.textAlign='center';
      ctx.fillText('✓',cardX+56,ry+26);ctx.textAlign='left';
    }
    const labelX=row.check?cardX+86:cardX+32;
    ctx.fillStyle=P.warmGray;ctx.font='700 14px Lato';ctx.letterSpacing='0.10em';ctx.textBaseline='top';
    ctx.fillText(row.label,labelX,ry+10);
    ctx.fillStyle=row.valueC;ctx.font=row.valueFont;ctx.letterSpacing='-0.01em';ctx.textBaseline='top';
    ctx.fillText(row.value,labelX,ry+34);
  });

  // Body text
  ctx.fillStyle=rgba(P.cream,.75);ctx.font='300 28px Lato';ctx.letterSpacing='0em';ctx.textBaseline='top';
  ctx.textAlign='center';ctx.fillText('Every number from one free calculation.',W/2,978);ctx.textAlign='left';

  // CTA
  const ctaW=380,ctaH=68,ctaX=(W-ctaW)/2,ctaY=1046;
  rrect(ctaX,ctaY,ctaW,ctaH,34);ctx.fillStyle=P.sagePale;ctx.fill();
  ctx.fillStyle=P.greenDk;ctx.font='700 22px Lato';ctx.letterSpacing='0.04em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('Get Your Numbers →',ctaX+ctaW/2,ctaY+ctaH/2);ctx.textAlign='left';

  // Brand note
  ctx.fillStyle=rgba(P.sagePale,.6);ctx.font='300 20px Lato';ctx.letterSpacing='0.04em';ctx.textBaseline='top';ctx.textAlign='center';
  ctx.fillText('timeandmoneytree.com · Coast FIRE Calculator · Free · No sign-up',W/2,1178);ctx.textAlign='left';

  ctx.textBaseline='alphabetic';ctx.letterSpacing='0em';
  drawFooter();
}

function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='coast-fire-23-mockup-output-closeup-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});

document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
