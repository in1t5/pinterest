<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Coast FIRE Calculator Preview — Free Tool · Coast FIRE · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;width:420px;height:630px;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">coast-fire-21 · Browser Mockup · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');

const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',
};

function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}

let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_2501x2500.png';}

function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}

function drawDecorCircles(){
  ctx.save();
  ctx.globalAlpha=0.10;ctx.strokeStyle=P.sagePale;ctx.lineWidth=4;
  ctx.beginPath();ctx.arc(874,265,238,0,Math.PI*2);ctx.stroke();
  ctx.globalAlpha=0.07;ctx.fillStyle=P.sagePale;
  ctx.beginPath();ctx.arc(944,510,118,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function drawBadge(text,x,y){
  ctx.font='700 18px Lato';ctx.letterSpacing='0.10em';
  const bw=ctx.measureText(text).width+68,bh=42,br=21;
  rrect(x,y-bh/2,bw,bh,br);ctx.strokeStyle=rgba(P.sagePale,.50);ctx.lineWidth=1.5;ctx.stroke();
  ctx.fillStyle=P.sagePale;ctx.beginPath();ctx.arc(x+22,y,5,0,Math.PI*2);ctx.fill();
  ctx.textBaseline='middle';ctx.fillText(text,x+36,y);
}

function render(){
  ctx.clearRect(0,0,W,H);

  // Forest green bg
  ctx.fillStyle=P.green;ctx.fillRect(0,0,W,1395);
  drawDecorCircles();

  // Badge
  ctx.fillStyle=P.sagePale;
  drawBadge('FREE TOOL · COAST FIRE CALCULATOR',76,66);

  // Headline
  ctx.fillStyle=P.cream;ctx.font='300 98px "Cormorant Garamond"';ctx.letterSpacing='-0.01em';ctx.textBaseline='top';
  ctx.fillText('Coast FIRE Calculator',76,100);

  // Sub
  ctx.fillStyle=P.sagePale;ctx.font='300 28px Lato';ctx.letterSpacing='0em';ctx.textBaseline='top';
  ctx.fillText('Find your coast number. Free. No sign-up.',76,218);

  // Browser frame
  const bfx=60,bfy=268,bfw=880,bfh=980;
  ctx.save();ctx.shadowColor='rgba(0,0,0,0.40)';ctx.shadowBlur=60;ctx.shadowOffsetY=24;
  rrect(bfx,bfy,bfw,bfh,16);ctx.fillStyle=P.white;ctx.fill();ctx.restore();

  // Chrome bar
  ctx.fillStyle='#e8e8e8';
  ctx.save();
  ctx.beginPath();if(ctx.roundRect)ctx.roundRect(bfx,bfy,bfw,52,{upperLeft:16,upperRight:16,lowerLeft:0,lowerRight:0});else{ctx.rect(bfx,bfy,bfw,52);}ctx.fill();ctx.restore();

  // Three dots
  [{c:P.coral,x:90},{c:P.sage,x:112},{c:P.green,x:134}].forEach(d=>{
    ctx.beginPath();ctx.arc(d.x,bfy+26,8,0,Math.PI*2);ctx.fillStyle=d.c;ctx.fill();
  });

  // URL bar
  rrect(152,bfy+12,580,28,14);ctx.fillStyle=P.white;ctx.fill();
  ctx.fillStyle='#888';ctx.font='400 13px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';
  ctx.fillText('timeandmoneytree.com/coast-fire-calculator',162,bfy+26);

  // Content area
  const cx=bfx,cy=bfy+52,cw=bfw,ch=bfh-52;
  ctx.fillStyle=P.white;ctx.fillRect(cx,cy,cw,ch);

  // App header bar
  ctx.fillStyle=P.green;ctx.fillRect(cx,cy,cw,50);
  ctx.fillStyle=P.cream;ctx.font='700 18px Lato';ctx.letterSpacing='0.04em';ctx.textBaseline='middle';ctx.textAlign='center';
  ctx.fillText('🌿 Coast FIRE Calculator',cx+cw/2,cy+25);ctx.textAlign='left';

  // 2×2 input grid
  const inputs=[
    {l:'CURRENT AGE',v:'30'},{l:'RETIREMENT AGE',v:'62'},
    {l:'ANNUAL EXPENSES',v:'$45,000'},{l:'CURRENT PORTFOLIO',v:'$87,000'}
  ];
  const igx=cx+30,igy=cy+66,igw=(cw-90)/2,igh=72,igGap=12;
  inputs.forEach((inp,i)=>{
    const col=i%2,row=Math.floor(i/2);
    const ix=igx+col*(igw+igGap),iy=igy+row*(igh+8);
    rrect(ix,iy,igw,igh,8);ctx.fillStyle='#edf2ee';ctx.fill();
    ctx.fillStyle=P.warmGray;ctx.font='700 12px Lato';ctx.letterSpacing='0.08em';ctx.textBaseline='top';
    ctx.fillText(inp.l,ix+12,iy+8);
    ctx.fillStyle=P.nearBlk;ctx.font='300 36px "Cormorant Garamond"';ctx.letterSpacing='-0.01em';ctx.textBaseline='top';
    ctx.fillText(inp.v,ix+12,iy+26);
  });

  // Divider
  const divY=cy+230;
  ctx.strokeStyle='#dde8df';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(cx+30,divY);ctx.lineTo(cx+cw-30,divY);ctx.stroke();

  // Result
  ctx.fillStyle=P.warmGray;ctx.font='700 14px Lato';ctx.letterSpacing='0.12em';ctx.textBaseline='top';
  ctx.fillText('COAST FIRE NUMBER',cx+30,divY+14);
  ctx.fillStyle=P.nearBlk;ctx.font='300 78px "Cormorant Garamond"';ctx.letterSpacing='-0.02em';ctx.textBaseline='top';
  ctx.fillText('$207,000',cx+30,divY+32);
  ctx.fillStyle='#2e7d32';ctx.font='400 18px Lato';ctx.letterSpacing='0em';ctx.textBaseline='top';
  ctx.fillText('✓ Reach at age 33 — 3 years away',cx+30,divY+118);

  // Progress bars
  const pbY=divY+150,pbH=16,pbW=(cw-90)/4,pbGap=10;
  [P.green,P.sage,P.sagePale,P.sageFaint].forEach((c,i)=>{
    rrect(cx+30+i*(pbW+pbGap),pbY,pbW,pbH,8);ctx.fillStyle=c;ctx.fill();
  });

  // Calculate button
  const btnY=pbY+36,btnH=52;
  rrect(cx+30,btnY,cw-60,btnH,10);ctx.fillStyle=P.green;ctx.fill();
  ctx.fillStyle=P.cream;ctx.font='700 18px Lato';ctx.letterSpacing='0.08em';ctx.textBaseline='middle';ctx.textAlign='center';
  ctx.fillText('CALCULATE →',cx+cw/2,btnY+btnH/2);ctx.textAlign='left';

  // Remaining content area fill
  const remY=btnY+btnH+20;
  const remH=cy+ch-remY-20;
  if(remH>0){
    // Extra UI elements
    ctx.fillStyle='#f8faf8';ctx.fillRect(cx+30,remY,cw-60,remH);
    ctx.fillStyle=P.warmGray;ctx.font='700 13px Lato';ctx.letterSpacing='0.10em';ctx.textBaseline='top';
    ctx.fillText('PORTFOLIO PROJECTION',cx+40,remY+16);
    // Mini chart bars
    const chartH=Math.min(remH-60,120);
    const barW=((cw-90)/6);
    [0.3,0.45,0.55,0.65,0.78,1.0].forEach((v,i)=>{
      const bx=cx+35+i*(barW+8),bH=v*chartH,bY=remY+50+chartH-bH;
      rrect(bx,bY,barW,bH,4);ctx.fillStyle=i===5?P.green:P.sagePale;ctx.fill();
    });
  }

  // CTA strip below browser
  const ctaW=380,ctaH=68,ctaX=(W-ctaW)/2,ctaY=1300;
  rrect(ctaX,ctaY,ctaW,ctaH,34);ctx.fillStyle=P.sagePale;ctx.fill();
  ctx.fillStyle=P.greenDk;ctx.font='700 22px Lato';ctx.letterSpacing='0.04em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('Try It Free →',ctaX+ctaW/2,ctaY+ctaH/2);ctx.textAlign='left';

  ctx.textBaseline='alphabetic';ctx.letterSpacing='0em';
  drawFooter();
}

document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='coast-fire-21-mockup-browser-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});

document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
