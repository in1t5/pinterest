<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>12 Months Tracking vs Not Tracking · Budget Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 12 · Before/After Timeline · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_no_text_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Cream background
  ctx.fillStyle=P.cream;
  ctx.fillRect(0,0,W,1395);

  // Top bar
  ctx.fillStyle=P.green;
  ctx.fillRect(0,0,W,10);

  // Headline
  ctx.fillStyle=P.nearBlk;ctx.font='700 34px Lato';ctx.letterSpacing='0.04em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('12 MONTHS: TRACKING VS. NOT',W/2,28);

  // Two columns
  const colW=420,colH=460,colY=90,gap=40;
  const leftX=(W-colW*2-gap)/2;
  const rightX=leftX+colW+gap;

  // LEFT - warmGray no budget
  ctx.fillStyle=P.warmGray;
  rrect(leftX,colY,colW,colH,18);ctx.fill();

  ctx.fillStyle=P.white;ctx.font='700 24px Lato';ctx.letterSpacing='0.10em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('NO BUDGET',leftX+colW/2,colY+22);

  // Big number
  ctx.fillStyle=rgba(P.cream,.9);ctx.font='700 72px Lato';ctx.letterSpacing='0em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('$2,400',leftX+colW/2,colY+68);

  ctx.fillStyle=rgba(P.cream,.6);ctx.font='300 24px Lato';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('annual savings (4%)',leftX+colW/2,colY+152);

  // Quote
  ctx.fillStyle=rgba(P.cream,.5);ctx.font='italic 300 28px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('"where did it go?"',leftX+colW/2,colY+210);

  // Mini bar
  const mbx=leftX+32,mbw=colW-64,mby=colY+270,mbh=28;
  ctx.fillStyle=rgba(P.white,.15);rrect(mbx,mby,mbw,mbh,14);ctx.fill();
  ctx.fillStyle=rgba(P.cream,.5);rrect(mbx,mby,mbw*0.04,mbh,14);ctx.fill();
  ctx.fillStyle=rgba(P.cream,.5);ctx.font='700 20px Lato';ctx.letterSpacing='0em';
  ctx.textAlign='left';ctx.textBaseline='middle';
  ctx.fillText('4% savings rate',mbx,mby+mbh+24);

  // Spending breakdown rows
  const leftDataY=colY+340;
  ['Food + rent: unknown','Savings: whatever\'s left','Growth: stalled'].forEach((row,i)=>{
    ctx.fillStyle=rgba(P.cream,.55);ctx.font='300 22px Lato';ctx.letterSpacing='0em';
    ctx.textAlign='center';ctx.textBaseline='top';
    ctx.fillText(row,leftX+colW/2,leftDataY+i*36);
  });

  // RIGHT - forest green with budget
  ctx.fillStyle=P.green;
  rrect(rightX,colY,colW,colH,18);ctx.fill();
  ctx.fillStyle=rgba(P.white,.05);rrect(rightX,colY,colW,80,18);ctx.fill();

  ctx.fillStyle=P.sagePale;ctx.font='700 24px Lato';ctx.letterSpacing='0.10em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('WITH BUDGET',rightX+colW/2,colY+22);

  // Big number
  ctx.fillStyle=P.white;ctx.font='700 72px Lato';ctx.letterSpacing='0em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('$10,560',rightX+colW/2,colY+68);

  ctx.fillStyle=P.sagePale;ctx.font='300 24px Lato';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('annual savings (24%)',rightX+colW/2,colY+152);

  // Quote
  ctx.fillStyle=rgba(P.sagePale,.8);ctx.font='italic 300 28px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('"I grew my portfolio"',rightX+colW/2,colY+210);

  // Mini bar
  const rmbx=rightX+32,rmbw=colW-64,rmby=colY+270,rmbh=28;
  ctx.fillStyle=rgba(P.white,.15);rrect(rmbx,rmby,rmbw,rmbh,14);ctx.fill();
  ctx.fillStyle=P.sagePale;rrect(rmbx,rmby,rmbw*0.24,rmbh,14);ctx.fill();
  ctx.fillStyle=P.sagePale;ctx.font='700 20px Lato';ctx.letterSpacing='0em';
  ctx.textAlign='left';ctx.textBaseline='middle';
  ctx.fillText('24% savings rate',rmbx,rmby+rmbh+24);

  // Right data rows
  const rightDataY=colY+340;
  ['Housing 27% · Food 12%','Savings: first line','Growth: on track'].forEach((row,i)=>{
    ctx.fillStyle=P.sagePale;ctx.font='300 22px Lato';ctx.letterSpacing='0em';
    ctx.textAlign='center';ctx.textBaseline='top';
    ctx.fillText(row,rightX+colW/2,rightDataY+i*36);
  });

  // Hero strip
  ctx.fillStyle=P.green;
  rrect(60,610,W-120,110,16);ctx.fill();
  ctx.fillStyle=P.white;ctx.font='700 30px Lato';ctx.letterSpacing='0.04em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('$8,160 extra saved in one year',W/2,652);
  ctx.fillStyle=P.sagePale;ctx.font='300 24px Lato';ctx.letterSpacing='0em';
  ctx.fillText('same income · intentional system',W/2,690);

  // Insight
  ctx.fillStyle=P.nearBlk;
  ctx.font='italic 300 42px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('"A year from now you\'ll',W/2,760);
  ctx.fillText('wish you started today."',W/2,810);

  // Sub text
  ctx.fillStyle=P.warmGray;ctx.font='300 26px Lato';ctx.letterSpacing='0em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('The calculator is free. The clarity is priceless.',W/2,892);

  // Feature chips
  [['Free to use','No sign-up'],['Budget + actual','Savings rate auto-calculated']].forEach((pair,i)=>{
    pair.forEach((txt,j)=>{
      const cw=360,ch=52,cx=80+j*480,cy=970+i*68;
      // just text if too wide, draw inline
    });
  });
  const chips2=['Free to use · no sign-up','Savings rate auto-calculated','Monthly budget vs. actual tracking'];
  chips2.forEach((c,i)=>{
    const cw=640,ch=52,cx=(W-cw)/2,cy=960+i*68;
    ctx.fillStyle=rgba(P.green,.1);rrect(cx,cy,cw,ch,26);ctx.fill();
    ctx.strokeStyle=rgba(P.green,.3);ctx.lineWidth=1;rrect(cx,cy,cw,ch,26);ctx.stroke();
    ctx.fillStyle=P.green;ctx.font='700 22px Lato';ctx.letterSpacing='0em';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(c,cx+cw/2,cy+ch/2);
  });

  // CTA
  ctx.fillStyle=P.green;
  rrect(W/2-200,1180,400,88,44);ctx.fill();
  ctx.fillStyle=P.white;ctx.font='700 30px Lato';ctx.letterSpacing='0.06em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Start This Month  →',W/2,1224);

  // Tag
  ctx.fillStyle=P.warmGray;ctx.font='300 22px Lato';ctx.letterSpacing='0em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('budget · savings · FIRE · timeandmoneytree.com',W/2,1304);

  drawFooter();
}
function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='budget-12-before-after-timeline-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
