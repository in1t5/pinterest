<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Budget Calculator vs Spreadsheet · Simple Budget Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 28 · Educational Benchmark · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxWidth&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);return y;
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_no_text_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Cream background
  ctx.fillStyle=P.cream;
  ctx.fillRect(0,0,W,1395);

  // Header
  ctx.fillStyle=P.green;ctx.font='700 52px Lato';ctx.letterSpacing='0.04em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('BUDGET CALCULATOR',W/2,32);ctx.letterSpacing='0em';

  ctx.fillStyle=P.warmGray;ctx.font='300 36px Lato';ctx.letterSpacing='0em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('vs. Spreadsheet',W/2,96);

  ctx.fillStyle=P.warmGray;ctx.font='300 22px Lato';ctx.letterSpacing='0em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('What\'s actually the difference?',W/2,142);

  // Table card
  const tX=60,tY=186,tW=880;

  const features=[
    {feat:'Category setup',ss:'✓',calc:'✓',ssColor:P.nearBlk,calcColor:P.green,ssGood:true,calcGood:true},
    {feat:'Savings rate calc',ss:'Manual',calc:'✓ Auto',ssColor:P.warmGray,calcColor:P.green,ssGood:false,calcGood:true},
    {feat:'Variance tracking',ss:'Manual',calc:'✓ Auto',ssColor:P.warmGray,calcColor:P.green,ssGood:false,calcGood:true},
    {feat:'Budget vs. actual',ss:'Manual',calc:'✓ Auto',ssColor:P.warmGray,calcColor:P.green,ssGood:false,calcGood:true},
    {feat:'PDF export',ss:'✗',calc:'✓',ssColor:P.coral,calcColor:P.green,ssGood:false,calcGood:true},
    {feat:'No formula errors',ss:'✗',calc:'✓',ssColor:P.coral,calcColor:P.green,ssGood:false,calcGood:true},
  ];

  const rowH=110,headerH=64;
  const tH=headerH+features.length*rowH+2;

  // Card shadow
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,0.1)';ctx.shadowBlur=20;ctx.shadowOffsetY=6;
  ctx.fillStyle=P.white;
  rrect(tX,tY,tW,tH,18);ctx.fill();
  ctx.restore();
  ctx.fillStyle=P.white;
  rrect(tX,tY,tW,tH,18);ctx.fill();

  // Column widths: feature=440, spreadsheet=200, calc=220
  const col1X=tX+28,col2X=tX+460,col3X=tX+660;

  // Table header
  ctx.fillStyle=P.sageFaint;
  ctx.save();rrect(tX,tY,tW,headerH,18);ctx.clip();ctx.fillRect(tX,tY,tW,headerH);ctx.restore();

  ctx.fillStyle=P.nearBlk;ctx.font='700 22px Lato';ctx.letterSpacing='0em';
  ctx.textAlign='left';ctx.textBaseline='middle';
  ctx.fillText('Feature',col1X,tY+headerH/2);

  ctx.fillStyle=P.warmGray;ctx.font='700 20px Lato';ctx.letterSpacing='0em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Spreadsheet',col2X+90,tY+headerH/2);

  ctx.fillStyle=P.green;ctx.font='700 20px Lato';ctx.letterSpacing='0em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Budget Calculator',col3X+108,tY+headerH/2);

  // Vertical dividers
  ctx.strokeStyle=rgba(P.nearBlk,.06);ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(col2X-20,tY);ctx.lineTo(col2X-20,tY+tH);ctx.stroke();
  ctx.beginPath();ctx.moveTo(col3X-20,tY);ctx.lineTo(col3X-20,tY+tH);ctx.stroke();

  // Feature rows
  features.forEach((row,i)=>{
    const ry=tY+headerH+i*rowH;
    if(i%2===1){
      ctx.fillStyle=P.sageFaint;
      ctx.save();
      rrect(tX,ry,tW,rowH,0);ctx.clip();
      ctx.fillRect(tX,ry,tW,rowH);
      ctx.restore();
    }

    ctx.strokeStyle=rgba(P.nearBlk,.05);ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(tX,ry+rowH);ctx.lineTo(tX+tW,ry+rowH);ctx.stroke();

    // Feature name
    ctx.fillStyle=P.nearBlk;ctx.font='400 26px Lato';ctx.letterSpacing='0em';
    ctx.textAlign='left';ctx.textBaseline='middle';
    ctx.fillText(row.feat,col1X,ry+rowH/2);

    // Spreadsheet value
    ctx.fillStyle=row.ssColor;ctx.font=row.ssGood?'700 26px Lato':'400 24px Lato';ctx.letterSpacing='0em';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(row.ss,col2X+90,ry+rowH/2);

    // Calculator value
    ctx.fillStyle=row.calcColor;ctx.font='700 26px Lato';ctx.letterSpacing='0em';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(row.calc,col3X+108,ry+rowH/2);
  });

  // Sage strip
  const stripY=tY+tH+24;
  ctx.fillStyle=P.sageFaint;
  ctx.fillRect(0,stripY,W,70);
  ctx.fillStyle=P.green;ctx.font='italic 300 32px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('"No formulas. No errors. Just clarity."',W/2,stripY+35);

  // CTA
  const ctaY=stripY+96;
  ctx.fillStyle=P.green;
  rrect(W/2-230,ctaY,460,88,44);ctx.fill();
  ctx.fillStyle=P.white;ctx.font='700 28px Lato';ctx.letterSpacing='0.06em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Switch to Calculator  →',W/2,ctaY+44);ctx.letterSpacing='0em';

  // Tag
  ctx.fillStyle=P.warmGray;ctx.font='300 20px Lato';ctx.letterSpacing='0em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('budget calculator · vs spreadsheet · free · timeandmoneytree.com',W/2,ctaY+106);

  drawFooter();
}
function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='budget-28-educational-benchmark-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
