<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Savings Rate Formula · Simple Budget Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;width:420px;height:630px;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 27 · Educational Formula Explainer · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxWidth&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);return y;
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // White background
  ctx.fillStyle=P.white;
  ctx.fillRect(0,0,W,1395);

  // Top italic + bold headline
  ctx.fillStyle=P.sage;ctx.font='italic 300 36px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('the formula that predicts',W/2,32);

  ctx.fillStyle=P.nearBlk;ctx.font='700 62px Lato';ctx.letterSpacing='0.04em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('YOUR RETIREMENT',W/2,82);ctx.letterSpacing='0em';

  // FORMULA chip
  const chipW=160,chipH=44;
  ctx.fillStyle=P.green;
  rrect(80,148,chipW,chipH,22);ctx.fill();
  ctx.fillStyle=P.white;ctx.font='700 19px Lato';ctx.letterSpacing='0.12em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('FORMULA',80+chipW/2,148+chipH/2);ctx.letterSpacing='0em';

  // Formula card
  const fcX=80,fcY=208,fcW=840,fcH=176,fcR=18;
  ctx.fillStyle=P.sageFaint;
  rrect(fcX,fcY,fcW,fcH,fcR);ctx.fill();

  ctx.fillStyle=P.nearBlk;ctx.font='700 32px Lato';ctx.letterSpacing='0em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  const formulaLine1='Savings Rate =';
  const formulaLine2='(Income − Expenses) ÷ Income × 100';
  ctx.fillText(formulaLine1,W/2,fcY+56);
  ctx.fillText(formulaLine2,W/2,fcY+116);

  // Example card
  const exX=80,exY=fcY+fcH+24,exW=840,exH=120,exR=16;
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,0.08)';ctx.shadowBlur=14;ctx.shadowOffsetY=4;
  ctx.fillStyle=P.white;
  rrect(exX,exY,exW,exH,exR);ctx.fill();
  ctx.restore();
  ctx.fillStyle=P.white;
  rrect(exX,exY,exW,exH,exR);ctx.fill();

  // Sage left border
  ctx.save();
  rrect(exX,exY,exW,exH,exR);ctx.clip();
  ctx.fillStyle=P.sage;ctx.fillRect(exX,exY,8,exH);
  ctx.restore();

  ctx.fillStyle=P.nearBlk;ctx.font='400 30px Lato';ctx.letterSpacing='0em';
  ctx.textAlign='left';ctx.textBaseline='middle';
  ctx.fillText('($5,200 − $3,952) ÷ $5,200 × 100 = 24%',exX+28,exY+exH/2);

  // 3 implication rows
  const impls=[
    '24% savings rate  →  ~27 years to FIRE (at 7% return)',
    '32% savings rate  →  ~22 years',
    '50% savings rate  →  ~17 years',
  ];

  const implY=exY+exH+28;
  const implH=112,implGap=16;
  impls.forEach((impl,i)=>{
    const iy=implY+i*(implH+implGap);
    ctx.save();
    ctx.shadowColor='rgba(0,0,0,0.06)';ctx.shadowBlur=10;ctx.shadowOffsetY=3;
    ctx.fillStyle=P.white;
    rrect(80,iy,840,implH,14);ctx.fill();
    ctx.restore();
    ctx.strokeStyle=rgba(P.nearBlk,.06);ctx.lineWidth=1.5;
    rrect(80,iy,840,implH,14);ctx.stroke();

    // Arrow
    ctx.fillStyle=P.green;ctx.font='700 32px Lato';ctx.letterSpacing='0em';
    ctx.textAlign='left';ctx.textBaseline='middle';
    ctx.fillText('→',100,iy+implH/2);

    // Text
    ctx.fillStyle=P.nearBlk;ctx.font='400 27px Lato';ctx.letterSpacing='0em';
    ctx.textAlign='left';ctx.textBaseline='middle';
    ctx.fillText(impl,144,iy+implH/2);
  });

  // CTA
  const ctaY=implY+3*(implH+implGap)-implGap+28;
  ctx.fillStyle=P.green;
  rrect(W/2-200,ctaY,400,88,44);ctx.fill();
  ctx.fillStyle=P.white;ctx.font='700 28px Lato';ctx.letterSpacing='0.06em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Find Your Rate  →',W/2,ctaY+44);ctx.letterSpacing='0em';

  // Tag
  ctx.fillStyle=P.warmGray;ctx.font='300 20px Lato';ctx.letterSpacing='0em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('savings rate · FIRE · formula · free · timeandmoneytree.com',W/2,ctaY+106);

  drawFooter();
}
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='budget-27-educational-formula-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
