<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>What Your Savings Rate Means · Simple Budget Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 30 · Educational What Your Number Means · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxWidth&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);return y;
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_no_text_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Cream background
  ctx.fillStyle=P.cream;
  ctx.fillRect(0,0,W,1395);

  // Header
  ctx.fillStyle=P.nearBlk;
  ctx.fillRect(0,0,W,138);

  ctx.fillStyle=P.sagePale;ctx.font='700 18px Lato';ctx.letterSpacing='0.16em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('SAVINGS RATE DECODER',W/2,20);ctx.letterSpacing='0em';

  ctx.fillStyle=P.white;ctx.font='700 42px Lato';ctx.letterSpacing='0.03em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('WHAT YOUR SAVINGS RATE',W/2,58);ctx.letterSpacing='0em';

  ctx.fillStyle=P.sage;ctx.font='700 36px Lato';ctx.letterSpacing='0.03em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('REALLY MEANS',W/2,104);ctx.letterSpacing='0em';

  // Implication cards
  const cards=[
    {
      bg:P.coral,
      badge:'Below 10%',
      text:'Financial security is slow-building — consider raising your savings focus',
    },
    {
      bg:P.warmGray,
      badge:'10–20%',
      text:'Solid foundation — emergency fund builds, slow investment growth',
    },
    {
      bg:P.sage,
      badge:'20–30%',
      text:'Financial freedom trajectory — FIRE is a reasonable goal',
    },
    {
      bg:P.green,
      badge:'30%+',
      text:'Accelerating freedom — you are outpacing 90% of savers',
    },
  ];

  const cardH=200,cardGap=18,cardX=80,cardW=840,startY=156;

  cards.forEach((card,i)=>{
    const cy=startY+i*(cardH+cardGap);

    ctx.save();
    ctx.shadowColor='rgba(0,0,0,0.18)';ctx.shadowBlur=18;ctx.shadowOffsetY=6;
    ctx.fillStyle=card.bg;
    rrect(cardX,cy,cardW,cardH,20);ctx.fill();
    ctx.restore();

    ctx.fillStyle=card.bg;
    rrect(cardX,cy,cardW,cardH,20);ctx.fill();

    // Rate badge (left, pill)
    const badgeW=154,badgeH=50;
    ctx.fillStyle=rgba(P.white,.22);
    rrect(cardX+20,cy+cardH/2-badgeH/2,badgeW,badgeH,25);ctx.fill();
    ctx.fillStyle=P.white;ctx.font='700 26px Lato';ctx.letterSpacing='0em';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(card.badge,cardX+20+badgeW/2,cy+cardH/2);

    // Body text
    ctx.fillStyle=P.white;ctx.font='400 26px Lato';ctx.letterSpacing='0em';
    ctx.textAlign='left';ctx.textBaseline='middle';
    const bodyX=cardX+194,bodyW=cardW-214,lineH=36;
    const words=card.text.split(' ');let line='';let ly=cy+cardH/2-(Math.ceil(card.text.length/38)*lineH)/2;
    // simple wrap centered
    const lines=[];let cur='';
    words.forEach(w=>{
      const t=cur+w+' ';
      ctx.font='400 26px Lato';
      if(ctx.measureText(t).width>bodyW&&cur!=''){lines.push(cur.trim());cur=w+' ';}
      else cur=t;
    });
    if(cur.trim())lines.push(cur.trim());
    const totalTextH=lines.length*lineH;
    let tly=cy+cardH/2-totalTextH/2+lineH/2;
    lines.forEach(ln=>{
      ctx.fillText(ln,bodyX,tly);
      tly+=lineH;
    });
  });

  // Italic Cormorant quote
  const quoteY=startY+4*(cardH+cardGap)-cardGap+20;
  ctx.fillStyle=P.nearBlk;ctx.font='italic 300 28px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='top';
  const qLine1='"Savings rate is not a number.';
  const qLine2='It\'s the speed of your journey to financial independence."';
  ctx.fillText(qLine1,W/2,quoteY);
  ctx.fillText(qLine2,W/2,quoteY+38);

  // CTA
  const ctaY=quoteY+96;
  ctx.fillStyle=P.green;
  rrect(W/2-200,ctaY,400,88,44);ctx.fill();
  ctx.fillStyle=P.white;ctx.font='700 28px Lato';ctx.letterSpacing='0.06em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Find Your Rate  →',W/2,ctaY+44);ctx.letterSpacing='0em';

  // Tag
  ctx.fillStyle=P.warmGray;ctx.font='300 20px Lato';ctx.letterSpacing='0em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('savings rate · financial freedom · FIRE · timeandmoneytree.com',W/2,ctaY+106);

  drawFooter();
}
function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='budget-30-educational-what-number-means-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
