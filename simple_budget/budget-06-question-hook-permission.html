<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>5 Minutes Every Month Forever · Budget Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;width:420px;height:630px;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 06 · Question Hook Permission · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxWidth&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);return y;
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Pale sage background
  ctx.fillStyle=P.sageFaint;
  ctx.fillRect(0,0,W,1395);

  // Top accent bar
  ctx.fillStyle=P.green;
  ctx.fillRect(0,0,W,12);

  // Pinyon Script tagline
  ctx.fillStyle=P.sage;
  ctx.font='400 54px "Pinyon Script"';
  ctx.textAlign='center';
  ctx.textBaseline='top';
  ctx.fillText('a small habit. a big difference.',W/2,40);

  // Large Pinyon Script central statement
  ctx.fillStyle=P.green;
  ctx.font='400 100px "Pinyon Script"';
  ctx.textAlign='center';
  ctx.textBaseline='top';
  ctx.fillText('5 minutes.',W/2,130);
  ctx.fillText('every month.',W/2,240);
  ctx.fillText('forever.',W/2,350);

  // Divider line
  ctx.strokeStyle=rgba(P.green,.2);
  ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(120,500);ctx.lineTo(W-120,500);ctx.stroke();

  // Italic question
  ctx.fillStyle=P.nearBlk;
  ctx.font='italic 300 52px "Cormorant Garamond"';
  ctx.textAlign='center';
  ctx.textBaseline='top';
  ctx.fillText('"What if budgeting',W/2,528);
  ctx.fillText('was this fast?"',W/2,588);

  // Three step chips horizontal
  const steps=[
    {label:'Open',sub:'30 seconds',bg:P.sageFaint,border:rgba(P.sage,.5)},
    {label:'Review\ncategories',sub:'2–3 minutes',bg:P.sage,border:P.sage},
    {label:'Adjust for\nnext month',sub:'1–2 minutes',bg:P.green,border:P.green},
  ];
  const chipW=240,chipH=200,chipGap=28;
  const totalW=chipW*3+chipGap*2;
  const startX=(W-totalW)/2;
  const chipY=700;
  steps.forEach((s,i)=>{
    const cx=startX+i*(chipW+chipGap);
    ctx.fillStyle=s.bg;
    rrect(cx,chipY,chipW,chipH,16);ctx.fill();
    ctx.strokeStyle=s.border;ctx.lineWidth=2;
    rrect(cx,chipY,chipW,chipH,16);ctx.stroke();

    // Step number
    ctx.fillStyle=i===2?P.sagePale:P.green;
    ctx.font='700 18px Lato';ctx.letterSpacing='0.12em';
    ctx.textAlign='center';ctx.textBaseline='top';
    ctx.fillText('STEP '+(i+1),cx+chipW/2,chipY+16);

    // Label
    ctx.fillStyle=i>=1?P.white:P.green;
    ctx.font='700 30px Lato';ctx.letterSpacing='0em';
    ctx.textAlign='center';ctx.textBaseline='top';
    const lines=s.label.split('\n');
    lines.forEach((ln,li)=>ctx.fillText(ln,cx+chipW/2,chipY+50+li*36));

    // Sub
    ctx.fillStyle=i===2?rgba(P.sagePale,.85):rgba(P.nearBlk,.55);
    ctx.font='300 22px Lato';ctx.letterSpacing='0em';
    ctx.textAlign='center';ctx.textBaseline='top';
    ctx.fillText(s.sub,cx+chipW/2,chipY+chipH-40);
  });

  // Arrow connectors between chips
  ctx.fillStyle=P.warmGray;
  ctx.font='700 28px Lato';
  ctx.textAlign='center';ctx.textBaseline='middle';

  // Body copy
  ctx.fillStyle=P.nearBlk;
  ctx.font='300 30px Lato';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('Clarity doesn\'t take hours.',W/2,960);
  ctx.fillText('It takes a system.',W/2,998);

  // Sub copy
  ctx.fillStyle=P.warmGray;
  ctx.font='300 26px Lato';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('Five minutes per month is all it takes',W/2,1062);
  ctx.fillText('to know exactly where you stand.',W/2,1098);

  // CTA button
  ctx.fillStyle=P.green;
  rrect(W/2-210,1180,420,88,44);ctx.fill();
  ctx.fillStyle=P.white;ctx.font='700 30px Lato';ctx.letterSpacing='0.06em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Try It Free  →',W/2,1224);

  // Tag line
  ctx.fillStyle=P.warmGray;
  ctx.font='300 22px Lato';ctx.letterSpacing='0em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('budget calculator · free · no sign-up',W/2,1304);
  ctx.fillText('timeandmoneytree.com',W/2,1338);

  drawFooter();
}
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='budget-06-question-hook-permission-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
