<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Without Categories vs. With a Budget System · Budget Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 09 · Before/After Strategy · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_no_text_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Split background: LEFT warmGray / RIGHT forest green
  ctx.fillStyle=rgba(P.warmGray,.15);
  ctx.fillRect(0,0,W/2,1395);
  ctx.fillStyle=P.green;
  ctx.fillRect(W/2,0,W/2,1395);

  // Headline band across both
  ctx.fillStyle=P.nearBlk;
  ctx.fillRect(0,0,W,100);

  ctx.fillStyle=P.white;ctx.font='700 28px Lato';ctx.letterSpacing='0.06em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('WITHOUT CATEGORIES',W/4,50);
  ctx.fillStyle=P.sagePale;ctx.font='700 28px Lato';ctx.letterSpacing='0.06em';
  ctx.textAlign='center';
  ctx.fillText('WITH A BUDGET SYSTEM',3*W/4,50);

  // Sub headline
  ctx.fillStyle=rgba(P.white,.5);ctx.font='300 20px Lato';ctx.letterSpacing='0em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Unstructured',W/4,80);
  ctx.fillStyle=rgba(P.sagePale,.7);
  ctx.fillText('Structured & optimizable',3*W/4,80);

  // Divider line center
  ctx.strokeStyle=rgba(P.white,.2);ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,1395);ctx.stroke();

  // LEFT items - warmGray side
  const leftItems=[
    {label:'Uncategorized',sub:'everything blurs together'},
    {label:'Savings:',sub:'whatever\'s left'},
    {label:'Pattern:',sub:'invisible'},
    {label:'Control:',sub:'minimal'},
  ];
  const itemY=140,itemH=150,itemGap=20;
  leftItems.forEach((item,i)=>{
    const iy=itemY+i*(itemH+itemGap);
    ctx.fillStyle=rgba(P.white,.07);
    rrect(32,iy,W/2-64,itemH,12);ctx.fill();
    ctx.strokeStyle=rgba(P.white,.12);ctx.lineWidth=1;
    rrect(32,iy,W/2-64,itemH,12);ctx.stroke();
    ctx.fillStyle=P.cream;ctx.font='700 28px Lato';ctx.letterSpacing='0em';
    ctx.textAlign='left';ctx.textBaseline='top';
    ctx.fillText(item.label,52,iy+24);
    ctx.fillStyle=rgba(P.cream,.55);ctx.font='300 24px Lato';
    ctx.fillText(item.sub,52,iy+64);
  });

  // RIGHT items - forest green side
  const rightItems=[
    {label:'Each dollar assigned',sub:'housing · food · savings · misc'},
    {label:'Savings:',sub:'first line — guaranteed'},
    {label:'Pattern:',sub:'clear and optimizable'},
    {label:'Control:',sub:'complete'},
  ];
  rightItems.forEach((item,i)=>{
    const iy=itemY+i*(itemH+itemGap);
    ctx.fillStyle=rgba(P.white,.1);
    rrect(W/2+32,iy,W/2-64,itemH,12);ctx.fill();
    ctx.strokeStyle=rgba(P.sagePale,.25);ctx.lineWidth=1;
    rrect(W/2+32,iy,W/2-64,itemH,12);ctx.stroke();
    ctx.fillStyle=P.white;ctx.font='700 28px Lato';ctx.letterSpacing='0em';
    ctx.textAlign='left';ctx.textBaseline='top';
    ctx.fillText(item.label,W/2+52,iy+24);
    ctx.fillStyle=P.sagePale;ctx.font='300 24px Lato';
    ctx.fillText(item.sub,W/2+52,iy+64);
  });

  // Divider
  const midY=820;
  ctx.strokeStyle=rgba(P.white,.15);ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(32,midY);ctx.lineTo(W-32,midY);ctx.stroke();

  // Summary comparison strip
  ctx.fillStyle=rgba(P.coral,.2);
  rrect(32,midY+20,W/2-64,120,12);ctx.fill();
  ctx.strokeStyle=rgba(P.coral,.4);ctx.lineWidth=1.5;
  rrect(32,midY+20,W/2-64,120,12);ctx.stroke();
  ctx.fillStyle=P.coral;ctx.font='700 26px Lato';ctx.letterSpacing='0em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('❌ Savings rate unknown',W/4,midY+80);

  ctx.fillStyle=rgba(P.sagePale,.2);
  rrect(W/2+32,midY+20,W/2-64,120,12);ctx.fill();
  ctx.strokeStyle=rgba(P.sagePale,.4);ctx.lineWidth=1.5;
  rrect(W/2+32,midY+20,W/2-64,120,12);ctx.stroke();
  ctx.fillStyle=P.sagePale;ctx.font='700 26px Lato';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('✓ Savings rate: 24%',3*W/4,midY+80);

  // Italic insight
  ctx.fillStyle=P.cream;
  ctx.font='italic 300 38px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('"You can\'t optimize',W/2,980);
  ctx.fillText('what you can\'t see."',W/2,1026);

  // CTA button
  ctx.fillStyle=P.sagePale;
  rrect(W/2-240,1100,480,88,44);ctx.fill();
  ctx.fillStyle=P.nearBlk;ctx.font='700 28px Lato';ctx.letterSpacing='0.06em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Set Up Your Categories  →',W/2,1144);

  // Tag
  ctx.fillStyle=rgba(P.cream,.45);
  ctx.font='300 22px Lato';ctx.letterSpacing='0em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('budget categories · savings rate · free · timeandmoneytree.com',W/2,1220);

  drawFooter();
}
function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='budget-09-before-after-strategy-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
