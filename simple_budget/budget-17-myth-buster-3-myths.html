<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3 Budget Myths Busted · Budget Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;width:420px;height:630px;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 17 · Myth Buster 3 Myths · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Cream background
  ctx.fillStyle=P.cream;
  ctx.fillRect(0,0,W,1395);

  // Top bar
  ctx.fillStyle=P.nearBlk;
  ctx.fillRect(0,0,W,130);

  ctx.fillStyle=P.coral;ctx.font='700 22px Lato';ctx.letterSpacing='0.16em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('MYTH BUSTERS',W/2,14);

  ctx.fillStyle=P.white;ctx.font='700 40px Lato';ctx.letterSpacing='0.04em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('3 Budget Myths — Debunked',W/2,52);

  ctx.fillStyle=rgba(P.cream,.55);ctx.font='300 22px Lato';ctx.letterSpacing='0em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('What you\'ve heard vs. what\'s actually true',W/2,104);

  // Myth cards
  const myths=[
    {
      num:'01',
      myth:'"You need to track every single purchase"',
      correction:'Track categories, not transactions. A weekly 10-min review is all it takes.',
    },
    {
      num:'02',
      myth:'"Budgeting means cutting everything you love"',
      correction:'A budget gives permission to spend guilt-free — savings are already handled first.',
    },
    {
      num:'03',
      myth:'"If you miss a month, you\'ve failed"',
      correction:'Budgets reset monthly. Every month is a fresh start. Imperfect is still powerful.',
    },
  ];

  const cardH=340,cardGap=18,cardX=50,cardW=W-100,startY=140;
  myths.forEach((myth,i)=>{
    const cy=startY+i*(cardH+cardGap);

    // Card bg
    ctx.fillStyle=P.white;
    rrect(cardX,cy,cardW,cardH,18);ctx.fill();
    ctx.strokeStyle=rgba(P.nearBlk,.08);ctx.lineWidth=1;
    rrect(cardX,cy,cardW,cardH,18);ctx.stroke();

    // Coral myth band
    ctx.fillStyle=P.coral;
    rrect(cardX,cy,cardW,88,18);ctx.fill();
    // square bottom corners of myth band
    ctx.fillRect(cardX,cy+56,cardW,32);

    // Myth number
    ctx.fillStyle=rgba(P.white,.3);ctx.font='700 64px Lato';ctx.letterSpacing='0em';
    ctx.textAlign='right';ctx.textBaseline='middle';
    ctx.fillText(myth.num,cardX+cardW-16,cy+44);

    // MYTH label
    ctx.fillStyle=P.white;ctx.font='700 18px Lato';ctx.letterSpacing='0.14em';
    ctx.textAlign='left';ctx.textBaseline='top';
    ctx.fillText('MYTH '+myth.num,cardX+22,cy+12);

    // Myth text
    ctx.fillStyle=P.white;ctx.font='italic 300 28px "Cormorant Garamond"';
    ctx.textAlign='left';ctx.textBaseline='top';
    const mwords=myth.myth.split(' ');let mline='';let mly=cy+42;const mmx=cardW-80;
    for(let n=0;n<mwords.length;n++){
      const test=mline+mwords[n]+' ';
      if(ctx.measureText(test).width>mmx&&n>0){ctx.fillText(mline,cardX+22,mly);mline=mwords[n]+' ';mly+=32;}
      else mline=test;
    }
    ctx.fillText(mline,cardX+22,mly);

    // Correction zone
    const corrY=cy+88;
    // Green checkmark circle
    ctx.fillStyle=P.green;
    ctx.beginPath();ctx.arc(cardX+38,corrY+30,22,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=P.white;ctx.font='700 22px Lato';ctx.letterSpacing='0em';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('✓',cardX+38,corrY+30);

    // TRUTH label
    ctx.fillStyle=P.green;ctx.font='700 18px Lato';ctx.letterSpacing='0.12em';
    ctx.textAlign='left';ctx.textBaseline='top';
    ctx.fillText('THE TRUTH',cardX+72,corrY+10);

    // Correction text
    ctx.fillStyle=P.nearBlk;ctx.font='300 24px Lato';ctx.letterSpacing='0em';
    ctx.textAlign='left';ctx.textBaseline='top';
    const cwords=myth.correction.split(' ');let cline='';let cly=corrY+46;const cmx=cardW-90;
    for(let n=0;n<cwords.length;n++){
      const test=cline+cwords[n]+' ';
      if(ctx.measureText(test).width>cmx&&n>0){ctx.fillText(cline,cardX+22,cly);cline=cwords[n]+' ';cly+=30;}
      else cline=test;
    }
    ctx.fillText(cline,cardX+22,cly);
  });

  // CTA
  const ctaY=startY+3*(cardH+cardGap)-cardGap+18;
  ctx.fillStyle=P.green;
  rrect(W/2-240,ctaY,480,88,44);ctx.fill();
  ctx.fillStyle=P.white;ctx.font='700 28px Lato';ctx.letterSpacing='0.06em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Build a Budget That Works  →',W/2,ctaY+44);

  // Tag
  ctx.fillStyle=P.warmGray;ctx.font='300 22px Lato';ctx.letterSpacing='0em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('budget myths · tips · free · timeandmoneytree.com',W/2,ctaY+108);

  drawFooter();
}
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='budget-17-myth-buster-3-myths-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
