<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3 Phases of Budget Mastery · Budget Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;width:420px;height:630px;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 14 · Step Ladder 3-Phase · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Title section - nearBlk top
  ctx.fillStyle=P.nearBlk;
  ctx.fillRect(0,0,W,150);

  ctx.fillStyle=P.sagePale;
  ctx.font='400 44px "Pinyon Script"';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('the journey to financial freedom',W/2,10);

  ctx.fillStyle=P.white;ctx.font='700 38px Lato';ctx.letterSpacing='0.06em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('3 PHASES OF BUDGET MASTERY',W/2,64);

  // Phase bands
  const phases=[
    {
      num:'1',
      label:'AWARENESS',
      color:P.green,
      textColor:P.white,
      subColor:P.sagePale,
      desc:'First time seeing where money actually goes',
      body:'Categories revealed. Patterns visible. No more guessing.',
      h:280,
    },
    {
      num:'2',
      label:'OPTIMIZATION',
      color:P.sage,
      textColor:P.nearBlk,
      subColor:P.green,
      desc:'Cutting inefficiency, raising savings rate deliberately',
      body:'Reduce waste. Redirect to savings. Watch the rate climb.',
      h:280,
    },
    {
      num:'3',
      label:'FREEDOM',
      color:P.sageFaint,
      textColor:P.green,
      subColor:P.warmGray,
      desc:'Savings rate high enough to accelerate financial independence',
      body:'The budget becomes automatic. FIRE timeline shortens.',
      h:280,
    },
  ];

  let bandY=150;
  phases.forEach((phase,i)=>{
    ctx.fillStyle=phase.color;
    ctx.fillRect(0,bandY,W,phase.h);

    // Decorative large number behind
    ctx.fillStyle=rgba(phase.num==='1'?P.white:(phase.num==='2'?P.nearBlk:P.green),.06);
    ctx.font='700 260px Lato';ctx.letterSpacing='0em';
    ctx.textAlign='right';ctx.textBaseline='middle';
    ctx.fillText(phase.num,W-20,bandY+phase.h/2);

    // Phase label chip
    ctx.fillStyle=rgba(phase.textColor,.15);
    rrect(60,bandY+24,220,50,25);ctx.fill();
    ctx.strokeStyle=rgba(phase.textColor,.3);ctx.lineWidth=1.5;
    rrect(60,bandY+24,220,50,25);ctx.stroke();
    ctx.fillStyle=phase.textColor;ctx.font='700 20px Lato';ctx.letterSpacing='0.12em';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('PHASE '+phase.num,60+110,bandY+49);

    // Phase name
    ctx.fillStyle=phase.textColor;ctx.font='700 44px Lato';ctx.letterSpacing='0.04em';
    ctx.textAlign='left';ctx.textBaseline='top';
    ctx.fillText(phase.label,60,bandY+88);

    // Description
    ctx.fillStyle=phase.subColor;ctx.font='italic 300 30px "Cormorant Garamond"';
    ctx.textAlign='left';ctx.textBaseline='top';
    ctx.fillText(phase.desc,60,bandY+142);

    // Body
    ctx.fillStyle=rgba(phase.textColor,.7);ctx.font='300 24px Lato';ctx.letterSpacing='0em';
    ctx.textAlign='left';ctx.textBaseline='top';
    ctx.fillText(phase.body,60,bandY+190);

    // Divider
    if(i<phases.length-1){
      ctx.strokeStyle=rgba(phase.textColor,.12);ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(0,bandY+phase.h-1);ctx.lineTo(W,bandY+phase.h-1);ctx.stroke();
    }

    bandY+=phase.h;
  });

  // Insight strip
  ctx.fillStyle=P.nearBlk;
  ctx.fillRect(0,990,W,90);
  ctx.fillStyle=P.cream;ctx.font='italic 300 36px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('"Every phase starts with a single budget."',W/2,1035);

  // Body copy
  ctx.fillStyle=P.nearBlk;ctx.font='300 28px Lato';ctx.letterSpacing='0em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillRect(0,1080,W,240);
  ctx.fillStyle=P.cream;
  ctx.fillText('The calculator guides you through',W/2,1104);
  ctx.fillText('awareness to optimization to freedom.',W/2,1142);

  // CTA
  ctx.fillStyle=P.sagePale;
  rrect(W/2-200,1210,400,88,44);ctx.fill();
  ctx.fillStyle=P.nearBlk;ctx.font='700 30px Lato';ctx.letterSpacing='0.06em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Start Phase 1  →',W/2,1254);

  // Tag
  ctx.fillStyle=rgba(P.cream,.4);ctx.font='300 22px Lato';ctx.letterSpacing='0em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('budget mastery · savings rate · FIRE · timeandmoneytree.com',W/2,1326);

  drawFooter();
}
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='budget-14-step-ladder-3-phase-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
