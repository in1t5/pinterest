<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>What 30 Days of Tracking Changes · Budget Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 11 · Before/After Emotional · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_no_text_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Split vertical background
  ctx.fillStyle=rgba(P.warmGray,.18);
  ctx.fillRect(0,0,W/2,1395);
  ctx.fillStyle=P.green;
  ctx.fillRect(W/2,0,W/2,1395);

  // Center divider
  ctx.strokeStyle=rgba(P.white,.15);ctx.lineWidth=2;
  ctx.setLineDash([8,8]);
  ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,1395);ctx.stroke();
  ctx.setLineDash([]);

  // Headline band
  ctx.fillStyle=P.nearBlk;
  ctx.fillRect(0,0,W,88);
  ctx.fillStyle=P.white;ctx.font='700 30px Lato';ctx.letterSpacing='0.06em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('WHAT 30 DAYS OF TRACKING CHANGES',W/2,44);

  // LEFT large italic label - Cormorant 72px
  ctx.fillStyle=rgba(P.cream,.3);
  ctx.font='italic 300 72px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('Overwhelm',W/4,110);

  // LEFT items
  const leftItems=[
    {label:'Overwhelmed by bills',icon:'→'},
    {label:'"I\'ll deal with it later"',icon:'→'},
    {label:'Money = anxiety',icon:'→'},
  ];
  leftItems.forEach((item,i)=>{
    const iy=230+i*140;
    ctx.fillStyle=rgba(P.white,.08);
    rrect(24,iy,W/2-48,110,12);ctx.fill();
    ctx.strokeStyle=rgba(P.white,.1);ctx.lineWidth=1;
    rrect(24,iy,W/2-48,110,12);ctx.stroke();
    ctx.fillStyle=rgba(P.cream,.75);ctx.font='italic 300 32px "Cormorant Garamond"';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(item.label,W/4,iy+55);
  });

  // Money line LEFT
  ctx.fillStyle=rgba(P.coral,.6);
  rrect(24,650,W/2-48,80,12);ctx.fill();
  ctx.fillStyle=P.white;ctx.font='700 26px Lato';ctx.letterSpacing='0em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Money: anxiety',W/4,690);

  // RIGHT large italic label
  ctx.fillStyle=rgba(P.sagePale,.25);
  ctx.font='italic 300 72px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('Clarity',3*W/4,110);

  // RIGHT items
  const rightItems=[
    {label:'Category clarity'},
    {label:'"I know exactly\nwhere I stand"'},
    {label:'Money = tool'},
  ];
  rightItems.forEach((item,i)=>{
    const iy=230+i*140;
    ctx.fillStyle=rgba(P.white,.1);
    rrect(W/2+24,iy,W/2-48,110,12);ctx.fill();
    ctx.strokeStyle=rgba(P.sagePale,.2);ctx.lineWidth=1;
    rrect(W/2+24,iy,W/2-48,110,12);ctx.stroke();
    const lines=item.label.split('\n');
    ctx.fillStyle=P.white;ctx.font='italic 300 32px "Cormorant Garamond"';
    ctx.textAlign='center';
    lines.forEach((ln,li)=>{
      ctx.textBaseline='middle';
      ctx.fillText(ln,3*W/4,iy+55+(li-(lines.length-1)/2)*38);
    });
  });

  // Money line RIGHT
  ctx.fillStyle=P.sagePale;
  rrect(W/2+24,650,W/2-48,80,12);ctx.fill();
  ctx.fillStyle=P.nearBlk;ctx.font='700 26px Lato';ctx.letterSpacing='0em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Money: tool',3*W/4,690);

  // Transition arrow
  ctx.fillStyle=P.sagePale;ctx.font='700 60px Lato';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('→',W/2,780);

  // Insight strip
  ctx.fillStyle=P.nearBlk;
  ctx.fillRect(0,840,W,100);
  ctx.fillStyle=P.cream;ctx.font='italic 300 40px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('"One month of data changes everything."',W/2,890);

  // Supporting text
  ctx.fillStyle=P.cream;ctx.font='300 28px Lato';ctx.letterSpacing='0em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('Track your first month. See the shift.',W/2,970);
  ctx.fillText('Clarity arrives faster than you expect.',W/2,1010);

  // Feature chips
  const chips=[
    {t:'No spreadsheet needed',bg:rgba(P.sagePale,.15),tc:P.cream},
    {t:'No accounting knowledge',bg:rgba(P.sagePale,.15),tc:P.cream},
    {t:'No sign-up required',bg:P.sagePale,tc:P.nearBlk},
  ];
  chips.forEach((chip,i)=>{
    const cw=280,ch=56,cy=1060+i*72;
    const cx=(W-cw)/2;
    ctx.fillStyle=chip.bg;rrect(cx,cy,cw,ch,28);ctx.fill();
    ctx.fillStyle=chip.tc;ctx.font='700 22px Lato';ctx.letterSpacing='0em';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(chip.t,cx+cw/2,cy+ch/2);
  });

  // CTA
  ctx.fillStyle=P.sagePale;
  rrect(W/2-220,1290,440,80,40);ctx.fill();
  ctx.fillStyle=P.nearBlk;ctx.font='700 28px Lato';ctx.letterSpacing='0.06em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Start Your 30 Days  →',W/2,1330);

  drawFooter();
}
function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='budget-11-before-after-emotional-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
