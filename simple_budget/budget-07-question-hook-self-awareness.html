<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Do You Know Where Your Money Goes? · Budget Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;width:420px;height:630px;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 07 · Question Hook Self-Awareness · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Cream background
  ctx.fillStyle=P.cream;
  ctx.fillRect(0,0,W,1395);

  // Top bar accent
  ctx.fillStyle=P.green;
  ctx.fillRect(0,0,W,10);

  // Large italic question headline
  ctx.fillStyle=P.nearBlk;
  ctx.font='italic 300 62px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('"Do you know where',W/2,38);
  ctx.fillText('your money goes',W/2,110);
  ctx.fillText('each month?"',W/2,182);

  // Sub headline
  ctx.fillStyle=P.warmGray;
  ctx.font='300 28px Lato';ctx.letterSpacing='0em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('Not generally. Not "probably food',W/2,278);
  ctx.fillText('and rent." Exactly.',W/2,316);

  // Divider
  ctx.strokeStyle=rgba(P.green,.2);ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(88,370);ctx.lineTo(W-88,370);ctx.stroke();

  // Two-cell contrast
  const cellW=400,cellH=380,cellY=400,gap=24;
  const leftX=88,rightX=88+cellW+gap;

  // LEFT cell - warmGray
  ctx.fillStyle=P.warmGray;
  rrect(leftX,cellY,cellW,cellH,18);ctx.fill();

  ctx.fillStyle=P.white;ctx.font='700 22px Lato';ctx.letterSpacing='0.10em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('GUESSING',leftX+cellW/2,cellY+24);

  ctx.fillStyle=rgba(P.white,.85);ctx.font='italic 300 36px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('"It goes...', leftX+cellW/2, cellY+74);
  ctx.fillText('somewhere"', leftX+cellW/2, cellY+118);

  ctx.fillStyle=rgba(P.cream,.7);ctx.font='300 24px Lato';ctx.letterSpacing='0em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('No categories',leftX+cellW/2,cellY+180);
  ctx.fillText('No patterns',leftX+cellW/2,cellY+212);
  ctx.fillText('No control',leftX+cellW/2,cellY+244);

  ctx.fillStyle=rgba(P.coral,1);ctx.font='700 26px Lato';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('❌ Blind spots everywhere',leftX+cellW/2,cellY+310);

  // RIGHT cell - forest green elevated
  ctx.fillStyle=P.green;
  rrect(rightX,cellY,cellW,cellH,18);ctx.fill();
  // subtle top highlight
  ctx.fillStyle=rgba(P.white,.06);
  rrect(rightX,cellY,cellW,cellH/3,18);ctx.fill();

  ctx.fillStyle=P.sagePale;ctx.font='700 22px Lato';ctx.letterSpacing='0.10em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('TRACKING',rightX+cellW/2,cellY+24);

  ctx.fillStyle=P.white;ctx.font='700 28px Lato';ctx.letterSpacing='0em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('Housing 27%',rightX+cellW/2,cellY+74);
  ctx.fillText('Food 12%',rightX+cellW/2,cellY+114);
  ctx.fillText('Savings 24%',rightX+cellW/2,cellY+154);

  ctx.fillStyle=P.sagePale;ctx.font='300 24px Lato';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('Every category visible',rightX+cellW/2,cellY+218);
  ctx.fillText('Every pattern clear',rightX+cellW/2,cellY+252);

  ctx.fillStyle=P.sagePale;ctx.font='700 26px Lato';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('✓ Full clarity',rightX+cellW/2,cellY+310);

  // Body copy
  ctx.fillStyle=P.nearBlk;
  ctx.font='300 28px Lato';ctx.letterSpacing='0em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('People who track categories',W/2,830);
  ctx.fillText('spend less on what doesn\'t matter.',W/2,868);

  // Italic insight
  ctx.fillStyle=P.green;
  ctx.font='italic 300 38px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('"Awareness is the first step',W/2,940);
  ctx.fillText('to financial clarity."',W/2,986);

  // CTA
  ctx.fillStyle=P.green;
  rrect(W/2-220,1080,440,88,44);ctx.fill();
  ctx.fillStyle=P.white;ctx.font='700 30px Lato';ctx.letterSpacing='0.06em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Start Tracking Free  →',W/2,1124);

  // Tag
  ctx.fillStyle=P.warmGray;
  ctx.font='300 22px Lato';ctx.letterSpacing='0em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('budget categories · savings rate · free calculator',W/2,1202);
  ctx.fillText('timeandmoneytree.com',W/2,1238);

  drawFooter();
}
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='budget-07-question-hook-self-awareness-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
