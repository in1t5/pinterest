<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Your Budget Organized · Simple Budget Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;width:420px;height:630px;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 22 · Mockup Phone Vertical · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxWidth&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);return y;
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Near-black background
  ctx.fillStyle=P.nearBlk;
  ctx.fillRect(0,0,W,1395);

  // Header text
  ctx.fillStyle=P.cream;ctx.font='700 52px Lato';ctx.letterSpacing='0.04em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('YOUR BUDGET.',W/2,42);ctx.letterSpacing='0em';

  ctx.fillStyle=P.sage;ctx.font='300 38px Lato';ctx.letterSpacing='0em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('Organized Like This.',W/2,106);

  // Phone frame outer
  const phX=220,phY=168,phW=560,phH=860,phR=48;
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,0.6)';ctx.shadowBlur=40;ctx.shadowOffsetY=16;
  ctx.fillStyle=P.green;
  rrect(phX,phY,phW,phH,phR);ctx.fill();
  ctx.restore();

  ctx.fillStyle=P.green;
  rrect(phX,phY,phW,phH,phR);ctx.fill();

  // Phone inner bezel
  const biX=phX+14,biY=phY+14,biW=phW-28,biH=phH-28,biR=36;
  ctx.fillStyle=rgba(P.nearBlk,.95);
  rrect(biX,biY,biW,biH,biR);ctx.fill();

  // Status bar notch
  const notchW=140,notchH=28;
  ctx.fillStyle=P.green;
  rrect(phX+phW/2-notchW/2,biY,notchW,notchH,14);ctx.fill();

  // Screen content clipped
  ctx.save();
  rrect(biX,biY,biW,biH,biR);ctx.clip();

  const scX=biX+20,scW=biW-40;

  // App header
  ctx.fillStyle=P.sage;ctx.font='700 28px Lato';ctx.letterSpacing='0.05em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('Budget',phX+phW/2,biY+40);ctx.letterSpacing='0em';

  // Savings rate hero
  ctx.fillStyle=P.cream;ctx.font='700 56px Lato';ctx.letterSpacing='0em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('Savings Rate: 24%',phX+phW/2,biY+88);

  ctx.fillStyle=P.sage;ctx.font='300 26px Lato';ctx.letterSpacing='0em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('Savings: $1,248',phX+phW/2,biY+158);

  // Divider
  ctx.strokeStyle=rgba(P.sage,.3);ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(scX,biY+196);ctx.lineTo(scX+scW,biY+196);ctx.stroke();

  // Category rows
  const catRows=[
    {label:'Housing',val:'$1,400',bg:rgba(P.nearBlk,.0),textColor:P.cream,bold:false},
    {label:'Food',val:'$620',bg:rgba(P.white,.04),textColor:P.cream,bold:false},
    {label:'Savings',val:'$880 ↑',bg:rgba(P.sage,.18),textColor:P.sage,bold:true},
    {label:'Transport',val:'$290',bg:rgba(P.nearBlk,.0),textColor:P.cream,bold:false},
    {label:'Entertainment',val:'$362',bg:rgba(P.white,.04),textColor:P.cream,bold:false},
  ];
  const rowH=74;
  catRows.forEach((row,i)=>{
    const ry=biY+206+i*rowH;
    ctx.fillStyle=row.bg;
    ctx.fillRect(biX,ry,biW,rowH);
    ctx.strokeStyle=rgba(P.sage,.15);ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(biX,ry+rowH);ctx.lineTo(biX+biW,ry+rowH);ctx.stroke();

    ctx.fillStyle=row.textColor;
    ctx.font=row.bold?'700 26px Lato':'400 26px Lato';ctx.letterSpacing='0em';
    ctx.textAlign='left';ctx.textBaseline='middle';
    ctx.fillText(row.label,scX,ry+rowH/2);
    ctx.textAlign='right';
    ctx.fillText(row.val,scX+scW,ry+rowH/2);
  });

  // Progress bar
  const pbY=biY+206+catRows.length*rowH+20;
  ctx.fillStyle=P.cream;ctx.font='700 20px Lato';ctx.letterSpacing='0em';
  ctx.textAlign='left';ctx.textBaseline='top';
  ctx.fillText('Savings Rate',scX,pbY);
  ctx.textAlign='right';
  ctx.fillText('24%',scX+scW,pbY);

  ctx.fillStyle=rgba(P.sage,.25);
  rrect(scX,pbY+30,scW,18,9);ctx.fill();
  ctx.fillStyle=P.sage;
  rrect(scX,pbY+30,scW*0.24,18,9);ctx.fill();

  // Home indicator
  ctx.fillStyle=rgba(P.white,.25);
  rrect(phX+phW/2-50,biY+biH-22,100,6,3);ctx.fill();

  ctx.restore();

  // CTA
  const ctaY=phY+phH+44;
  ctx.fillStyle=P.green;
  rrect(W/2-180,ctaY,360,84,42);ctx.fill();
  ctx.fillStyle=P.white;ctx.font='700 28px Lato';ctx.letterSpacing='0.06em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Open Free  →',W/2,ctaY+42);ctx.letterSpacing='0em';

  // Tag
  ctx.fillStyle=P.warmGray;ctx.font='300 20px Lato';ctx.letterSpacing='0em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('budget calculator · mobile · free · timeandmoneytree.com',W/2,ctaY+104);

  drawFooter();
}
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='budget-22-mockup-phone-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
