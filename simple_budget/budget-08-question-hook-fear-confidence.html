<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scared to Look at Your Spending? · Budget Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;width:420px;height:630px;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 08 · Question Hook Fear → Confidence · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Near-black background
  ctx.fillStyle=P.nearBlk;
  ctx.fillRect(0,0,W,1395);

  // Subtle texture dots
  for(let xi=0;xi<W;xi+=80){
    for(let yi=0;yi<1395;yi+=80){
      ctx.fillStyle=rgba(P.white,.015);
      ctx.beginPath();ctx.arc(xi,yi,1.5,0,Math.PI*2);ctx.fill();
    }
  }

  // Top label chip
  ctx.fillStyle=rgba(P.coral,.15);
  rrect(W/2-100,32,200,44,22);ctx.fill();
  ctx.strokeStyle=rgba(P.coral,.4);ctx.lineWidth=1.5;
  rrect(W/2-100,32,200,44,22);ctx.stroke();
  ctx.fillStyle=P.coral;ctx.font='700 18px Lato';ctx.letterSpacing='0.12em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('RELATABLE',W/2,54);

  // Cream italic headline
  ctx.fillStyle=P.cream;
  ctx.font='italic 300 72px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('"Scared to look',W/2,100);
  ctx.fillText('at your spending?"',W/2,178);

  // Body pale sage
  ctx.fillStyle=P.sagePale;
  ctx.font='300 32px Lato';ctx.letterSpacing='0em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('Budget avoidance feels protective.',W/2,286);
  ctx.fillText('It isn\'t.',W/2,330);

  // Divider
  ctx.strokeStyle=rgba(P.sage,.3);ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(120,390);ctx.lineTo(W-120,390);ctx.stroke();

  // Transition insight
  ctx.fillStyle=rgba(P.cream,.7);
  ctx.font='italic 300 36px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('"What you don\'t see still costs you."',W/2,416);

  // Before/after chips
  const chipW=360,chipH=160,chipY=500,gap=32;
  const leftX=(W-chipW*2-gap)/2;
  const rightX=leftX+chipW+gap;

  // Before chip - warmGray
  ctx.fillStyle=rgba(P.warmGray,.25);
  rrect(leftX,chipY,chipW,chipH,16);ctx.fill();
  ctx.strokeStyle=rgba(P.warmGray,.4);ctx.lineWidth=1.5;
  rrect(leftX,chipY,chipW,chipH,16);ctx.stroke();
  ctx.fillStyle=P.warmGray;ctx.font='700 20px Lato';ctx.letterSpacing='0.10em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('BEFORE',leftX+chipW/2,chipY+22);
  ctx.fillStyle=P.cream;ctx.font='italic 300 52px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('anxious',leftX+chipW/2,chipY+56);

  // Arrow
  ctx.fillStyle=P.sage;ctx.font='700 40px Lato';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('→',W/2,chipY+chipH/2);

  // After chip - forest green
  ctx.fillStyle=P.green;
  rrect(rightX,chipY,chipW,chipH,16);ctx.fill();
  ctx.fillStyle=P.sagePale;ctx.font='700 20px Lato';ctx.letterSpacing='0.10em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('AFTER',rightX+chipW/2,chipY+22);
  ctx.fillStyle=P.white;ctx.font='italic 300 52px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('in control',rightX+chipW/2,chipY+56);

  // Second insight
  ctx.fillStyle=P.sagePale;
  ctx.font='300 28px Lato';ctx.letterSpacing='0em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('The data isn\'t the scary part.',W/2,714);
  ctx.fillText('The unknown is.',W/2,752);

  // Feature list
  const feats=[
    'See every category at once',
    'Know exactly what can change',
    'Replace anxiety with a number',
  ];
  feats.forEach((f,i)=>{
    const fy=830+i*58;
    ctx.fillStyle=P.green;
    ctx.beginPath();ctx.arc(110,fy+20,14,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=P.white;ctx.font='700 18px Lato';ctx.letterSpacing='0em';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('✓',110,fy+20);
    ctx.fillStyle=P.cream;ctx.font='300 28px Lato';
    ctx.textAlign='left';ctx.textBaseline='top';
    ctx.fillText(f,142,fy+6);
  });

  // CTA sage pill
  ctx.fillStyle=rgba(P.sage,.2);
  rrect(W/2-240,1060,480,88,44);ctx.fill();
  ctx.strokeStyle=P.sage;ctx.lineWidth=2;
  rrect(W/2-240,1060,480,88,44);ctx.stroke();
  ctx.fillStyle=P.sagePale;ctx.font='700 28px Lato';ctx.letterSpacing='0.06em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Just Open the Calculator  →',W/2,1104);

  // Tag
  ctx.fillStyle=rgba(P.warmGray,.7);
  ctx.font='300 22px Lato';ctx.letterSpacing='0em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('budget · money anxiety · financial clarity',W/2,1190);
  ctx.fillText('free · no sign-up · timeandmoneytree.com',W/2,1224);

  drawFooter();
}
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='budget-08-question-hook-fear-confidence-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
