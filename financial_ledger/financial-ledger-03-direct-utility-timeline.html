<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Financial Ledger — 5 Years of Net Worth Growth in One Chart · Financial Ledger · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;width:420px;height:630px;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 03 · Direct Utility Timeline · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);
  // Dark bg
  ctx.fillStyle=P.nearBlk;ctx.fillRect(0,0,W,H);
  // Green glow center
  const bg2=ctx.createRadialGradient(W/2,600,80,W/2,600,600);
  bg2.addColorStop(0,rgba(P.sage,.18));bg2.addColorStop(1,'transparent');
  ctx.fillStyle=bg2;ctx.fillRect(0,0,W,H);

  // Headline
  ctx.fillStyle=P.cream;ctx.font='300 78px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('5 Years of Wealth Growth',W/2,120);

  // Sub italic
  ctx.fillStyle=rgba(P.sagePale,.7);ctx.font='italic 300 34px "Cormorant Garamond"';
  ctx.fillText('Your financial story — in one chart',W/2,172);

  // Chart area
  const chartX=80,chartY=220,chartW=840,chartH=520;
  // Grid lines
  ctx.strokeStyle=rgba(P.white,.06);ctx.lineWidth=1;
  for(let g=0;g<5;g++){
    const gy=chartY+chartH-g*(chartH/4);
    ctx.beginPath();ctx.moveTo(chartX,gy);ctx.lineTo(chartX+chartW,gy);ctx.stroke();
  }

  // Data
  const data=[{yr:'2019',val:42},{yr:'2020',val:68},{yr:'2021',val:112},{yr:'2022',val:168},{yr:'2023',val:231}];
  const maxVal=250;
  const pts=data.map((d,i)=>[
    chartX+60+i*(chartW-120)/4,
    chartY+chartH-30-(d.val/maxVal)*(chartH-60)
  ]);

  // Glowing area
  const aGrad=ctx.createLinearGradient(0,chartY,0,chartY+chartH);
  aGrad.addColorStop(0,rgba(P.sage,.45));aGrad.addColorStop(1,rgba(P.sage,.03));
  ctx.fillStyle=aGrad;
  ctx.beginPath();ctx.moveTo(pts[0][0],chartY+chartH-30);
  pts.forEach(p=>ctx.lineTo(p[0],p[1]));
  ctx.lineTo(pts[pts.length-1][0],chartY+chartH-30);ctx.closePath();ctx.fill();

  // Glow stroke
  ctx.save();ctx.shadowColor=P.sage;ctx.shadowBlur=18;
  ctx.strokeStyle=P.sage;ctx.lineWidth=5;ctx.lineJoin='round';ctx.lineCap='round';
  ctx.beginPath();pts.forEach((p,i)=>i===0?ctx.moveTo(p[0],p[1]):ctx.lineTo(p[0],p[1]));ctx.stroke();
  ctx.restore();

  // Nodes with glow
  pts.forEach((p,i)=>{
    ctx.save();ctx.shadowColor=P.sagePale;ctx.shadowBlur=20;
    ctx.beginPath();ctx.arc(p[0],p[1],12,0,Math.PI*2);
    ctx.fillStyle=P.cream;ctx.fill();
    ctx.strokeStyle=P.sage;ctx.lineWidth=3;ctx.stroke();
    ctx.restore();
    // Value above node
    ctx.fillStyle=P.cream;ctx.font='700 26px Lato';ctx.textAlign='center';ctx.textBaseline='alphabetic';
    ctx.fillText('$'+data[i].val+'k',p[0],p[1]-22);
    // Year below x-axis
    ctx.fillStyle=rgba(P.sagePale,.75);ctx.font='700 20px Lato';
    ctx.fillText(data[i].yr,p[0],chartY+chartH+16);
  });

  // Divider
  ctx.strokeStyle=rgba(P.sagePale,.2);ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(100,chartY+chartH+40);ctx.lineTo(900,chartY+chartH+40);ctx.stroke();

  // Body text
  ctx.fillStyle=P.warmGray;ctx.font='300 28px Lato';
  ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('One entry per year.',W/2,chartY+chartH+100);
  ctx.fillText('Five minutes per year.',W/2,chartY+chartH+138);
  ctx.fillText('A lifetime of clarity.',W/2,chartY+chartH+176);

  // CTA pill
  const pw=360,ph=70,ppx=W/2-pw/2,ppy=1140;
  rrect(ppx,ppy,pw,ph,35);
  const pGrad=ctx.createLinearGradient(ppx,ppy,ppx+pw,ppy);
  pGrad.addColorStop(0,P.sage);pGrad.addColorStop(1,P.green);
  ctx.fillStyle=pGrad;ctx.fill();
  ctx.save();ctx.shadowColor=rgba(P.sage,.5);ctx.shadowBlur=24;ctx.stroke();ctx.restore();
  ctx.fillStyle=P.white;ctx.font='700 26px Lato';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Start Your Ledger →',W/2,ppy+ph/2);

  // Small tag
  ctx.fillStyle=rgba(P.sagePale,.4);ctx.font='italic 300 21px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('Financial Ledger · free · no account needed',W/2,1268);

  drawFooter();
}
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='financial-ledger-03-direct-utility-timeline-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
