<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Are Your Finances Actually Improving? · Financial Ledger · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 08 · Question Hook Fear/Confidence · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxWidth&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);return y;
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_no_text_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);
  // Near-black background
  ctx.fillStyle=P.nearBlk;ctx.fillRect(0,0,W,H);
  // Subtle top accent
  ctx.fillStyle=P.green;ctx.fillRect(0,0,W,8);

  // Cream italic headline
  ctx.fillStyle=P.cream;ctx.font='italic 300 72px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('Are your finances',W/2,140);
  ctx.fillText('actually improving',W/2,222);
  ctx.fillStyle=P.sagePale;ctx.font='italic 300 80px "Cormorant Garamond"';
  ctx.fillText('— or does it just',W/2,312);
  ctx.fillStyle=P.cream;ctx.font='italic 300 72px "Cormorant Garamond"';
  ctx.fillText('feel that way?',W/2,392);

  // Thin divider
  ctx.strokeStyle=rgba(P.sage,.3);ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(120,430);ctx.lineTo(880,430);ctx.stroke();

  // Subtle line chart — flat then rising
  const chartX=100,chartY=490,chartW=800,chartH=280;
  // Chart bg
  rrect(chartX,chartY,chartW,chartH,16);
  ctx.fillStyle=rgba(P.green,.12);ctx.fill();
  ctx.strokeStyle=rgba(P.sage,.2);ctx.lineWidth=1;ctx.stroke();

  // Grid lines
  ctx.strokeStyle=rgba(P.sage,.12);ctx.lineWidth=1;
  for(let i=1;i<4;i++){
    const gy=chartY+chartH*(i/4);
    ctx.beginPath();ctx.moveTo(chartX+20,gy);ctx.lineTo(chartX+chartW-20,gy);ctx.stroke();
  }

  // Flat then rising line
  const pts=[
    [chartX+40, chartY+chartH-50],
    [chartX+140,chartY+chartH-55],
    [chartX+240,chartY+chartH-48],
    [chartX+340,chartY+chartH-60],
    [chartX+440,chartY+chartH-100],
    [chartX+560,chartY+chartH-150],
    [chartX+680,chartY+chartH-210],
    [chartX+chartW-40,chartY+40],
  ];
  // Area fill under line
  ctx.beginPath();
  ctx.moveTo(pts[0][0],chartY+chartH-20);
  pts.forEach(([x,y])=>ctx.lineTo(x,y));
  ctx.lineTo(pts[pts.length-1][0],chartY+chartH-20);
  ctx.closePath();
  const grad=ctx.createLinearGradient(0,chartY,0,chartY+chartH);
  grad.addColorStop(0,rgba(P.sage,.35));
  grad.addColorStop(1,rgba(P.sage,.03));
  ctx.fillStyle=grad;ctx.fill();
  // Line
  ctx.beginPath();
  pts.forEach(([x,y],i)=>i===0?ctx.moveTo(x,y):ctx.lineTo(x,y));
  ctx.strokeStyle=P.sage;ctx.lineWidth=3;ctx.stroke();
  // Endpoint dot
  ctx.beginPath();ctx.arc(pts[pts.length-1][0],pts[pts.length-1][1],8,0,Math.PI*2);
  ctx.fillStyle=P.sage;ctx.fill();

  // Chart label
  ctx.fillStyle=rgba(P.sagePale,.7);ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.textAlign='left';ctx.textBaseline='alphabetic';
  ctx.fillText('NET WORTH OVER TIME',chartX+24,chartY+28);

  // LOG THE DATA text
  ctx.fillStyle=P.sagePale;ctx.font='700 28px Lato';ctx.letterSpacing='0.12em';
  ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('LOG THE DATA',W/2,840);
  ctx.letterSpacing='0em';

  // Rule
  ctx.strokeStyle=rgba(P.sage,.25);ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(200,860);ctx.lineTo(800,860);ctx.stroke();

  // Body quote
  ctx.fillStyle=rgba(P.cream,.85);ctx.font='italic 300 42px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('"Optimism is valuable.',W/2,940);
  ctx.fillStyle=P.sagePale;ctx.font='italic 300 42px "Cormorant Garamond"';
  ctx.fillText('Data is irreplaceable."',W/2,994);

  // Supporting text
  ctx.fillStyle=rgba(P.cream,.55);ctx.font='300 24px Lato';
  ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('Track your net worth every year.',W/2,1068);
  ctx.fillText('See your real financial trajectory.',W/2,1102);

  // CTA pill
  const pw=380,ph=72,ppx=W/2-pw/2,ppy=1178;
  rrect(ppx,ppy,pw,ph,36);
  ctx.fillStyle=P.sage;ctx.fill();
  ctx.fillStyle=P.nearBlk;ctx.font='700 26px Lato';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.letterSpacing='0.04em';
  ctx.fillText('Start Tracking Free  →',W/2,ppy+ph/2);
  ctx.letterSpacing='0em';

  // Tag line
  ctx.fillStyle=rgba(P.cream,.25);ctx.font='300 17px Lato';ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('financial ledger  ·  net worth tracker  ·  free tool',W/2,1310);

  drawFooter();
}
function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='financial-ledger-08-question-hook-fear-confidence-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
