<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Do You Know What Your Net Worth Is Right Now? · Financial Ledger · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 07 · Question Hook Self-Awareness · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_no_text_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);
  // Cream background
  ctx.fillStyle=P.cream;ctx.fillRect(0,0,W,H);
  ctx.fillStyle=P.green;ctx.fillRect(0,0,W,10);

  // Large italic question
  ctx.fillStyle=P.greenDk;ctx.font='italic 300 82px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('Do you know what your',W/2,130);
  ctx.fillText('net worth is',W/2,218);
  ctx.fillStyle=P.green;ctx.font='italic 300 96px "Cormorant Garamond"';
  ctx.fillText('right now?',W/2,320);

  // Sub emphasizer
  ctx.fillStyle=P.warmGray;ctx.font='italic 300 34px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('Not approximately. Not "probably around." Exactly.',W/2,380);

  // Rule
  ctx.strokeStyle=rgba(P.sage,.4);ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(100,406);ctx.lineTo(900,406);ctx.stroke();

  // Two-cell contrast
  const cellH=240,cellY=440,gap=20,cellW=(W-200-gap)/2,lx=100,rx=lx+cellW+gap;

  // LEFT muted: Guessing
  rrect(lx,cellY,cellW,cellH,14);
  ctx.fillStyle=rgba(P.warmGray,.12);ctx.fill();
  ctx.strokeStyle=rgba(P.warmGray,.3);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.warmGray;ctx.font='700 20px Lato';ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.letterSpacing='0.06em';ctx.fillText('GUESSING',lx+cellW/2,cellY+50);ctx.letterSpacing='0em';
  ctx.font='italic 300 52px "Cormorant Garamond"';ctx.fillText('Vague',lx+cellW/2,cellY+122);
  ctx.font='italic 300 36px "Cormorant Garamond"';ctx.fillText('feeling',lx+cellW/2,cellY+168);
  ctx.fillStyle=rgba(P.warmGray,.5);ctx.font='300 18px Lato';
  ctx.fillText('"Around... maybe?"',lx+cellW/2,cellY+210);

  // RIGHT elevated: Tracking
  rrect(rx,cellY,cellW,cellH,14);
  ctx.fillStyle=rgba(P.sageFaint,.8);ctx.fill();
  ctx.strokeStyle=P.sage;ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.green;ctx.font='700 20px Lato';ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.letterSpacing='0.06em';ctx.fillText('TRACKING',rx+cellW/2,cellY+50);ctx.letterSpacing='0em';
  ctx.font='italic 300 62px "Cormorant Garamond"';ctx.fillStyle=P.green;ctx.fillText('$231,000',rx+cellW/2,cellY+130);
  ctx.fillStyle=P.sage;ctx.font='700 22px Lato';
  ctx.fillText('▲ +$89k this year',rx+cellW/2,cellY+172);
  ctx.fillStyle=P.green;ctx.font='300 18px Lato';
  ctx.fillText('Exact. Updated. Confident.',rx+cellW/2,cellY+210);

  // VS separator
  ctx.fillStyle=rgba(P.greenDk,.35);ctx.font='700 26px Lato';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('vs',W/2,cellY+cellH/2);

  // Body text
  ctx.fillStyle=P.warmGray;ctx.font='300 27px Lato';ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('The Financial Ledger shows you the',W/2,760);
  ctx.fillText('exact number — updated every year.',W/2,798);

  // Benefit chips
  const chips=[['No guessing','#47584F'],['Instant chart','#47584F'],['PDF export','#84A17C']];
  const cw=240,ch=52,cGap=16,cStart=W/2-(cw*3+cGap*2)/2;
  chips.forEach(([label,col],i)=>{
    const cx=cStart+i*(cw+cGap),cy=860;
    rrect(cx,cy,cw,ch,26);
    ctx.fillStyle=col;ctx.fill();
    ctx.fillStyle=P.white;ctx.font='700 20px Lato';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(label,cx+cw/2,cy+ch/2);
  });

  // Italic insight
  ctx.fillStyle=rgba(P.green,.6);ctx.font='italic 300 28px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('"Clarity is the first step to financial freedom."',W/2,980);

  // CTA
  const pw=360,ph=70,ppx=W/2-pw/2,ppy=1060;
  rrect(ppx,ppy,pw,ph,35);
  ctx.fillStyle=P.green;ctx.fill();
  ctx.fillStyle=P.white;ctx.font='700 26px Lato';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Find Out Yours →',W/2,ppy+ph/2);

  ctx.fillStyle=rgba(P.warmGray,.72);ctx.font='300 18px Lato';ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('financial ledger  ·  net worth tracker  ·  free tool',W/2,1210);

  drawFooter();
}
function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='financial-ledger-07-question-hook-self-awareness-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
