<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Track Your Net Worth From Your Phone · Financial Ledger · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 22 · Mockup — Phone Vertical · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxWidth&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);return y;
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_no_text_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  ctx.letterSpacing='0em';
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);
  ctx.textAlign='left';ctx.letterSpacing='0em';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Near-black bg
  ctx.fillStyle=P.nearBlk;ctx.fillRect(0,0,W,H);

  // Subtle top gradient accent
  const topGrad=ctx.createLinearGradient(0,0,0,200);
  topGrad.addColorStop(0,rgba(P.green,.25));
  topGrad.addColorStop(1,rgba(P.green,0));
  ctx.fillStyle=topGrad;ctx.fillRect(0,0,W,200);

  // Headline
  ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillStyle=P.cream;ctx.font='700 72px Lato';ctx.letterSpacing='-0.01em';
  ctx.fillText('NET WORTH',W/2,110);
  ctx.letterSpacing='0em';
  ctx.fillStyle=P.cream;ctx.font='700 72px Lato';
  ctx.fillText('TRACKER.',W/2,190);
  ctx.fillStyle=P.sage;ctx.font='300 36px Lato';
  ctx.fillText('In Your Pocket.',W/2,244);

  // Phone outer frame
  const phoneX=310,phoneY=290,phoneW=380,phoneH=620,phoneR=40;
  rrect(phoneX,phoneY,phoneW,phoneH,phoneR);
  ctx.fillStyle=P.green;ctx.fill();
  ctx.strokeStyle=P.greenDk;ctx.lineWidth=3;ctx.stroke();

  // Phone inner screen
  const scrX=phoneX+20,scrY=phoneY+30,scrW=phoneW-40,scrH=phoneH-60;
  rrect(scrX,scrY,scrW,scrH,24);
  ctx.fillStyle=rgba(P.nearBlk,1);ctx.fill();

  // Screen top notch
  rrect(phoneX+phoneW/2-40,phoneY+14,80,14,7);
  ctx.fillStyle=P.greenDk;ctx.fill();

  // Screen header
  ctx.fillStyle=rgba(P.green,.35);ctx.fillRect(scrX,scrY,scrW,52);
  ctx.fillStyle=P.sagePale;ctx.font='700 18px Lato';ctx.letterSpacing='0.06em';
  ctx.textAlign='left';ctx.textBaseline='middle';
  ctx.fillText('🌿 Net Worth',scrX+16,scrY+26);
  ctx.letterSpacing='0em';
  ctx.fillStyle=rgba(P.sagePale,.5);ctx.font='300 13px Lato';
  ctx.textAlign='right';
  ctx.fillText('2023',scrX+scrW-16,scrY+26);

  // Net worth value
  ctx.textAlign='center';
  ctx.fillStyle=P.cream;ctx.font='700 52px Lato';ctx.textBaseline='alphabetic';
  ctx.fillText('$231,000',scrX+scrW/2,scrY+122);

  // YoY change
  ctx.fillStyle=P.sagePale;ctx.font='700 24px Lato';
  ctx.fillText('▲ +$89k (YoY)',scrX+scrW/2,scrY+158);

  // Mini chart
  const cX=scrX+20,cY=scrY+178,cW=scrW-40,cH=140;
  ctx.fillStyle=rgba(P.green,.2);ctx.fillRect(cX,cY,cW,cH);

  // Grid lines
  ctx.strokeStyle=rgba(P.sage,.12);ctx.lineWidth=1;
  for(let i=1;i<3;i++){
    ctx.beginPath();ctx.moveTo(cX,cY+cH*i/3);ctx.lineTo(cX+cW,cY+cH*i/3);ctx.stroke();
  }

  // Rising line
  const lpts=[
    [cX,cY+cH-10],
    [cX+cW*0.2,cY+cH-28],
    [cX+cW*0.4,cY+cH-60],
    [cX+cW*0.6,cY+cH-90],
    [cX+cW*0.8,cY+cH-115],
    [cX+cW,cY+12],
  ];
  // Fill
  ctx.beginPath();
  ctx.moveTo(lpts[0][0],cY+cH);
  lpts.forEach(([x,y])=>ctx.lineTo(x,y));
  ctx.lineTo(cX+cW,cY+cH);ctx.closePath();
  const gr=ctx.createLinearGradient(0,cY,0,cY+cH);
  gr.addColorStop(0,rgba(P.sage,.45));gr.addColorStop(1,rgba(P.sage,.02));
  ctx.fillStyle=gr;ctx.fill();
  // Line
  ctx.beginPath();lpts.forEach(([x,y],i)=>i===0?ctx.moveTo(x,y):ctx.lineTo(x,y));
  ctx.strokeStyle=P.sage;ctx.lineWidth=2.5;ctx.stroke();
  // End dot
  ctx.beginPath();ctx.arc(lpts[5][0],lpts[5][1],6,0,Math.PI*2);
  ctx.fillStyle=P.sage;ctx.fill();

  // Year labels under chart
  const years=['2019','2020','2021','2022','2023'];
  years.forEach((yr,i)=>{
    const xp=cX+cW*(i/4);
    ctx.fillStyle=rgba(P.warmGray,.6);ctx.font='300 13px Lato';ctx.textAlign='center';
    ctx.textBaseline='alphabetic';ctx.fillText(yr,xp,cY+cH+20);
  });

  // PDF export label
  ctx.fillStyle=rgba(P.warmGray,.68);ctx.font='300 14px Lato';ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('[PDF export]',scrX+scrW/2,scrY+scrH-14);

  // CTA button below phone
  const ctaW=300,ctaH=64,ctaX=W/2-ctaW/2,ctaY=phoneY+phoneH+50;
  rrect(ctaX,ctaY,ctaW,ctaH,32);
  ctx.fillStyle=P.green;ctx.fill();
  ctx.fillStyle=P.white;ctx.font='700 26px Lato';ctx.letterSpacing='0.04em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Open Free →',W/2,ctaY+ctaH/2);
  ctx.letterSpacing='0em';

  // Subtext
  ctx.fillStyle=rgba(P.warmGray,.68);ctx.font='300 16px Lato';ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('no sign-up  ·  no spreadsheet  ·  free forever',W/2,1360);

  drawFooter();
}
function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='financial-ledger-22-mockup-phone-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
