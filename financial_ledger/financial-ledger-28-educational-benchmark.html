<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Financial Ledger vs Spreadsheet · Financial Ledger · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;width:420px;height:630px;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 28 · Educational — Benchmark Comparison · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxWidth&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);return y;
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  ctx.letterSpacing='0em';
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);
  ctx.textAlign='left';ctx.letterSpacing='0em';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Cream bg
  ctx.fillStyle=P.cream;ctx.fillRect(0,0,W,H);
  ctx.fillStyle=P.green;ctx.fillRect(0,0,W,8);

  // Headline
  ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillStyle=P.green;ctx.font='700 66px Lato';ctx.letterSpacing='-0.01em';
  ctx.fillText('FINANCIAL LEDGER',W/2,90);
  ctx.letterSpacing='0em';
  ctx.fillStyle=P.warmGray;ctx.font='300 40px Lato';
  ctx.fillText('vs. Spreadsheet',W/2,142);
  ctx.fillStyle=rgba(P.warmGray,.5);ctx.font='300 22px Lato';
  ctx.fillText('which tracks net worth better?',W/2,182);

  // Comparison table card
  const cardX=60,cardY=202,cardW=880,cardR=20;
  const rowH=94;
  const rows=[
    {feat:'Manual entry',            ss:true, fl:true},
    {feat:'Automatic chart',         ss:false,fl:true},
    {feat:'Savings rate calc',       ss:false,fl:true},
    {feat:'Year-over-year trend',    ss:false,fl:true},
    {feat:'PDF export',              ss:false,fl:true},
    {feat:'No formulas needed',      ss:false,fl:true},
  ];
  const cardH=58+rows.length*rowH+20;

  // Card shadow + fill
  ctx.save();ctx.shadowColor='rgba(0,0,0,.12)';ctx.shadowBlur=24;ctx.shadowOffsetY=8;
  rrect(cardX,cardY,cardW,cardH,cardR);ctx.fillStyle=P.white;ctx.fill();
  ctx.restore();
  rrect(cardX,cardY,cardW,cardH,cardR);ctx.fillStyle=P.white;ctx.fill();

  // Header row
  const hdrY=cardY;
  ctx.fillStyle=P.white;ctx.fillRect(cardX,hdrY,cardW,58);
  // Feature col header
  ctx.fillStyle=P.nearBlk;ctx.font='700 22px Lato';ctx.letterSpacing='0.04em';
  ctx.textAlign='left';ctx.textBaseline='middle';
  ctx.fillText('FEATURE',cardX+32,hdrY+30);
  ctx.letterSpacing='0em';
  // Spreadsheet header
  ctx.fillStyle=P.warmGray;ctx.font='700 22px Lato';ctx.letterSpacing='0.02em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Spreadsheet',cardX+cardW*0.62,hdrY+30);
  ctx.letterSpacing='0em';
  // Financial Ledger header — green bold
  ctx.fillStyle=P.green;ctx.font='700 22px Lato';ctx.letterSpacing='0.02em';
  ctx.fillText('Financial Ledger',cardX+cardW*0.87,hdrY+30);
  ctx.letterSpacing='0em';

  // Divider below header
  ctx.strokeStyle=rgba(P.sage,.25);ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(cardX,hdrY+58);ctx.lineTo(cardX+cardW,hdrY+58);ctx.stroke();

  // Data rows
  rows.forEach((row,i)=>{
    const ry=hdrY+58+i*rowH;
    // Alternating bg
    ctx.fillStyle=i%2===0?P.sageFaint:P.white;
    ctx.fillRect(cardX,ry,cardW,rowH);
    // Clip to card shape on last row
    if(i===rows.length-1){
      rrect(cardX,ry,cardW,rowH+20,cardR);
      ctx.fillStyle=i%2===0?P.sageFaint:P.white;ctx.fill();
    }

    // Feature name
    ctx.fillStyle=P.nearBlk;ctx.font='400 26px Lato';
    ctx.textAlign='left';ctx.textBaseline='middle';
    ctx.fillText(row.feat,cardX+32,ry+rowH/2);

    // Spreadsheet tick/cross
    const ssX=cardX+cardW*0.62;
    ctx.fillStyle=row.ss?P.green:P.coral;ctx.font='700 34px Lato';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(row.ss?'✓':'✗',ssX,ry+rowH/2);

    // FL tick/cross
    const flX=cardX+cardW*0.87;
    ctx.fillStyle=row.fl?P.green:P.coral;
    ctx.fillText(row.fl?'✓':'✗',flX,ry+rowH/2);

    // Row divider
    if(i<rows.length-1){
      ctx.strokeStyle=rgba(P.sage,.15);ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(cardX,ry+rowH);ctx.lineTo(cardX+cardW,ry+rowH);ctx.stroke();
    }
  });

  // Sage strip below table
  const stripY=cardY+cardH+22;
  rrect(60,stripY,880,74,12);ctx.fillStyle=P.sage;ctx.fill();
  ctx.fillStyle=P.white;ctx.font='700 24px Lato';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('The dedicated tool. No formula maintenance.',W/2,stripY+37);

  // CTA
  const ctaW=360,ctaH=64,ctaX=W/2-ctaW/2,ctaY=stripY+74+40;
  rrect(ctaX,ctaY,ctaW,ctaH,32);
  ctx.fillStyle=P.green;ctx.fill();
  ctx.fillStyle=P.white;ctx.font='700 26px Lato';ctx.letterSpacing='0.04em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Switch to Ledger Free →',W/2,ctaY+ctaH/2);
  ctx.letterSpacing='0em';

  ctx.fillStyle=rgba(P.warmGray,.72);ctx.font='300 17px Lato';ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('financial ledger  ·  net worth tracker  ·  free tool',W/2,ctaY+ctaH+50);

  drawFooter();
}
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='financial-ledger-28-educational-benchmark-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
