<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>5 Years of Net Worth Tracking · Financial Ledger · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;width:420px;height:630px;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 23 · Mockup — Output Result Closeup · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxWidth&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);return y;
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  ctx.letterSpacing='0em';
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);
  ctx.textAlign='left';ctx.letterSpacing='0em';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Near-black bg
  ctx.fillStyle=P.nearBlk;ctx.fillRect(0,0,W,H);

  // Top accent stripe
  ctx.fillStyle=P.green;ctx.fillRect(0,0,W,8);

  // Headline
  ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillStyle=P.cream;ctx.font='700 56px Lato';ctx.letterSpacing='-0.01em';
  ctx.fillText('5 YEARS OF',W/2,100);
  ctx.letterSpacing='0em';
  ctx.fillStyle=P.sage;ctx.font='700 56px Lato';
  ctx.fillText('FINANCIAL CLARITY',W/2,168);
  ctx.fillStyle=rgba(P.warmGray,.6);ctx.font='300 26px Lato';
  ctx.fillText('one number · tracked annually',W/2,214);

  // Large result card
  const cardX=80,cardY=240,cardW=840,cardH=780,cardR=24;
  // Card shadow
  ctx.save();ctx.shadowColor='rgba(0,0,0,0.5)';ctx.shadowBlur=40;ctx.shadowOffsetY=16;
  rrect(cardX,cardY,cardW,cardH,cardR);ctx.fillStyle=P.cream;ctx.fill();
  ctx.restore();
  rrect(cardX,cardY,cardW,cardH,cardR);ctx.fillStyle=P.cream;ctx.fill();

  // Card header
  ctx.fillStyle=P.green;ctx.font='700 22px Lato';ctx.letterSpacing='0.06em';
  ctx.textAlign='left';ctx.textBaseline='alphabetic';
  ctx.fillText('ANNUAL NET WORTH SUMMARY',cardX+48,cardY+56);
  ctx.letterSpacing='0em';

  // 5 rows
  const rows=[
    {year:'2019',nw:'$42,000'},
    {year:'2020',nw:'$89,000'},
    {year:'2021',nw:'$130,000'},
    {year:'2022',nw:'$168,000'},
    {year:'2023',nw:'$231,000'},
  ];
  const rowH=96,rowStartY=cardY+80;
  rows.forEach((row,i)=>{
    const ry=rowStartY+i*rowH;
    // Alternating subtle bg inside card
    if(i%2===0){
      rrect(cardX+24,ry,cardW-48,rowH-8,10);
      ctx.fillStyle=rgba(P.green,.06);ctx.fill();
    }
    // Checkmark chip
    const chipX=cardX+48,chipY=ry+16,chipW=52,chipH=52;
    rrect(chipX,chipY,chipW,chipH,10);
    ctx.fillStyle=P.green;ctx.fill();
    ctx.fillStyle=P.white;ctx.font='700 28px Lato';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('✓',chipX+chipW/2,chipY+chipH/2);
    // Row text
    ctx.fillStyle=P.nearBlk;ctx.font='400 30px Lato';
    ctx.textAlign='left';ctx.textBaseline='middle';
    ctx.fillText(row.year+':  Net Worth  ',cardX+120,ry+rowH/2);
    const labelW=ctx.measureText(row.year+':  Net Worth  ').width;
    ctx.fillStyle=P.green;ctx.font='700 30px Lato';
    ctx.fillText(row.nw,cardX+120+labelW,ry+rowH/2);
  });

  // Divider
  ctx.strokeStyle=P.sage;ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(cardX+48,rowStartY+5*rowH+6);ctx.lineTo(cardX+cardW-48,rowStartY+5*rowH+6);ctx.stroke();

  // Total growth
  ctx.fillStyle=P.sage;ctx.font='700 36px Lato';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Total growth: +$189,000',W/2,rowStartY+5*rowH+56);

  // CTA button
  const ctaW=360,ctaH=68,ctaX=W/2-ctaW/2,ctaY=1072;
  rrect(ctaX,ctaY,ctaW,ctaH,34);
  ctx.fillStyle=P.green;ctx.fill();
  ctx.fillStyle=P.white;ctx.font='700 26px Lato';ctx.letterSpacing='0.04em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Start Your Story →',W/2,ctaY+ctaH/2);
  ctx.letterSpacing='0em';

  // Tag line
  ctx.fillStyle=rgba(P.warmGray,.72);ctx.font='300 17px Lato';
  ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('financial ledger  ·  net worth tracker  ·  free tool',W/2,1240);

  drawFooter();
}
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='financial-ledger-23-mockup-output-closeup-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
