<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Anxiety vs Clarity · Financial Ledger · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;width:420px;height:630px;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 11 · Before/After Emotional · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // LEFT warmGray, RIGHT forest green
  ctx.fillStyle=rgba(P.warmGray,.15);ctx.fillRect(0,0,W/2,H);
  ctx.fillStyle=P.green;ctx.fillRect(W/2,0,W/2,H);

  // Top bar
  ctx.fillStyle=rgba(P.warmGray,.3);ctx.fillRect(0,0,W/2,72);
  ctx.fillStyle=P.greenDk;ctx.fillRect(W/2,0,W/2,72);

  ctx.fillStyle=rgba(P.cream,.5);ctx.font='700 16px Lato';ctx.letterSpacing='0.14em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('WITHOUT TRACKING',W/4,36);
  ctx.fillStyle=P.sagePale;
  ctx.fillText('WITH FINANCIAL LEDGER',W*3/4,36);
  ctx.letterSpacing='0em';

  // Large italic emotion labels
  ctx.fillStyle=rgba(P.cream,.55);ctx.font='italic 300 72px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('Anxiety',W/4,180);
  ctx.fillStyle=P.cream;
  ctx.fillText('Clarity',W*3/4,180);

  // Underline accents
  ctx.strokeStyle=rgba(P.warmGray,.35);ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(60,198);ctx.lineTo(440,198);ctx.stroke();
  ctx.strokeStyle=rgba(P.sagePale,.6);ctx.lineWidth=2.5;
  ctx.beginPath();ctx.moveTo(W/2+60,198);ctx.lineTo(W-60,198);ctx.stroke();

  // LEFT bullet items
  const leftItems=[
    'Avoid money',
    'conversations',
    '"I hope things',
    'are OK"',
    'No plan,',
    'no progress',
  ];
  ctx.fillStyle=rgba(P.cream,.45);ctx.font='300 26px Lato';
  ctx.textAlign='center';ctx.textBaseline='alphabetic';
  leftItems.forEach((line,i)=>ctx.fillText(line,W/4,260+i*46));

  // LEFT quote card
  rrect(40,590,420,120,14);
  ctx.fillStyle=rgba(P.warmGray,.2);ctx.fill();
  ctx.strokeStyle=rgba(P.warmGray,.3);ctx.lineWidth=1.5;ctx.stroke();
  ctx.fillStyle=rgba(P.cream,.4);ctx.font='italic 300 26px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('"I hope things are OK"',W/4,640);
  ctx.fillText('— every single month',W/4,672);

  // RIGHT bullet items
  const rightItems=[
    'Proactive reviews',
    'every year',
    '"I know exactly',
    'where I stand"',
    'Plan, track,',
    'improve',
  ];
  ctx.fillStyle=P.cream;ctx.font='300 26px Lato';
  ctx.textAlign='center';ctx.textBaseline='alphabetic';
  rightItems.forEach((line,i)=>ctx.fillText(line,W*3/4,260+i*46));

  // RIGHT quote card
  rrect(W/2+40,590,420,120,14);
  ctx.fillStyle=rgba(P.nearBlk,.25);ctx.fill();
  ctx.strokeStyle=rgba(P.sagePale,.5);ctx.lineWidth=1.5;ctx.stroke();
  ctx.fillStyle=P.sagePale;ctx.font='italic 300 26px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('"I know exactly where',W*3/4,640);
  ctx.fillText('I stand"',W*3/4,672);

  // Center divider
  ctx.strokeStyle=rgba(P.cream,.2);ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(W/2,80);ctx.lineTo(W/2,1395);ctx.stroke();

  // VS label
  rrect(W/2-30,350,60,44,22);
  ctx.fillStyle=P.nearBlk;ctx.fill();
  ctx.strokeStyle=rgba(P.sage,.5);ctx.lineWidth=1.5;ctx.stroke();
  ctx.fillStyle=P.cream;ctx.font='700 18px Lato';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('VS',W/2,372);

  // Two metrics comparison row
  const mData=[
    {left:['Monthly dread',rgba(P.cream,.4)],right:['Monthly peace',P.cream]},
    {left:['Unknown future',rgba(P.cream,.4)],right:['Clear trajectory',P.cream]},
    {left:['React to surprises',rgba(P.cream,.4)],right:['Plan ahead',P.cream]},
  ];
  mData.forEach(({left,right},i)=>{
    const rowY=760+i*110;
    // Left item
    rrect(40,rowY,430,80,10);
    ctx.fillStyle=rgba(P.warmGray,.15);ctx.fill();
    ctx.fillStyle=left[1];ctx.font='300 22px Lato';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(left[0],250,rowY+40);
    // Right item
    rrect(W/2+30,rowY,430,80,10);
    ctx.fillStyle=rgba(P.nearBlk,.2);ctx.fill();
    ctx.strokeStyle=rgba(P.sagePale,.3);ctx.lineWidth=1;ctx.stroke();
    ctx.fillStyle=right[1];ctx.font='700 22px Lato';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(right[0],W/2+245,rowY+40);
  });

  // CTA
  const pw=420,ph=68,ppx=W/2-pw/2,ppy=1124;
  rrect(ppx,ppy,pw,ph,34);
  ctx.fillStyle=P.cream;ctx.fill();
  ctx.fillStyle=P.green;ctx.font='700 26px Lato';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.letterSpacing='0.04em';
  ctx.fillText('Start Your Ledger  →',W/2,ppy+ph/2);
  ctx.letterSpacing='0em';

  ctx.fillStyle=rgba(P.cream,.3);ctx.font='300 17px Lato';ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('financial ledger  ·  net worth tracker  ·  free tool',W/2,1250);

  drawFooter();
}
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='financial-ledger-11-before-after-emotional-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
