<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Financial Ledger — Assets vs. Liabilities: The Full Picture · Financial Ledger · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 04 · Direct Utility Two Outcome · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_no_text_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);
  // Cream background
  ctx.fillStyle=P.cream;ctx.fillRect(0,0,W,H);
  // Top pattern strip
  ctx.fillStyle=P.green;ctx.fillRect(0,0,W,16);

  // Headline
  ctx.fillStyle=P.greenDk;ctx.font='300 70px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('Assets vs. Liabilities',W/2,110);
  ctx.fillText('— The Complete Picture',W/2,178);

  ctx.strokeStyle=rgba(P.green,.25);ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(100,198);ctx.lineTo(900,198);ctx.stroke();

  // Two metric chips side by side
  const cardY=230,cardH=220,gap=24,cardW=(W-200-gap)/2,lx=100,rx=lx+cardW+gap;
  // Left: sage (assets)
  rrect(lx,cardY,cardW,cardH,18);
  ctx.fillStyle=P.sageFaint;ctx.fill();
  ctx.strokeStyle=rgba(P.sage,.5);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.green;ctx.font='700 22px Lato';ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('TOTAL ASSETS',lx+cardW/2,cardY+52);
  ctx.fillStyle=P.greenDk;ctx.font='italic 300 64px "Cormorant Garamond"';
  ctx.textBaseline='alphabetic';ctx.fillText('$295,000',lx+cardW/2,cardY+148);

  // Right: warmGray tint (liabilities)
  rrect(rx,cardY,cardW,cardH,18);
  ctx.fillStyle=rgba(P.warmGray,.1);ctx.fill();
  ctx.strokeStyle=rgba(P.warmGray,.35);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.warmGray;ctx.font='700 22px Lato';ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('TOTAL LIABILITIES',rx+cardW/2,cardY+52);
  ctx.fillStyle=P.nearBlk;ctx.font='italic 300 64px "Cormorant Garamond"';
  ctx.fillText('$64,000',rx+cardW/2,cardY+148);

  // Math connector
  ctx.fillStyle=rgba(P.green,.4);ctx.font='700 40px Lato';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('−',W/2,cardY+cardH/2);

  // Result strip
  const resY=480,resH=110;
  ctx.fillStyle=P.green;ctx.fillRect(60,resY,W-120,resH);
  ctx.fillStyle=P.cream;ctx.font='700 30px Lato';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('NET WORTH:  $231,000  ▲ +$89k YoY',W/2,resY+resH/2);

  // Sub text
  ctx.fillStyle=P.warmGray;ctx.font='300 27px Lato';
  ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('See both sides. Understand your',W/2,660);
  ctx.fillText('real financial position.',W/2,698);

  // Bar chart — assets vs liabilities visual
  const barY=760,barH=260,barMaxH=200,barW=120,barGap=80;
  const assetsBarH=barMaxH;
  const liabBarH=(64/295)*barMaxH;
  const barsX=W/2-barW-barGap/2;

  // Assets bar
  ctx.fillStyle=P.sage;
  ctx.fillRect(barsX,barY+barMaxH-assetsBarH,barW,assetsBarH);
  ctx.fillStyle=P.greenDk;ctx.font='700 22px Lato';ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('$295k',barsX+barW/2,barY+barMaxH-assetsBarH-14);
  ctx.fillStyle=P.warmGray;ctx.font='700 18px Lato';ctx.textBaseline='top';
  ctx.fillText('Assets',barsX+barW/2,barY+barMaxH+12);

  // Liabilities bar
  const lbx=barsX+barW+barGap;
  ctx.fillStyle=rgba(P.warmGray,.4);
  ctx.fillRect(lbx,barY+barMaxH-liabBarH,barW,liabBarH);
  ctx.fillStyle=P.warmGray;ctx.font='700 22px Lato';ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('$64k',lbx+barW/2,barY+barMaxH-liabBarH-14);
  ctx.fillStyle=P.warmGray;ctx.font='700 18px Lato';ctx.textBaseline='top';
  ctx.fillText('Liabilities',lbx+barW/2,barY+barMaxH+12);

  // Insight text
  ctx.fillStyle=rgba(P.green,.6);ctx.font='italic 300 24px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('"The more you see, the more you grow."',W/2,1080);

  // CTA pill
  const pw=360,ph=70,ppx=W/2-pw/2,ppy=1140;
  rrect(ppx,ppy,pw,ph,35);
  ctx.fillStyle=P.green;ctx.fill();
  ctx.fillStyle=P.white;ctx.font='700 26px Lato';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Start Tracking Free →',W/2,ppy+ph/2);

  // Footer tag
  ctx.fillStyle=rgba(P.warmGray,.72);ctx.font='700 17px Lato';ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.letterSpacing='0.08em';ctx.fillText('FINANCIAL LEDGER  ·  TIMEANDMONEYTREE.COM',W/2,1270);ctx.letterSpacing='0em';

  drawFooter();
}
function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='financial-ledger-04-direct-utility-two-outcome-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
