<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Income Too Low Myth Busted · Financial Ledger · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;width:420px;height:630px;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 19 · Myth Buster Single Myth · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle=P.cream;ctx.fillRect(0,0,W,H);
  ctx.fillStyle=P.green;ctx.fillRect(0,0,W,8);

  // Large decorative "MYTH" background watermark
  ctx.fillStyle=rgba(P.coral,.06);
  ctx.font='700 200px Lato';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('MYTH',W/2,340);

  // Label
  ctx.fillStyle=P.warmGray;ctx.font='700 18px Lato';ctx.letterSpacing='0.14em';
  ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('COMMON MISCONCEPTION',W/2,56);
  ctx.letterSpacing='0em';

  // MYTH chip
  const chipW=130,chipH=44,chipX=W/2-chipW/2,chipY=80;
  rrect(chipX,chipY,chipW,chipH,22);
  ctx.fillStyle=P.coral;ctx.fill();
  ctx.fillStyle=P.white;ctx.font='700 20px Lato';ctx.letterSpacing='0.10em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('MYTH',W/2,chipY+chipH/2);
  ctx.letterSpacing='0em';

  // Large italic myth Cormorant
  ctx.fillStyle=rgba(P.nearBlk,.75);ctx.font='italic 300 64px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('"My income is',W/2,230);
  ctx.fillText('too low to track',W/2,304);
  ctx.fillText('net worth"',W/2,378);

  // Cross-out line through myth
  ctx.strokeStyle=rgba(P.coral,.45);ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(60,280);ctx.lineTo(940,280);ctx.stroke();

  // Divider with TRUTH label
  const divY=430;
  ctx.strokeStyle=rgba(P.sage,.4);ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(60,divY);ctx.lineTo(940,divY);ctx.stroke();
  // Truth chip
  rrect(W/2-55,divY-22,110,44,22);
  ctx.fillStyle=P.sage;ctx.fill();
  ctx.fillStyle=P.white;ctx.font='700 18px Lato';ctx.letterSpacing='0.10em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('TRUTH',W/2,divY);
  ctx.letterSpacing='0em';

  // Correction card with sage left border
  rrect(60,468,880,340,14);
  ctx.fillStyle=rgba(P.sage,.08);ctx.fill();
  ctx.strokeStyle=rgba(P.sage,.2);ctx.lineWidth=1.5;ctx.stroke();
  // Left border accent
  ctx.fillStyle=P.sage;ctx.fillRect(60,468,8,340);

  ctx.fillStyle=P.greenDk;ctx.font='300 25px Lato';ctx.textAlign='left';ctx.textBaseline='alphabetic';
  const corrText='Net worth = assets − liabilities. A $45k income with $8k savings and no debt = positive net worth worth tracking.';
  const corrWords=corrText.split(' ');let corrLine='';let corrY=520;
  corrWords.forEach((w,wi)=>{
    const test=corrLine+w+' ';
    if(ctx.measureText(test).width>760&&wi>0){ctx.fillText(corrLine,88,corrY);corrLine=w+' ';corrY+=38;}
    else corrLine=test;
  });
  ctx.fillText(corrLine,88,corrY);

  ctx.strokeStyle=rgba(P.sage,.3);ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(88,corrY+20);ctx.lineTo(880,corrY+20);ctx.stroke();

  ctx.fillStyle=P.sage;ctx.font='700 26px Lato';ctx.textAlign='left';ctx.textBaseline='alphabetic';
  ctx.fillText('"What you earn matters less',88,corrY+62);
  ctx.fillText('than what you keep."',88,corrY+98);

  // Example mini card
  const exY=850;
  rrect(60,exY,880,120,12);
  ctx.fillStyle=rgba(P.green,.06);ctx.fill();
  ctx.strokeStyle=rgba(P.sage,.2);ctx.lineWidth=1;ctx.stroke();
  ctx.fillStyle=P.warmGray;ctx.font='700 16px Lato';ctx.letterSpacing='0.08em';
  ctx.textAlign='left';ctx.textBaseline='alphabetic';
  ctx.fillText('EXAMPLE',88,exY+36);ctx.letterSpacing='0em';
  ctx.fillStyle=P.greenDk;ctx.font='300 22px Lato';
  ctx.fillText('Income $45k · Savings $8k · No debt  =  Net Worth: +$8,000 and growing',88,exY+74);

  // Insight
  ctx.fillStyle=rgba(P.warmGray,.7);ctx.font='italic 300 34px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('"Start where you are. Track what you have."',W/2,1038);

  // CTA
  const pw=360,ph=68,ppx=W/2-pw/2,ppy=1082;
  rrect(ppx,ppy,pw,ph,34);
  ctx.fillStyle=P.green;ctx.fill();
  ctx.fillStyle=P.white;ctx.font='700 26px Lato';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.letterSpacing='0.04em';
  ctx.fillText('Find Your Number  →',W/2,ppy+ph/2);
  ctx.letterSpacing='0em';

  ctx.fillStyle=rgba(P.warmGray,.72);ctx.font='300 17px Lato';ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('financial ledger  ·  net worth tracker  ·  free tool',W/2,1230);

  drawFooter();
}
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='financial-ledger-19-myth-buster-single-myth-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
