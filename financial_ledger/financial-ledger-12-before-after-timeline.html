<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Before vs After Timeline Chart · Financial Ledger · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 12 · Before/After Timeline · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_no_text_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function drawChart(x,y,w,h,pts,lineColor,fillColor,dotted){
  rrect(x,y,w,h,16);
  ctx.fillStyle=rgba(P.cream,.95);ctx.fill();
  ctx.strokeStyle=rgba(P.warmGray,.2);ctx.lineWidth=1.5;ctx.stroke();
  // Area
  ctx.beginPath();
  ctx.moveTo(pts[0][0],y+h);
  pts.forEach(([px,py])=>ctx.lineTo(px,py));
  ctx.lineTo(pts[pts.length-1][0],y+h);
  ctx.closePath();
  const gr=ctx.createLinearGradient(0,y,0,y+h);
  gr.addColorStop(0,fillColor);
  gr.addColorStop(1,rgba(lineColor,0.03));
  ctx.fillStyle=gr;ctx.fill();
  // Line
  if(dotted){ctx.setLineDash([10,6]);}
  ctx.beginPath();
  pts.forEach(([px,py],i)=>i===0?ctx.moveTo(px,py):ctx.lineTo(px,py));
  ctx.strokeStyle=lineColor;ctx.lineWidth=3;ctx.stroke();
  ctx.setLineDash([]);
}
function render(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle=P.cream;ctx.fillRect(0,0,W,H);
  ctx.fillStyle=P.green;ctx.fillRect(0,0,W,8);

  // Headline
  ctx.fillStyle=P.greenDk;ctx.font='700 24px Lato';ctx.letterSpacing='0.14em';
  ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('5-YEAR NET WORTH',W/2,50);
  ctx.letterSpacing='0em';
  ctx.fillStyle=P.warmGray;ctx.font='italic 300 34px "Cormorant Garamond"';
  ctx.fillText('Same income. Very different results.',W/2,94);

  // Chart dimensions
  const chartW=380,chartH=280,gap=20;
  const lx=50,rx=lx+chartW+gap;
  const chartY=130;

  // BEFORE label
  ctx.fillStyle=P.warmGray;ctx.font='italic 300 44px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('Before',lx+chartW/2,126);
  ctx.fillStyle=P.sage;
  ctx.fillText('After',rx+chartW/2,126);

  // BEFORE chart — flat/jagged
  const bpts=[
    [lx+20,chartY+chartH-40],
    [lx+70,chartY+chartH-20],
    [lx+120,chartY+chartH-55],
    [lx+170,chartY+chartH-30],
    [lx+220,chartY+chartH-60],
    [lx+280,chartY+chartH-35],
    [lx+chartW-20,chartY+chartH-50],
  ];
  drawChart(lx,chartY,chartW,chartH,bpts,rgba(P.warmGray,.5),rgba(P.warmGray,.08),true);

  // AFTER chart — smooth rising
  const apts=[
    [rx+20,chartY+chartH-30],
    [rx+60,chartY+chartH-60],
    [rx+100,chartY+chartH-100],
    [rx+150,chartY+chartH-140],
    [rx+210,chartY+chartH-190],
    [rx+270,chartY+chartH-230],
    [rx+chartW-20,chartY+30],
  ];
  drawChart(rx,chartY,chartW,chartH,apts,P.sage,rgba(P.sage,.25),false);
  // Glow on last point
  const lpt=apts[apts.length-1];
  const glow=ctx.createRadialGradient(lpt[0],lpt[1],0,lpt[0],lpt[1],30);
  glow.addColorStop(0,rgba(P.sage,.4));
  glow.addColorStop(1,rgba(P.sage,0));
  ctx.fillStyle=glow;ctx.beginPath();ctx.arc(lpt[0],lpt[1],30,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(lpt[0],lpt[1],8,0,Math.PI*2);ctx.fillStyle=P.sage;ctx.fill();

  // Chart subtitles
  ctx.fillStyle=rgba(P.warmGray,.6);ctx.font='700 15px Lato';ctx.letterSpacing='0.08em';
  ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('NO TRACKING — DRIFTS',lx+chartW/2,chartY+chartH+30);
  ctx.fillStyle=P.green;
  ctx.fillText('UPWARD TRAJECTORY',rx+chartW/2,chartY+chartH+30);
  ctx.letterSpacing='0em';

  // Growth callout
  rrect(rx+10,chartY+chartH+50,chartW-20,60,10);
  ctx.fillStyle=P.sageFaint;ctx.fill();
  ctx.strokeStyle=P.sage;ctx.lineWidth=1.5;ctx.stroke();
  ctx.fillStyle=P.green;ctx.font='700 22px Lato';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('+$189k growth in 5 years',rx+chartW/2,chartY+chartH+80);

  // Divider
  ctx.strokeStyle=rgba(P.warmGray,.2);ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(60,590);ctx.lineTo(940,590);ctx.stroke();

  // Body explanation
  ctx.fillStyle=P.warmGray;ctx.font='italic 300 34px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('Tracking creates the trajectory.',W/2,640);
  ctx.fillText('The numbers follow the habit.',W/2,680);

  // Three point cards
  const points=[
    ['Annual entries','One log per year, 3 minutes'],
    ['Automatic chart','See your trend instantly'],
    ['PDF export','Share or archive your progress'],
  ];
  points.forEach(([title,desc],i)=>{
    const py=730+i*130;
    rrect(60,py,880,110,12);
    ctx.fillStyle=rgba(P.green,.07);ctx.fill();
    ctx.strokeStyle=rgba(P.sage,.3);ctx.lineWidth=1.5;ctx.stroke();
    // Number circle
    ctx.beginPath();ctx.arc(110,py+55,28,0,Math.PI*2);
    ctx.fillStyle=P.green;ctx.fill();
    ctx.fillStyle=P.white;ctx.font='700 22px Lato';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(String(i+1).padStart(2,'0'),110,py+55);
    // Text
    ctx.fillStyle=P.greenDk;ctx.font='700 24px Lato';ctx.textAlign='left';ctx.textBaseline='alphabetic';
    ctx.fillText(title,160,py+45);
    ctx.fillStyle=P.warmGray;ctx.font='300 20px Lato';
    ctx.fillText(desc,160,py+78);
  });

  // CTA pill
  const pw=360,ph=68,ppx=W/2-pw/2,ppy=1146;
  rrect(ppx,ppy,pw,ph,34);
  ctx.fillStyle=P.green;ctx.fill();
  ctx.fillStyle=P.white;ctx.font='700 26px Lato';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.letterSpacing='0.04em';
  ctx.fillText('Start Your Chart  →',W/2,ppy+ph/2);
  ctx.letterSpacing='0em';

  ctx.fillStyle=rgba(P.warmGray,.72);ctx.font='300 17px Lato';ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('financial ledger  ·  net worth tracker  ·  free tool',W/2,1280);

  drawFooter();
}
function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='financial-ledger-12-before-after-timeline-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
