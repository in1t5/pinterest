<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Financial Ledger Dark Mode Preview · Financial Ledger · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 24 · Mockup — Dark Mode · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxWidth&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);return y;
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_no_text_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  ctx.letterSpacing='0em';
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);
  ctx.textAlign='left';ctx.letterSpacing='0em';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Near-black bg
  ctx.fillStyle=P.nearBlk;ctx.fillRect(0,0,W,H);

  // Subtle gradient wash
  const bgGrad=ctx.createRadialGradient(W/2,200,0,W/2,200,600);
  bgGrad.addColorStop(0,rgba(P.green,.18));bgGrad.addColorStop(1,rgba(P.green,0));
  ctx.fillStyle=bgGrad;ctx.fillRect(0,0,W,H);

  // Script accent
  ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillStyle=rgba(P.sagePale,.55);ctx.font='italic 300 52px "Pinyon Script"';
  ctx.fillText('track your wealth',W/2,78);

  // Headline
  ctx.fillStyle=P.cream;ctx.font='700 58px Lato';ctx.letterSpacing='-0.01em';
  ctx.fillText('FINANCIAL LEDGER',W/2,148);
  ctx.letterSpacing='0em';
  ctx.fillStyle=P.sage;ctx.font='700 46px Lato';
  ctx.fillText('DARK MODE',W/2,208);

  // Browser chrome outer
  const bx=70,by=236,bw=860,bh=820,br=18;
  rrect(bx,by,bw,bh,br);
  ctx.fillStyle=P.greenDk;ctx.fill();
  ctx.strokeStyle=rgba(P.sage,.25);ctx.lineWidth=2;ctx.stroke();

  // Browser toolbar
  ctx.fillStyle=rgba(P.nearBlk,.8);ctx.fillRect(bx,by,bw,46);
  // Traffic lights
  [P.coral,'#F5C518',P.sage].forEach((c,i)=>{
    ctx.beginPath();ctx.arc(bx+22+i*26,by+23,8,0,Math.PI*2);
    ctx.fillStyle=c;ctx.fill();
  });
  // URL bar
  rrect(bx+110,by+12,520,22,11);
  ctx.fillStyle=rgba(P.white,.1);ctx.fill();
  ctx.fillStyle=rgba(P.white,.5);ctx.font='300 13px Lato';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('timeandmoneytree.com/financial-ledger',bx+370,by+23);

  // Screen area
  const sx=bx+4,sy=by+50,sw=bw-8,sh=bh-54;
  ctx.fillStyle=P.nearBlk;ctx.fillRect(sx,sy,sw,sh);

  // Screen header
  ctx.fillStyle=rgba(P.green,.4);ctx.fillRect(sx,sy,sw,52);
  ctx.fillStyle=P.sagePale;ctx.font='700 20px Lato';ctx.letterSpacing='0.06em';
  ctx.textAlign='left';ctx.textBaseline='middle';
  ctx.fillText('FINANCIAL LEDGER',sx+20,sy+26);
  ctx.letterSpacing='0em';
  ctx.fillStyle=rgba(P.sagePale,.5);ctx.font='300 14px Lato';
  ctx.textAlign='right';ctx.fillText('Net Worth Tracker',sx+sw-20,sy+26);

  // Chart area
  const cX=sx+24,cY=sy+70,cW=sw-48,cH=280;
  ctx.fillStyle=rgba(P.green,.15);ctx.fillRect(cX,cY,cW,cH);

  // Grid
  ctx.strokeStyle=rgba(P.sage,.1);ctx.lineWidth=1;
  for(let i=1;i<4;i++){
    ctx.beginPath();ctx.moveTo(cX,cY+cH*i/4);ctx.lineTo(cX+cW,cY+cH*i/4);ctx.stroke();
  }

  // Rising sage line (5 points for 5 years)
  const pts=[
    [cX,cY+cH-20],
    [cX+cW*0.25,cY+cH-80],
    [cX+cW*0.5,cY+cH-140],
    [cX+cW*0.75,cY+cH-200],
    [cX+cW,cY+24],
  ];
  // Fill under
  ctx.beginPath();
  ctx.moveTo(pts[0][0],cY+cH);
  pts.forEach(([x,y])=>ctx.lineTo(x,y));
  ctx.lineTo(cX+cW,cY+cH);ctx.closePath();
  const gr=ctx.createLinearGradient(0,cY,0,cY+cH);
  gr.addColorStop(0,rgba(P.sage,.5));gr.addColorStop(1,rgba(P.sage,.02));
  ctx.fillStyle=gr;ctx.fill();
  // Line
  ctx.beginPath();pts.forEach(([x,y],i)=>i===0?ctx.moveTo(x,y):ctx.lineTo(x,y));
  ctx.strokeStyle=P.sage;ctx.lineWidth=3;ctx.stroke();
  // End point star/dot glow
  ctx.save();ctx.shadowColor=P.sage;ctx.shadowBlur=16;
  ctx.beginPath();ctx.arc(pts[4][0],pts[4][1],10,0,Math.PI*2);
  ctx.fillStyle=P.sage;ctx.fill();
  ctx.restore();
  ctx.beginPath();ctx.arc(pts[4][0],pts[4][1],5,0,Math.PI*2);
  ctx.fillStyle=P.white;ctx.fill();

  // Year labels
  const years=['2019','2020','2021','2022','2023'];
  pts.forEach(([x],i)=>{
    ctx.fillStyle=rgba(P.warmGray,.6);ctx.font='300 14px Lato';ctx.textAlign='center';ctx.textBaseline='alphabetic';
    ctx.fillText(years[i],x,cY+cH+22);
  });

  // Metric overlay on chart
  ctx.fillStyle=P.cream;ctx.font='700 22px Lato';ctx.textAlign='right';ctx.textBaseline='alphabetic';
  ctx.fillText('2023 · $231,000',cX+cW-10,pts[4][1]-16);
  ctx.fillStyle=P.sagePale;ctx.font='300 17px Lato';
  ctx.fillText('Net Worth ↑',cX+cW-10,pts[4][1]-44);

  // Script accent overlay on screen
  ctx.save();ctx.translate(sx+sw*0.18,sy+460);ctx.rotate(-0.12);
  ctx.fillStyle=rgba(P.sagePale,.22);ctx.font='italic 300 64px "Pinyon Script"';
  ctx.textAlign='left';ctx.textBaseline='alphabetic';
  ctx.fillText('growing',0,0);
  ctx.restore();

  // Metrics strip inside screen
  const mY=sy+390;
  ctx.fillStyle=rgba(P.green,.3);ctx.fillRect(sx,mY,sw,56);
  const metrics=[{lbl:'Assets',val:'$285k'},{lbl:'Liabilities',val:'$54k'},{lbl:'Net Worth',val:'$231k'},{lbl:'YoY',val:'+$63k'}];
  metrics.forEach((m,i)=>{
    const mx=sx+20+i*(sw/4);
    ctx.fillStyle=rgba(P.sagePale,.7);ctx.font='300 14px Lato';ctx.letterSpacing='0.02em';
    ctx.textAlign='left';ctx.textBaseline='alphabetic';ctx.fillText(m.lbl,mx,mY+22);
    ctx.letterSpacing='0em';
    ctx.fillStyle=P.cream;ctx.font='700 20px Lato';
    ctx.fillText(m.val,mx,mY+46);
  });

  // Bottom screen label
  ctx.fillStyle=rgba(P.sagePale,.2);ctx.font='300 15px Lato';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('PDF Export  ·  Share  ·  Reset',sx+sw/2,sy+sh-20);

  // CTA
  const ctaW=380,ctaH=64,ctaX=W/2-ctaW/2,ctaY=1098;
  rrect(ctaX,ctaY,ctaW,ctaH,32);
  ctx.strokeStyle=P.cream;ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.cream;ctx.font='700 26px Lato';ctx.letterSpacing='0.04em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Try Dark Mode Free →',W/2,ctaY+ctaH/2);
  ctx.letterSpacing='0em';

  // Subtext
  ctx.fillStyle=rgba(P.warmGray,.72);ctx.font='300 17px Lato';ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('financial ledger  ·  dark mode  ·  free forever',W/2,1248);

  drawFooter();
}
function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='financial-ledger-24-mockup-dark-mode-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
