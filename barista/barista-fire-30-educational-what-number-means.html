<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>What Your Barista FI Number Actually Means · Barista FIRE Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 30 · Educational What Number Means · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxWidth&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);return y;
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_no_text_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Forest green background
  ctx.fillStyle=P.green;ctx.fillRect(0,0,W,H);

  // Subtle texture overlay — very faint grain
  ctx.fillStyle=rgba(P.greenDk,0.35);ctx.fillRect(0,0,W,H);

  // Top header text
  ctx.fillStyle=P.sagePale;ctx.font='italic 300 34px "Cormorant Garamond"';ctx.letterSpacing='0em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('what your',W/2,48);

  ctx.fillStyle=P.cream;ctx.font='700 54px Lato';ctx.letterSpacing='0em';
  ctx.fillText('BARISTA FI NUMBER',W/2,98);
  ctx.fillText('MEANS',W/2,162);

  // Thin sage line
  ctx.strokeStyle=rgba(P.sagePale,0.3);ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(100,228);ctx.lineTo(W-100,228);ctx.stroke();
  ctx.textAlign='left';

  // Watermark: large "exit ramp" text behind cards
  ctx.save();
  ctx.globalAlpha=0.07;
  ctx.fillStyle=P.sagePale;ctx.font='italic 300 180px "Cormorant Garamond"';ctx.letterSpacing='0em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('exit ramp',W/2,820);
  ctx.globalAlpha=1.0;
  ctx.restore();

  // Explainer paragraph
  ctx.fillStyle=rgba(P.cream,0.85);ctx.font='italic 300 26px "Cormorant Garamond"';ctx.letterSpacing='0em';
  ctx.textAlign='center';ctx.textBaseline='top';
  const exText='“$540,000 example = the portfolio where part-time income fills the gap — and compound growth handles the rest.”';
  // manual wrap centered
  const exWords=exText.split(' ');
  let exLine='',exY=252;
  const exMaxW=800;
  ctx.textAlign='center';
  for(let n=0;n<exWords.length;n++){
    const test=exLine+exWords[n]+' ';
    if(ctx.measureText(test).width>exMaxW&&n>0){ctx.fillText(exLine,W/2,exY);exLine=exWords[n]+' ';exY+=38;}
    else exLine=test;
  }
  ctx.fillText(exLine,W/2,exY);
  exY+=54;
  ctx.textAlign='left';

  // Three implication cards
  const cardX=60,cardW=W-120;
  const cards=[
    {label:'Full-time work ends',subtext:'Your income gap is covered. You call the shots on schedule.'},
    {label:'Stress-driven decisions end',subtext:'No more staying for salary alone. You work by choice, not necessity.'},
    {label:'Portfolio grows to Full FIRE on its own',subtext:'Compound growth closes the remaining gap while you live on part-time income.'},
  ];

  const cardH=190;
  const cardGap=20;
  let cy=exY+10;

  cards.forEach((card,i)=>{
    // Cream card
    ctx.save();ctx.shadowColor='rgba(0,0,0,0.25)';ctx.shadowBlur=20;ctx.shadowOffsetY=8;
    rrect(cardX,cy,cardW,cardH,14);ctx.fillStyle=P.cream;ctx.fill();
    ctx.restore();

    // Left accent bar (greenDk, 8px)
    ctx.fillStyle=P.greenDk;ctx.fillRect(cardX,cy,8,cardH);
    // Round the accent bar corners — redraw card outline to clip
    rrect(cardX,cy,cardW,cardH,14);ctx.strokeStyle=rgba(P.sagePale,0.2);ctx.lineWidth=1;ctx.stroke();

    // "IT MEANS" label
    ctx.fillStyle=P.warmGray;ctx.font='700 13px Lato';ctx.letterSpacing='0.12em';
    ctx.textBaseline='top';
    ctx.fillText('IT MEANS',cardX+28,cy+18);
    ctx.letterSpacing='0em';

    // Main statement
    ctx.fillStyle=P.nearBlk;ctx.font='700 26px Lato';ctx.letterSpacing='0em';
    ctx.textBaseline='top';
    const endY=wrapText(card.label,cardX+28,cy+50,cardW-60,34);

    // Subtext
    ctx.fillStyle=P.warmGray;ctx.font='300 19px Lato';ctx.letterSpacing='0em';
    wrapText(card.subtext,cardX+28,endY+16,cardW-60,26);

    cy+=cardH+cardGap;
  });

  // Pale sage insight strip
  const stripY=cy+14;
  rrect(cardX,stripY,cardW,72,12);
  const stripGrad=ctx.createLinearGradient(cardX,0,cardX+cardW,0);
  stripGrad.addColorStop(0,P.sagePale);stripGrad.addColorStop(1,'#A8C498');
  ctx.fillStyle=stripGrad;ctx.fill();
  ctx.fillStyle=P.greenDk;ctx.font='italic 300 28px "Cormorant Garamond"';ctx.letterSpacing='0em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('You’re not at the finish line. You’re at the exit ramp.',W/2,stripY+36);
  ctx.textAlign='left';

  // CTA pill — cream border, cream text
  const ctaW=360,ctaH=62,ctaX=(W-ctaW)/2,ctaY=stripY+96;
  rrect(ctaX,ctaY,ctaW,ctaH,31);ctx.strokeStyle=rgba(P.cream,0.75);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=rgba(P.cream,0.08);ctx.fill();
  ctx.fillStyle=P.cream;ctx.font='700 22px Lato';ctx.letterSpacing='0.08em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('FIND YOUR EXIT RAMP →',W/2,ctaY+ctaH/2);
  ctx.textAlign='left';

  drawFooter();
}
function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='barista-fire-30-educational-what-number-means-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
