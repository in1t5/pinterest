<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Barista FIRE Formula Explained · Barista FIRE Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 27 · Educational Formula · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxWidth&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);return y;
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_no_text_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // White background
  ctx.fillStyle=P.white;ctx.fillRect(0,0,W,H);

  // Header
  ctx.fillStyle=P.nearBlk;ctx.font='300 68px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('The Barista FIRE',W/2,30);
  ctx.fillStyle=P.green;ctx.font='italic 300 68px "Cormorant Garamond"';
  ctx.fillText('Formula',W/2,102);
  ctx.fillStyle=P.warmGray;ctx.font='300 22px Lato';ctx.letterSpacing='0em';
  ctx.fillText('Two formulas. Everything you need.',W/2,186);
  ctx.textAlign='left';

  // Formula 1 card
  const f1X=60,f1Y=236,f1W=W-120,f1H=310;
  ctx.save();ctx.shadowColor='rgba(0,0,0,0.08)';ctx.shadowBlur=20;ctx.shadowOffsetY=8;
  rrect(f1X,f1Y,f1W,f1H,14);ctx.fillStyle=P.white;ctx.fill();
  ctx.restore();
  ctx.strokeStyle=rgba(P.green,0.3);ctx.lineWidth=2;rrect(f1X,f1Y,f1W,f1H,14);ctx.stroke();
  ctx.fillStyle=P.green;ctx.fillRect(f1X,f1Y,f1W,52);
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(f1X,f1Y,f1W,52,[14,14,0,0]);ctx.fillStyle=P.green;ctx.fill();}

  // Formula 1 chip
  rrect(f1X+20,f1Y+10,100,32,16);ctx.fillStyle=rgba(P.cream,0.2);ctx.fill();
  ctx.fillStyle=P.cream;ctx.font='700 15px Lato';ctx.letterSpacing='0.08em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('FORMULA 01',f1X+70,f1Y+26);
  ctx.textAlign='left';

  ctx.fillStyle=P.green;ctx.font='700 17px Lato';ctx.letterSpacing='0.10em';
  ctx.textBaseline='top';
  ctx.fillText('BARISTA FI TARGET',f1X+20,f1Y+68);

  // Formula text
  ctx.fillStyle=P.nearBlk;ctx.font='700 22px Lato';ctx.letterSpacing='0em';
  ctx.fillText('(Monthly Expenses − Part-time Income)',f1X+20,f1Y+104);
  ctx.fillStyle=P.sage;ctx.font='700 26px Lato';
  ctx.fillText('× 12 × 25',f1X+20,f1Y+134);

  ctx.strokeStyle=rgba(P.sage,0.3);ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(f1X+20,f1Y+174);ctx.lineTo(f1X+f1W-20,f1Y+174);ctx.stroke();

  ctx.fillStyle=P.warmGray;ctx.font='italic 300 22px "Cormorant Garamond"';
  ctx.fillText('Also written as: income gap × 300',f1X+20,f1Y+190);
  ctx.fillStyle=rgba(P.warmGray,0.7);ctx.font='300 19px Lato';
  wrapText('Where 300 = 12 months × 25 (inverse of 4% withdrawal rate)',f1X+20,f1Y+228,f1W-40,28);

  // Formula 2 card
  const f2X=60,f2Y=f1Y+f1H+24,f2W=W-120,f2H=220;
  ctx.save();ctx.shadowColor='rgba(0,0,0,0.08)';ctx.shadowBlur=20;ctx.shadowOffsetY=8;
  rrect(f2X,f2Y,f2W,f2H,14);ctx.fillStyle=P.white;ctx.fill();
  ctx.restore();
  ctx.strokeStyle=rgba(P.sage,0.3);ctx.lineWidth=2;rrect(f2X,f2Y,f2W,f2H,14);ctx.stroke();
  ctx.fillStyle=P.sage;ctx.fillRect(f2X,f2Y,f2W,52);
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(f2X,f2Y,f2W,52,[14,14,0,0]);ctx.fillStyle=P.sage;ctx.fill();}

  rrect(f2X+20,f2Y+10,100,32,16);ctx.fillStyle=rgba(P.cream,0.25);ctx.fill();
  ctx.fillStyle=P.white;ctx.font='700 15px Lato';ctx.letterSpacing='0.08em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('FORMULA 02',f2X+70,f2Y+26);
  ctx.textAlign='left';

  ctx.fillStyle=P.nearBlk;ctx.font='700 17px Lato';ctx.letterSpacing='0.10em';
  ctx.textBaseline='top';
  ctx.fillText('FULL FIRE TARGET',f2X+20,f2Y+68);
  ctx.fillStyle=P.nearBlk;ctx.font='700 24px Lato';ctx.letterSpacing='0em';
  ctx.fillText('Annual Expenses × 25',f2X+20,f2Y+104);
  ctx.fillStyle=P.warmGray;ctx.font='300 20px Lato';
  ctx.fillText('The classic 4% rule — the finish line.',f2X+20,f2Y+148);

  // Example card — pale sage
  const exX=60,exY=f2Y+f2H+24,exW=W-120,exH=216;
  rrect(exX,exY,exW,exH,14);ctx.fillStyle=P.sageFaint;ctx.fill();
  ctx.strokeStyle=rgba(P.sage,0.25);ctx.lineWidth=1.5;rrect(exX,exY,exW,exH,14);ctx.stroke();
  ctx.fillStyle=P.green;ctx.font='700 15px Lato';ctx.letterSpacing='0.12em';
  ctx.textBaseline='top';
  ctx.fillText('WORKED EXAMPLE',exX+24,exY+20);
  ctx.fillStyle=P.nearBlk;ctx.font='700 21px Lato';ctx.letterSpacing='0em';
  ctx.fillText('$3k/mo − $1.2k  =  $1.8k gap × 12 × 25',exX+24,exY+54);
  ctx.fillStyle=P.green;ctx.font='700 26px Lato';
  ctx.fillText('= $540,000  Barista FI',exX+24,exY+94);
  ctx.strokeStyle=rgba(P.sage,0.3);ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(exX+24,exY+132);ctx.lineTo(exX+exW-24,exY+132);ctx.stroke();
  ctx.fillStyle=P.nearBlk;ctx.font='700 21px Lato';
  ctx.fillText('$36k/yr × 25',exX+24,exY+148);
  ctx.fillStyle=P.sage;ctx.font='700 26px Lato';
  ctx.fillText('= $900,000  Full FIRE',exX+24,exY+178);

  // Plain English insight
  ctx.fillStyle=P.warmGray;ctx.font='italic 300 30px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('"Smaller target first. Compound growth closes the rest."',W/2,exY+exH+22);
  ctx.textAlign='left';

  // CTA
  const ctaW=360,ctaH=62,ctaX=(W-ctaW)/2,ctaY=exY+exH+80;
  ctx.save();
  ctx.shadowColor='rgba(71,88,79,0.35)';ctx.shadowBlur=22;ctx.shadowOffsetY=8;
  rrect(ctaX,ctaY,ctaW,ctaH,31);ctx.fillStyle=P.green;ctx.fill();
  ctx.restore();
  ctx.fillStyle=P.cream;ctx.font='700 22px Lato';ctx.letterSpacing='0.10em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('RUN THE CALCULATOR →',W/2,ctaY+ctaH/2);
  ctx.textAlign='left';

  drawFooter();
}
function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='barista-fire-27-educational-formula-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
