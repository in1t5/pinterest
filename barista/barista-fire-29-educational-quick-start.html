<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Start Planning Barista FIRE in 5 Minutes · Barista FIRE Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;width:420px;height:630px;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 29 · Educational Quick-Start · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxWidth&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);return y;
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Cream background
  ctx.fillStyle=P.cream;ctx.fillRect(0,0,W,H);

  // Header area
  ctx.fillStyle=P.white;ctx.fillRect(0,0,W,210);
  ctx.strokeStyle=rgba(P.sage,0.25);ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(0,210);ctx.lineTo(W,210);ctx.stroke();

  // Pinyon Script sub-heading
  ctx.fillStyle=P.sage;ctx.font='400 54px "Pinyon Script"';ctx.letterSpacing='0em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('your barista fire dates',W/2,18);

  // Big Lato heading
  ctx.fillStyle=P.nearBlk;ctx.font='700 64px Lato';ctx.letterSpacing='0em';
  ctx.fillText('IN 5 MINUTES',W/2,86);

  // Sub-label
  ctx.fillStyle=P.warmGray;ctx.font='300 22px Lato';ctx.letterSpacing='0em';
  ctx.fillText('Free calculator — no sign-up required',W/2,162);
  ctx.textAlign='left';

  // Step cards
  const cardX=60,cardW=W-120;
  const steps=[
    {num:'01',chip:'1 MIN',chipColor:P.sage,chipTxt:P.white,elevated:false,
     title:'Enter the basics',
     body:'Age, monthly expenses, current portfolio value, and monthly savings rate.',
     label:null},
    {num:'02',chip:'THE BARISTA FIRE INPUT',chipColor:P.green,chipTxt:P.cream,elevated:true,
     title:'Enter planned part-time income',
     body:'How much you expect to earn part-time once you leave full-time work.',
     label:'The unique Barista FIRE input'},
    {num:'03',chip:'1 MIN',chipColor:P.sage,chipTxt:P.white,elevated:false,
     title:'Set investment return rate',
     body:'Historical real return around 5–7%. Conservative? Use 5%.',
     label:null},
    {num:'04',chip:'2 MIN',chipColor:P.sage,chipTxt:P.white,elevated:false,
     title:'Read both milestones',
     body:'Your Barista FI date + your Full FIRE date. Adjust inputs and repeat.',
     label:null},
  ];

  const normalH=185,elevatedH=215;
  let cy=228;

  steps.forEach((step,i)=>{
    const isEl=step.elevated;
    const cardH=isEl?elevatedH:normalH;

    // Card shadow + bg
    ctx.save();ctx.shadowColor='rgba(0,0,0,0.08)';ctx.shadowBlur=18;ctx.shadowOffsetY=6;
    rrect(cardX,cy,cardW,cardH,14);
    ctx.fillStyle=isEl?P.sageFaint:P.white;ctx.fill();
    ctx.restore();

    // Left accent bar for elevated card
    if(isEl){
      ctx.fillStyle=P.green;ctx.fillRect(cardX,cy,8,cardH);
      // also add top border
      if(ctx.roundRect){ctx.beginPath();ctx.roundRect(cardX,cy,cardW,cardH,14);}
      ctx.strokeStyle=rgba(P.green,0.4);ctx.lineWidth=2;ctx.stroke();
    } else {
      rrect(cardX,cy,cardW,cardH,14);ctx.strokeStyle=rgba(P.sage,0.15);ctx.lineWidth=1;ctx.stroke();
    }

    // Step number
    const numX=isEl?cardX+28:cardX+20;
    ctx.fillStyle=isEl?P.green:rgba(P.warmGray,0.4);
    ctx.font=(isEl?'700 48px':'700 44px')+' Lato';ctx.letterSpacing='0em';
    ctx.textBaseline='top';ctx.textAlign='left';
    ctx.fillText('Step '+step.num,numX,cy+18);

    // Time chip
    const chipPadH=16,chipPadV=10;
    ctx.font='700 14px Lato';ctx.letterSpacing='0.08em';
    const chipW=ctx.measureText(step.chip).width+chipPadH*2;
    const chipX=cardX+cardW-chipW-20,chipY=cy+16;
    rrect(chipX,chipY,chipW,28+chipPadV,14);
    ctx.fillStyle=step.chipColor;ctx.fill();
    ctx.fillStyle=step.chipTxt;
    ctx.textBaseline='middle';ctx.textAlign='center';
    ctx.fillText(step.chip,chipX+chipW/2,chipY+19);
    ctx.textAlign='left';ctx.letterSpacing='0em';

    // Title
    ctx.fillStyle=isEl?P.greenDk:P.nearBlk;
    ctx.font=(isEl?'700 26px':'700 24px')+' Lato';ctx.letterSpacing='0em';
    ctx.textBaseline='top';
    ctx.fillText(step.title,numX,cy+72);

    // Body
    ctx.fillStyle=isEl?P.green:P.warmGray;
    ctx.font='300 19px Lato';ctx.letterSpacing='0em';
    const bodyY=cy+106;
    wrapText(step.body,numX,bodyY,cardW-120,28);

    // Italic label for elevated
    if(step.label){
      ctx.fillStyle=P.warmGray;ctx.font='italic 300 20px "Cormorant Garamond"';ctx.letterSpacing='0em';
      ctx.textBaseline='top';
      ctx.fillText(step.label,numX,cy+cardH-38);
    }

    cy+=cardH+16;
  });

  // Sage italic strip
  const stripY=cy+10;
  rrect(cardX,stripY,cardW,70,12);ctx.fillStyle=P.green;ctx.fill();
  ctx.fillStyle=P.cream;ctx.font='italic 300 32px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Two milestones. Complete clarity.',W/2,stripY+35);
  ctx.textAlign='left';

  // CTA
  const ctaW=340,ctaH=62,ctaX=(W-ctaW)/2,ctaY=stripY+96;
  ctx.save();
  ctx.shadowColor='rgba(71,88,79,0.35)';ctx.shadowBlur=22;ctx.shadowOffsetY=8;
  rrect(ctaX,ctaY,ctaW,ctaH,31);ctx.fillStyle=P.green;ctx.fill();
  ctx.restore();
  ctx.fillStyle=P.cream;ctx.font='700 22px Lato';ctx.letterSpacing='0.10em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('START NOW — FREE →',W/2,ctaY+ctaH/2);
  ctx.textAlign='left';

  drawFooter();
}
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='barista-fire-29-educational-quick-start-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
