<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Barista FIRE vs Full FIRE vs Coast FIRE · Barista FIRE Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;width:420px;height:630px;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 28 · Educational Benchmark · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxWidth&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);return y;
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Cream background
  ctx.fillStyle=P.cream;ctx.fillRect(0,0,W,H);

  // Top header area
  ctx.fillStyle=P.white;ctx.fillRect(0,0,W,180);
  ctx.strokeStyle=rgba(P.sage,0.25);ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(0,180);ctx.lineTo(W,180);ctx.stroke();

  ctx.fillStyle=P.nearBlk;ctx.font='700 40px Lato';ctx.letterSpacing='0em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('WHICH FIRE STRATEGY',W/2,22);
  ctx.fillText('IS RIGHT FOR YOU?',W/2,70);
  ctx.fillStyle=P.sage;ctx.font='italic 300 30px "Cormorant Garamond"';
  ctx.fillText('Barista · Full · Coast — compared',W/2,128);
  ctx.textAlign='left';

  // Card
  const cX=60,cY=210,cW=W-120,cH=840;
  ctx.save();ctx.shadowColor='rgba(0,0,0,0.10)';ctx.shadowBlur=24;ctx.shadowOffsetY=10;
  rrect(cX,cY,cW,cH,16);ctx.fillStyle=P.white;ctx.fill();
  ctx.restore();
  ctx.strokeStyle=rgba(P.sage,0.2);ctx.lineWidth=1.5;rrect(cX,cY,cW,cH,16);ctx.stroke();

  // Table header row
  const hdrH=64;
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(cX,cY,cW,hdrH,[16,16,0,0]);ctx.fillStyle=P.green;ctx.fill();}
  else{ctx.fillStyle=P.green;ctx.fillRect(cX,cY,cW,hdrH);}

  // Column positions
  const col0=cX+16,col1=cX+270,col2=cX+490,col3=cX+700;
  const colW0=200,colW1=200,colW2=190,colW3=180;

  ctx.fillStyle=P.cream;ctx.font='700 17px Lato';ctx.letterSpacing='0.10em';
  ctx.textBaseline='middle';
  ctx.fillText('STRATEGY',col0,cY+hdrH/2);
  ctx.fillText('PORTFOLIO',col1,cY+hdrH/2);
  ctx.fillText('WORK',col2,cY+hdrH/2);
  ctx.fillText('TIMELINE',col3,cY+hdrH/2);
  ctx.letterSpacing='0em';

  // Row data
  const rows=[
    {name:'Full FIRE',sub:'Classic',portfolio:'25× expenses',work:'None',timeline:'Long',elevated:false,bg:P.white},
    {name:'Coast FIRE',sub:'Passive',portfolio:'Varies by age',work:'Full-time OK',timeline:'Medium',elevated:false,bg:P.sageFaint},
    {name:'Barista FIRE',sub:'',portfolio:'12–15× expenses',work:'Part-time',timeline:'Fastest exit',elevated:true,bg:P.sagePale},
  ];

  const rowH=250;
  rows.forEach((row,i)=>{
    const ry=cY+hdrH+i*rowH;
    const actualBg=row.elevated?'#D8E9CE':row.bg;
    ctx.fillStyle=actualBg;ctx.fillRect(cX,ry,cW,rowH);

    // Row divider
    if(i>0){
      ctx.strokeStyle=rgba(P.sage,0.2);ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(cX,ry);ctx.lineTo(cX+cW,ry);ctx.stroke();
    }

    // Elevated green left accent bar
    if(row.elevated){
      ctx.fillStyle=P.green;ctx.fillRect(cX,ry,8,rowH);
    }

    // Column vertical dividers
    [col1,col2,col3].forEach(cx=>{
      ctx.strokeStyle=rgba(P.sage,0.18);ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(cx-16,ry+20);ctx.lineTo(cx-16,ry+rowH-20);ctx.stroke();
    });

    const cellMidY=ry+rowH/2;
    const textColor=row.elevated?P.greenDk:P.nearBlk;
    const subColor=row.elevated?P.green:P.warmGray;

    // Strategy name cell
    if(row.elevated){
      ctx.fillStyle=P.green;ctx.font='700 30px Lato';ctx.letterSpacing='0em';
    } else {
      ctx.fillStyle=textColor;ctx.font='700 26px Lato';ctx.letterSpacing='0em';
    }
    ctx.textBaseline='middle';
    const nameX=row.elevated?cX+24:col0;
    ctx.fillText(row.name,nameX,cellMidY-16);

    if(row.sub){
      ctx.fillStyle=subColor;ctx.font='300 18px Lato';ctx.letterSpacing='0em';
      ctx.fillText(row.sub,nameX,cellMidY+18);
    }

    // Portfolio cell
    if(row.elevated){
      ctx.fillStyle=P.greenDk;ctx.font='700 24px Lato';ctx.letterSpacing='0em';
    } else {
      ctx.fillStyle=textColor;ctx.font='700 22px Lato';ctx.letterSpacing='0em';
    }
    ctx.textBaseline='middle';
    // wrap portfolio text
    ctx.font=(row.elevated?'700 24px':'700 22px')+' Lato';
    ctx.letterSpacing='0em';
    ctx.fillStyle=row.elevated?P.greenDk:textColor;
    wrapText(row.portfolio,col1,cellMidY-12,colW1,30);

    // Work cell
    ctx.fillStyle=row.elevated?P.greenDk:textColor;
    ctx.font=(row.elevated?'700 24px':'700 22px')+' Lato';
    ctx.letterSpacing='0em';
    ctx.textBaseline='middle';
    ctx.fillText(row.work,col2,cellMidY);

    // Timeline cell
    if(row.elevated){
      // pill badge for fastest exit
      const tw=ctx.measureText(row.timeline).width+24;
      rrect(col3,cellMidY-20,tw,40,20);ctx.fillStyle=P.green;ctx.fill();
      ctx.fillStyle=P.cream;ctx.font='700 20px Lato';ctx.letterSpacing='0em';
      ctx.textBaseline='middle';ctx.fillText(row.timeline,col3+12,cellMidY);
    } else {
      ctx.fillStyle=textColor;ctx.font='700 22px Lato';ctx.letterSpacing='0em';
      ctx.textBaseline='middle';ctx.fillText(row.timeline,col3,cellMidY);
    }
  });

  // Round bottom corners of card
  ctx.save();
  ctx.fillStyle=P.white;
  // just clip the bottom area for final row's bg bleed
  ctx.restore();

  // Bottom card border clip using path
  rrect(cX,cY,cW,cH,16);ctx.strokeStyle=rgba(P.sage,0.2);ctx.lineWidth=1.5;ctx.stroke();

  // Sage italic strip
  const stripY=cY+cH+36;
  rrect(cX,stripY,cW,72,12);ctx.fillStyle=P.green;ctx.fill();
  ctx.fillStyle=P.cream;ctx.font='italic 300 32px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Two milestones. One strategy. Your timeline.',W/2,stripY+36);
  ctx.textAlign='left';

  // CTA
  const ctaText='CALCULATE YOURS →';
  ctx.font='700 22px Lato';
  const ctaPadding=56;
  const ctaH=62;
  const ctaW=Math.ceil(ctx.measureText(ctaText).width+ctaPadding);
  const ctaX=(W-ctaW)/2,ctaY=stripY+100;
  ctx.save();
  ctx.shadowColor='rgba(71,88,79,0.35)';ctx.shadowBlur=22;ctx.shadowOffsetY=8;
  rrect(ctaX,ctaY,ctaW,ctaH,31);ctx.fillStyle=P.green;ctx.fill();
  ctx.restore();
  ctx.fillStyle=P.cream;ctx.letterSpacing='0.10em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(ctaText,W/2,ctaY+ctaH/2);
  ctx.textAlign='left';

  drawFooter();
}
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='barista-fire-28-educational-benchmark-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
