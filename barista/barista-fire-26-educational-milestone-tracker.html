<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Barista FIRE Milestone Tracker · Barista FIRE Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 26 · Educational Milestone Tracker · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxWidth&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);return y;
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_no_text_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Cream background
  ctx.fillStyle=P.cream;ctx.fillRect(0,0,W,H);

  // Header
  ctx.fillStyle=P.white;ctx.fillRect(0,0,W,148);
  ctx.strokeStyle=rgba(P.sage,0.25);ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(0,148);ctx.lineTo(W,148);ctx.stroke();
  ctx.fillStyle=P.green;ctx.font='700 14px Lato';ctx.letterSpacing='0.18em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('WHERE ARE YOU ON THE PATH?',W/2,20);
  ctx.fillStyle=P.nearBlk;ctx.font='300 62px "Cormorant Garamond"';ctx.letterSpacing='0em';
  ctx.fillText('Portfolio Milestones',W/2,52);
  ctx.fillStyle=P.warmGray;ctx.font='italic 300 30px "Cormorant Garamond"';
  ctx.fillText('Barista FIRE reference guide',W/2,118);
  ctx.textAlign='left';

  // Color ramp: forest green → pale sage (6 steps)
  const rampColors=[P.greenDk,'#3F6658',P.green,P.sage,'#A8C498',P.sagePale];
  const textColors=[P.cream,P.cream,P.cream,P.white,P.nearBlk,P.greenDk];
  const elevated=3; // index of the elevated row ($400k–$600k)

  const milestones=[
    {range:'$0 – $100k',label:'Foundation',desc:'Every investment journey starts here. Consistent contributions matter most at this stage. Time and habit.'},
    {range:'$100k – $250k',label:'Early Accumulation',desc:'Compound growth starts becoming visible. Savings rate drives progress. Keep the habit.'},
    {range:'$250k – $400k',label:'Approaching Barista FI',desc:'Viable in lower-expense scenarios. The horizon is coming into view. Model it now.'},
    {range:'$400k – $600k',label:'Barista FI Range',desc:'The range where most practitioners reach their Barista FI target. Full-time work becomes optional.'},
    {range:'$600k – $800k',label:'Bridge Phase',desc:'Phase 2 well underway. Portfolio growing on its own. Full FIRE approaching steadily.'},
    {range:'$800k+',label:'Full FIRE Territory',desc:'25× annual expenses achieved for $32k–$36k expense levels. Work is fully optional.'},
  ];

  const rowH=200;
  let ry=148;
  milestones.forEach((m,i)=>{
    const isElevated=(i===elevated);
    const bg=rampColors[i];
    const tc=textColors[i];
    const actualH=isElevated?rowH+30:rowH;

    ctx.fillStyle=bg;ctx.fillRect(0,ry,W,actualH);

    // Elevated badge
    if(isElevated){
      rrect(W-180,ry+12,160,32,16);ctx.fillStyle=rgba(P.cream,0.25);ctx.fill();
      ctx.strokeStyle=rgba(P.cream,0.4);ctx.lineWidth=1;rrect(W-180,ry+12,160,32,16);ctx.stroke();
      ctx.fillStyle=tc;ctx.font='700 14px Lato';ctx.letterSpacing='0.08em';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('← BARISTA FI ZONE',W-100,ry+28);
      ctx.textAlign='left';
    }

    // Range chip
    const chipW=ctx.measureText(m.range).width+32;
    rrect(60,ry+18,chipW,36,6);ctx.fillStyle=rgba(P.cream,0.18);ctx.fill();
    ctx.fillStyle=tc;ctx.font='700 18px Lato';ctx.letterSpacing='0em';
    ctx.textBaseline='middle';
    ctx.fillText(m.range,76,ry+36);

    // Label
    ctx.fillStyle=tc;ctx.font='700 28px Lato';
    ctx.textBaseline='top';
    ctx.fillText(m.label,60,ry+66);

    // Desc
    ctx.fillStyle=rgba(tc,0.75);ctx.font='300 19px Lato';
    wrapText(m.desc,60,ry+104,W-120,28);

    // Row divider
    ctx.strokeStyle=rgba(P.cream,0.1);ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(0,ry+actualH);ctx.lineTo(W,ry+actualH);ctx.stroke();

    ry+=actualH;
  });

  // CTA
  const ctaW=360,ctaH=62,ctaX=(W-ctaW)/2,ctaY=ry+18;
  ctx.save();
  ctx.shadowColor='rgba(71,88,79,0.35)';ctx.shadowBlur=22;ctx.shadowOffsetY=8;
  rrect(ctaX,ctaY,ctaW,ctaH,31);ctx.fillStyle=P.green;ctx.fill();
  ctx.restore();
  ctx.fillStyle=P.cream;ctx.font='700 22px Lato';ctx.letterSpacing='0.10em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('FIND YOUR MILESTONE →',W/2,ctaY+ctaH/2);
  ctx.textAlign='left';

  drawFooter();
}
function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='barista-fire-26-educational-milestone-tracker-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
