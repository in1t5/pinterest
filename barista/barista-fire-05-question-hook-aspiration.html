<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Could You Leave Your Full-Time Job in 5 Years? · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 05 · Question Hook Aspiration · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxWidth&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);return y;
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_no_text_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Forest green hero band top ~40%
  ctx.fillStyle=P.green;ctx.fillRect(0,0,W,580);

  // Cream bg bottom
  ctx.fillStyle=P.cream;ctx.fillRect(0,580,W,H-580);

  // Decorative texture lines on green
  for(let i=0;i<8;i++){
    ctx.strokeStyle=rgba(P.sagePale,0.06);ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(0,i*80);ctx.lineTo(W,i*80);ctx.stroke();
  }

  // Question mark watermark
  ctx.fillStyle=rgba(P.greenDk,0.4);ctx.font='300 320px "Cormorant Garamond"';
  ctx.textAlign='right';ctx.textBaseline='top';
  ctx.fillText('?',960,60);
  ctx.textAlign='left';

  // Pinyon Script accent
  ctx.fillStyle=rgba(P.sagePale,0.7);ctx.font='400 58px "Pinyon Script"';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('could you?',W/2,50);
  ctx.textAlign='left';

  // Main question
  ctx.fillStyle=P.cream;ctx.font='italic 300 72px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('Could you leave your',W/2,120);
  ctx.fillText('full-time job',W/2,200);
  ctx.fillStyle=P.sagePale;
  ctx.fillText('in 5 years?',W/2,280);
  ctx.textAlign='left';

  // Sub on green
  ctx.fillStyle=rgba(P.cream,0.75);ctx.font='300 28px Lato';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('Barista FIRE makes it possible.',W/2,376);
  ctx.textAlign='left';

  // Metric card on cream bg (spanning the boundary)
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,0.18)';ctx.shadowBlur=30;ctx.shadowOffsetY=10;
  rrect(80,500,840,200,18);ctx.fillStyle=P.sagePale;ctx.fill();
  ctx.restore();

  // Card label
  ctx.fillStyle=P.greenDk;ctx.font='700 17px Lato';ctx.letterSpacing='0.12em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('WITH YOUR CURRENT PORTFOLIO + 32% SAVINGS RATE',W/2,528);
  // Card metric
  ctx.fillStyle=P.green;ctx.font='300 64px "Cormorant Garamond"';ctx.letterSpacing='0em';
  ctx.fillText('Barista FI in 5 years',W/2,558);
  // Card sub
  ctx.fillStyle=P.warmGray;ctx.font='300 24px Lato';
  ctx.fillText('Age 35 · $3,000/mo part-time income covered',W/2,634);
  ctx.textAlign='left';

  // Divider
  ctx.strokeStyle=rgba(P.sage,0.3);ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(80,728);ctx.lineTo(920,728);ctx.stroke();

  // Body explanation
  ctx.fillStyle=P.warmGray;ctx.font='300 28px Lato';
  ctx.textAlign='center';ctx.textBaseline='top';
  wrapText('Barista FIRE doesn\'t require full retirement savings. Just enough for part-time income to bridge the gap.',W/2,754,800,40);
  ctx.textAlign='left';

  // Three bullet points
  const bullets=[
    'Part-time income covers day-to-day expenses',
    'Portfolio grows unassisted to Full FIRE',
    'Calculator shows your exact exit date',
  ];
  let by2=874;
  bullets.forEach(b=>{
    ctx.beginPath();ctx.arc(94,by2+14,7,0,Math.PI*2);
    ctx.fillStyle=P.green;ctx.fill();
    ctx.fillStyle=P.nearBlk;ctx.font='300 26px Lato';
    ctx.textAlign='left';ctx.textBaseline='top';
    ctx.fillText(b,116,by2);
    by2+=52;
  });

  // Divider 2
  ctx.strokeStyle=rgba(P.sage,0.3);ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(80,1040);ctx.lineTo(920,1040);ctx.stroke();

  // Italic quote
  ctx.fillStyle=P.green;ctx.font='italic 300 34px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('"The exit from full-time is closer',W/2,1062);
  ctx.fillText('than most people think."',W/2,1104);
  ctx.textAlign='left';

  // Keywords
  const tags=['barista fire calculator','barista fire','retire early part time'];
  const tagY=1178,tagH=40,tagGap=8,tagPad=16;
  ctx.font='700 17px Lato';ctx.letterSpacing='0.04em';
  const tagMetrics=tags.map(label=>({label,width:ctx.measureText(label).width+tagPad*2}));
  const totalTagW=tagMetrics.reduce((sum,{width})=>sum+width,0)+tagGap*(tagMetrics.length-1);
  let tx=(W-totalTagW)/2;
  tagMetrics.forEach(({label,width})=>{
    rrect(tx,tagY,width,tagH,20);ctx.fillStyle=rgba(P.sage,0.18);ctx.fill();
    ctx.strokeStyle=rgba(P.sage,0.38);ctx.lineWidth=1;ctx.stroke();
    ctx.fillStyle=P.green;ctx.textBaseline='middle';ctx.textAlign='center';
    ctx.fillText(label,tx+width/2,tagY+tagH/2);
    tx+=width+tagGap;
  });

  // CTA pill
  const ctaText='CALCULATE YOUR EXIT DATE →';
  ctx.font='700 24px Lato';
  const ctaPadding=64;
  const ctaH=68;
  const ctaW=Math.ceil(ctx.measureText(ctaText).width+ctaPadding);
  const ctaX=(W-ctaW)/2,ctaY=1292;
  ctx.save();
  ctx.shadowColor='rgba(71,88,79,0.35)';ctx.shadowBlur=22;ctx.shadowOffsetY=8;
  rrect(ctaX,ctaY,ctaW,ctaH,34);ctx.fillStyle=P.green;ctx.fill();
  ctx.restore();
  ctx.fillStyle=P.cream;ctx.letterSpacing='0.10em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(ctaText,W/2,ctaY+ctaH/2);
  ctx.textAlign='left';

  drawFooter();
}
function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='barista-fire-05-question-hook-aspiration-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
