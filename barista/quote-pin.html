<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quote Pin · Barista FIRE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0a0a08;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.8)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">Quote Pin · Barista FIRE · 1000 × 1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F', greenDk:'#3B4B42', greenDkk:'#2e3c34',
  sage:'#84A17C', sagePale:'#C1D5A5', sageFaint:'#EAEDCE',
  cream:'#F5EEED', nearBlk:'#1A1A18', warmGray:'#6E686A', white:'#FFFFFF',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_no_text_2501x2500.png';}

function render(){
  ctx.clearRect(0,0,W,H);

  // ── Full dark green background ──────────────────────────────────────────
  ctx.fillStyle=P.greenDk; ctx.fillRect(0,0,W,H);

  // Subtle texture: decorative circles
  ctx.save();
  ctx.globalAlpha=0.07; ctx.strokeStyle=P.sagePale; ctx.lineWidth=4;
  ctx.beginPath(); ctx.arc(880,200,280,0,Math.PI*2); ctx.stroke();
  ctx.globalAlpha=0.05; ctx.fillStyle=P.sagePale;
  ctx.beginPath(); ctx.arc(920,850,160,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=0.04;
  ctx.beginPath(); ctx.arc(100,1200,200,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // ── Large decorative open-quote ─────────────────────────────────────────
  ctx.save();
  ctx.globalAlpha=0.10;
  ctx.fillStyle=P.sagePale;
  ctx.font='300 320px "Cormorant Garamond"';
  ctx.textBaseline='top';
  ctx.fillText('“',62,60);
  ctx.restore();

  // ── Quote lines ─────────────────────────────────────────────────────────
  ctx.textBaseline='top'; ctx.letterSpacing='-0.01em';
  const lx=76;

  ctx.fillStyle=P.cream; ctx.font='300 106px "Cormorant Garamond"';
  ctx.fillText('I don’t want',lx,290);

  ctx.fillStyle=P.cream; ctx.font='300 106px "Cormorant Garamond"';
  ctx.fillText('to retire.',lx,406);

  // Script accent for contrast
  ctx.fillStyle=P.sagePale; ctx.font='400 120px "Pinyon Script"'; ctx.letterSpacing='0em';
  ctx.fillText('I want to choose.',lx,520);

  // ── Attribution ─────────────────────────────────────────────────────────
  ctx.fillStyle=rgba(P.sagePale,0.60);
  ctx.font='300 italic 28px "Cormorant Garamond"'; ctx.letterSpacing='0.04em';
  ctx.textBaseline='middle';
  ctx.fillText('The Barista FIRE mindset',lx+24,688);

  // Rule before attribution
  ctx.strokeStyle=P.sage; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(lx,688); ctx.lineTo(lx+18,688); ctx.stroke();

  // ── Context paragraph ────────────────────────────────────────────────────
  ctx.fillStyle=rgba(P.cream,0.68);
  ctx.font='300 32px Lato'; ctx.letterSpacing='0em'; ctx.textBaseline='top';
  ctx.fillText('Work part-time. Let your investments',lx,780);
  ctx.fillText('grow. Reach full FIRE on your terms.',lx,822);

  // ── Decorative horizontal rule ────────────────────────────────────────────
  ctx.save();
  ctx.strokeStyle=rgba(P.sage,0.30); ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(lx,920); ctx.lineTo(W-lx,920); ctx.stroke();
  ctx.restore();

  // ── Sage stat accent ──────────────────────────────────────────────────────
  ctx.textBaseline='top';
  const stats=[
    {n:'7 yrs',  l:'to Barista FIRE'},
    {n:'$450k',  l:'target portfolio'},
    {n:'$0',     l:'extra savings needed'},
  ];
  const sw=(W-lx*2)/3;
  stats.forEach((s,i)=>{
    const sx=lx+i*sw;
    ctx.fillStyle=P.sagePale; ctx.font='300 52px "Cormorant Garamond"'; ctx.letterSpacing='-0.01em';
    ctx.fillText(s.n,sx,960);
    ctx.fillStyle=rgba(P.sagePale,0.55); ctx.font='400 20px Lato'; ctx.letterSpacing='0.06em';
    ctx.fillText(s.l.toUpperCase(),sx,1022);
  });

  // ── Calculator pill ───────────────────────────────────────────────────────
  ctx.font='700 18px Lato'; ctx.letterSpacing='0.08em';
  const pillTxt='FREE BARISTA FIRE CALCULATOR';
  const pillW=ctx.measureText(pillTxt).width+56, pillH=42, pillX=(W-pillW)/2, pillY=1120;
  rrect(pillX,pillY,pillW,pillH,21);
  ctx.strokeStyle=rgba(P.sagePale,0.45); ctx.lineWidth=1.5; ctx.stroke();
  ctx.fillStyle=P.sagePale; ctx.textBaseline='middle'; ctx.textAlign='center';
  ctx.fillText(pillTxt,W/2,pillY+pillH/2);
  ctx.textAlign='left';

  ctx.fillStyle=rgba(P.sagePale,0.45); ctx.font='400 24px Lato'; ctx.letterSpacing='0.10em';
  ctx.textBaseline='top'; ctx.textAlign='center';
  ctx.fillText('TIMEANDMONEYTREE.COM',W/2,1184);
  ctx.textAlign='left';

  // ── Footer strip ──────────────────────────────────────────────────────────
  ctx.fillStyle=P.greenDkk; ctx.fillRect(0,1395,W,105);
  const midY=1395+52;
  if(logo){
    const sz=64; ctx.save();
    ctx.beginPath(); ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2); ctx.clip();
    ctx.drawImage(logo,88,midY-sz/2,sz,sz); ctx.restore();
  }
  ctx.fillStyle=P.white; ctx.font='700 24px Lato'; ctx.letterSpacing='0em'; ctx.textBaseline='middle';
  ctx.fillText('Try it free — no sign-up',174,midY-14);
  ctx.fillStyle=P.sagePale; ctx.font='700 15px Lato'; ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+14);
  const bw=210,bh=48,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,24); ctx.strokeStyle=rgba(P.sagePale,0.60); ctx.lineWidth=2; ctx.stroke();
  ctx.fillStyle=P.white; ctx.font='700 20px Lato'; ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle'; ctx.textAlign='center';
  ctx.fillText('CALCULATE  →',bx+bw/2,midY);
  ctx.textAlign='left';
}

function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{const a=document.createElement('a');a.download='barista-fire-quote-pin.png';a.href=canvas.toDataURL('image/png');a.click();});
document.fonts.ready.then(()=>{ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);render();});
</script>
</body>
</html>
