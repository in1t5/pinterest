<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Your Barista FIRE Numbers · Barista FIRE Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 23 · Mockup Output Close-up · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxWidth&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);return y;
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_no_text_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Near-black background
  ctx.fillStyle=P.nearBlk;ctx.fillRect(0,0,W,H);

  // Subtle green glow top
  const grd=ctx.createRadialGradient(W/2,0,0,W/2,0,600);
  grd.addColorStop(0,rgba(P.green,0.12));
  grd.addColorStop(1,'transparent');
  ctx.fillStyle=grd;ctx.fillRect(0,0,W,600);

  // Header
  ctx.fillStyle=P.sagePale;ctx.font='700 14px Lato';ctx.letterSpacing='0.18em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('YOUR RESULTS',W/2,36);
  ctx.fillStyle=P.cream;ctx.font='300 68px "Cormorant Garamond"';ctx.letterSpacing='0em';
  ctx.fillText('Everything You Need',W/2,68);
  ctx.fillStyle=P.sage;ctx.font='italic 300 68px "Cormorant Garamond"';
  ctx.fillText('to Know',W/2,140);
  ctx.textAlign='left';

  // Large cream card
  const cardX=50,cardY=226,cardW=W-100,cardH=878;
  ctx.save();ctx.shadowColor='rgba(0,0,0,0.4)';ctx.shadowBlur=50;ctx.shadowOffsetY=20;
  rrect(cardX,cardY,cardW,cardH,20);ctx.fillStyle=P.cream;ctx.fill();
  ctx.restore();
  ctx.strokeStyle=rgba(P.sage,0.2);ctx.lineWidth=1.5;rrect(cardX,cardY,cardW,cardH,20);ctx.stroke();

  // Card header band
  ctx.fillStyle=P.green;
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(cardX,cardY,cardW,72,[20,20,0,0]);ctx.fill();}
  else{ctx.fillRect(cardX,cardY,cardW,72);}
  ctx.fillStyle=P.cream;ctx.font='700 17px Lato';ctx.letterSpacing='0.14em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('BARISTA FIRE CALCULATOR · EXAMPLE OUTPUT',cardX+cardW/2,cardY+36);
  ctx.textAlign='left';

  // Result rows
  const results=[
    {label:'Barista FI Target Portfolio',value:'$540,000',phase:'Phase 1 end',color:P.green},
    {label:'Barista FI Date',value:'Age 38',sub:'8 years from now',color:P.green},
    {label:'Part-time Income Needed',value:'$1,200/mo',sub:'Phase 2 income gap',color:P.sage},
    {label:'Full FIRE Date',value:'Age 47',sub:'17 years from now',color:P.sage},
    {label:'Full FIRE Portfolio',value:'$1,125,000',sub:'25× annual expenses',color:P.greenDk},
  ];

  let ry=cardY+90;
  results.forEach((r,i)=>{
    const rowH=144;
    if(i>0){
      ctx.strokeStyle=rgba(P.sage,0.18);ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(cardX+30,ry);ctx.lineTo(cardX+cardW-30,ry);ctx.stroke();
    }

    // Checkmark
    ctx.fillStyle=r.color;ctx.font='700 28px Lato';ctx.letterSpacing='0em';
    ctx.textBaseline='middle';
    ctx.fillText('✓',cardX+28,ry+rowH/2);

    // Label
    ctx.fillStyle=P.warmGray;ctx.font='300 19px Lato';
    ctx.textBaseline='top';
    ctx.fillText(r.label,cardX+68,ry+22);

    // Value
    ctx.fillStyle=P.nearBlk;ctx.font='700 38px Lato';
    ctx.fillText(r.value,cardX+68,ry+52);

    // Sub
    if(r.sub){
      ctx.fillStyle=rgba(r.color,0.7);ctx.font='700 16px Lato';ctx.letterSpacing='0.06em';
      ctx.fillText(r.sub,cardX+68,ry+100);
    }

    ry+=rowH;
  });

  // Note at bottom of card
  ctx.fillStyle=P.warmGray;ctx.font='italic 300 20px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='bottom';
  ctx.fillText('Inputs: Age 30 · $150k portfolio · $3k/mo expenses · $1.2k/mo part-time',cardX+cardW/2,cardY+cardH-18);
  ctx.textAlign='left';

  // CTA
  const ctaW=340,ctaH=62,ctaX=(W-ctaW)/2,ctaY=cardY+cardH+30;
  ctx.save();
  ctx.shadowColor='rgba(193,213,165,0.3)';ctx.shadowBlur=28;ctx.shadowOffsetY=10;
  rrect(ctaX,ctaY,ctaW,ctaH,31);ctx.fillStyle=P.sagePale;ctx.fill();
  ctx.restore();
  ctx.fillStyle=P.greenDk;ctx.font='700 22px Lato';ctx.letterSpacing='0.10em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('GET YOUR NUMBERS →',W/2,ctaY+ctaH/2);
  ctx.textAlign='left';

  drawFooter();
}
function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='barista-fire-23-mockup-output-closeup-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
