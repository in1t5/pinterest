<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>4-Step Barista FIRE Formula · Barista FIRE Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 13 · Step Ladder 4-Step · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxWidth&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);return y;
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_no_text_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Cream background
  ctx.fillStyle=P.cream;ctx.fillRect(0,0,W,H);

  // Top header
  ctx.fillStyle=P.green;ctx.fillRect(0,0,W,140);
  ctx.fillStyle=P.cream;ctx.font='300 62px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Calculate Your Barista FI',W/2,55);
  ctx.fillStyle=P.sagePale;ctx.font='700 14px Lato';ctx.letterSpacing='0.18em';
  ctx.fillText('4 STEPS · FREE CALCULATOR',W/2,110);
  ctx.textAlign='left';

  // Steps
  const steps=[
    {num:'01',title:'Calculate monthly expenses',sub:'Every dollar you spend monthly. This sets both your Barista FI and Full FIRE targets.',elevated:false},
    {num:'02',title:'Subtract planned part-time income',sub:'Barista, freelance, consulting — any income you\'ll earn during Phase 2.',elevated:false},
    {num:'03',title:'Multiply gap × 300',sub:'This is your Barista FI target portfolio. The number that ends full-time work.',elevated:true},
    {num:'04',title:'Track portfolio to target',sub:'Once you hit it, Phase 2 begins. Work part-time while compound growth closes to Full FIRE.',elevated:false},
  ];

  let sy=162;
  steps.forEach((step,i)=>{
    const cardH=176;
    const elevated=step.elevated;
    const cardBg=elevated?P.sagePale:P.white;
    const cardX=60,cardW=W-120;

    // Card shadow
    ctx.save();
    ctx.shadowColor='rgba(0,0,0,0.10)';ctx.shadowBlur=elevated?28:14;ctx.shadowOffsetY=elevated?10:5;
    rrect(cardX,sy,cardW,cardH,14);ctx.fillStyle=cardBg;ctx.fill();
    ctx.restore();
    ctx.strokeStyle=elevated?rgba(P.green,0.3):rgba(P.sage,0.2);ctx.lineWidth=1.5;
    rrect(cardX,sy,cardW,cardH,14);ctx.stroke();

    // Elevated marker
    if(elevated){
      rrect(cardX+cardW-130,sy-14,130,28,14);ctx.fillStyle=P.green;ctx.fill();
      ctx.fillStyle=P.cream;ctx.font='700 13px Lato';ctx.letterSpacing='0.10em';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('KEY FORMULA',cardX+cardW-65,sy);
      ctx.textAlign='left';
    }

    // Step number — large Cormorant
    ctx.fillStyle=elevated?P.green:rgba(P.green,0.18);
    ctx.font='300 88px "Cormorant Garamond"';
    ctx.textBaseline='top';ctx.textAlign='left';
    ctx.fillText(step.num,cardX+22,sy+10);

    // Step title
    ctx.fillStyle=P.nearBlk;ctx.font='700 26px Lato';ctx.letterSpacing='0em';
    ctx.textBaseline='top';
    ctx.fillText(step.title,cardX+120,sy+26);

    // Step sub
    ctx.fillStyle=P.warmGray;ctx.font='300 21px Lato';
    wrapText(step.sub,cardX+120,sy+68,cardW-140,30);

    // Bottom connector arrow (not last)
    if(i<steps.length-1){
      const arrowY=sy+cardH+10;
      ctx.fillStyle=rgba(P.green,0.35);ctx.font='700 24px Lato';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('↓',W/2,arrowY);
      ctx.textAlign='left';
    }

    sy+=cardH+(i<steps.length-1?34:28);
  });

  // Example strip
  const exY=sy;const exH=90;
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,exY,W,exH);
  ctx.fillStyle=P.sagePale;ctx.font='700 15px Lato';ctx.letterSpacing='0.12em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('EXAMPLE',W/2,exY+14);
  ctx.fillStyle=P.cream;ctx.font='300 28px "Cormorant Garamond"';ctx.letterSpacing='0em';
  ctx.textBaseline='top';
  ctx.fillText('$3k/mo  −  $1.2k  =  $1.8k  ×  300  =  $540,000',W/2,exY+40);
  ctx.textAlign='left';

  // CTA
  const ctaW=460,ctaH=62,ctaX=(W-ctaW)/2,ctaY=exY+exH+28;
  ctx.save();
  ctx.shadowColor='rgba(71,88,79,0.35)';ctx.shadowBlur=22;ctx.shadowOffsetY=8;
  rrect(ctaX,ctaY,ctaW,ctaH,31);ctx.fillStyle=P.green;ctx.fill();
  ctx.restore();
  ctx.fillStyle=P.cream;ctx.font='700 22px Lato';ctx.letterSpacing='0.10em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('USE THE FREE CALCULATOR →',W/2,ctaY+ctaH/2);
  ctx.textAlign='left';

  drawFooter();
}
function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='barista-fire-13-step-ladder-4-step-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
