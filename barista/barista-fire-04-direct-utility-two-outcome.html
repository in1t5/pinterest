<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Barista FIRE Calculator — Part-Time Freedom vs. Full Financial Independence · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;width:420px;height:630px;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 04 · Direct Utility Two Outcome · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxWidth&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);return y;
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Cream bg
  ctx.fillStyle=P.cream;ctx.fillRect(0,0,W,H);

  // Top cream headline band
  ctx.fillStyle=P.white;ctx.fillRect(0,0,W,180);
  ctx.strokeStyle=rgba(P.sage,0.3);ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(0,180);ctx.lineTo(W,180);ctx.stroke();

  // Headline in band
  ctx.fillStyle=P.nearBlk;ctx.font='300 68px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('Two Outcomes.',W/2,26);
  ctx.fillText('One Calculator.',W/2,102);
  ctx.textAlign='left';

  // Two-column cards
  const cardY=200,cardH=880,cardW=440,cardGap=20;
  const card1X=W/2-cardW-cardGap/2;
  const card2X=W/2+cardGap/2;

  // Left card - pale sage
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,0.12)';ctx.shadowBlur=20;ctx.shadowOffsetY=8;
  rrect(card1X,cardY,cardW,cardH,18);ctx.fillStyle=P.sagePale;ctx.fill();
  ctx.restore();

  // Right card - forest green
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,0.18)';ctx.shadowBlur=28;ctx.shadowOffsetY=10;
  rrect(card2X,cardY,cardW,cardH,18);ctx.fillStyle=P.green;ctx.fill();
  ctx.restore();

  // Left card content
  // Header band
  ctx.fillStyle=P.sage;
  ctx.save();if(ctx.roundRect){ctx.beginPath();ctx.roundRect(card1X,cardY,cardW,70,[18,18,0,0]);}else{ctx.fillRect(card1X,cardY,cardW,70);}ctx.fill();ctx.restore();
  ctx.fillStyle=P.white;ctx.font='700 20px Lato';ctx.letterSpacing='0.12em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('BARISTA FI',card1X+cardW/2,cardY+35);

  // Age metric
  ctx.fillStyle=P.green;ctx.font='300 80px "Cormorant Garamond"';ctx.letterSpacing='0em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('Age 38',card1X+cardW/2,cardY+90);

  // Items
  const leftItems=['Work 20 hrs/wk','Stress eliminated','Portfolio still growing','Benefits from part-time job','Freedom begins now'];
  let ly=cardY+190;
  leftItems.forEach(item=>{
    // Check dot
    ctx.beginPath();ctx.arc(card1X+38,ly+12,8,0,Math.PI*2);
    ctx.fillStyle=P.green;ctx.fill();
    ctx.fillStyle=P.greenDk;ctx.font='300 26px Lato';ctx.letterSpacing='0em';
    ctx.textAlign='left';ctx.textBaseline='top';
    ctx.fillText(item,card1X+58,ly);
    ly+=52;
  });

  // Left card bottom note
  ctx.fillStyle=rgba(P.greenDk,0.65);ctx.font='italic 300 22px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('"The exit ramp"',card1X+cardW/2,cardY+cardH-54);

  // Right card content
  // Header band
  ctx.fillStyle=P.greenDk;
  ctx.save();if(ctx.roundRect){ctx.beginPath();ctx.roundRect(card2X,cardY,cardW,70,[18,18,0,0]);}else{ctx.fillRect(card2X,cardY,cardW,70);}ctx.fill();ctx.restore();
  ctx.fillStyle=P.sagePale;ctx.font='700 20px Lato';ctx.letterSpacing='0.12em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('FULL FIRE',card2X+cardW/2,cardY+35);

  // Age metric
  ctx.fillStyle=P.cream;ctx.font='300 80px "Cormorant Garamond"';ctx.letterSpacing='0em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('Age 47',card2X+cardW/2,cardY+90);

  // Items
  const rightItems=['Work optional','Complete freedom','Portfolio self-sustaining','No income required','True independence'];
  let ry=cardY+190;
  rightItems.forEach(item=>{
    ctx.beginPath();ctx.arc(card2X+38,ry+12,8,0,Math.PI*2);
    ctx.fillStyle=P.sagePale;ctx.fill();
    ctx.fillStyle=P.cream;ctx.font='300 26px Lato';ctx.letterSpacing='0em';
    ctx.textAlign='left';ctx.textBaseline='top';
    ctx.fillText(item,card2X+58,ry);
    ry+=52;
  });

  // Right card bottom note
  ctx.fillStyle=rgba(P.sagePale,0.8);ctx.font='italic 300 22px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('"The destination"',card2X+cardW/2,cardY+cardH-54);
  ctx.textAlign='left';

  // VS badge in center
  const vsX=W/2-28,vsY=cardY+cardH/2-28;
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,0.25)';ctx.shadowBlur=12;
  ctx.beginPath();ctx.arc(W/2,cardY+cardH/2,30,0,Math.PI*2);
  ctx.fillStyle=P.cream;ctx.fill();
  ctx.restore();
  ctx.strokeStyle=rgba(P.sage,0.5);ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(W/2,cardY+cardH/2,30,0,Math.PI*2);ctx.stroke();
  ctx.fillStyle=P.green;ctx.font='700 22px Lato';ctx.letterSpacing='0.04em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('→',W/2,cardY+cardH/2);
  ctx.textAlign='left';

  // Bottom band
  ctx.fillStyle=P.white;ctx.fillRect(0,1110,W,145);
  ctx.strokeStyle=rgba(P.sage,0.3);ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(0,1110);ctx.lineTo(W,1110);ctx.stroke();

  ctx.fillStyle=P.warmGray;ctx.font='300 26px Lato';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('Enter your numbers. Both outcomes calculated',W/2,1128);
  ctx.fillText('instantly — no sign-up required.',W/2,1162);
  ctx.textAlign='left';

  // Keywords
  const tags=['barista fire calculator','barista fire','financial independence calculator'];
  const tagY=1220,tagH=40,tagGap=8,tagPad=16;
  ctx.font='700 17px Lato';ctx.letterSpacing='0.04em';
  const tagMetrics=tags.map(label=>({label,width:ctx.measureText(label).width+tagPad*2}));
  const totalTagW=tagMetrics.reduce((sum,{width})=>sum+width,0)+tagGap*(tagMetrics.length-1);
  let tx=(W-totalTagW)/2;
  tagMetrics.forEach(({label,width})=>{
    rrect(tx,tagY,width,tagH,20);ctx.fillStyle=rgba(P.sage,0.18);ctx.fill();
    ctx.strokeStyle=rgba(P.sage,0.38);ctx.lineWidth=1;ctx.stroke();
    ctx.fillStyle=P.green;ctx.textBaseline='middle';ctx.textAlign='center';
    ctx.fillText(label,tx+width/2,tagY+tagH/2);
    tx+=width+tagGap;
  });

  // CTA
  const ctaW=340,ctaH=64,ctaX=(W-ctaW)/2,ctaY=1300;
  ctx.save();
  ctx.shadowColor='rgba(71,88,79,0.35)';ctx.shadowBlur=22;ctx.shadowOffsetY=8;
  rrect(ctaX,ctaY,ctaW,ctaH,32);ctx.fillStyle=P.green;ctx.fill();
  ctx.restore();
  ctx.fillStyle=P.cream;ctx.font='700 23px Lato';ctx.letterSpacing='0.10em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('CALCULATE BOTH →',W/2,ctaY+ctaH/2);
  ctx.textAlign='left';

  drawFooter();
}
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='barista-fire-04-direct-utility-two-outcome-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
