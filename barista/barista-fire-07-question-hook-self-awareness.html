<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Do You Know the Difference Between Barista FIRE and Full FIRE? · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;width:420px;height:630px;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 07 · Question Hook Self-Awareness · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxWidth&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);return y;
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Cream bg
  ctx.fillStyle=P.cream;ctx.fillRect(0,0,W,H);

  // Top accent line
  ctx.fillStyle=P.green;ctx.fillRect(0,0,W,12);

  // Large italic question
  ctx.fillStyle=P.nearBlk;ctx.font='italic 300 60px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('Do you know the difference',W/2,38);
  ctx.fillText('between Barista FIRE',W/2,108);
  ctx.fillStyle=P.green;
  ctx.fillText('and Full FIRE?',W/2,178);
  ctx.textAlign='left';

  // Divider
  ctx.strokeStyle=rgba(P.sage,0.4);ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(80,268);ctx.lineTo(920,268);ctx.stroke();

  // Two comparison cells
  const cellY=296,cellH=340,cellW=420,cellGap=20;
  const cell1X=W/2-cellW-cellGap/2;
  const cell2X=W/2+cellGap/2;

  // Left cell - pale sage
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,0.10)';ctx.shadowBlur=14;ctx.shadowOffsetY=5;
  rrect(cell1X,cellY,cellW,cellH,16);ctx.fillStyle=P.sagePale;ctx.fill();
  ctx.restore();
  ctx.fillStyle=P.greenDk;ctx.font='700 18px Lato';ctx.letterSpacing='0.12em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('BARISTA FIRE',cell1X+cellW/2,cellY+24);
  ctx.fillStyle=P.green;ctx.font='300 56px "Cormorant Garamond"';ctx.letterSpacing='0em';
  ctx.fillText('Phase 2',cell1X+cellW/2,cellY+60);
  ctx.fillStyle=P.greenDk;ctx.font='300 24px Lato';ctx.letterSpacing='0em';
  ctx.textBaseline='top';
  const leftLines=['Part-time income +','growing portfolio','· 12–15× expenses gap','· Exit from full-time','· Bridge to Full FIRE'];
  let lly=cellY+128;
  leftLines.forEach(l=>{ctx.fillText(l,cell1X+cellW/2,lly);lly+=34;});

  // Right cell - forest green
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,0.16)';ctx.shadowBlur=20;ctx.shadowOffsetY=7;
  rrect(cell2X,cellY,cellW,cellH,16);ctx.fillStyle=P.green;ctx.fill();
  ctx.restore();
  ctx.fillStyle=P.sagePale;ctx.font='700 18px Lato';ctx.letterSpacing='0.12em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('FULL FIRE',cell2X+cellW/2,cellY+24);
  ctx.fillStyle=P.cream;ctx.font='300 56px "Cormorant Garamond"';ctx.letterSpacing='0em';
  ctx.fillText('Phase 3',cell2X+cellW/2,cellY+60);
  ctx.fillStyle=P.cream;ctx.font='300 24px Lato';ctx.letterSpacing='0em';
  ctx.textBaseline='top';
  const rightLines=['Portfolio alone','sustains all expenses','· 25× annual expenses','· Work fully optional','· Complete freedom'];
  let rly=cellY+128;
  rightLines.forEach(l=>{ctx.fillText(l,cell2X+cellW/2,rly);rly+=34;});
  ctx.textAlign='left';

  // Arrow between
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,0.2)';ctx.shadowBlur=8;
  ctx.beginPath();ctx.arc(W/2,cellY+cellH/2,24,0,Math.PI*2);
  ctx.fillStyle=P.cream;ctx.fill();
  ctx.restore();
  ctx.fillStyle=P.green;ctx.font='700 20px Lato';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('→',W/2,cellY+cellH/2);
  ctx.textAlign='left';

  // Implication
  ctx.fillStyle=P.green;ctx.font='italic 300 36px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('"Barista FI is achievable years',W/2,668);
  ctx.fillText('before Full FIRE — and it',W/2,712);
  ctx.fillText('changes everything."',W/2,756);
  ctx.textAlign='left';

  // Divider
  ctx.strokeStyle=rgba(P.sage,0.3);ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(80,818);ctx.lineTo(920,818);ctx.stroke();

  // Key numbers comparison
  ctx.fillStyle=P.nearBlk;ctx.font='300 34px "Cormorant Garamond"';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('The numbers that matter',W/2,846);
  ctx.textAlign='left';

  const numRows=[
    {label:'Barista FI target',val:'~$540K',note:'12–15× income gap'},
    {label:'Full FIRE target',val:'~$1.125M',note:'25× annual expenses'},
    {label:'Years between them',val:'~9 yrs',note:'Portfolio grows itself'},
  ];
  let ny=898;
  numRows.forEach(r=>{
    ctx.fillStyle=P.white;
    rrect(80,ny,840,72,10);ctx.fill();
    ctx.strokeStyle=rgba(P.sage,0.25);ctx.lineWidth=1;ctx.stroke();
    ctx.fillStyle=P.warmGray;ctx.font='300 24px Lato';ctx.textBaseline='middle';ctx.textAlign='left';
    ctx.fillText(r.label,104,ny+36);
    ctx.fillStyle=P.green;ctx.font='300 38px "Cormorant Garamond"';ctx.textAlign='center';
    ctx.fillText(r.val,W/2,ny+36);
    ctx.fillStyle=P.warmGray;ctx.font='300 22px Lato';ctx.textAlign='right';
    ctx.fillText(r.note,900,ny+36);
    ny+=84;
  });
  ctx.textAlign='left';

  // Keywords
  const tags=['barista fire calculator','barista fire','financial independence calculator'];
  const tagY=1164,tagH=40,tagGap=8,tagPad=16;
  ctx.font='700 17px Lato';ctx.letterSpacing='0.04em';
  const tagMetrics=tags.map(label=>({label,width:ctx.measureText(label).width+tagPad*2}));
  const totalTagW=tagMetrics.reduce((sum,{width})=>sum+width,0)+tagGap*(tagMetrics.length-1);
  let tx=(W-totalTagW)/2;
  tagMetrics.forEach(({label,width})=>{
    rrect(tx,tagY,width,tagH,20);ctx.fillStyle=rgba(P.sage,0.18);ctx.fill();
    ctx.strokeStyle=rgba(P.sage,0.38);ctx.lineWidth=1;ctx.stroke();
    ctx.fillStyle=P.green;ctx.textBaseline='middle';ctx.textAlign='center';
    ctx.fillText(label,tx+width/2,tagY+tagH/2);
    tx+=width+tagGap;
  });

  // Body
  ctx.fillStyle=P.warmGray;ctx.font='300 26px Lato';
  ctx.textAlign='center';ctx.textBaseline='top';
  wrapText('The free calculator computes both milestones from your real numbers.',W/2,1226,800,38);
  ctx.textAlign='left';

  // CTA
  const ctaW=380,ctaH=64,ctaX=(W-ctaW)/2,ctaY=1300;
  ctx.save();
  ctx.shadowColor='rgba(71,88,79,0.35)';ctx.shadowBlur=22;ctx.shadowOffsetY=8;
  rrect(ctaX,ctaY,ctaW,ctaH,32);ctx.fillStyle=P.green;ctx.fill();
  ctx.restore();
  ctx.fillStyle=P.cream;ctx.font='700 23px Lato';ctx.letterSpacing='0.10em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('FIND YOUR TWO DATES →',W/2,ctaY+ctaH/2);
  ctx.textAlign='left';

  drawFooter();
}
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='barista-fire-07-question-hook-self-awareness-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
