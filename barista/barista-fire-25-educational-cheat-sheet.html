<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Barista FIRE Cheat Sheet · Barista FIRE Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 25 · Educational Cheat Sheet · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxWidth&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);return y;
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_no_text_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Cream background
  ctx.fillStyle=P.cream;ctx.fillRect(0,0,W,H);

  // Header
  ctx.fillStyle=P.green;ctx.fillRect(0,0,W,148);
  ctx.fillStyle=P.cream;ctx.font='700 15px Lato';ctx.letterSpacing='0.18em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('BARISTA FIRE CHEAT SHEET',W/2,22);
  ctx.font='300 62px "Cormorant Garamond"';ctx.letterSpacing='0em';
  ctx.fillText('5 Numbers to Know',W/2,50);
  ctx.fillStyle=P.sagePale;ctx.font='italic 300 32px "Cormorant Garamond"';
  ctx.fillText('before you calculate',W/2,118);
  ctx.textAlign='left';

  // Color ramp: forest green → pale sage (5 steps)
  const rampColors=[P.green,'#537B69',P.sage,'#A8C498',P.sagePale];
  const textColors=[P.cream,P.cream,P.white,P.nearBlk,P.greenDk];

  const rows=[
    {num:'01',label:'Monthly Expenses',desc:'Your baseline figure. Every dollar you spend per month. Start here — everything else derives from this number.',example:'e.g. $3,000/mo'},
    {num:'02',label:'Part-time Income Target',desc:'The income you plan to earn during Phase 2 — barista, freelance, consulting, or any part-time work.',example:'e.g. $1,200/mo'},
    {num:'03',label:'Monthly Income Gap',desc:'Your expenses minus your planned part-time income. This gap is what your portfolio must cover.',example:'e.g. $3k − $1.2k = $1,800/mo'},
    {num:'04',label:'Barista FI Portfolio',desc:'Monthly income gap × 300. This is the portfolio at which part-time income plus investment returns cover expenses.',example:'e.g. $1,800 × 300 = $540,000'},
    {num:'05',label:'Full FIRE Portfolio',desc:'Annual expenses × 25 (the 4% rule). Your final destination — portfolio that funds all expenses without any income.',example:'e.g. $36k × 25 = $900,000'},
  ];

  const rowH=228;
  let ry=148;
  rows.forEach((row,i)=>{
    const bg=rampColors[i];
    const tc=textColors[i];
    ctx.fillStyle=bg;ctx.fillRect(0,ry,W,rowH);

    // Row divider
    if(i>0){
      ctx.strokeStyle=rgba(P.cream,0.12);ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(0,ry);ctx.lineTo(W,ry);ctx.stroke();
    }

    // Number chip
    const chipW=64,chipH=38;
    rrect(60,ry+22,chipW,chipH,6);
    ctx.fillStyle=rgba(P.cream,0.18);ctx.fill();
    ctx.fillStyle=tc;ctx.font='700 22px Lato';ctx.letterSpacing='0em';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(row.num,60+chipW/2,ry+22+chipH/2);
    ctx.textAlign='left';

    // Row label
    ctx.fillStyle=tc;ctx.font='700 28px Lato';ctx.letterSpacing='0em';
    ctx.textBaseline='top';
    ctx.fillText(row.label,60+chipW+16,ry+22);

    // Description
    ctx.fillStyle=rgba(tc,0.80);ctx.font='300 20px Lato';
    wrapText(row.desc,60,ry+78,W-120,30);

    // Example pill
    const epW=ctx.measureText(row.example).width+36;
    rrect(60,ry+rowH-52,epW,32,16);ctx.fillStyle=rgba(P.cream,0.20);ctx.fill();
    ctx.fillStyle=tc;ctx.font='700 16px Lato';ctx.letterSpacing='0.04em';
    ctx.textBaseline='middle';
    ctx.fillText(row.example,78,ry+rowH-52+16);

    ry+=rowH;
  });

  // CTA
  const ctaW=340,ctaH=62,ctaX=(W-ctaW)/2,ctaY=ry+20;
  ctx.save();
  ctx.shadowColor='rgba(71,88,79,0.35)';ctx.shadowBlur=22;ctx.shadowOffsetY=8;
  rrect(ctaX,ctaY,ctaW,ctaH,31);ctx.fillStyle=P.green;ctx.fill();
  ctx.restore();
  ctx.fillStyle=P.cream;ctx.font='700 22px Lato';ctx.letterSpacing='0.10em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('CALCULATE ALL 5 →',W/2,ctaY+ctaH/2);
  ctx.textAlign='left';

  drawFooter();
}
function fitCanvas(){
  const scale=Math.min(1,(window.innerHeight-140)/1500,(window.innerWidth-40)/1000);
  canvas.style.width=Math.round(1000*scale)+'px';
  canvas.style.height=Math.round(1500*scale)+'px';
}
fitCanvas();
window.addEventListener('resize',fitCanvas);
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='barista-fire-25-educational-cheat-sheet-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
