<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Barista FIRE Misconception Busted · Barista FIRE Calculator · 1000×1500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;width:420px;height:630px;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">PIN 20 · Myth Buster Misconception · 1000×1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F',greenDk:'#3B4B42',
  sage:'#84A17C',sagePale:'#C1D5A5',sageFaint:'#EAEDCE',
  cream:'#F5EEED',nearBlk:'#1A1A18',warmGray:'#6E686A',
  white:'#FFFFFF',coral:'#F1683F',navy:'#3A5477',cornflower:'#5192C6',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}
  else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
}
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' ');let line='';
  for(let n=0;n<words.length;n++){
    const test=line+words[n]+' ';
    if(ctx.measureText(test).width>maxWidth&&n>0){ctx.fillText(line,x,y);line=words[n]+' ';y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);return y;
}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../design/logo_brownish_framed_2501x2500.png';}
function drawFooter(){
  ctx.fillStyle=P.greenDk;ctx.fillRect(0,1395,W,105);
  const midY=1447;
  if(logo){const sz=66;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  else{ctx.beginPath();ctx.arc(121,midY,33,0,Math.PI*2);ctx.fillStyle=P.green;ctx.fill();}
  ctx.fillStyle=P.white;ctx.font='700 25px Lato';ctx.letterSpacing='0em';ctx.textBaseline='middle';ctx.textAlign='left';
  ctx.fillText('Try it free — no sign-up',174,midY-15);
  ctx.fillStyle=P.sagePale;ctx.font='700 16px Lato';ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+15);
  const bw=210,bh=50,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,26);ctx.strokeStyle=rgba(P.sagePale,.65);ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle=P.white;ctx.font='700 21px Lato';ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle';ctx.textAlign='center';ctx.fillText('CALCULATE  →',bx+bw/2,midY);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,W,H);

  // Pale sage background
  ctx.fillStyle=P.sageFaint;ctx.fillRect(0,0,W,H);

  // Header
  ctx.fillStyle=P.white;ctx.fillRect(0,0,W,110);
  ctx.fillStyle=P.warmGray;ctx.font='700 13px Lato';ctx.letterSpacing='0.18em';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('THE MISCONCEPTION',W/2,22);
  ctx.fillStyle=P.nearBlk;ctx.font='300 62px "Cormorant Garamond"';ctx.letterSpacing='0em';
  ctx.fillText('You\'ve Heard This. It\'s Wrong.',W/2,52);
  ctx.textAlign='left';

  // Misconception card (X)
  const mcX=60,mcY=130,mcW=W-120,mcH=348;
  ctx.save();ctx.shadowColor='rgba(0,0,0,0.10)';ctx.shadowBlur=16;ctx.shadowOffsetY=6;
  rrect(mcX,mcY,mcW,mcH,14);ctx.fillStyle=P.white;ctx.fill();
  ctx.restore();
  ctx.strokeStyle=rgba(P.coral,0.35);ctx.lineWidth=2;rrect(mcX,mcY,mcW,mcH,14);ctx.stroke();
  // coral left border
  ctx.fillStyle=P.coral;ctx.fillRect(mcX,mcY,6,mcH);
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(mcX,mcY,6,mcH,[14,0,0,14]);ctx.fillStyle=P.coral;ctx.fill();}

  // X icon
  const xSize=52;const xY=mcY+20;
  rrect(mcX+20,xY,xSize,xSize,8);ctx.fillStyle=rgba(P.coral,0.12);ctx.fill();
  ctx.strokeStyle=P.coral;ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(mcX+33,xY+13);ctx.lineTo(mcX+20+xSize-13,xY+xSize-13);ctx.stroke();
  ctx.beginPath();ctx.moveTo(mcX+20+xSize-13,xY+13);ctx.lineTo(mcX+33,xY+xSize-13);ctx.stroke();

  ctx.fillStyle=P.coral;ctx.font='700 15px Lato';ctx.letterSpacing='0.12em';
  ctx.textAlign='left';ctx.textBaseline='top';
  ctx.fillText('MISCONCEPTION',mcX+90,mcY+28);

  ctx.fillStyle=P.nearBlk;ctx.font='italic 300 28px "Cormorant Garamond"';ctx.letterSpacing='0em';
  ctx.textBaseline='top';
  wrapText('"Barista FIRE is for people who couldn\'t save enough for real retirement."',mcX+24,mcY+92,mcW-50,40);

  ctx.fillStyle=P.warmGray;ctx.font='300 22px Lato';
  wrapText('This confuses a deliberate strategy with a fallback. Barista FIRE is a choice, not a compromise.',mcX+24,mcY+240,mcW-50,32);

  // Correction card (checkmark)
  const ccX=60,ccY=mcY+mcH+24,ccW=W-120,ccH=368;
  ctx.save();ctx.shadowColor='rgba(71,88,79,0.12)';ctx.shadowBlur=18;ctx.shadowOffsetY=6;
  rrect(ccX,ccY,ccW,ccH,14);ctx.fillStyle=P.white;ctx.fill();
  ctx.restore();
  ctx.strokeStyle=rgba(P.sage,0.30);ctx.lineWidth=2;rrect(ccX,ccY,ccW,ccH,14);ctx.stroke();
  // sage left border
  ctx.fillStyle=P.sage;ctx.fillRect(ccX,ccY,6,ccH);
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(ccX,ccY,6,ccH,[14,0,0,14]);ctx.fillStyle=P.sage;ctx.fill();}

  // Checkmark icon
  const chkSize=52;const chkY=ccY+20;
  rrect(ccX+20,chkY,chkSize,chkSize,8);ctx.fillStyle=rgba(P.sage,0.15);ctx.fill();
  ctx.strokeStyle=P.sage;ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(ccX+30,chkY+28);ctx.lineTo(ccX+42,chkY+40);ctx.lineTo(ccX+62,chkY+18);ctx.stroke();

  ctx.fillStyle=P.sage;ctx.font='700 15px Lato';ctx.letterSpacing='0.12em';
  ctx.textAlign='left';ctx.textBaseline='top';
  ctx.fillText('REALITY',ccX+90,ccY+28);

  ctx.fillStyle=P.nearBlk;ctx.font='italic 300 28px "Cormorant Garamond"';ctx.letterSpacing='0em';
  ctx.textBaseline='top';
  wrapText('"Barista FIRE is a deliberate two-phase approach that gets you out of full-time work faster."',ccX+24,ccY+86,ccW-50,40);

  ctx.fillStyle=P.warmGray;ctx.font='300 22px Lato';
  wrapText('Keeping you active and engaged in Phase 2 often builds more wealth than grinding full-time to traditional retirement.',ccX+24,ccY+228,ccW-50,32);

  // CTA
  const ctaW=340,ctaH=62,ctaX=(W-ctaW)/2,ctaY=ccY+ccH+24;
  ctx.save();
  ctx.shadowColor='rgba(71,88,79,0.35)';ctx.shadowBlur=22;ctx.shadowOffsetY=8;
  rrect(ctaX,ctaY,ctaW,ctaH,31);ctx.fillStyle=P.green;ctx.fill();
  ctx.restore();
  ctx.fillStyle=P.cream;ctx.font='700 22px Lato';ctx.letterSpacing='0.10em';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('PLAN YOUR STRATEGY →',W/2,ctaY+ctaH/2);
  ctx.textAlign='left';

  drawFooter();
}
document.getElementById('bSave').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='barista-fire-20-myth-buster-misconception-1000x1500.png';
  a.href=canvas.toDataURL('image/png');a.click();
});
document.fonts.ready.then(()=>{
  ctx.font='400 1px "Pinyon Script"';ctx.fillText('',0,0);
  ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);
  render();
});
</script>
</body>
</html>
