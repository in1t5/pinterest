<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FIRE Number Pin · Barista FIRE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0c;display:flex;flex-direction:column;align-items:center;padding:36px 20px 64px;font-family:Lato,sans-serif}
  .hdr{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#3a3a38;margin-bottom:22px}
  canvas{display:block;width:420px;height:630px;border-radius:8px;box-shadow:0 28px 80px rgba(0,0,0,.7)}
  .ctrl{margin-top:18px}
  .btn{background:#47584F;color:#F5EEED;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:Lato,sans-serif;font-size:12px;font-weight:700;letter-spacing:.10em;text-transform:uppercase}
  .btn:hover{background:#84A17C}
</style>
</head>
<body>
<p class="hdr">FIRE Number Pin (#5) · 1000 × 1500 px</p>
<canvas id="c" width="1000" height="1500"></canvas>
<div class="ctrl"><button class="btn" id="bSave">⬇ Save PNG</button></div>
<script>
'use strict';
const W=1000,H=1500;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const P={
  green:'#47584F', greenDk:'#3B4B42', greenDkk:'#2e3c34',
  sage:'#84A17C', sagePale:'#C1D5A5', sageFaint:'#EAEDCE',
  cream:'#F5EEED', nearBlk:'#1A1A18', warmGray:'#6E686A', white:'#FFFFFF',
  appPrimary:'#2e7d32', appText:'#1f2b21', appMuted:'#55635a',
};
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rrect(x,y,w,h,r){if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}else{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}}
let logo=null;
{const i=new Image();i.onload=()=>{logo=i;render();};i.onerror=()=>render();i.src='../../../assets/logo_brownish_framed_2501x2500.png';}

function render(){
  ctx.clearRect(0,0,W,H);
  const HERO_H=560, CREAM_Y=560, FOOT_Y=1395;

  // ── Hero ──────────────────────────────────────────────────────────────────
  ctx.fillStyle=P.green; ctx.fillRect(0,0,W,HERO_H+12);
  ctx.save();
  ctx.globalAlpha=0.12; ctx.strokeStyle=P.sagePale; ctx.lineWidth=5;
  ctx.beginPath(); ctx.arc(880,240,240,0,Math.PI*2); ctx.stroke();
  ctx.globalAlpha=0.07; ctx.fillStyle=P.sagePale;
  ctx.beginPath(); ctx.arc(940,490,110,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // Badge
  ctx.font='700 19px Lato'; ctx.letterSpacing='0.10em';
  const bt='FREE CALCULATOR · FIRE & EARLY RETIREMENT';
  const bw=ctx.measureText(bt).width+72,bh=44,bx=76,by=70;
  rrect(bx,by-bh/2,bw,bh,22); ctx.strokeStyle=rgba(P.sagePale,.50); ctx.lineWidth=1.5; ctx.stroke();
  ctx.fillStyle=P.sagePale;
  ctx.beginPath(); ctx.arc(bx+23,by,6,0,Math.PI*2); ctx.fill();
  ctx.textBaseline='middle'; ctx.fillText(bt,bx+39,by);

  // Headline
  ctx.textBaseline='top'; ctx.letterSpacing='-0.01em';
  ctx.fillStyle=P.cream; ctx.font='300 100px "Cormorant Garamond"';
  ctx.fillText('Part-time work.',76,118);
  ctx.fillStyle=P.sagePale; ctx.font='300 100px "Cormorant Garamond"';
  ctx.fillText('Half the target.',76,232);

  // Subtext
  ctx.fillStyle=rgba(P.cream,.76); ctx.font='300 30px Lato'; ctx.letterSpacing='0em';
  ctx.fillText('$1,500/month part-time income cuts your',76,378);
  ctx.fillText('required FIRE portfolio in half.',76,418);
  ctx.fillText('Same retirement. Far less waiting.',76,458);

  // ── Cream section ─────────────────────────────────────────────────────────
  ctx.fillStyle=P.cream; ctx.fillRect(0,CREAM_Y,W,FOOT_Y-CREAM_Y);

  // ── Main stat visual ──────────────────────────────────────────────────────
  const statY=CREAM_Y+40;

  // Two bars side by side
  const barAreaX=76, barAreaW=840;
  const b1W=360, b2W=360, bGap=120;
  const b1X=barAreaX+(barAreaW-b1W-b2W-bGap)/2;
  const b2X=b1X+b1W+bGap;
  const bBotY=statY+430;
  const b1H=340, b2H=170; // b2 is exactly half

  // Bar 1: Full FIRE
  rrect(b1X,bBotY-b1H,b1W,b1H,12);
  ctx.fillStyle=rgba(P.sage,0.25); ctx.fill();
  ctx.strokeStyle=rgba(P.sage,0.40); ctx.lineWidth=1.5; ctx.stroke();

  // Bar 2: Barista FIRE
  rrect(b2X,bBotY-b2H,b2W,b2H,12);
  ctx.fillStyle=P.sage; ctx.fill();

  // Bar labels (top)
  ctx.fillStyle=P.appMuted; ctx.font='700 15px Lato'; ctx.letterSpacing='0.10em';
  ctx.textBaseline='bottom'; ctx.textAlign='center';
  ctx.fillText('FULL FIRE',b1X+b1W/2,bBotY-b1H-10);
  ctx.fillText('BARISTA FIRE',b2X+b2W/2,bBotY-b2H-10);

  // Bar values (inside)
  ctx.fillStyle=rgba(P.warmGray,0.7); ctx.font='300 48px "Cormorant Garamond"';
  ctx.letterSpacing='-0.01em'; ctx.textBaseline='middle';
  ctx.fillText('$900,000',b1X+b1W/2,bBotY-b1H/2);
  ctx.fillStyle=P.white; ctx.font='300 48px "Cormorant Garamond"';
  ctx.fillText('$450,000',b2X+b2W/2,bBotY-b2H/2);
  ctx.textAlign='left';

  // x-axis line
  ctx.strokeStyle='#dde8df'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(76,bBotY); ctx.lineTo(924,bBotY); ctx.stroke();

  // ── "50% less" badge between bars ────────────────────────────────────────
  const midX=(b1X+b1W+b2X)/2;
  ctx.beginPath(); ctx.arc(midX,bBotY-b2H,36,0,Math.PI*2);
  ctx.fillStyle=P.appPrimary; ctx.fill();
  ctx.fillStyle=P.white; ctx.font='700 18px Lato'; ctx.letterSpacing='-0.02em';
  ctx.textBaseline='middle'; ctx.textAlign='center';
  ctx.fillText('50%',midX,bBotY-b2H-8);
  ctx.fillText('less',midX,bBotY-b2H+12);
  ctx.textAlign='left';

  // ── Explanation card ───────────────────────────────────────────────────────
  const cardY=CREAM_Y+480, cardH=168;
  ctx.save();
  ctx.shadowColor='rgba(26,26,24,0.08)'; ctx.shadowBlur=20; ctx.shadowOffsetY=6;
  rrect(76,cardY,848,cardH,14); ctx.fillStyle=P.white; ctx.fill();
  ctx.shadowColor='transparent';
  rrect(76,cardY,848,cardH,14); ctx.strokeStyle='#dde8df'; ctx.lineWidth=1; ctx.stroke();
  ctx.restore();

  ctx.fillStyle=P.appMuted; ctx.font='700 15px Lato'; ctx.letterSpacing='0.10em'; ctx.textBaseline='top';
  ctx.fillText('THE MATH',76+24,cardY+22);

  ctx.fillStyle=P.appText; ctx.font='300 34px "Cormorant Garamond"'; ctx.letterSpacing='0em';
  ctx.fillText('$36k expenses − $18k barista income = $18k gap',76+24,cardY+50);
  ctx.fillStyle=P.appMuted; ctx.font='400 26px Lato';
  ctx.fillText('$18,000 ÷ 4% SWR = $450,000 portfolio needed',76+24,cardY+98);
  ctx.fillStyle=P.appPrimary; ctx.font='700 20px Lato';
  ctx.fillText('vs $900,000 for Full FIRE — exactly half.',76+24,cardY+136);

  // ── Checkmarks ────────────────────────────────────────────────────────────
  const bullets=[
    {bold:'Reach freedom in 7 years', rest:' — not 18'},
    {bold:'Keep working part-time', rest:' — 20 hrs/week, your terms'},
    {bold:'Full FIRE still on track', rest:' — portfolio coasts to $900k'},
  ];
  const bStartY=CREAM_Y+676, bLineH=60, iconR=15;
  bullets.forEach((item,i)=>{
    const y=bStartY+i*bLineH, ix=76+iconR;
    ctx.beginPath(); ctx.arc(ix,y+iconR,iconR,0,Math.PI*2); ctx.fillStyle=P.sage; ctx.fill();
    ctx.fillStyle=P.white; ctx.font='700 17px Lato'; ctx.textBaseline='middle'; ctx.textAlign='center';
    ctx.fillText('✓',ix,y+iconR+1);
    ctx.textAlign='left';
    const tx=ix+iconR+16;
    ctx.fillStyle=P.nearBlk; ctx.font='700 24px Lato'; ctx.letterSpacing='0em'; ctx.textBaseline='middle';
    ctx.fillText(item.bold,tx,y+iconR);
    const boldW=ctx.measureText(item.bold).width;
    ctx.fillStyle=P.warmGray; ctx.font='400 24px Lato';
    ctx.fillText(item.rest,tx+boldW,y+iconR);
  });

  // Footer
  drawFooter(FOOT_Y);
}

function drawFooter(y){
  ctx.fillStyle=P.greenDk; ctx.fillRect(0,y,W,H-y);
  const midY=y+52;
  if(logo){const sz=64;ctx.save();ctx.beginPath();ctx.arc(88+sz/2,midY,sz/2,0,Math.PI*2);ctx.clip();ctx.drawImage(logo,88,midY-sz/2,sz,sz);ctx.restore();}
  ctx.fillStyle=P.white; ctx.font='700 24px Lato'; ctx.letterSpacing='0em'; ctx.textBaseline='middle';
  ctx.fillText('Try it free — no sign-up',174,midY-14);
  ctx.fillStyle=P.sagePale; ctx.font='700 15px Lato'; ctx.letterSpacing='0.10em';
  ctx.fillText('TIMEANDMONEYTREE.COM',174,midY+14);
  const bw=210,bh=48,bx=W-88-bw,by=midY-bh/2;
  rrect(bx,by,bw,bh,24); ctx.strokeStyle=rgba(P.sagePale,0.60); ctx.lineWidth=2; ctx.stroke();
  ctx.fillStyle=P.white; ctx.font='700 20px Lato'; ctx.letterSpacing='0.06em';
  ctx.textBaseline='middle'; ctx.textAlign='center';
  ctx.fillText('CALCULATE  →',bx+bw/2,midY); ctx.textAlign='left';
}

document.getElementById('bSave').addEventListener('click',()=>{const a=document.createElement('a');a.download='barista-fire-fire-number-pin.png';a.href=canvas.toDataURL('image/png');a.click();});
document.fonts.ready.then(()=>{ctx.font='300 1px "Cormorant Garamond"';ctx.fillText('',0,0);render();});
</script>
</body>
</html>
